name: Deploy ELC Worker

# Деплой Cloudflare Worker (elc-worker) без локального терминала.
#  • вручную — вкладка Actions → «Deploy ELC Worker» → Run workflow
#  • автоматически — при пуше в main, если менялись файлы elc-worker/**
#
# Нужен один секрет репозитория: CLOUDFLARE_API_TOKEN
# (Settings → Secrets and variables → Actions → New repository secret).
# Токен создаётся в Cloudflare: My Profile → API Tokens → шаблон
# «Edit Cloudflare Workers» (+ при необходимости добавь D1:Edit, R2:Edit).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'elc-worker/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: elc-worker
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: elc-worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
