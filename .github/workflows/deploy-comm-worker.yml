name: Deploy pllato-comm worker

# Авто-деплой воркера pllato-comm при изменении бэкенда.
# Чинит давнюю проблему: фронт обновлялся сам (статика из репо),
# а воркер приходилось деплоить руками — и о нём забывали → /api/* отдавал 404.
on:
  push:
    branches: [main]
    paths:
      - 'crm/worker/**'
  workflow_dispatch: {}   # можно запустить вручную из вкладки Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy worker
        working-directory: crm/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 deploy --config ./wrangler.toml
