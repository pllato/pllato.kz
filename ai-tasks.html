<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Мониторинг — Pllato</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="pllato_favicon_64.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-2: #0d1d34;
  --navy-3: #132845;
  --bronze: #b8895a;
  --bronze-light: #d4a978;
  --bronze-soft: rgba(184, 137, 90, 0.18);
  --text: #edf3fb;
  --muted: #94a3b8;
  --line: rgba(255, 255, 255, 0.08);
  --green: #36d399;
  --blue: #60a5fa;
  --orange: #f59e0b;
  --red: #fb7185;
  --shadow-dark: rgba(1, 7, 16, 0.72);
  --shadow-light: rgba(255, 255, 255, 0.06);
  --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 24% 16%, rgba(184, 137, 90, 0.2), transparent 28%),
    radial-gradient(circle at 78% 10%, rgba(96, 165, 250, 0.12), transparent 26%),
    linear-gradient(135deg, #07111f 0%, var(--navy) 45%, #081321 100%);
  color: var(--text);
  font-family: var(--sans);
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

.page {
  width: min(1480px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 22px 0 34px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}

.brand img {
  width: 36px;
  height: 36px;
  filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
}

.brand h1 {
  margin: 0;
  font-size: clamp(22px, 3vw, 34px);
  line-height: 1;
  letter-spacing: 0;
}

.brand p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.pill,
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 38px;
  padding: 9px 13px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(10, 22, 40, 0.64);
  box-shadow: 7px 7px 18px var(--shadow-dark), -5px -5px 14px var(--shadow-light);
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.back-link {
  color: var(--text);
}

.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(54, 211, 153, 0.45);
  animation: pulse 1.6s infinite;
}

@keyframes pulse {
  70% { box-shadow: 0 0 0 9px rgba(54, 211, 153, 0); }
  100% { box-shadow: 0 0 0 0 rgba(54, 211, 153, 0); }
}

.dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: stretch;
}

.office-shell,
.side-panel {
  border: 1px solid var(--line);
  border-radius: 22px;
  background: rgba(11, 24, 43, 0.72);
  box-shadow: 16px 16px 42px var(--shadow-dark), -12px -12px 32px var(--shadow-light);
  backdrop-filter: blur(18px);
}

.office-shell {
  position: relative;
  min-height: 690px;
  overflow: hidden;
}

.office {
  position: absolute;
  inset: 18px;
  overflow: hidden;
  border-radius: 18px;
  background:
    linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
    radial-gradient(ellipse at top, rgba(184, 137, 90, 0.11), transparent 40%),
    linear-gradient(160deg, rgba(19, 40, 69, 0.92), rgba(7, 17, 31, 0.98));
  background-size: 42px 42px, 42px 42px, auto, auto;
  box-shadow: inset 12px 12px 30px rgba(0, 0, 0, 0.42), inset -8px -8px 24px rgba(255, 255, 255, 0.035);
}

.office::before {
  content: "";
  position: absolute;
  left: 7%;
  right: 7%;
  top: 96px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212, 169, 120, 0.42), transparent);
}

.owner-deck {
  position: absolute;
  z-index: 5;
  top: 18px;
  left: 50%;
  width: min(560px, 72%);
  height: 98px;
  transform: translateX(-50%);
  border: 1px solid rgba(184, 137, 90, 0.2);
  border-radius: 0 0 28px 28px;
  background: linear-gradient(180deg, rgba(184, 137, 90, 0.2), rgba(10, 22, 40, 0.86));
  box-shadow: 0 18px 34px rgba(0, 0, 0, 0.34), inset 0 -9px 20px rgba(0, 0, 0, 0.32);
}

.owner {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  place-items: center;
  gap: 6px;
  color: var(--bronze-light);
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.owner-avatar,
.avatar,
.cto-avatar {
  display: grid;
  place-items: center;
  border-radius: 50%;
  font-weight: 900;
}

.owner-avatar {
  width: 46px;
  height: 46px;
  background: linear-gradient(145deg, #d4a978, #8b6740);
  color: #07111f;
  box-shadow: 8px 8px 18px rgba(0, 0, 0, 0.42), -5px -5px 14px rgba(255, 255, 255, 0.08);
}

.owner-sight {
  position: absolute;
  z-index: 2;
  top: 84px;
  left: 50%;
  width: 52%;
  height: 470px;
  transform: translateX(-50%);
  clip-path: polygon(48% 0, 52% 0, 100% 100%, 0 100%);
  background: linear-gradient(180deg, rgba(184, 137, 90, 0.11), transparent 82%);
  pointer-events: none;
}

.cto-zone {
  position: absolute;
  z-index: 4;
  left: 50%;
  top: 50%;
  width: 235px;
  height: 170px;
  transform: translate(-50%, -44%);
}

.cto-table {
  position: absolute;
  inset: 48px 0 0;
  border-radius: 24px;
  background: linear-gradient(145deg, #10233d, #07111f);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 16px 16px 36px rgba(0, 0, 0, 0.48), -9px -9px 22px rgba(255, 255, 255, 0.045);
}

.cto-table::before {
  content: "";
  position: absolute;
  inset: 18px 28px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(184, 137, 90, 0.34), rgba(184, 137, 90, 0.08));
  box-shadow: inset 5px 5px 12px rgba(0, 0, 0, 0.22);
}

.paper-stack {
  position: absolute;
  z-index: 2;
  right: 42px;
  top: 72px;
  width: 42px;
  height: 32px;
}

.paper-stack span,
.flying-paper {
  position: absolute;
  width: 32px;
  height: 22px;
  border-radius: 4px;
  background: #f7ead8;
  border: 1px solid rgba(184, 137, 90, 0.5);
  box-shadow: 4px 5px 10px rgba(0, 0, 0, 0.22);
}

.paper-stack span:nth-child(1) { transform: rotate(-8deg); }
.paper-stack span:nth-child(2) { transform: translate(5px, 5px) rotate(5deg); }
.paper-stack span:nth-child(3) { transform: translate(10px, 10px) rotate(-2deg); }

.cto-person {
  position: absolute;
  z-index: 4;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  place-items: center;
  gap: 7px;
}

.cto-avatar {
  width: 70px;
  height: 70px;
  background: linear-gradient(145deg, #1c3b63, #091525);
  border: 2px solid rgba(212, 169, 120, 0.42);
  color: var(--bronze-light);
  box-shadow: 9px 9px 22px rgba(0, 0, 0, 0.5), -6px -6px 16px rgba(255, 255, 255, 0.055);
}

.cto-label {
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(184, 137, 90, 0.17);
  border: 1px solid rgba(184, 137, 90, 0.26);
  color: var(--bronze-light);
  font-size: 11px;
  font-weight: 900;
}

.worker-station {
  position: absolute;
  z-index: 6;
  left: var(--x);
  top: var(--y);
  width: 190px;
  min-height: 160px;
  transform: translate(-50%, -50%);
}

.desk {
  position: absolute;
  left: 50%;
  bottom: 2px;
  width: 142px;
  height: 62px;
  transform: translateX(-50%);
  border-radius: 18px;
  background: linear-gradient(145deg, #122843, #071322);
  border: 1px solid rgba(255, 255, 255, 0.075);
  box-shadow: 11px 12px 22px rgba(0, 0, 0, 0.38), -6px -6px 16px rgba(255, 255, 255, 0.045);
}

.desk::before {
  content: "";
  position: absolute;
  left: 22px;
  top: 13px;
  width: 46px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.48), rgba(54, 211, 153, 0.18));
  box-shadow: 0 0 18px rgba(96, 165, 250, 0.16);
}

.desk::after {
  content: "";
  position: absolute;
  right: 22px;
  top: 17px;
  width: 34px;
  height: 22px;
  border-radius: 5px;
  background: rgba(247, 234, 216, 0.85);
}

.worker-person {
  position: absolute;
  z-index: 3;
  left: 62px;
  top: 46px;
  width: 66px;
  display: grid;
  place-items: center;
  gap: 5px;
  transform-origin: center;
}

.worker-station.is-working .worker-person,
.worker-station.is-running .worker-person,
.worker-station.is-active .worker-person {
  animation: fetchTask 7.2s cubic-bezier(0.42, 0, 0.2, 1) infinite;
}

@keyframes fetchTask {
  0%, 14% { transform: translate(0, 0) scale(1); }
  34%, 48% { transform: translate(calc(var(--walk-x) * 0.62), calc(var(--walk-y) * 0.62)) scale(0.96); }
  59% { transform: translate(calc(var(--walk-x) * 0.62), calc(var(--walk-y) * 0.62)) scale(0.96) rotate(-2deg); }
  82%, 100% { transform: translate(0, 0) scale(1); }
}

.avatar {
  width: 46px;
  height: 46px;
  background: linear-gradient(145deg, #173557, #081524);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #dbeafe;
  font-size: 13px;
  box-shadow: 8px 8px 17px rgba(0, 0, 0, 0.42), -5px -5px 12px rgba(255, 255, 255, 0.05);
}

.worker-station.is-complete .avatar,
.worker-station.is-done .avatar {
  color: #082116;
  background: linear-gradient(145deg, #6ee7b7, #36d399);
}

.worker-station.is-error .avatar,
.worker-station.is-failed .avatar {
  color: #2a0910;
  background: linear-gradient(145deg, #fda4af, #fb7185);
}

.body {
  width: 35px;
  height: 28px;
  border-radius: 14px 14px 9px 9px;
  background: linear-gradient(145deg, var(--bronze-light), var(--bronze));
  box-shadow: 5px 7px 13px rgba(0, 0, 0, 0.32);
}

.task-card {
  position: absolute;
  z-index: 5;
  left: 50%;
  top: -2px;
  width: min(190px, 44vw);
  transform: translateX(-50%);
  padding: 10px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.09);
  background: rgba(9, 20, 36, 0.86);
  box-shadow: 10px 10px 24px rgba(0, 0, 0, 0.38), -6px -6px 18px rgba(255, 255, 255, 0.045);
  backdrop-filter: blur(14px);
}

.session-id {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 900;
}

.meta {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-top: 7px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}

.stage {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}

.bar {
  height: 7px;
  margin-top: 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  overflow: hidden;
  box-shadow: inset 3px 3px 8px rgba(0, 0, 0, 0.34);
}

.bar span {
  display: block;
  width: var(--progress);
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--bronze), var(--green));
  box-shadow: 0 0 16px rgba(54, 211, 153, 0.28);
  transition: width 0.45s ease;
}

.flying-paper {
  z-index: 2;
  left: 50%;
  top: 52%;
  opacity: 0;
  transform: translate(-50%, -50%);
}

.worker-station.is-working .flying-paper,
.worker-station.is-running .flying-paper,
.worker-station.is-active .flying-paper {
  animation: paperMove 7.2s cubic-bezier(0.42, 0, 0.2, 1) infinite;
}

@keyframes paperMove {
  0%, 28% { opacity: 0; transform: translate(calc(var(--walk-x) * 0.62), calc(var(--walk-y) * 0.62)) rotate(-8deg); }
  42%, 58% { opacity: 1; transform: translate(calc(var(--walk-x) * 0.34), calc(var(--walk-y) * 0.34)) rotate(7deg); }
  80% { opacity: 1; transform: translate(-8px, 16px) rotate(-5deg); }
  100% { opacity: 0; transform: translate(0, 0) rotate(0); }
}

.side-panel {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.side-panel h2 {
  margin: 0;
  font-size: 17px;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat {
  padding: 14px;
  border-radius: 16px;
  background: linear-gradient(145deg, rgba(17, 36, 61, 0.92), rgba(8, 18, 32, 0.96));
  border: 1px solid var(--line);
  box-shadow: 8px 8px 18px rgba(0, 0, 0, 0.34), -5px -5px 14px rgba(255, 255, 255, 0.035);
}

.stat strong {
  display: block;
  font-size: 26px;
  line-height: 1;
}

.stat span {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}

.session-list {
  display: grid;
  gap: 9px;
  overflow: auto;
  padding-right: 2px;
}

.session-row {
  display: grid;
  gap: 5px;
  padding: 11px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(7, 17, 31, 0.62);
}

.session-row b,
.session-row small {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.session-row b {
  font-size: 12px;
}

.session-row small {
  color: var(--muted);
  font-size: 11px;
}

.empty {
  display: grid;
  place-items: center;
  min-height: 180px;
  padding: 24px;
  color: var(--muted);
  text-align: center;
  border: 1px dashed rgba(255, 255, 255, 0.13);
  border-radius: 16px;
}

.status-ok { color: var(--green); }
.status-work { color: var(--blue); }
.status-wait { color: var(--orange); }
.status-error { color: var(--red); }

@media (max-width: 1100px) {
  .dashboard { grid-template-columns: 1fr; }
  .office-shell { min-height: 720px; }
  .side-panel { min-height: 0; }
}

@media (max-width: 760px) {
  .page { width: min(100vw - 20px, 1480px); padding-top: 14px; }
  .topbar { align-items: flex-start; }
  .brand h1 { font-size: 22px; }
  .actions { width: 100%; justify-content: flex-start; }
  .office-shell { min-height: 840px; border-radius: 18px; }
  .office { inset: 10px; }
  .owner-deck { width: 88%; }
  .cto-zone { top: 45%; transform: translate(-50%, -50%) scale(0.9); }
  .worker-station { width: 166px; }
  .task-card { width: 160px; }
  .stats { grid-template-columns: 1fr 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="brand" href="/app.html" aria-label="Pllato apps">
        <img src="pllato_logo_transparent_white.svg" alt="">
        <div>
          <h1>AI Мониторинг</h1>
          <p>Владелец смотрит сверху, CTO раздаёт задачи, воркеры уходят работать.</p>
        </div>
      </a>
      <div class="actions">
        <div class="pill"><span class="pulse-dot"></span><span id="refreshText">Обновление каждые 3 сек</span></div>
        <a class="back-link" href="/app.html">← В хаб</a>
      </div>
    </header>

    <section class="dashboard">
      <div class="office-shell" aria-label="Офис AI-воркеров">
        <div class="office" id="office">
          <div class="owner-sight"></div>
          <div class="owner-deck">
            <div class="owner">
              <div class="owner-avatar">P</div>
              <div>Владелец</div>
            </div>
          </div>

          <div class="cto-zone" id="ctoZone">
            <div class="cto-table"></div>
            <div class="paper-stack" aria-hidden="true"><span></span><span></span><span></span></div>
            <div class="cto-person">
              <div class="cto-avatar">CTO</div>
              <div class="cto-label">Центр выдачи</div>
            </div>
          </div>

          <div id="workers"></div>
        </div>
      </div>

      <aside class="side-panel">
        <h2>Сессии</h2>
        <div class="stats">
          <div class="stat"><strong id="totalCount">0</strong><span>Всего</span></div>
          <div class="stat"><strong id="activeCount">0</strong><span>В работе</span></div>
          <div class="stat"><strong id="doneCount">0</strong><span>Готово</span></div>
          <div class="stat"><strong id="errorCount">0</strong><span>Ошибки</span></div>
        </div>
        <div class="session-list" id="sessionList">
          <div class="empty">Загружаю данные из /api/codex/sessions</div>
        </div>
      </aside>
    </section>
  </main>

<script>
const API_URL = "/api/codex/sessions";
const REFRESH_MS = 3000;
const MAX_WORKERS = 10;

const workersEl = document.getElementById("workers");
const sessionListEl = document.getElementById("sessionList");
const refreshTextEl = document.getElementById("refreshText");
const counters = {
  total: document.getElementById("totalCount"),
  active: document.getElementById("activeCount"),
  done: document.getElementById("doneCount"),
  error: document.getElementById("errorCount")
};

const desktopSlots = [
  { x: 18, y: 34 }, { x: 82, y: 34 }, { x: 17, y: 63 }, { x: 83, y: 63 },
  { x: 31, y: 81 }, { x: 69, y: 81 }, { x: 32, y: 23 }, { x: 68, y: 23 },
  { x: 50, y: 82 }, { x: 50, y: 21 }
];

const mobileSlots = [
  { x: 24, y: 26 }, { x: 76, y: 26 }, { x: 22, y: 54 }, { x: 78, y: 54 },
  { x: 26, y: 76 }, { x: 74, y: 76 }, { x: 50, y: 84 }, { x: 50, y: 18 }
];

function normalizeResponse(payload) {
  const raw = Array.isArray(payload)
    ? payload
    : Array.isArray(payload?.sessions)
      ? payload.sessions
      : payload?.sessions && typeof payload.sessions === "object"
        ? Object.entries(payload.sessions).map(([id, value]) => ({ id, ...value }))
        : payload && typeof payload === "object"
          ? Object.entries(payload).map(([id, value]) => typeof value === "object" ? ({ id, ...value }) : ({ id, value }))
          : [];

  return raw.map((item, index) => {
    const id = String(item.session_id || item.sessionId || item.id || item.name || `session-${index + 1}`);
    const status = String(item.status || item.state || item.phase || "waiting").toLowerCase();
    const stage = String(item.stage || item.step || item.current_step || item.message || item.task || "ожидает задачу");
    const progress = clampProgress(item.progress ?? item.percent ?? item.percentage ?? progressByStatus(status));
    return { id, status, stage, progress, raw: item };
  });
}

function clampProgress(value) {
  const numeric = Number.parseFloat(value);
  if (!Number.isFinite(numeric)) return 0;
  return Math.max(0, Math.min(100, numeric <= 1 ? numeric * 100 : numeric));
}

function progressByStatus(status) {
  if (isDone(status)) return 100;
  if (isError(status)) return 100;
  if (isActive(status)) return 58;
  return 8;
}

function isActive(status) {
  return ["active", "running", "working", "in_progress", "processing", "work"].some((key) => status.includes(key));
}

function isDone(status) {
  return ["done", "complete", "completed", "success", "finished", "ready", "готов"].some((key) => status.includes(key));
}

function isError(status) {
  return ["error", "failed", "fail", "cancel", "stopped", "ошиб"].some((key) => status.includes(key));
}

function statusLabel(status) {
  if (isDone(status)) return "готово";
  if (isError(status)) return "ошибка";
  if (isActive(status)) return "работает";
  return "ожидает";
}

function statusClass(status) {
  if (isDone(status)) return "status-ok";
  if (isError(status)) return "status-error";
  if (isActive(status)) return "status-work";
  return "status-wait";
}

function stationClass(status) {
  if (isDone(status)) return "is-complete";
  if (isError(status)) return "is-error";
  if (isActive(status)) return "is-working";
  return "is-waiting";
}

function initials(id) {
  const clean = id.replace(/^codex[-_]?/i, "").replace(/[^a-z0-9]/gi, "");
  return (clean.slice(0, 2) || "AI").toUpperCase();
}

function shortId(id) {
  return id.length > 22 ? `${id.slice(0, 10)}...${id.slice(-7)}` : id;
}

function getSlots() {
  return window.matchMedia("(max-width: 760px)").matches ? mobileSlots : desktopSlots;
}

function renderOffice(sessions) {
  const slots = getSlots();
  const visible = sessions.slice(0, Math.min(MAX_WORKERS, slots.length));
  const placeholders = Math.max(0, Math.min(4, slots.length - visible.length));
  const display = [
    ...visible,
    ...Array.from({ length: placeholders }, (_, index) => ({
      id: `standby-${index + 1}`,
      status: "waiting",
      stage: "свободное место",
      progress: 0,
      placeholder: true
    }))
  ];

  workersEl.innerHTML = display.map((session, index) => {
    const slot = slots[index];
    const walkX = 50 - slot.x;
    const walkY = 49 - slot.y;
    const muted = session.placeholder ? " opacity: .46;" : "";
    return `
      <article class="worker-station ${stationClass(session.status)}" style="--x:${slot.x}%; --y:${slot.y}%; --walk-x:${walkX * 5.2}px; --walk-y:${walkY * 5.2}px;${muted}">
        <div class="task-card">
          <div class="session-id" title="${escapeHtml(session.id)}">${escapeHtml(shortId(session.id))}</div>
          <div class="meta">
            <span class="${statusClass(session.status)}">${escapeHtml(statusLabel(session.status))}</span>
            <span class="stage" title="${escapeHtml(session.stage)}">${escapeHtml(session.stage)}</span>
          </div>
          <div class="bar"><span style="--progress:${session.progress}%"></span></div>
        </div>
        <div class="worker-person">
          <div class="avatar">${escapeHtml(initials(session.id))}</div>
          <div class="body"></div>
        </div>
        <div class="desk"></div>
        <div class="flying-paper"></div>
      </article>
    `;
  }).join("");
}

function renderPanel(sessions, errorText = "") {
  const active = sessions.filter((item) => isActive(item.status)).length;
  const done = sessions.filter((item) => isDone(item.status)).length;
  const errors = sessions.filter((item) => isError(item.status)).length;

  counters.total.textContent = sessions.length;
  counters.active.textContent = active;
  counters.done.textContent = done;
  counters.error.textContent = errors;

  if (!sessions.length) {
    sessionListEl.innerHTML = `<div class="empty">${escapeHtml(errorText || "Активных AI-сессий пока нет.")}</div>`;
    return;
  }

  sessionListEl.innerHTML = sessions.map((session) => `
    <div class="session-row">
      <b title="${escapeHtml(session.id)}">${escapeHtml(shortId(session.id))}</b>
      <small><span class="${statusClass(session.status)}">${escapeHtml(statusLabel(session.status))}</span> · ${escapeHtml(session.stage)} · ${Math.round(session.progress)}%</small>
    </div>
  `).join("");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadSessions() {
  const startedAt = new Date();
  try {
    const response = await fetch(API_URL, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const payload = await response.json();
    const sessions = normalizeResponse(payload);
    renderOffice(sessions);
    renderPanel(sessions);
    refreshTextEl.textContent = `Обновлено ${startedAt.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
  } catch (error) {
    const message = `API недоступен: ${error.message}. Жду /api/codex/sessions.`;
    renderOffice([]);
    renderPanel([], message);
    refreshTextEl.textContent = "Нет связи с API";
  }
}

window.addEventListener("resize", () => loadSessions());
loadSessions();
setInterval(loadSessions, REFRESH_MS);
</script>
</body>
</html>
