<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pllato CRM</title>
<style>
:root {
  --bg: #0e0e12;
  --bg2: #16161d;
  --bg3: #1f1f2a;
  --bg4: #27273a;
  --b1: rgba(255,255,255,.08);
  --b2: rgba(255,255,255,.15);
  --t1: #f0eefc;
  --t2: #c5c2db;
  --t3: #9896b0;
  --ac: #7c5cfc;
  --ac2: #a87fff;
  --acbg: rgba(124,92,252,.12);
  --acb: rgba(124,92,252,.3);
  --gn: #3fd88e;
  --rd: #f05975;
  --yl: #f5c14b;
  --r: 10px;
  --fb: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Login screen ─────────────────────────────────── */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 420px;
}
.logo {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.logo .accent { color: var(--ac); }
.tagline {
  font-size: 13px;
  color: var(--t3);
  margin-bottom: 24px;
}
.btn {
  background: var(--ac);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-family: var(--fb);
  font-size: 13px;
  font-weight: 600;
  padding: 11px 22px;
  transition: opacity .15s;
  width: 100%;
  margin-bottom: 8px;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.google {
  background: white;
  color: #1f1f2a;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn.secondary {
  background: var(--bg3);
  color: var(--t1);
  border: 1px solid var(--b2);
}
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--b1);
}
.input {
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 10px;
  color: var(--t1);
  font-family: var(--fb);
  font-size: 13px;
  padding: 11px 14px;
  width: 100%;
  margin-bottom: 8px;
}
.input:focus { outline: none; border-color: var(--ac); }
.error {
  background: rgba(240,89,117,.08);
  border: 1px solid rgba(240,89,117,.3);
  border-radius: 8px;
  color: var(--rd);
  font-size: 12px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.success {
  background: rgba(63,216,142,.08);
  border: 1px solid rgba(63,216,142,.3);
  border-radius: 8px;
  color: var(--gn);
  font-size: 12px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.link {
  color: var(--ac2);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  margin-top: 8px;
}
.link:hover { text-decoration: underline; }

/* ── App layout ───────────────────────────────────── */
.app { display: none; min-height: 100vh; }
.app.active { display: flex; }
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--b1);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
}
.sidebar .logo { font-size: 18px; margin-bottom: 22px; padding: 0 6px; }
.nav-section {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--t3);
  padding: 10px 8px 6px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--t2);
  transition: background .15s;
}
.nav-item:hover { background: var(--bg3); color: var(--t1); }
.nav-item.active { background: var(--acbg); color: var(--ac2); font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-spacer { flex: 1; }
.user-card {
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--ac);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
}
.user-name {
  font-size: 12px;
  color: var(--t1);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.user-email {
  font-size: 11px;
  color: var(--t3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.signout-btn {
  background: transparent;
  border: 1px solid var(--b2);
  border-radius: 6px;
  color: var(--t3);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
}
.signout-btn:hover { color: var(--rd); border-color: var(--rd); }

.main {
  flex: 1;
  padding: 24px 32px;
  overflow-y: auto;
}
.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 13px;
  color: var(--t3);
  margin-bottom: 22px;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 14px;
}
.card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--t2);
}
.empty {
  color: var(--t3);
  font-size: 13px;
  padding: 30px 20px;
  text-align: center;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 12px;
  padding: 14px 16px;
}
.stat-label { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; color: var(--t1); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.btn-sm {
  padding: 8px 14px;
  font-size: 12px;
  width: auto;
  margin-bottom: 0;
}
.log-area {
  background: #0a0a0e;
  border: 1px solid var(--b1);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 11px;
  color: var(--t2);
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.6;
}
.log-area .ok { color: var(--gn); }
.log-area .err { color: var(--rd); }
.log-area .info { color: var(--ac2); }
.log-area .gray { color: var(--t3); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--b1); }
th { color: var(--t3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
td { color: var(--t2); }
tr:hover td { background: var(--bg3); }

@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; }
  .main { padding: 16px; }
}

/* ── Deals page ───────────────────────────────────── */
.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar input, .toolbar select {
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px;
  color: var(--t1);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 11px;
}
.toolbar input { flex: 1; min-width: 180px; }
.toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--ac); }
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 7px 14px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px;
  color: var(--t2);
  cursor: pointer;
  font-size: 12px;
}
.view-tab.active {
  background: var(--acbg);
  border-color: var(--ac);
  color: var(--ac2);
  font-weight: 600;
}
.deals-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.deals-table th, .deals-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--b1);
}
.deals-table th {
  color: var(--t3);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .04em;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 2;
}
.deals-table td { color: var(--t2); }
.deals-table tr.row { cursor: pointer; }
.deals-table tr.row:hover td { background: var(--bg3); }
.deals-table .deal-title {
  color: var(--t1);
  font-weight: 600;
  max-width: 350px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stage-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg3);
  color: var(--t2);
  border: 1px solid var(--b1);
  white-space: nowrap;
}
.stage-badge.success { background: rgba(63,216,142,.12); color: var(--gn); border-color: rgba(63,216,142,.3); }
.stage-badge.failed { background: rgba(240,89,117,.12); color: var(--rd); border-color: rgba(240,89,117,.3); }
.money { color: var(--gn); font-weight: 600; font-variant-numeric: tabular-nums; }
.money.zero { color: var(--t3); font-weight: 400; }
.pagination {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.pagination .pg-btn {
  background: var(--bg3);
  border: 1px solid var(--b2);
  color: var(--t2);
  border-radius: 6px;
  padding: 6px 11px;
  cursor: pointer;
  font-size: 12px;
}
.pagination .pg-btn:hover { background: var(--bg4); }
.pagination .pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.pagination .pg-info { color: var(--t3); font-size: 12px; padding: 0 8px; }

/* Kanban */
.kanban-wrap {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 16px;
  margin: 0 -8px;
  padding-left: 8px;
}
.kanban-col {
  flex-shrink: 0;
  width: 280px;
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 12px;
  padding: 10px;
  max-height: calc(100vh - 240px);
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px 8px;
  border-bottom: 1px solid var(--b1);
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--t2);
  font-weight: 600;
}
.kanban-col-header .col-count {
  color: var(--t3);
  font-weight: 500;
  font-size: 11px;
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 10px;
}
.kanban-col-cards {
  flex: 1;
  overflow-y: auto;
  padding: 0 4px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.kanban-card {
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 8px;
  padding: 9px 11px;
  cursor: pointer;
  transition: border-color .15s;
}
.kanban-card:hover { border-color: var(--ac); }
.kanban-card-title {
  font-size: 12px;
  color: var(--t1);
  font-weight: 600;
  margin-bottom: 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.4;
}
.kanban-card-meta {
  font-size: 11px;
  color: var(--t3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-card-money {
  color: var(--gn);
  font-weight: 600;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

/* Deal card modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 100;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: 22px 26px;
  width: 100%;
  max-width: 760px;
  margin: 20px auto;
  position: relative;
}
.modal .close-x {
  position: absolute;
  top: 14px;
  right: 16px;
  background: transparent;
  border: none;
  color: var(--t3);
  font-size: 24px;
  cursor: pointer;
  width: auto;
  padding: 0;
  margin: 0;
  line-height: 1;
}
.modal .close-x:hover { color: var(--t1); }
.modal h2 { font-size: 18px; margin-bottom: 4px; padding-right: 30px; }
.modal-sub { color: var(--t3); font-size: 12px; margin-bottom: 18px; }
.field-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 8px 18px;
  font-size: 13px;
  margin-bottom: 18px;
}
.field-grid .fl { color: var(--t3); padding: 4px 0; }
.field-grid .fv { color: var(--t1); padding: 4px 0; word-break: break-word; }
.section-h {
  font-size: 12px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 18px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--b1);
}
.muted { color: var(--t3); }
.empty-cell { color: var(--t3); font-style: italic; font-size: 12px; }
.cf-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 14px;
  font-size: 12px;
}
@media (max-width: 600px) {
  .field-grid { grid-template-columns: 1fr; gap: 2px 0; }
  .field-grid .fl { color: var(--t3); padding-top: 8px; padding-bottom: 0; font-size: 11px; }
  .field-grid .fv { padding-top: 0; padding-bottom: 8px; }
  .cf-grid { grid-template-columns: 1fr; }
  .kanban-col { width: 240px; }
}

/* ─── Таймлайн дел сделки/контакта ─── */
.tl-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.tl-filter {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg3);
  border: 1px solid transparent;
  color: var(--t3);
  padding: 5px 10px;
  border-radius: 18px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.tl-filter:hover { background: var(--bg2); }
.tl-filter.active { background: rgba(127,99,232,.15); color: var(--t1); border-color: rgba(127,99,232,.4); }
.tl-filter .tl-count {
  background: rgba(0,0,0,.3);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 10px;
}
.tl-filter.active .tl-count { background: rgba(127,99,232,.3); }

.tl-wrap {
  border-left: 1px solid var(--bg3);
  margin-left: 14px;
  padding-left: 18px;
  position: relative;
}
.tl-day-label {
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 18px 0 8px -32px;
  padding-left: 32px;
  font-weight: 600;
}
.tl-day-label:first-child { margin-top: 0; }

.tl-item {
  position: relative;
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.tl-item:last-child { border-bottom: none; }

.tl-icon {
  position: absolute;
  left: -32px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  border: 2px solid var(--bg2);
}

.tl-body { flex: 1; min-width: 0; padding-left: 4px; }

.tl-head {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--t3);
  margin-bottom: 3px;
}
.tl-type-label { color: var(--t2); font-weight: 600; }
.tl-time { margin-left: auto; }
.tl-provider { background: rgba(127,99,232,.15); color: var(--ac2); padding: 1px 7px; border-radius: 8px; font-size: 10px; }
.tl-dir.incoming { color: #3fd88e; font-size: 10px; }
.tl-dir.outgoing { color: #f0a23a; font-size: 10px; }
.tl-duration { color: var(--t3); font-size: 11px; }
.tl-completed { color: #3fd88e; font-weight: 700; }

.tl-subject {
  font-size: 13px;
  color: var(--t1);
  font-weight: 500;
  margin-bottom: 3px;
  word-break: break-word;
}
.tl-desc {
  font-size: 12px;
  color: var(--t2);
  line-height: 1.5;
  word-break: break-word;
}
.tl-files {
  font-size: 11px;
  color: var(--t3);
  margin-top: 6px;
  padding: 5px 10px;
  background: var(--bg3);
  border-radius: 6px;
  display: inline-block;
}
.tl-files-status {
  margin-left: 6px;
  font-size: 10px;
  color: var(--t3);
}
@media (max-width: 600px) {
  .tl-wrap { margin-left: 8px; padding-left: 14px; }
  .tl-icon { left: -25px; width: 22px; height: 22px; font-size: 11px; }
  .tl-head { font-size: 10px; }
  .tl-time { width: 100%; margin-left: 0; }
}
</style>
</head>
<body>

<!-- ── Login Screen ───────────────────────────────────────────── -->
<div id="login" class="login-wrap">
  <div class="login-card">
    <div class="logo">Pllato<span class="accent">.crm</span></div>
    <div class="tagline">Внутренний портал управления</div>

    <div id="login-error" class="error" style="display:none"></div>
    <div id="login-success" class="success" style="display:none"></div>

    <button class="btn google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34.4 5.8 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.2-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34.4 5.8 29.4 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.4-4.6 2.5-7.3 2.5-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.3 5.3C41.4 35.5 44 30.2 44 24c0-1.3-.2-2.6-.4-3.9z"/></svg>
      Войти через Google
    </button>

    <div class="divider">или</div>

    <input type="email" id="login-email" class="input" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" class="input" placeholder="Пароль" autocomplete="current-password">
    <button class="btn" onclick="loginEmail()">Войти по email</button>

    <a class="link" onclick="resetPassword()">Забыли пароль?</a>
  </div>
</div>

<!-- ── Main App ───────────────────────────────────────────────── -->
<div id="app" class="app">
  <div class="sidebar">
    <div class="logo">Pllato<span class="accent">.crm</span></div>

    <div class="nav-section">Главное</div>
    <div class="nav-item" data-page="dashboard">
      <span class="nav-icon">📊</span><span>Главная</span>
    </div>

    <div class="nav-section">CRM</div>
    <div class="nav-item" data-page="contacts">

} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';

// ── Config ───────────────────────────────────────────────
const firebaseConfig = {

// ── Auth: Google sign-in ─────────────────────────────────
window.loginGoogle = async function() {
  showError('');
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch (e) {
    showError(humanizeAuthError(e));
  }
};

window.loginEmail = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!email || !pass) { showError('Введите email и пароль'); return; }
  showError('');
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    showError(humanizeAuthError(e));
  }
};

window.resetPassword = async function() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('Сначала введите email'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess('Письмо для сброса пароля отправлено на ' + email);
  } catch (e) {
    showError(humanizeAuthError(e));
  }
};

window.signOut = async function() {
  await fbSignOut(auth);
};

function humanizeAuthError(e) {
  const code = e.code || '';
  if (code.includes('user-not-found')) return 'Пользователь не найден';
  if (code.includes('wrong-password') || code.includes('invalid-credential')) return 'Неверный пароль';
  if (code.includes('invalid-email')) return 'Неправильный формат email';
  if (code.includes('too-many-requests')) return 'Слишком много попыток. Попробуйте позже';
  if (code.includes('popup-closed-by-user')) return 'Окно закрыто';
  if (code.includes('popup-blocked')) return 'Браузер заблокировал всплывающее окно. Разрешите popups для этого сайта.';
  return e.message || 'Ошибка авторизации';
}
function showError(msg) {
  const el = document.getElementById('login-error');
  if (msg) { el.textContent = msg; el.style.display = ''; } else { el.style.display = 'none'; }
  document.getElementById('login-success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('login-success');
  if (msg) { el.textContent = msg; el.style.display = ''; } else { el.style.display = 'none'; }
  document.getElementById('login-error').style.display = 'none';
}

// ── Auth state listener ──────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.add('active');
    initApp(user);
  } else {
    document.getElementById('login').style.display = '';
    document.getElementById('app').classList.remove('active');
  }
});

// ── App init ─────────────────────────────────────────────
async function initApp(user) {
  // Сохраняем профиль текущего пользователя
  const profile = {
    email: user.email,
    name: user.displayName || user.email.split('@')[0],
    photoURL: user.photoURL || '',
    lastLogin: new Date().toISOString(),
    provider: user.providerData[0]?.providerId || 'unknown',
  };
  await update(ref(db, `users/${user.uid}`), profile);

  // UI
  const initials = (profile.name || 'U').split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
  document.getElementById('ux-avatar').textContent = initials;
  document.getElementById('ux-name').textContent = profile.name;
  document.getElementById('ux-email').textContent = user.email;

  // Default page
  navigate('dashboard');

  // Setup nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => navigate(el.dataset.page);
  });
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const main = document.getElementById('main');
  if (page === 'dashboard') renderDashboard(main);
  else if (page === 'contacts') renderEmptyPage(main, 'Контакты', 'Здесь будут все контакты CRM. Сейчас данных нет — мигрируем из Битрикса.');
  else if (page === 'deals') renderDeals(main);
  else if (page === 'tasks') renderEmptyPage(main, 'Задачи', 'Здесь будут задачи. Сейчас данных нет — мигрируем из Битрикса.');
  else if (page === 'users') renderUsers(main);
  else if (page === 'migration') renderMigration(main);
}

function renderDashboard(el) {
  el.innerHTML = `
    <div class="page-title">👋 Добро пожаловать в Pllato CRM</div>
    <div class="page-sub">Внутренний портал, скоро здесь будут все ваши данные</div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Контакты</div><div class="stat-value" id="s-contacts">0</div></div>
      <div class="stat"><div class="stat-label">Сделки</div><div class="stat-value" id="s-deals">0</div></div>
      <div class="stat"><div class="stat-label">Задачи</div><div class="stat-value" id="s-tasks">0</div></div>
      <div class="stat"><div class="stat-label">Сотрудники</div><div class="stat-value" id="s-users">0</div></div>
    </div>

    <div class="card">
      <h3>🚀 Что дальше</h3>
      <div style="font-size:13px;color:var(--t2);line-height:1.7">

        <br>1. Миграция 88 пользователей из Битрикса (раздел "Миграция Bitrix")

    <div class="card">

async function loadDashboardStats() {
  try {
    // Используем shallow=true чтобы не качать всё содержимое 22к сделок —
    // получим только список ключей
    const [contactsKeys, dealsKeys, tasksKeys, usersKeys] = await Promise.all([
      fetchShallowKeys('contacts'),
      fetchShallowKeys('deals'),
      fetchShallowKeys('tasks'),
      fetchShallowKeys('users'),
    ]);
    document.getElementById('s-contacts').textContent = contactsKeys.toLocaleString('ru');
    document.getElementById('s-deals').textContent = dealsKeys.toLocaleString('ru');
    document.getElementById('s-tasks').textContent = tasksKeys.toLocaleString('ru');
    document.getElementById('s-users').textContent = usersKeys.toLocaleString('ru');
  } catch (e) {
    console.warn('stats error:', e);
  }
}

async function fetchShallowKeys(path) {
  // Firebase REST API с shallow=true — возвращает только верхний уровень ключей
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const url = `https://pllato-crm-default-rtdb.firebaseio.com/${path}.json?shallow=true&auth=${idToken}`;
    const r = await fetch(url);
    if (!r.ok) return 0;
    const data = await r.json();
    if (!data) return 0;
    return Object.keys(data).length;
  } catch (e) {
    return 0;
  }
}

async function testConnection() {
  const el = document.getElementById('conn-status');
  try {
    el.textContent = '⏳ Проверяем Worker...';
    const r = await fetch(WORKER_URL + '/api/whoami', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken: await auth.currentUser.getIdToken() })
    });
    const d = await r.json();
    if (d.ok) {
      el.innerHTML = `<span style="color:var(--gn)">✓ Worker отвечает</span> · Firebase project: <b>${d.project}</b> · вы: <b>${d.email}</b>`;
    } else {
      el.innerHTML = `<span style="color:var(--rd)">✗ Worker ошибка:</span> ${d.error}`;
    }
  } catch (e) {
    el.innerHTML = `<span style="color:var(--rd)">✗ Worker недоступен:</span> ${e.message}`;
  }
}

// ── Deals state (in-memory cache) ────────────────────────
const dealsState = {
  loaded: false,
  deals: [],          // массив всех сделок
  pipeline: null,     // структура воронки
  customSchema: null, // схема кастомных полей
  users: {},          // map: uid -> {name, lastName, email}
  view: 'list',       // 'list' | 'kanban'
  search: '',
  stageFilter: '',
  responsibleFilter: '',
  page: 0,
  pageSize: 50,
};

async function renderDeals(el) {
  el.innerHTML = `
    <div class="page-title">💼 Сделки</div>
    <div class="page-sub">Воронка UniqBook Старт</div>
    <div class="card" id="deals-loader">
      <div class="empty">⏳ Загружаем данные из Firebase...</div>
    </div>
  `;

  // Один раз загружаем всё что нужно
  if (!dealsState.loaded) {
    await loadDealsData();
  }

  if (!dealsState.deals.length) {
    document.getElementById('deals-loader').innerHTML = `
      <div class="empty">
        Сделки не найдены в базе.<br>
        Запустите миграцию из раздела <b>Миграция Bitrix</b>.
      </div>
    `;
    return;
  }

  renderDealsLayout(el);
}

async function loadDealsData() {
  try {
    const [dealsSnap, pipelineSnap, schemaSnap, usersSnap] = await Promise.all([
      dbGet(dbRef(fbDb, 'deals')),
      dbGet(dbRef(fbDb, 'pipelines/pipeline_3')),
      dbGet(dbRef(fbDb, 'customFieldsSchema/deal')),
      dbGet(dbRef(fbDb, 'users')),
    ]);

    const dealsObj = dealsSnap.val() || {};
    dealsState.deals = Object.values(dealsObj);
    dealsState.pipeline = pipelineSnap.val() || null;
    dealsState.customSchema = schemaSnap.val() || {};
    dealsState.users = usersSnap.val() || {};
    dealsState.loaded = true;

    // Сортируем по дате создания (сначала новые)
    dealsState.deals.sort((a, b) => {
      return (b.bitrixDateCreate || '').localeCompare(a.bitrixDateCreate || '');
    });

    console.log(`Loaded ${dealsState.deals.length} deals`);
  } catch (e) {
    console.error('loadDealsData error:', e);
  }
}

function renderDealsLayout(el) {
  el.innerHTML = `
    <div class="page-title">💼 Сделки</div>
    <div class="page-sub">Воронка <b>${escapeHtml(dealsState.pipeline?.name || 'Неизвестно')}</b> · ${dealsState.deals.length.toLocaleString('ru')} сделок</div>

    <div class="toolbar">
      <input type="text" id="deal-search" placeholder="🔍 Поиск по названию..." value="${escapeHtml(dealsState.search)}">
      <select id="stage-filter">
        <option value="">Все стадии</option>
        ${getStagesSorted().map(s => `<option value="${escapeHtml(s.statusId)}" ${s.statusId === dealsState.stageFilter ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}
      </select>
      <select id="resp-filter">
        <option value="">Все ответственные</option>
        ${getUsersForFilter().map(u => `<option value="${escapeHtml(u.uid)}" ${u.uid === dealsState.responsibleFilter ? 'selected' : ''}>${escapeHtml(u.fullName)}</option>`).join('')}
      </select>
      <div class="view-tabs">
        <div class="view-tab ${dealsState.view === 'list' ? 'active' : ''}" data-view="list">📋 Список</div>
        <div class="view-tab ${dealsState.view === 'kanban' ? 'active' : ''}" data-view="kanban">📊 Канбан</div>
      </div>
    </div>

    <div id="deals-content"></div>
  `;

  // Listeners
  document.getElementById('deal-search').addEventListener('input', e => {
    dealsState.search = e.target.value;
    dealsState.page = 0;
    renderDealsContent();
  });
  document.getElementById('stage-filter').addEventListener('change', e => {
    dealsState.stageFilter = e.target.value;
    dealsState.page = 0;
    renderDealsContent();
  });
  document.getElementById('resp-filter').addEventListener('change', e => {
    dealsState.responsibleFilter = e.target.value;
    dealsState.page = 0;
    renderDealsContent();
  });
  document.querySelectorAll('[data-view]').forEach(t => {
    t.addEventListener('click', () => {
      dealsState.view = t.dataset.view;
      renderDealsLayout(el);
    });
  });

  renderDealsContent();
}

function getFilteredDeals() {
  let arr = dealsState.deals;
  if (dealsState.search) {
    const q = dealsState.search.toLowerCase();
    arr = arr.filter(d => (d.title || '').toLowerCase().includes(q));
  }
  if (dealsState.stageFilter) {
    arr = arr.filter(d => d.stageId === dealsState.stageFilter);
  }
  if (dealsState.responsibleFilter) {
    arr = arr.filter(d => d.responsibleUid === dealsState.responsibleFilter);
  }
  return arr;
}

function renderDealsContent() {
  const c = document.getElementById('deals-content');
  if (!c) return;
  const arr = getFilteredDeals();

  if (dealsState.view === 'list') {
    renderDealsList(c, arr);
  } else {
    renderDealsKanban(c, arr);
  }
}

function renderDealsList(c, arr) {
  if (!arr.length) {
    c.innerHTML = `<div class="card"><div class="empty">Не найдено сделок по фильтрам</div></div>`;
    return;
  }
  const totalPages = Math.ceil(arr.length / dealsState.pageSize);
  const page = Math.min(dealsState.page, totalPages - 1);
  const start = page * dealsState.pageSize;
  const end = Math.min(start + dealsState.pageSize, arr.length);
  const slice = arr.slice(start, end);

  let html = `<div class="card" style="padding:0;overflow:auto">
    <table class="deals-table">
      <thead>
        <tr>
          <th>Название</th>
          <th>Стадия</th>
          <th>Сумма</th>
          <th>Ответственный</th>
          <th>Создано</th>
        </tr>
      </thead>
      <tbody>`;

  for (const d of slice) {
    const stage = dealsState.pipeline?.stages?.[d.stageId];
    const stageName = stage?.name || d.stageId || '—';
    const stageCls = stage?.semantics === 'S' ? 'success' : stage?.semantics === 'F' ? 'failed' : '';
    const respUser = dealsState.users[d.responsibleUid];
    const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
    const opp = d.opportunity || 0;
    const date = d.bitrixDateCreate ? d.bitrixDateCreate.slice(0, 10) : '—';

    html += `<tr class="row" data-deal-id="${escapeHtml(d.bitrixId)}">
      <td><div class="deal-title">${escapeHtml(d.title || '(без названия)')}</div></td>
      <td><span class="stage-badge ${stageCls}">${escapeHtml(stageName)}</span></td>
      <td class="money ${opp === 0 ? 'zero' : ''}">${opp ? opp.toLocaleString('ru') + ' ' + (d.currency || '') : '—'}</td>
      <td>${escapeHtml(respName)}</td>
      <td class="muted">${date}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  // Pagination
  html += `<div class="pagination">
    <button class="pg-btn" data-pg="first" ${page === 0 ? 'disabled' : ''}>« Первая</button>
    <button class="pg-btn" data-pg="prev" ${page === 0 ? 'disabled' : ''}>‹ Назад</button>
    <span class="pg-info">${page + 1} из ${totalPages} · показано ${start + 1}–${end} из ${arr.length.toLocaleString('ru')}</span>
    <button class="pg-btn" data-pg="next" ${page >= totalPages - 1 ? 'disabled' : ''}>Вперёд ›</button>
    <button class="pg-btn" data-pg="last" ${page >= totalPages - 1 ? 'disabled' : ''}>Последняя »</button>
  </div>`;

  c.innerHTML = html;

  // Click on row
  c.querySelectorAll('tr.row').forEach(r => {
    r.addEventListener('click', () => openDealCard(r.dataset.dealId));
  });
  // Pagination
  c.querySelectorAll('[data-pg]').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.pg === 'first') dealsState.page = 0;
      else if (b.dataset.pg === 'prev') dealsState.page = Math.max(0, page - 1);
      else if (b.dataset.pg === 'next') dealsState.page = Math.min(totalPages - 1, page + 1);
      else if (b.dataset.pg === 'last') dealsState.page = totalPages - 1;
      renderDealsContent();
    });
  });
}

function renderDealsKanban(c, arr) {
  const stages = getStagesSorted();
  if (!stages.length) {
    c.innerHTML = `<div class="card"><div class="empty">Нет стадий воронки</div></div>`;
    return;
  }

  // Группируем по стадии
  const byStage = {};
  for (const s of stages) byStage[s.statusId] = [];
  for (const d of arr) {
    if (byStage[d.stageId]) byStage[d.stageId].push(d);
    else { // если стадия не из этой воронки
      if (!byStage['__other']) byStage['__other'] = [];
      byStage['__other'].push(d);
    }
  }

  let html = `<div class="kanban-wrap">`;
  // Лимит карточек на колонку чтобы DOM не зависал
  const MAX_PER_COL = 200;

  for (const s of stages) {
    const cards = byStage[s.statusId] || [];
    const cls = s.semantics === 'S' ? 'success' : s.semantics === 'F' ? 'failed' : '';
    html += `<div class="kanban-col">
      <div class="kanban-col-header">
        <span><span class="stage-badge ${cls}" style="margin-right:6px;font-size:10px;padding:2px 6px">${escapeHtml(s.name)}</span></span>
        <span class="col-count">${cards.length.toLocaleString('ru')}</span>
      </div>
      <div class="kanban-col-cards">`;

    for (const d of cards.slice(0, MAX_PER_COL)) {
      const respUser = dealsState.users[d.responsibleUid];
      const respShort = respUser ? (respUser.lastName || respUser.name || '').slice(0, 12) : '';
      const opp = d.opportunity || 0;
      html += `<div class="kanban-card" data-deal-id="${escapeHtml(d.bitrixId)}">
        <div class="kanban-card-title">${escapeHtml(d.title || '(без названия)')}</div>
        <div class="kanban-card-meta">
          <span>${escapeHtml(respShort)}</span>
          ${opp ? `<span class="kanban-card-money">${opp.toLocaleString('ru')}</span>` : ''}
        </div>
      </div>`;
    }
    if (cards.length > MAX_PER_COL) {
      html += `<div style="text-align:center;padding:8px;color:var(--t3);font-size:11px">… ещё ${(cards.length - MAX_PER_COL).toLocaleString('ru')}</div>`;
    }

    html += `</div></div>`;
  }
  html += `</div>`;

  c.innerHTML = html;

  c.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('click', () => openDealCard(card.dataset.dealId));
  });
}

function getStagesSorted() {
  const stages = dealsState.pipeline?.stages || {};
  return Object.values(stages).sort((a, b) => (a.sort || 0) - (b.sort || 0));
}

function getUsersForFilter() {
  // Только те юзеры что реально упомянуты в сделках как ответственные
  const seen = new Set();
  for (const d of dealsState.deals) {
    if (d.responsibleUid) seen.add(d.responsibleUid);
  }
  const arr = [];
  for (const uid of seen) {
    const u = dealsState.users[uid];
    if (u) {
      arr.push({
        uid,
        fullName: `${u.lastName || ''} ${u.name || ''}`.trim() || u.email,
      });
    }
  }
  return arr.sort((a, b) => a.fullName.localeCompare(b.fullName, 'ru'));
}

async function openDealCard(bitrixId) {
  const deal = dealsState.deals.find(d => d.bitrixId === bitrixId);
  if (!deal) return;

  const stage = dealsState.pipeline?.stages?.[deal.stageId];
  const stageName = stage?.name || deal.stageId || '—';
  const respUser = dealsState.users[deal.responsibleUid];
  const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
  const respEmail = respUser?.email || '';
  const createdByUser = dealsState.users[deal.createdByUid];
  const createdByName = createdByUser ? `${createdByUser.lastName || ''} ${createdByUser.name || ''}`.trim() : '—';

  // Bitrix URL
  const bitrixUrl = `https://elcalmaty.bitrix24.kz/crm/deal/details/${deal.bitrixId}/`;

  // Параллельно подтягиваем контакт и таймлайн
  const idToken = await fbAuth.currentUser.getIdToken();
  const dbUrl = firebaseConfig.databaseURL.replace(/\/$/, '');
  const fetches = [];

  // Контакт сделки (если есть)
  if (deal.contactId) {
    fetches.push(
      fetch(`${dbUrl}/contacts/${deal.contactId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null)
    );
  } else {
    fetches.push(Promise.resolve(null));
  }

  // Компания сделки (если есть)
  if (deal.companyId) {
    fetches.push(
      fetch(`${dbUrl}/companies/${deal.companyId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null)
    );
  } else {
    fetches.push(Promise.resolve(null));
  }

  // Таймлайн дел сделки
  fetches.push(
    fetch(`${dbUrl}/timeline/deal_${deal.bitrixId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null)
  );

  const [contact, company, timelineRaw] = await Promise.all(fetches);

  // Превращаем timeline объект в массив, сортируем по дате (новые сверху)
  const timeline = timelineRaw
    ? Object.entries(timelineRaw).map(([k, v]) => ({ ...v, _key: k })).sort((a, b) => {
        const da = a.bitrixCreated || a.start || '';
        const db = b.bitrixCreated || b.start || '';
        return db.localeCompare(da);
      })
    : [];

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeDealCard()">
    <div class="modal">
      <button class="close-x" onclick="closeDealCard()">×</button>
      <h2>${escapeHtml(deal.title || '(без названия)')}</h2>
      <div class="modal-sub">
        ID: <code>${escapeHtml(deal.bitrixId)}</code> · 
        <a href="${bitrixUrl}" target="_blank" style="color:var(--ac2)">Открыть в Битриксе ↗</a>
      </div>

      <div class="section-h">Основное</div>
      <div class="field-grid">
        <div class="fl">Стадия</div>
        <div class="fv"><span class="stage-badge ${stage?.semantics === 'S' ? 'success' : stage?.semantics === 'F' ? 'failed' : ''}">${escapeHtml(stageName)}</span></div>
        
        <div class="fl">Сумма</div>
        <div class="fv">${deal.opportunity ? `<span class="money">${deal.opportunity.toLocaleString('ru')} ${escapeHtml(deal.currency || '')}</span>` : '<span class="empty-cell">не указана</span>'}</div>
        
        ${deal.probability ? `<div class="fl">Вероятность</div><div class="fv">${deal.probability}%</div>` : ''}
        
        <div class="fl">Ответственный</div>
        <div class="fv">${escapeHtml(respName)} ${respEmail ? `<span class="muted">· ${escapeHtml(respEmail)}</span>` : ''}</div>
        
        <div class="fl">Создал</div>
        <div class="fv">${escapeHtml(createdByName)}</div>
        
        <div class="fl">Дата создания</div>
        <div class="fv">${deal.bitrixDateCreate ? new Date(deal.bitrixDateCreate).toLocaleString('ru') : '—'}</div>
        
        <div class="fl">Изменено</div>
        <div class="fv">${deal.bitrixDateModify ? new Date(deal.bitrixDateModify).toLocaleString('ru') : '—'}</div>
        
        <div class="fl">Закрыто</div>
        <div class="fv">${deal.closed ? '<span style="color:var(--gn)">✓ Да</span> ' + (deal.closeDate ? new Date(deal.closeDate).toLocaleDateString('ru') : '') : '<span class="muted">Нет</span>'}</div>
        
        ${renderContactRow(contact, deal.contactId)}
        ${renderCompanyRow(company, deal.companyId)}
      </div>

      ${deal.comments ? `<div class="section-h">Комментарии</div><div style="font-size:13px;color:var(--t2);white-space:pre-wrap;background:var(--bg3);padding:12px 14px;border-radius:8px">${escapeHtml(deal.comments)}</div>` : ''}

      ${renderTimelineBlock(timeline)}

      ${renderCustomFieldsBlock(deal.customFields)}
    </div>
  </div>`;

  // Add to body
  const div = document.createElement('div');
  div.innerHTML = html;
  const modal = div.firstElementChild;
  document.body.appendChild(modal);
  document.body.style.overflow = 'hidden';

  // Timeline filters: клик по типу — toggle видимости элементов этого типа
  modal.querySelectorAll('.tl-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const type = btn.dataset.type;
      const active = btn.classList.contains('active');
      modal.querySelectorAll(`.tl-item[data-type="${type}"]`).forEach(it => {
        it.style.display = active ? '' : 'none';
      });
      // Скрываем дни в которых не осталось видимых элементов
      modal.querySelectorAll('.tl-day-label').forEach(dayLabel => {
        let next = dayLabel.nextElementSibling;
        let hasVisible = false;
        while (next && !next.classList.contains('tl-day-label')) {
          if (next.classList.contains('tl-item') && next.style.display !== 'none') {
            hasVisible = true;
            break;
          }
          next = next.nextElementSibling;
        }
        dayLabel.style.display = hasVisible ? '' : 'none';
      });
    });
  });
}

const ACTIVITY_TYPE_META = {
  call:     { icon: '📞', label: 'Звонок', color: '#3fd88e' },
  email:    { icon: '✉️', label: 'Email', color: '#7f63e8' },

  unknown:  { icon: '•',  label: 'Дело', color: '#7c869a' },
};

const PROVIDER_NAMES = {
  'IMOPENLINES_SESSION': 'Открытая линия',
  'IMOL': 'Открытая линия',
  'CRM_WHATSAPP': 'WhatsApp',
  'CRM_TELEGRAMBOT': 'Telegram',
  'CRM_INSTAGRAM': 'Instagram',
  'VOXIMPLANT_CALL': 'Звонок Битрикс',
  'CALL': 'Звонок',
  'CRM_EMAIL': 'Email',
  'REST_APP': 'Внешнее приложение',
};

function renderTimelineBlock(timeline) {
  if (!timeline || timeline.length === 0) {
    return `<div class="section-h">Таймлайн</div>
      <div style="font-size:13px;color:var(--t3);padding:12px 0">Нет дел в таймлайне</div>`;
  }

  // Группировка по дням
  const groups = {};
  for (const a of timeline) {
    const dateStr = a.bitrixCreated || a.start || a.bitrixLastUpdated || '';
    const dateKey = dateStr ? dateStr.slice(0, 10) : 'unknown';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(a);
  }
  const sortedDays = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  // Подсчёт по типам для фильтра
  const byType = {};
  for (const a of timeline) {
    const t = a.type || 'unknown';
    byType[t] = (byType[t] || 0) + 1;
  }

  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400_000).toISOString().slice(0, 10);

  let html = `<div class="section-h">Таймлайн (${timeline.length})</div>`;

  // Фильтры по типам
  const typeFilters = Object.entries(byType)
    .sort((a, b) => b[1] - a[1])
    .map(([t, n]) => {
      const meta = ACTIVITY_TYPE_META[t] || ACTIVITY_TYPE_META.unknown;
      return `<button class="tl-filter active" data-type="${escapeHtml(t)}">${meta.icon} ${escapeHtml(meta.label)} <span class="tl-count">${n}</span></button>`;
    }).join('');
  html += `<div class="tl-filters">${typeFilters}</div>`;

  html += `<div class="tl-wrap">`;
  for (const day of sortedDays) {
    let label = day;
    if (day === today) label = 'Сегодня';
    else if (day === yesterday) label = 'Вчера';
    else if (day !== 'unknown') label = new Date(day).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
    else label = 'Без даты';

    html += `<div class="tl-day-label">${label}</div>`;
    for (const a of groups[day]) {
      html += renderTimelineItem(a);
    }
  }
  html += `</div>`;
  return html;
}

function renderTimelineItem(a) {
  const type = a.type || 'unknown';
  const meta = ACTIVITY_TYPE_META[type] || ACTIVITY_TYPE_META.unknown;
  const author = a.responsibleUid ? dealsState.users[a.responsibleUid] : null;
  const authorName = author ? `${author.lastName || ''} ${author.name || ''}`.trim() : '';
  const time = a.bitrixCreated ? new Date(a.bitrixCreated).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';

  // Subject (тема/название)
  const subject = a.subject || '';

  // Description: чистим от HTML тегов для краткого превью если type=html, иначе как есть
  let desc = a.description || '';
  if (a.descriptionType === '3' || a.descriptionType === 3) {
    // HTML — убираем теги для превью
    desc = desc.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  }
  if (desc.length > 300) desc = desc.slice(0, 300) + '...';

  // Provider/направление для звонков
  let providerInfo = '';
  if (a.providerId) {
    const provName = PROVIDER_NAMES[a.providerId] || a.providerId;
    providerInfo = `<span class="tl-provider">${escapeHtml(provName)}</span>`;
  }
  let directionInfo = '';
  if (a.direction === '1' || a.direction === 1) directionInfo = '<span class="tl-dir incoming">↓ входящий</span>';
  else if (a.direction === '2' || a.direction === 2) directionInfo = '<span class="tl-dir outgoing">↑ исходящий</span>';

  // Длительность звонка
  let durationInfo = '';
  if (a.callDuration && parseInt(a.callDuration) > 0) {
    const sec = parseInt(a.callDuration);
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    durationInfo = `<span class="tl-duration">⏱ ${min}:${String(s).padStart(2, '0')}</span>`;
  }

  // Файлы
  let filesInfo = '';
  if (a.hasFiles && Array.isArray(a.files) && a.files.length > 0) {
    const fileCount = a.files.length;
    const word = fileCount === 1 ? 'файл' : (fileCount < 5 ? 'файла' : 'файлов');
    const status = a.filesMigrated ? '✓ в R2' : '⏳ в Битриксе';
    filesInfo = `<div class="tl-files">📎 ${fileCount} ${word} <span class="tl-files-status">${status}</span></div>`;
  } else if (a.recordFileId) {
    filesInfo = `<div class="tl-files">🎙 запись звонка <span class="tl-files-status">${a.filesMigrated ? '✓ в R2' : '⏳ в Битриксе'}</span></div>`;
  }

  // Completed badge
  const completedBadge = a.completed ? '<span class="tl-completed">✓</span>' : '';

  return `<div class="tl-item" data-type="${escapeHtml(type)}">
    <div class="tl-icon" style="background:${meta.color}22;color:${meta.color}">${meta.icon}</div>
    <div class="tl-body">
      <div class="tl-head">
        <span class="tl-type-label">${escapeHtml(meta.label)}</span>
        ${providerInfo}
        ${directionInfo}
        ${durationInfo}
        ${completedBadge}
        <span class="tl-time">${time}${authorName ? ' · ' + escapeHtml(authorName) : ''}</span>
      </div>
      ${subject ? `<div class="tl-subject">${escapeHtml(subject)}</div>` : ''}
      ${desc ? `<div class="tl-desc">${escapeHtml(desc)}</div>` : ''}
      ${filesInfo}
    </div>
  </div>`;
}

function renderCustomFieldsBlock(cfData) {
  if (!cfData || Object.keys(cfData).length === 0) return '';
  const schema = dealsState.customSchema || {};

  let html = `<div class="section-h">Кастомные поля</div><div class="cf-grid">`;
  for (const [field, value] of Object.entries(cfData)) {
    const meta = schema[field] || {};
    const label = meta.label || field;
    const display = formatCfValue(value, meta);
    html += `<div class="fl">${escapeHtml(label)}</div><div class="fv">${display}</div>`;
  }
  html += `</div>`;
  return html;
}

function formatCfValue(value, meta) {
  if (value === null || value === undefined || value === '') return '<span class="empty-cell">—</span>';
  if (Array.isArray(value)) {
    if (!value.length) return '<span class="empty-cell">—</span>';
    // Для enum нужно резолвить через meta.list
    if (meta.type === 'enumeration' && meta.list) {
      const labels = value.map(v => {
        const item = meta.list.find(l => String(l.ID) === String(v) || String(l.VALUE) === String(v));
        return item ? escapeHtml(item.VALUE) : escapeHtml(String(v));
      });
      return labels.join(', ');
    }
    return value.map(v => escapeHtml(String(v))).join(', ');
  }
  if (meta.type === 'enumeration' && meta.list) {
    const item = meta.list.find(l => String(l.ID) === String(value));
    return item ? escapeHtml(item.VALUE) : escapeHtml(String(value));
  }
  if (meta.type === 'boolean') return value === '1' || value === true ? '✓ Да' : '✗ Нет';
  if (meta.type === 'date' || meta.type === 'datetime') {
    try { return new Date(value).toLocaleString('ru'); } catch { return escapeHtml(String(value)); }
  }
  if (meta.type === 'money' || meta.type === 'double') {
    const num = parseFloat(value);
    return isNaN(num) ? escapeHtml(String(value)) : `<span class="money">${num.toLocaleString('ru')}</span>`;
  }
  return escapeHtml(String(value));
}

window.migrateDeals = async function() {
  if (!confirm('Запустить миграцию ~22 600 сделок?\n\nЭто займёт ~20-30 минут. Идёт батчами по 50, прогресс сохраняется. Можно прервать и продолжить.')) return;

  // Wake Lock
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('deals-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию сделок...\n';

  let offset = 0;
  let totalProcessed = 0;
  let totalErrors = 0;
  let totalContactIds = new Set();
  let totalCompanyIds = new Set();
  let total = null;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(`${WORKER_URL}/api/migrate-deals`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, categoryId: 3, offset, limit: 50 })
      });
      const d = await r.json();

      if (!d.ok) {
        el.innerHTML += `\n<span class="err">✗ Ошибка: ${d.error}</span>\n`;
        el.innerHTML += `<span class="info">Можно нажать "Перенести сделки" снова — продолжится с offset ${offset}</span>\n`;
        break;
      }

      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const speed = totalProcessed > 0 ? (totalProcessed / elapsed).toFixed(1) : 0;
      const remaining = total - totalProcessed;
      const etaSec = speed > 0 ? Math.round(remaining / speed) : 0;
      const etaMin = Math.floor(etaSec / 60);
      const etaS = etaSec % 60;
      const pct = Math.round(totalProcessed / total * 100);

      el.innerHTML = `<span class="info">⚙ Обработано ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      el.innerHTML += `Прошло: ${Math.floor(elapsed/60)}м ${elapsed%60}с · Скорость: ${speed} сделок/сек · Осталось: ~${etaMin}м ${etaS}с\n`;
      el.innerHTML += `Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n\n`;
      el.innerHTML += `<span class="ok">█</span>`.repeat(Math.floor(pct/2)) + `<span class="gray">░</span>`.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        el.innerHTML += `\n<span class="ok">✓ Миграция сделок завершена!</span>\n\n`;
        el.innerHTML += `Всего обработано: <span class="ok">${totalProcessed.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${minutes}м ${seconds}с\n`;
        el.innerHTML += `Ошибок: ${totalErrors}\n\n`;
        el.innerHTML += `<span class="info">Дальше: миграция контактов и компаний (упомянутых в сделках)</span>`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        // Обновим счётчик на главной
        loadDashboardStatsIfPossible();
        break;
      }

      offset = d.nextOffset;

      // Маленькая пауза чтобы не перегружать
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать "Перенести сделки" снова — продолжится с offset ${offset}</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      break;
    }
  }
};

window.migrateContacts = async function() {
  if (!confirm('Запустить миграцию ~143 741 контактов?\n\nЭто займёт ~2-2.5 часа. Идёт батчами по 50, прогресс сохраняется. При 429 (рейт-лимит Битрикса) автоматически ждёт 60 сек и продолжает. Можно прервать и продолжить — миграция возобновится с последнего offset.')) return;

  // Wake Lock — не давать экрану засыпать
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('contacts-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию контактов...\n';

  // Если есть сохранённое состояние — стартуем с него
  let offset = 0;
  let totalProcessed = 0;
  let resumeOffset = 0; // сколько уже было обработано до этой сессии
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateR = await fetch(`${firebaseConfig.databaseURL.replace(/\/$/,'')}/migrationState/contacts.json?auth=${idToken}`);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        totalProcessed = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += `<span class="info">↪ Продолжаем с offset ${offset.toLocaleString('ru')}</span>\n`;
      }
    }
  } catch {}

  let totalErrors = 0;
  let total = null;
  let companyIdsCollected = 0;
  let customFieldsCount = null;
  let retry429 = 0;
  const MAX_429_RETRIES = 20; // ~20 минут ожидания максимум подряд
  const RETRY_WAIT_MS = 60_000; // 60 секунд между ретраями
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(`${WORKER_URL}/api/migrate-contacts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, offset, limit: 50 })
      });
      const d = await r.json();

      if (!d.ok) {
        // ── Auto-retry на 429 (Bitrix rate limit) ──
        const is429 = (d.error || '').includes('429');
        if (is429 && retry429 < MAX_429_RETRIES) {
          retry429++;
          const baseHtml = el.innerHTML; // снимок до паузы
          const waitS = RETRY_WAIT_MS / 1000;
          for (let i = waitS; i > 0; i--) {
            el.innerHTML = baseHtml + '\n<span class="warn">[пауза] Bitrix лимит (429). Ждём ' + i + ' сек... (попытка ' + retry429 + '/' + MAX_429_RETRIES + ', offset ' + offset.toLocaleString('ru') + ')</span>';
            el.scrollTop = el.scrollHeight;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + '\n<span class="info">[повтор] Возобновляем запрос...</span>\n';
          continue; // не двигаем offset
        }
        el.innerHTML += `\n<span class="err">✗ Ошибка: ${d.error}</span>\n`;
        el.innerHTML += `<span class="info">Можно нажать "Перенести контакты" снова — продолжится с offset ${offset}</span>\n`;
        break;
      }

      // Успех — сбрасываем счётчик 429
      retry429 = 0;

      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors;
      companyIdsCollected = d.companyIdsCollected || companyIdsCollected;
      if (d.customFieldsCount !== null && d.customFieldsCount !== undefined) {
        customFieldsCount = d.customFieldsCount;
      }

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      // Скорость по текущей сессии (без уже-мигрированных при resume)
      const elapsedSafe = Math.max(elapsed, 1);
      const speedNum = (totalProcessed - resumeOffset) / elapsedSafe;
      const speed = speedNum > 0 ? speedNum.toFixed(1) : '0.0';
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const etaS = etaSec % 60;
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;

      const etaText = etaH > 0 ? `${etaH}ч ${etaMin}м` : `${etaMin}м ${etaS}с`;
      const elapsedText = elapsed >= 3600
        ? `${Math.floor(elapsed/3600)}ч ${Math.floor((elapsed%3600)/60)}м`
        : `${Math.floor(elapsed/60)}м ${elapsed%60}с`;

      el.innerHTML = `<span class="info">⚙ Обработано ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      el.innerHTML += `Прошло: ${elapsedText} · Скорость: ${speed} конт/сек · Осталось: ~${etaText}\n`;
      el.innerHTML += `Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n`;
      if (customFieldsCount !== null) el.innerHTML += `Кастомных полей в схеме: ${customFieldsCount}\n`;
      el.innerHTML += `Уникальных компаний для миграции: ${companyIdsCollected}\n\n`;
      el.innerHTML += `<span class="ok">█</span>`.repeat(Math.floor(pct/2)) + `<span class="gray">░</span>`.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        el.innerHTML += `\n<span class="ok">✓ Миграция контактов завершена!</span>\n\n`;
        el.innerHTML += `Всего обработано: <span class="ok">${totalProcessed.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${elapsedText}\n`;
        el.innerHTML += `Ошибок: ${totalErrors}\n`;
        el.innerHTML += `Компаний для миграции: <span class="ok">${companyIdsCollected}</span>\n\n`;
        el.innerHTML += `<span class="info">Дальше: миграция компаний и активностей</span>`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        loadDashboardStatsIfPossible();
        break;
      }

      offset = d.nextOffset;

      // Маленькая пауза
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать "Перенести контакты" снова — продолжится с offset ${offset}</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      break;
    }
  }
};

        <b>Оценка времени миграции:</b> ${etaText}

      <div style="margin-top:14px">

      </div>
    </div>`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${e.message}</div>`;

// ═══════════════════════════════════════════════════════════════
//   Универсальный runner для батчевых миграций
//   Опции:
//     endpoint         — URL endpoint в worker
//     stateKey         — путь в Firebase /migrationState/{key}
//     resultElId       — id <div> для логов
//     entityName       — "контактов"/"дел"/"задач" (для сообщений)
//     entityNameShort  — "контакт"/"дело"/"задача" (для скорости)
//     totalLabel       — "143 741" (для confirm)
//     extraBody        — дополнительные поля в JSON body (опционально)
//     extraStats       — функция (response, accumulator) для накопления stats (опционально)
//     extraStatsRender — функция (accumulator) → HTML строка для показа (опционально)
//     onComplete       — callback после успешного завершения (опционально)
//     confirmText      — текст confirm перед запуском (опционально)
// ═══════════════════════════════════════════════════════════════
async function runBatchMigration(opts) {
  if (opts.confirmText && !confirm(opts.confirmText)) return;

  // Wake Lock
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById(opts.resultElId);
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию ' + opts.entityName + '...\n';

  // Auto-resume из migrationState
  let offset = 0;
  let totalProcessed = 0;
  let resumeOffset = 0;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateUrl = firebaseConfig.databaseURL.replace(/\/$/,'') + '/migrationState/' + opts.stateKey + '.json?auth=' + idToken;
    const stateR = await fetch(stateUrl);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        totalProcessed = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += '<span class="info">↪ Продолжаем с offset ' + offset.toLocaleString('ru') + '</span>\n';
      }
    }
  } catch {}

  let totalErrors = 0;
  let total = null;
  let retry429 = 0;
  const MAX_429_RETRIES = 20;
  const RETRY_WAIT_MS = 60_000;
  const accumulator = {};
  const startedAt = Date.now();
  // Адаптивный лимит для случаев когда сервер просит уменьшить (комменты задач)
  let currentLimit = opts.initialLimit || 50;

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const body = Object.assign({ idToken, offset, limit: currentLimit }, opts.extraBody || {});
      const r = await fetch(WORKER_URL + opts.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const d = await r.json();

      if (!d.ok) {
        // Сервер просит попробовать меньшим лимитом (комменты задач)
        if (d.shouldRetryWithSmallerLimit && currentLimit > 1) {
          const newLimit = Math.max(1, Math.floor(currentLimit / 2));
          el.innerHTML += '\n<span class="warn">[адаптация] Уменьшаем размер батча: ' + currentLimit + ' → ' + newLimit + ' (offset ' + offset + ')</span>\n';
          currentLimit = newLimit;
          continue;
        }
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || httpCode === 403 ||
                            (httpCode !== null && httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry429 < MAX_429_RETRIES) {
          retry429++;
          const baseHtml = el.innerHTML;
          const waitS = RETRY_WAIT_MS / 1000;
          for (let i = waitS; i > 0; i--) {
            el.innerHTML = baseHtml + '\n<span class="warn">[пауза] Bitrix вернул HTTP ' + httpCode + '. Ждём ' + i + ' сек... (попытка ' + retry429 + '/' + MAX_429_RETRIES + ', offset ' + offset.toLocaleString('ru') + ')</span>';
            el.scrollTop = el.scrollHeight;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + '\n<span class="info">[повтор] Возобновляем запрос...</span>\n';
          continue;
        }
        el.innerHTML += '\n<span class="err">✗ Ошибка: ' + errStr + '</span>\n';
        el.innerHTML += '<span class="info">Можно нажать снова — продолжится с offset ' + offset + '</span>\n';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry429 = 0;
      // После успешного батча — пробуем понемногу увеличивать лимит обратно (если был сброшен)
      if (currentLimit < (opts.initialLimit || 50)) {
        currentLimit = Math.min((opts.initialLimit || 50), currentLimit * 2);
      }
      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors || 0;
      if (opts.extraStats) opts.extraStats(d, accumulator);

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const elapsedSafe = Math.max(elapsed, 1);
      const speedNum = (totalProcessed - resumeOffset) / elapsedSafe;
      const speed = speedNum > 0 ? speedNum.toFixed(1) : '0.0';
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const etaS = etaSec % 60;
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;
      const etaText = etaH > 0 ? etaH + 'ч ' + etaMin + 'м' : etaMin + 'м ' + etaS + 'с';
      const elapsedText = elapsed >= 3600
        ? Math.floor(elapsed/3600) + 'ч ' + Math.floor((elapsed%3600)/60) + 'м'
        : Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с';

      let html = '<span class="info">⚙ Обработано ' + totalProcessed.toLocaleString('ru') + ' из ' + total.toLocaleString('ru') + ' (' + pct + '%)</span>\n\n';
      html += 'Прошло: ' + elapsedText + ' · Скорость: ' + speed + ' ' + opts.entityNameShort + '/сек · Осталось: ~' + etaText + '\n';
      html += 'Ошибок: ' + (totalErrors > 0 ? '<span class="err">' + totalErrors + '</span>' : 0) + '\n';
      if (currentLimit !== (opts.initialLimit || 50)) html += 'Текущий размер батча: ' + currentLimit + '\n';
      if (opts.extraStatsRender) html += opts.extraStatsRender(accumulator) + '\n';
      html += '\n<span class="ok">█</span>'.repeat(Math.floor(pct/2)) + '<span class="gray">░</span>'.repeat(50 - Math.floor(pct/2)) + ' ' + pct + '%\n';
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        el.innerHTML += '\n<span class="ok">✓ Миграция ' + opts.entityName + ' завершена!</span>\n\n';
        el.innerHTML += 'Всего обработано: <span class="ok">' + totalProcessed.toLocaleString('ru') + '</span>\n';
        el.innerHTML += 'Время: ' + elapsedText + '\n';
        el.innerHTML += 'Ошибок: ' + totalErrors + '\n';
        if (opts.extraStatsRender) el.innerHTML += opts.extraStatsRender(accumulator) + '\n';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        loadDashboardStatsIfPossible();
        if (opts.onComplete) opts.onComplete(accumulator);
        return;
      }

      offset = d.nextOffset;
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += '\n<span class="err">✗ ' + e.message + '</span>\n';
      el.innerHTML += '<span class="info">Можно нажать снова — продолжится с offset ' + offset + '</span>\n';
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      return;
    }
  }
}

window.testFileDownload = async function(bitrixFileId = null) {
  const el = document.getElementById('file-test-result');
  el.style.display = '';
  el.innerHTML = '<div style="font-size:12px;color:var(--t3)">⏳ Тестируем разные методы скачивания файла из Битрикса...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/test-file-download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(bitrixFileId ? { idToken, bitrixFileId } : { idToken })
    });
    const d = await r.json();
    if (!d.ok) {
      el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(d.error || 'Ошибка')}</div>`;
      return;
    }

    const isSuccess = d.downloadResult?.r2Status === 'uploaded';
    const bgColor = isSuccess ? 'rgba(63,216,142,.06)' : 'rgba(240,162,58,.06)';
    const borderColor = isSuccess ? 'rgba(63,216,142,.3)' : 'rgba(240,162,58,.3)';
    const titleColor = isSuccess ? 'var(--gn)' : '#f0a23a';

    let html = `<div style="background:${bgColor};border:1px solid ${borderColor};border-radius:10px;padding:14px 18px">
      <div style="color:${titleColor};font-weight:600;font-size:13px;margin-bottom:10px">${escapeHtml(d.summary)}</div>
      <div style="font-size:12px;color:var(--t2);line-height:1.7">
        <b>FileID:</b> ${escapeHtml(String(d.fileId))} · <b>Найден в:</b> ${escapeHtml(d.foundIn || '(передан явно)')}<br>
        <b>Portal:</b> ${escapeHtml(d.portalBase)}<br>
      </div>`;

    html += `<div style="margin-top:12px"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Попытки методов:</div>`;
    for (const a of d.attempts) {
      const icon = a.ok ? '<span style="color:var(--gn)">✓</span>' : '<span style="color:var(--rd)">✗</span>';
      html += `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        ${icon} <code>${escapeHtml(a.method)}</code>`;
      if (a.ok && a.result) {
        const r = a.result;
        const bits = [];
        if (r.NAME) bits.push(`name=${escapeHtml(String(r.NAME))}`);
        if (r.SIZE) bits.push(`size=${escapeHtml(String(r.SIZE))}`);
        if (r.TYPE) bits.push(`type=${escapeHtml(String(r.TYPE))}`);
        if (r.DOWNLOAD_URL) bits.push(`<span style="color:var(--gn)">DOWNLOAD_URL ✓</span>`);
        if (a.contentType) bits.push(`ct=${escapeHtml(a.contentType)}`);
        if (a.contentLength) bits.push(`size=${escapeHtml(a.contentLength)}`);
        if (a.status !== undefined) bits.push(`status=${a.status}`);
        if (bits.length) html += ` — <span style="color:var(--t3)">${bits.join(' · ')}</span>`;
      } else if (!a.ok) {
        const errStr = a.result?.error || a.error || 'failed';
        html += ` — <span style="color:var(--rd);font-size:10px">${escapeHtml(typeof errStr === 'object' ? JSON.stringify(errStr) : String(errStr).slice(0, 100))}</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;

    if (d.downloadResult) {
      const dr = d.downloadResult;
      html += `<div style="margin-top:12px;padding:10px 12px;background:rgba(0,0,0,.2);border-radius:8px;font-size:11px;color:var(--t2)">
        <b>Скачивание:</b> ${dr.ok ? '<span style="color:var(--gn)">успех</span>' : '<span style="color:var(--rd)">ошибка</span>'}<br>
        ${dr.from ? '<b>Метод:</b> ' + escapeHtml(dr.from) + '<br>' : ''}
        ${dr.sizeBytes !== undefined ? '<b>Размер:</b> ' + (dr.sizeBytes / 1024).toFixed(1) + ' КБ<br>' : ''}
        ${dr.contentType ? '<b>Content-Type:</b> ' + escapeHtml(dr.contentType) + '<br>' : ''}
        ${dr.r2Key ? '<b>R2 ключ:</b> <code>' + escapeHtml(dr.r2Key) + '</code><br>' : ''}
        ${dr.error ? '<b>Ошибка:</b> ' + escapeHtml(dr.error) : ''}
      </div>`;
    }

    html += `</div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(e.message)}</div>`;
  }
};

async function runFileQueueBuild(source, label) {
  if (!confirm(`Построить очередь файлов для ${label}?\n\nСканирует Firebase, собирает все bitrixFileIds в /filesQueue. Можно прерывать — auto-resume сработает.`)) return;

  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('file-queue-result');
  el.style.display = '';
  el.innerHTML = `⏳ Запускаем построение очереди для ${label}...\n`;

  // Resume
  const stateKey = source === 'activities' ? 'fileQueueActivities' : 'fileQueueTasks';
  let offset = 0;
  let resumeOffset = 0;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateUrl = firebaseConfig.databaseURL.replace(/\/$/,'') + '/migrationState/' + stateKey + '.json?auth=' + idToken;
    const stateR = await fetch(stateUrl);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += `<span class="info">↪ Продолжаем с offset ${offset.toLocaleString('ru')}</span>\n`;
      }
    }
  } catch {}

  let total = null;
  let totalProcessed = offset;
  let totalFilesAdded = 0;
  let retry = 0;
  const MAX_RETRY = 20;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(WORKER_URL + '/api/build-file-queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, source, offset, limit: 15 })
      });
      const d = await r.json();

      if (!d.ok) {
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || (httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry < MAX_RETRY) {
          retry++;
          const baseHtml = el.innerHTML;
          for (let i = 60; i > 0; i--) {
            el.innerHTML = baseHtml + `\n<span class="warn">[пауза] HTTP ${httpCode}, ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + `\n<span class="info">[повтор]</span>\n`;
          continue;
        }
        el.innerHTML += `\n<span class="err">✗ ${errStr}</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry = 0;
      total = d.total;
      totalProcessed = d.offset + d.processed;
      totalFilesAdded = d.cumulativeFiles;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const speedNum = elapsed > 0 ? (totalProcessed - resumeOffset) / elapsed : 0;
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;
      const etaText = etaH > 0 ? etaH + 'ч ' + etaMin + 'м' : etaMin + 'м';
      const elapsedText = elapsed >= 60 ? Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с' : elapsed + 'с';

      let html = `<span class="info">⚙ ${label}: ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      html += `Прошло: ${elapsedText} · Скорость: ${speedNum.toFixed(1)} ключей/сек · ETA ~${etaText}\n`;
      html += `Файлов в очереди (${label}): ${totalFilesAdded.toLocaleString('ru')}\n\n`;
      html += '<span class="ok">█</span>'.repeat(Math.floor(pct/2)) + '<span class="gray">░</span>'.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        el.innerHTML += `\n<span class="ok">✓ Очередь файлов (${label}) построена!</span>\n`;
        el.innerHTML += `Всего файлов добавлено: <span class="ok">${totalFilesAdded.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${elapsedText}\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      offset = d.nextOffset;
      await new Promise(r => setTimeout(r, 100));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      return;
    }
  }
}

window.migrateFilesRun = async function() {
  if (!confirm('Запустить миграцию файлов в R2?\n\nКачает по 8 файлов за вызов. Можно прерывать — следующий запуск продолжит. Если ещё не построил очередь — сначала построй!')) return;

  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('files-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию файлов в R2...\n';

  let totalMigrated = 0;
  let totalErrors = 0;
  let totalBytes = 0;
  let retry = 0;
  const MAX_RETRY = 20;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(WORKER_URL + '/api/migrate-files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, batchSize: 8 })
      });
      const d = await r.json();

      if (!d.ok) {
        if (d.needsIndex) {
          el.innerHTML += `\n<span class="err">✗ Нужен индекс в Firebase rules. Открой Firebase Console → Realtime Database → Rules и добавь:\n\n  "filesQueue": { ".indexOn": "migrated" }\n\nвнутри "rules": {...}</span>\n`;
          if (wakeLock) { wakeLock.release(); wakeLock = null; }
          return;
        }
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || (httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry < MAX_RETRY) {
          retry++;
          const baseHtml = el.innerHTML;
          for (let i = 60; i > 0; i--) {
            el.innerHTML = baseHtml + `\n<span class="warn">[пауза] HTTP ${httpCode}, ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + `\n<span class="info">[повтор]</span>\n`;
          continue;
        }
        el.innerHTML += `\n<span class="err">✗ ${errStr}</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry = 0;
      // Если done и в этом батче 0 — очередь кончилась
      if (d.done && d.processedInBatch === 0) {
        const cum = d.cumulative || {};
        el.innerHTML += `\n<span class="ok">✓ Миграция файлов завершена!</span>\n`;
        el.innerHTML += `Всего файлов в R2: <span class="ok">${(cum.cumulativeMigrated || totalMigrated).toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Объём: ${((cum.cumulativeBytes || totalBytes) / 1024 / 1024).toFixed(1)} МБ\n`;
        el.innerHTML += `Ошибок: ${cum.cumulativeErrors || totalErrors}\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      totalMigrated = d.cumulativeMigrated;
      totalErrors = d.cumulativeErrors;
      totalBytes = d.cumulativeBytes;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const elapsedText = elapsed >= 3600
        ? Math.floor(elapsed/3600) + 'ч ' + Math.floor((elapsed%3600)/60) + 'м'
        : (elapsed >= 60 ? Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с' : elapsed + 'с');
      const sizeText = totalBytes < 1024*1024
        ? (totalBytes/1024).toFixed(0) + ' КБ'
        : totalBytes < 1024*1024*1024
          ? (totalBytes/1024/1024).toFixed(1) + ' МБ'
          : (totalBytes/1024/1024/1024).toFixed(2) + ' ГБ';

      let html = `<span class="info">⚙ Файлов мигрировано: ${totalMigrated.toLocaleString('ru')}</span>\n\n`;
      html += `Прошло: ${elapsedText} · Объём в R2: ${sizeText}\n`;
      html += `Ошибок: ${totalErrors > 0 ? '<span class="err">' + totalErrors + '</span>' : 0}\n`;
      html += `В этом батче: ${d.migratedInBatch} из ${d.processedInBatch} (${(d.bytesInBatch/1024).toFixed(0)} КБ)\n`;
      if (d.errorDetails && d.errorDetails.length > 0) {
        html += `\nПоследние ошибки:\n`;
        for (const e of d.errorDetails.slice(0, 3)) {
          html += `  · file ${e.fileId} [${e.stage}]: ${escapeHtml(String(e.error || e.status || '?').slice(0, 80))}\n`;
        }
      }
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      // Если в батче было меньше чем просили — очередь кончилась
      if (d.done) {
        el.innerHTML += `\n<span class="ok">✓ Миграция файлов завершена! Очередь обработана полностью.</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      // Между батчами небольшая пауза
      await new Promise(r => setTimeout(r, 300));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать снова — продолжится с того же места</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      return;
    }
  }
};
