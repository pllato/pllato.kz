name = "pllato-hr-worker"
main = "worker.js"
compatibility_date = "2025-01-01"
account_id = "d0655e161d8fca8487f88d55c0eeb215"

[vars]
FIREBASE_PROJECT_ID = "pllato-crm"
# Кто из команды имеет доступ к HR-панели (через запятую, в нижнем регистре).
# uurraa@gmail.com разрешён всегда. Добавляйте сюда e-mail сотрудников найма.
HR_ALLOWED_EMAILS = "uurraa@gmail.com"

# D1: создать один раз командой  wrangler d1 create pllato-hr-d1
# и подставить database_id из вывода.
[[d1_databases]]
binding = "DB"
database_name = "pllato-hr-d1"
database_id = "PUT_D1_ID_HERE"
