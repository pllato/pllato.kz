<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dentaly — CRM для стоматологии</title>
<style>
:root{
  --bg:#F5F7F8;--surface:#FFFFFF;--surface-2:#FAFBFB;
  --border:#E5E9EB;--border-2:#EEF1F2;
  --text:#0F1F1E;--text-2:#5B6B6A;--text-3:#8B9695;
  --primary:#0F766E;--primary-2:#115E59;--primary-soft:#CCFBF1;--primary-tint:#F0FDFA;
  --amber:#D97706;--amber-soft:#FEF3C7;
  --red:#DC2626;--red-soft:#FEE2E2;
  --green:#059669;--green-soft:#D1FAE5;
  --blue:#2563EB;--blue-soft:#DBEAFE;
  --purple:#7C3AED;--purple-soft:#EDE9FE;
  --gold:#CA8A04;--gold-soft:#FEF3C7;
  --sidebar:#0E1F1E;--sidebar-2:#152C2A;--sidebar-text:#A8B8B6;--sidebar-text-2:#7A8C8A;
  --shadow-sm:0 1px 2px rgba(15,31,30,.04);
  --shadow-lg:0 4px 12px rgba(15,31,30,.08),0 24px 48px rgba(15,31,30,.08);
  --r:10px;--r-lg:14px;--r-xl:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:inherit;color:inherit}

#app{display:grid;grid-template-columns:236px 1fr;height:100vh}
#sidebar{background:var(--sidebar);color:var(--sidebar-text);display:flex;flex-direction:column;overflow:hidden}
#main-wrap{display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px 60px}

.brand{padding:20px 18px 16px;display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0F766E,#2DD4BF);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.brand-name{color:#fff;font-weight:600;font-size:15px}
.brand-sub{color:var(--sidebar-text-2);font-size:11px;margin-top:1px}
.clinic-switch{margin:0 12px 14px;padding:10px 12px;background:var(--sidebar-2);border-radius:var(--r);display:flex;align-items:center;gap:9px;cursor:pointer}
.clinic-switch:hover{background:#1A3735}
.clinic-dot{width:8px;height:8px;border-radius:50%;background:#2DD4BF;box-shadow:0 0 0 3px rgba(45,212,191,.18)}
.clinic-name{color:#E5EEED;font-weight:500;font-size:13px;flex:1}
.clinic-name .chev{color:var(--sidebar-text-2);float:right}
.nav-section{padding:8px 12px}
.nav-label{font-size:11px;color:var(--sidebar-text-2);text-transform:uppercase;letter-spacing:.6px;padding:8px 10px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;color:var(--sidebar-text);font-size:13.5px;cursor:pointer;margin-bottom:1px;font-weight:500;transition:all .12s}
.nav-item:hover{background:var(--sidebar-2);color:#E5EEED}
.nav-item.active{background:linear-gradient(90deg,rgba(15,118,110,.25),rgba(15,118,110,.1));color:#fff}
.nav-item.active .nav-icon{color:#2DD4BF}
.nav-icon{width:18px;height:18px;flex-shrink:0;color:var(--sidebar-text-2)}
.dot-sep{color:var(--text-3);margin:0 6px}
.teeth-half.right{flex-direction:row-reverse}
.tp-h-text{flex:1}
.inv-low{position:relative}
.inv-low::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}

/* Treatment plan v2 */
.plan-hero{padding:18px 20px;background:linear-gradient(135deg,var(--primary-tint),#fff);border:1px solid var(--primary-soft);border-radius:var(--r-lg);display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.plan-hero-stat{flex:1;min-width:120px}
.plan-hero-label{font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.plan-hero-value{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-top:3px}
.variant-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.variant-card{padding:14px;border:1.5px solid var(--border);border-radius:var(--r-lg);background:var(--surface);cursor:pointer;transition:all .15s;position:relative}
.variant-card:hover{border-color:var(--text-3)}
.variant-card.active{border-color:var(--primary);background:var(--primary-tint);box-shadow:0 0 0 3px rgba(15,118,110,.08)}
.variant-card.active::before{content:'✓';position:absolute;top:10px;right:12px;color:var(--primary);font-weight:700}
.variant-name{font-weight:700;font-size:14px}
.variant-sub{font-size:11.5px;color:var(--text-2);margin-top:3px;line-height:1.4;min-height:32px}
.variant-price{font-size:18px;font-weight:700;color:var(--primary-2);margin-top:10px;letter-spacing:-.3px}
.variant-meta{font-size:11px;color:var(--text-3);margin-top:3px}

.visit-card{border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);overflow:hidden;transition:border-color .15s}
.visit-card:hover{border-color:#CBD5E1}
.visit-card.done{background:linear-gradient(180deg,#FAFCFC,#fff)}
.visit-card.planned{border-style:dashed}
.visit-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border-2)}
.visit-date{background:var(--primary-tint);color:var(--primary-2);border-radius:8px;padding:6px 10px;text-align:center;min-width:54px;flex-shrink:0}
.visit-date.done{background:#F1F3F4;color:var(--text-2)}
.visit-date-d{font-size:18px;font-weight:700;line-height:1}
.visit-date-m{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.visit-stage{display:grid;grid-template-columns:46px 1fr 100px 120px 36px;gap:12px;padding:10px 16px;align-items:center;border-bottom:1px solid var(--border-2);font-size:13px}
.visit-stage:last-child{border-bottom:none}
.visit-stage:hover{background:var(--surface-2)}
.stage-tooth{width:36px;height:36px;border-radius:8px;background:var(--primary-tint);color:var(--primary-2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.stage-tooth.done{background:#F1F3F4;color:var(--text-2)}
.add-visit-btn{padding:14px 18px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r-lg);color:var(--text-2);cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500;transition:all .15s}
.add-visit-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-tint)}

/* Telegram brand color */
.b-tg{background:#E7F3FB;color:#0088CC}
.ch-badge{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:5px;font-size:11px;font-weight:600}
.scroll-hide::-webkit-scrollbar{width:6px;height:6px}
.scroll-hide::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#D5DCDD;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb:hover{background:#B8C2C3}
.nav-item:hover .nav-icon{color:var(--sidebar-text)}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px}
.nav-badge.amber{background:var(--amber)}
.sidebar-bottom{margin-top:auto;padding:12px 14px;border-top:1px solid var(--sidebar-2)}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px;border-radius:9px;cursor:pointer}
.user-pill:hover{background:var(--sidebar-2)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}
.avatar.lg{width:56px;height:56px;font-size:18px}
.avatar.sm{width:24px;height:24px;font-size:10px}
.user-name{color:#E5EEED;font-size:13px;font-weight:500}
.user-role{color:var(--sidebar-text-2);font-size:11px}

.crumbs{display:flex;align-items:center;gap:6px;color:var(--text-2);font-size:13px;font-weight:500}
.crumbs .sep{color:var(--text-3)}
.crumbs .cur{color:var(--text);font-weight:600}
.search-box{flex:1;max-width:520px;margin:0 auto;position:relative}
.search-input{width:100%;height:36px;padding:0 12px 0 38px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;font-size:13px;outline:none;transition:all .15s}
.search-input:focus{background:#fff;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}
.search-kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border);padding:2px 6px;border-radius:5px;font-size:11px;color:var(--text-2);pointer-events:none}
.top-actions{display:flex;align-items:center;gap:6px;margin-left:auto}
.icon-btn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .15s;position:relative}
.icon-btn:hover{background:var(--surface-2);color:var(--text)}
.icon-btn .dot{position:absolute;top:7px;right:7px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}

.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:14px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.page-sub{color:var(--text-2);font-size:13.5px;margin-top:3px}
.btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 14px;border-radius:9px;font-size:13px;font-weight:600;border:1px solid transparent;white-space:nowrap;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-2)}
.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-amber{background:var(--amber);color:#fff}
.btn-sm{height:30px;padding:0 11px;font-size:12.5px;border-radius:7px}
.btn-xs{height:24px;padding:0 8px;font-size:11.5px;border-radius:6px;font-weight:600}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.card-pad{padding:18px}
.card-head{padding:16px 18px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-weight:600;font-size:14.5px}
.card-sub{font-size:12px;color:var(--text-2);margin-top:2px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600;line-height:1.5}
.b-green{background:var(--green-soft);color:#065F46}
.b-red{background:var(--red-soft);color:#991B1B}
.b-amber{background:var(--amber-soft);color:#92400E}
.b-blue{background:var(--blue-soft);color:#1E40AF}
.b-purple{background:var(--purple-soft);color:#5B21B6}
.b-gray{background:#F1F3F4;color:#475569}
.b-teal{background:var(--primary-soft);color:var(--primary-2)}
.b-gold{background:var(--gold-soft);color:#854D0E}

.kpi{padding:18px}
.kpi-label{font-size:12px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-.8px;line-height:1.1}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;margin-top:6px}
.kpi-delta.up{color:var(--green)}
.kpi-delta.down{color:var(--red)}

table.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-weight:600;text-align:left;padding:11px 14px;border-bottom:1px solid var(--border-2);background:var(--surface-2)}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--border-2);font-size:13px;vertical-align:middle}
.tbl tr:hover td{background:var(--surface-2)}
.tbl tr.clickable{cursor:pointer}

.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-dash{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-top:14px}

.heatmap{display:grid;grid-template-columns:140px repeat(7,1fr);gap:3px;font-size:11px}
.hm-h{padding:4px 6px;color:var(--text-3);text-align:center;font-weight:600;text-transform:uppercase}
.hm-l{padding:4px 6px;color:var(--text-3);font-weight:500;display:flex;align-items:center;font-size:11px}
.hm-c{aspect-ratio:1.2/1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:#fff}

.funnel{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.funnel-step{display:flex;align-items:center;gap:14px;padding:6px 0}
.funnel-bar{flex:1;background:var(--surface-2);border-radius:8px;height:36px;overflow:hidden}
.funnel-fill{height:100%;background:linear-gradient(90deg,var(--primary),#14B8A6);border-radius:8px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:600;font-size:12.5px}
.funnel-label{min-width:170px;font-size:13px;font-weight:500}
.funnel-conv{min-width:50px;font-size:12px;color:var(--text-2);text-align:right}

.sched-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.day-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px}
.day-tab{padding:6px 14px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--text-2);cursor:pointer}
.day-tab.active{background:var(--primary);color:#fff}
.day-tab:not(.active):hover{background:var(--surface-2);color:var(--text)}
.sched-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.sched-head{display:grid;border-bottom:1px solid var(--border-2);background:var(--surface-2)}
.sched-head-cell{padding:11px 8px;text-align:center;border-right:1px solid var(--border-2);font-size:12px}
.sched-head-cell:last-child{border-right:none}
.doc-mini{display:flex;align-items:center;justify-content:center;gap:7px}
.doc-mini-name{font-weight:600;font-size:12.5px;color:var(--text);white-space:nowrap}
.doc-mini-spec{font-size:11px;color:var(--text-3);margin-top:1px}
.sched-body{position:relative;overflow:auto;max-height:calc(100vh - 280px)}
.sched-row{display:grid;border-bottom:1px solid var(--border-2);min-height:40px}
.sched-row:nth-child(odd){background:var(--surface-2)}
.sched-time{padding:8px;font-size:11.5px;color:var(--text-3);font-weight:500;border-right:1px solid var(--border-2);text-align:center}
.sched-cell{border-right:1px solid var(--border-2);position:relative;padding:2px;min-height:40px}
.sched-cell:last-child{border-right:none}
.sched-cell:hover{background:rgba(15,118,110,.04)}
.appt{position:absolute;left:3px;right:3px;border-radius:6px;padding:5px 7px;font-size:11.5px;color:#fff;cursor:pointer;overflow:hidden;border-left:3px solid rgba(0,0,0,.18);z-index:2;transition:all .12s}
.appt:hover{box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:3}
.appt-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px}
.appt-proc{font-size:10.5px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.appt-status{position:absolute;top:4px;right:5px;width:6px;height:6px;border-radius:50%;background:#fff;opacity:.85}
.risk-dot{position:absolute;bottom:3px;right:5px;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-size:10px;color:#DC2626;font-weight:700}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:var(--text-3)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.chip-count{background:rgba(0,0,0,.08);padding:1px 6px;border-radius:5px;font-size:11px;font-weight:600}
.chip.active .chip-count{background:rgba(255,255,255,.2)}
.patient-name{display:flex;align-items:center;gap:10px}
.patient-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.tbl tr:hover .patient-actions{opacity:1}

.pc-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;align-items:center;gap:18px;margin-bottom:16px;flex-wrap:wrap}
.pc-main{flex:1;min-width:260px}
.pc-name{font-size:21px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pc-meta{color:var(--text-2);font-size:13px;margin-top:5px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pc-meta-item{display:flex;align-items:center;gap:5px}
.pc-stats{display:flex;gap:10px}
.pc-stat{padding:10px 14px;background:var(--surface-2);border-radius:9px;text-align:center;min-width:90px}
.pc-stat-label{font-size:11px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.pc-stat-value{font-size:17px;font-weight:700;margin-top:3px;letter-spacing:-.3px}

.tabs{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-badge{margin-left:6px;background:var(--surface-2);color:var(--text-2);padding:1px 6px;border-radius:5px;font-size:11px;font-weight:600}
.tab.active .tab-badge{background:var(--primary-soft);color:var(--primary-2)}

.teeth-wrap{background:linear-gradient(180deg,#FAFCFC,#FFFFFF);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 20px}
.teeth-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;padding:10px 14px;background:var(--surface-2);border-radius:9px}
.tl-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-2);font-weight:500}
.tl-swatch{width:11px;height:11px;border-radius:3px;border:1px solid rgba(0,0,0,.08)}
.teeth-row{display:flex;justify-content:center;gap:3px;margin-bottom:8px}
.teeth-half{display:flex;gap:3px}
.midline{width:2px;background:linear-gradient(180deg,transparent,var(--border) 20%,var(--border) 80%,transparent);margin:0 6px}
.tooth{cursor:pointer;transition:transform .15s,filter .15s}
.tooth:hover{transform:translateY(-2px);filter:drop-shadow(0 4px 6px rgba(15,118,110,.25))}
.tooth.selected{filter:drop-shadow(0 0 4px rgba(15,118,110,.6)) drop-shadow(0 4px 8px rgba(15,118,110,.3))}
.tooth-num{font-size:9px;text-anchor:middle;fill:var(--text-3);font-weight:600;pointer-events:none}
.tooth-seg{stroke:#94A3B8;stroke-width:.6}
.tooth-seg.healthy{fill:#FFFFFF}
.tooth-seg.caries{fill:#DC2626}
.tooth-seg.filling{fill:#94A3B8}
.tooth-seg.crown{fill:#CA8A04}
.tooth-seg.implant{fill:#2563EB}
.tooth-seg.endo{fill:#7C3AED}
.tooth-extracted{fill:none;stroke:#CBD5E1;stroke-width:1.5;stroke-dasharray:2 2}
.jaw-label{text-align:center;color:var(--text-3);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 4px}

.tp-head{padding:14px 16px;border-bottom:1px solid var(--border-2);display:flex;justify-content:space-between;align-items:center}
.tp-tooth{font-size:22px;font-weight:700;letter-spacing:-.5px}
.tp-tooth-name{font-size:11.5px;color:var(--text-2);margin-top:2px}
.tp-body{padding:12px 16px}
.tp-section{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-weight:600;margin-bottom:8px}
.tp-history-item{display:flex;gap:9px;padding:7px 0;font-size:12.5px;border-bottom:1px solid var(--border-2)}
.tp-history-item:last-child{border-bottom:none}
.tp-h-date{color:var(--text-3);font-size:11.5px;min-width:60px}

.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border)}
.tl-event{position:relative;padding:8px 0 16px}
.tl-dot{position:absolute;left:-30px;top:10px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--primary);color:var(--primary);box-shadow:0 0 0 4px var(--surface)}
.tl-event-card{background:var(--surface);border:1px solid var(--border-2);border-radius:9px;padding:11px 13px}
.tl-title{font-weight:600;font-size:13px}
.tl-meta{font-size:11.5px;color:var(--text-3);margin-top:3px}
.tl-desc{font-size:12.5px;color:var(--text-2);margin-top:5px}

.ai-fab{position:fixed;bottom:24px;right:24px;height:48px;padding:0 18px;background:linear-gradient(135deg,#0F766E,#7C3AED);color:#fff;border-radius:24px;display:flex;align-items:center;gap:9px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:0 8px 24px rgba(124,58,237,.32),0 2px 6px rgba(15,118,110,.2);z-index:50;transition:all .2s}
.ai-fab:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.4)}
.ai-fab .pulse{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 10px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.ai-panel{position:fixed;bottom:24px;right:24px;width:420px;height:560px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:0 24px 60px rgba(15,31,30,.18);display:flex;flex-direction:column;opacity:0;transform:translateY(20px) scale(.96);pointer-events:none;z-index:51;transition:all .25s}
.ai-panel.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.ai-head{padding:14px 16px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;gap:11px;background:linear-gradient(135deg,#0F766E,#7C3AED);color:#fff;border-radius:var(--r-xl) var(--r-xl) 0 0}
.ai-ava{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center}
.ai-title{font-weight:600;font-size:14px}
.ai-sub{font-size:11.5px;opacity:.85;margin-top:1px}
.ai-close{margin-left:auto;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(255,255,255,.15);cursor:pointer}
.ai-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:10px 13px;border-radius:13px;font-size:13px;line-height:1.5}
.ai-msg.bot{background:var(--surface-2);border:1px solid var(--border-2);align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg b{font-weight:600}
.ai-suggest{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--border-2)}
.ai-sg{padding:6px 10px;background:var(--primary-tint);color:var(--primary-2);border:1px solid var(--primary-soft);border-radius:14px;font-size:11.5px;font-weight:500;cursor:pointer}
.ai-sg:hover{background:var(--primary-soft)}
.ai-input-wrap{padding:10px 14px 14px;border-top:1px solid var(--border-2);display:flex;gap:8px}
.ai-input{flex:1;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2);outline:none;font-size:13px}
.ai-input:focus{background:#fff;border-color:var(--primary)}
.ai-send{width:38px;height:38px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.typing{display:inline-flex;gap:3px;align-items:center;height:18px}
.typing span{width:6px;height:6px;background:var(--text-3);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.modal-bg{position:fixed;inset:0;background:rgba(15,31,30,.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r-xl);box-shadow:0 24px 60px rgba(15,31,30,.25);max-width:540px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border-2);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-weight:600;font-size:16px}
.modal-body{padding:18px 20px;overflow-y:auto}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border-2);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2)}
.mb-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-2);font-size:13px}
.mb-row:last-child{border:none}
.mb-row .lbl{color:var(--text-2)}
.mb-row .val{font-weight:600}

.cmdk-bg{position:fixed;inset:0;background:rgba(15,31,30,.55);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:12vh}
.cmdk-bg.show{display:flex}
.cmdk{width:580px;max-width:90vw;background:var(--surface);border-radius:var(--r-xl);box-shadow:0 32px 80px rgba(15,31,30,.3);overflow:hidden}
.cmdk-search{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border-2);gap:10px}
.cmdk-search input{flex:1;border:none;outline:none;font-size:16px;background:none}
.cmdk-results{max-height:420px;overflow-y:auto;padding:6px}
.cmdk-section{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;padding:10px 12px 6px}
.cmdk-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px}
.cmdk-item:hover,.cmdk-item.sel{background:var(--primary-tint)}
.ci-ico{width:30px;height:30px;border-radius:7px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-2);flex-shrink:0}
.ci-text{flex:1;min-width:0}
.ci-title{font-weight:500}
.ci-sub{font-size:11.5px;color:var(--text-3);margin-top:1px}
.cmdk-foot{padding:9px 14px;border-top:1px solid var(--border-2);background:var(--surface-2);display:flex;gap:14px;font-size:11px;color:var(--text-3);align-items:center}
.cmdk-foot kbd{background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:4px;font-size:10.5px}

.notif-pop{position:absolute;top:46px;right:0;width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:60;display:none;overflow:hidden}

.ni-meta{font-size:11.5px;color:var(--text-3);margin-top:3px}

.plan-row{display:grid;grid-template-columns:60px 1fr 110px 110px 110px 36px;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border-2);align-items:center;font-size:13px}

.plan-total{padding:14px 16px;background:var(--surface-2);display:flex;justify-content:space-between;font-weight:600;font-size:14px}

.bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;width:100%;max-width:120px}
.bar-fill{height:100%;background:var(--primary);border-radius:3px}

.bar-fill.warn{background:var(--amber)}

.widget-preview{background:linear-gradient(180deg,#F0FDFA,#FAFCFC);border:1px solid var(--primary-soft);border-radius:var(--r-lg);padding:18px}

.wp-step{font-size:11px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.wp-title{font-size:14px;font-weight:600;margin:6px 0 10px}
.wp-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.wp-slot{padding:8px;text-align:center;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer}
.wp-slot:hover{border-color:var(--primary);color:var(--primary)}
.wp-slot.picked{background:var(--primary);color:#fff;border-color:var(--primary)}

.loyalty-box{padding:14px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:var(--r-lg);border:1px solid #FCD34D}
.loyalty-tier{font-size:11px;color:#92400E;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.loyalty-pts{font-size:24px;font-weight:700;color:#78350F;margin-top:3px}
.loyalty-prog{margin-top:10px;height:5px;background:rgba(146,64,14,.15);border-radius:3px;overflow:hidden}
.loyalty-prog-fill{height:100%;background:#D97706}
.loyalty-next{font-size:11.5px;color:#92400E;margin-top:6px}

.mic-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;width:100%;background:linear-gradient(135deg,var(--primary-tint),#fff);border:1px dashed var(--primary);border-radius:var(--r-lg);cursor:pointer}
.mic-btn:hover{background:var(--primary-soft)}
.mic-circle{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic-btn.recording .mic-circle{background:var(--red);animation:pulseRed 1.4s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{box-shadow:0 0 0 12px rgba(220,38,38,0)}}
.mic-wave{flex:1;display:flex;align-items:center;gap:3px;height:30px}
.mic-wave span{width:3px;background:var(--primary);border-radius:2px;opacity:.3;height:6px}
.mic-btn.recording .mic-wave span{opacity:1;animation:wave 1s infinite}
.mic-btn.recording .mic-wave span:nth-child(odd){animation-delay:.15s}
@keyframes wave{0%,100%{height:6px}50%{height:24px}}

.fin-tile{padding:16px 18px;border-radius:var(--r-lg);color:#fff}
.fin-t-1{background:linear-gradient(135deg,#0F766E,#14B8A6)}
.fin-t-2{background:linear-gradient(135deg,#D97706,#F59E0B)}
.fin-t-3{background:linear-gradient(135deg,#7C3AED,#A78BFA)}
.fin-t-label{font-size:12px;opacity:.85;font-weight:500}
.fin-t-value{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.5px}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#D5DCDD;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb:hover{background:#B8C2C3}
</style>
</head>

const APPOINTMENTS=(function(){
  const list=[];let id=1;
  const slots=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00'];
  DOCTORS.forEach((doc,di)=>{
    for(let day=0;day<WEEK_DAYS.length;day++){
      const count=7+((di*3+day*5)%5);
      let cursor=0;
      for(let i=0;i<count && cursor<slots.length-2;i++){
        const start=slots[cursor];
        const dur=[30,30,45,60,60,90][i%6];
        const patient=PATIENTS[(di*5+day*3+i*7)%PATIENTS.length];
        let proc=PROCEDURES[(di+day+i)%PROCEDURES.length];
        if(doc.spec.includes('Хирург'))proc=PROCEDURES[6+(i%3)];
        else if(doc.spec.includes('Ортодонт'))proc=PROCEDURES[12+(i%2)];
        else if(doc.spec.includes('Гигиенист'))proc=PROCEDURES[1];
        else if(doc.spec.includes('Детский'))proc=PROCEDURES[15];
        else if(doc.spec.includes('Ортопед'))proc=PROCEDURES[9+(i%3)];
        else if(doc.spec.includes('Эндодонт'))proc=PROCEDURES[4+(i%2)];
        else proc=PROCEDURES[2+(i%2)];
        const statuses=['confirmed','pending','confirmed','done','confirmed','noshow','confirmed'];
        const status=day<4?'done':(day===4&&parseInt(start)<11?'done':(day===4?(i%5===0?'pending':'confirmed'):statuses[i%6]));
        list.push({id:'a'+id++,day,start,dur,docId:doc.id,patientId:patient.id,procName:proc.n,procPrice:proc.p,procType:proc.t,status,risk:patient.risk||0.2});
        cursor+=Math.ceil(dur/30)+(i%4===0?1:0);
      }
    }
  });
  return list;
})();

const fmt={
money:v=>{const a=Math.abs(v);return (v<0?'-':'')+a.toLocaleString('ru-RU').replace(/,/g,' ')+' ₸'},
date:s=>{if(!s)return'—';return new Date(s).toLocaleDateString('ru-RU',{day:'2-digit',month:'short'})},
dateFull:s=>new Date(s).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'}),
age:a=>{const l=a%10,lt=a%100;if(lt>=11&&lt<=14)return a+' лет';if(l===1)return a+' год';if(l>=2&&l<=4)return a+' года';return a+' лет'}};
function $(id){return document.getElementById(id)}
function patient(id){return PATIENTS.find(p=>p.id===id)}
function doctor(id){return DOCTORS.find(d=>d.id===id)}
function escapeHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function ini(name){return name.split(' ').map(s=>s[0]).slice(0,2).join('')}
const TAG_LABEL={all:'Все',active:'Активные',sleeping:'Спящие 6+ мес',debtor:'Должники',vip:'VIP',new:'Новые'};
function tagBadge(t){const map={vip:'b-gold',active:'b-green',sleeping:'b-gray',debtor:'b-red',new:'b-blue'};const lbl={vip:'VIP',active:'Активный',sleeping:'Спящий',debtor:'Должник',new:'Новый'};return `<span class="badge ${map[t]||'b-gray'}">${lbl[t]||t}</span>`}
function statusBadge(s){const m={confirmed:['b-green','Подтверждена'],pending:['b-amber','Ждём'],inchair:['b-blue','В кресле'],done:['b-gray','Завершён'],noshow:['b-red','Не пришёл']};const[c,l]=m[s]||['b-gray',s];return `<span class="badge ${c}">${l}</span>`}

/* ===== NAVIGATION ===== */
function setView(v,extra){
  STATE.view=v;
  if(extra)Object.assign(STATE,extra);
  if(v==='patients'||v==='dashboard'||v==='schedule'||v==='treatment'||v==='finance'||v==='inventory'||v==='comms'||v==='analytics'){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
  }
  render();
}
const CRUMBS={dashboard:'Дашборд',schedule:'Расписание',patients:'Пациенты',treatment:'Лечение',finance:'Финансы',inventory:'Склад',comms:'Коммуникации',analytics:'Аналитика',settings:'Настройки'};
function renderCrumbs(){
  let html='<span>Главная</span><span class="sep">/</span>';
  if(STATE.view==='patient'){
    html+=`<span style="cursor:pointer" onclick="setView('patients')">Пациенты</span><span class="sep">/</span><span class="cur">${patient(STATE.patientId).name}</span>`;
  } else {
    html+=`<span class="cur">${CRUMBS[STATE.view]||''}</span>`;
  }
  $('crumbs').innerHTML=html;
}
function render(){
  renderCrumbs();
  const v=STATE.view;
  let html='';
  if(v==='dashboard')html=renderDashboard();
  else if(v==='schedule')html=renderSchedule();
  else if(v==='patients')html=renderPatients();
  else if(v==='patient')html=renderPatient();
  else if(v==='treatment')html=renderTreatment();
  else if(v==='finance')html=renderFinance();
  else if(v==='inventory')html=renderInventory();
  else if(v==='comms')html=renderComms();
  else if(v==='analytics')html=renderAnalytics();
  else if(v==='settings')html=renderSettings();
  $('content').innerHTML=html;
  if(v==='patient')bindPatientTabs();
}

/* ===== SCHEDULE ===== */
function renderSchedule(){
  const slots=[];
  for(let h=9;h<20;h++){slots.push(h+':00');slots.push(h+':30')}
  slots.forEach((s,i)=>slots[i]=s.padStart(5,'0'));
  const dayAppts=APPOINTMENTS.filter(a=>a.day===STATE.scheduleDay);
  const cols=`60px repeat(${DOCTORS.length},minmax(120px,1fr))`;
  let head=`<div class="sched-head" style="grid-template-columns:${cols}"><div class="sched-head-cell" style="background:var(--surface-2)"></div>`;
  DOCTORS.forEach(d=>{
    head+=`<div class="sched-head-cell"><div class="doc-mini"><div class="avatar sm" style="background:${d.c}">${d.ini}</div><div style="text-align:left;min-width:0"><div class="doc-mini-name">${d.name.split(' ')[0]} ${d.name.split(' ')[1][0]}.</div><div class="doc-mini-spec">${d.spec}</div></div></div></div>`;
  });
  head+='</div>';
  let body='';
  slots.forEach(slot=>{
    body+=`<div class="sched-row" style="grid-template-columns:${cols}"><div class="sched-time">${slot}</div>`;
    DOCTORS.forEach(doc=>{
      const cellAppts=dayAppts.filter(a=>a.docId===doc.id && a.start===slot);
      let inner='';
      cellAppts.forEach(a=>{
        const p=patient(a.patientId);
        const c=PROC_TYPES[a.procType].c;
        const h=(a.dur/30)*40-6;
        const highRisk=a.risk>0.6;
        inner+=`<div class="appt" style="background:${c};top:2px;height:${h}px" onclick="event.stopPropagation();openApptModal('${a.id}')"><div class="appt-status" style="background:${a.status==='done'?'#fff':a.status==='pending'?'#FCD34D':a.status==='noshow'?'#FCA5A5':'#fff'}"></div><div class="appt-name">${p.name}</div><div class="appt-proc">${a.procName}</div>${highRisk?`<div class="risk-dot" title="Высокий риск ${Math.round(a.risk*100)}%">⚠</div>`:''}</div>`;
      });
      body+=`<div class="sched-cell">${inner}</div>`;
    });
    body+='</div>';
  });
  return `
  <div class="page-head">
    <div><div class="page-title">Расписание</div><div class="page-sub">${dayAppts.length} записей · ${WEEK_DAYS[STATE.scheduleDay]} 2026 · загрузка 87%</div></div>
    <div style="display:flex;gap:8px"><button class="btn btn-ghost">${I.filter}Фильтры</button><button class="btn btn-primary" onclick="openModal('newAppt')">${I.plus}Записать</button></div>
  </div>
  <div class="sched-toolbar">
    <div class="day-tabs">${WEEK_DAYS.map((d,i)=>`<div class="day-tab ${i===STATE.scheduleDay?'active':''}" onclick="setView('schedule',{scheduleDay:${i}})">${d}</div>`).join('')}</div>
    <div style="margin-left:auto;display:flex;gap:14px;align-items:center;font-size:12px;color:var(--text-2);flex-wrap:wrap">
      ${Object.entries(PROC_TYPES).slice(0,6).map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:9px;height:9px;border-radius:3px;background:${v.c}"></div>${v.name}</div>`).join('')}
    </div>
  </div>

function bindPatientTabs(){
  document.querySelectorAll('.tab[data-tab]').forEach(t=>{

      $('pcTabContent').innerHTML=renderPatientTab(patient(STATE.patientId),STATE.patientTab);

/* ===== TEETH CHART (WOW FEATURE) ===== */
function renderTabTeeth(p){
  const data=TEETH_DATA[p.id]||{};
  function renderTooth(num){
    const cond=data[num]||{};
    const isFront=(num%10>=1 && num%10<=3);
    const isUpper=num<30;
    const w=28,h=isFront?44:38;
    let segments='';
    if(cond.state==='extracted'){
      segments=`<rect class="tooth-extracted" x="3" y="3" width="${w-6}" height="${h-6}" rx="6"/>`;
    } else if(cond.state==='implant'){
      const bc='#2563EB';
      segments=`<rect x="4" y="${isUpper?h-14:4}" width="${w-8}" height="10" rx="3" fill="${bc}"/><path d="M${w/2-3} ${isUpper?h-14:14} L${w/2} ${isUpper?h-22:6} L${w/2+3} ${isUpper?h-14:14}" stroke="${bc}" stroke-width="2.5" fill="none"/><line x1="${w/2}" y1="${isUpper?h-12:6}" x2="${w/2}" y2="${isUpper?h-4:14}" stroke="${bc}" stroke-width="1.5" stroke-dasharray="2 2"/>`;
    } else if(cond.state==='crown'){
      segments=`<rect class="tooth-seg crown" x="3" y="3" width="${w-6}" height="${h-6}" rx="5"/><path d="M6 ${h/2} L${w/2-3} ${h/2-3} L${w/2} ${h/2+3} L${w/2+3} ${h/2-3} L${w-6} ${h/2}" stroke="#854D0E" stroke-width=".8" fill="none" opacity=".5"/>`;
    } else {
      const seg=cond.seg||{};
      const s=(k)=>seg[k]||'healthy';
      const fdiOnRight=(num>=11&&num<=18)||(num>=41&&num<=48);
      const M_side=fdiOnRight?'left':'right';
      const D_side=fdiOnRight?'right':'left';
      const V_side=isUpper?'top':'bottom';
      const L_side=isUpper?'bottom':'top';
      const segOf=(side)=>{if(side===M_side)return s('m');if(side===D_side)return s('d');if(side===V_side)return s('v');if(side===L_side)return s('l');};
      segments=`<path class="tooth-seg ${segOf('top')}" d="M3 ${h*.32} Q3 3 ${w/2} 3 Q${w-3} 3 ${w-3} ${h*.32} L${w*.7} ${h*.45} L${w*.3} ${h*.45} Z"/><path class="tooth-seg ${segOf('bottom')}" d="M3 ${h*.68} Q3 ${h-3} ${w/2} ${h-3} Q${w-3} ${h-3} ${w-3} ${h*.68} L${w*.7} ${h*.55} L${w*.3} ${h*.55} Z"/><path class="tooth-seg ${segOf('left')}" d="M3 ${h*.32} L${w*.3} ${h*.45} L${w*.3} ${h*.55} L3 ${h*.68} Z"/><path class="tooth-seg ${segOf('right')}" d="M${w-3} ${h*.32} L${w*.7} ${h*.45} L${w*.7} ${h*.55} L${w-3} ${h*.68} Z"/>${isFront?'':`<rect class="tooth-seg ${s('o')}" x="${w*.3}" y="${h*.45}" width="${w*.4}" height="${h*.1}"/>`}`;
    }
    return `<svg class="tooth ${STATE.selectedTooth===num?'selected':''}" width="${w}" height="${h+12}" overflow="visible" data-tooth="${num}" onclick="selectTooth(${num})" style="display:inline-block"><text class="tooth-num" x="${w/2}" y="${isUpper?h+10:10}">${num}</text><g transform="translate(0,${isUpper?0:12})">${segments}</g></svg>`;
  }
  function renderRow(left,right){
    return `<div class="teeth-row"><div class="teeth-half right">${left.map(renderTooth).join('')}</div><div class="midline"></div><div class="teeth-half">${right.map(renderTooth).join('')}</div></div>`;
  }
  const conditions=Object.values(data);
  const stats={
    caries:conditions.filter(c=>c.seg&&Object.values(c.seg).includes('caries')).length,
    filling:conditions.filter(c=>c.seg&&Object.values(c.seg).includes('filling')).length,
    crown:conditions.filter(c=>c.state==='crown').length,
    implant:conditions.filter(c=>c.state==='implant').length,
    extracted:conditions.filter(c=>c.state==='extracted').length
  };
  const selectedHistory=STATE.selectedTooth?(TOOTH_HISTORY[`${p.id}-${STATE.selectedTooth}`]||[]):[];
  return `
  <div class="grid-2" style="grid-template-columns:1fr 320px">
    <div class="teeth-wrap">
      <div class="teeth-legend">
        <div class="tl-item"><div class="tl-swatch" style="background:#fff"></div>Здоровый</div>
        <div class="tl-item"><div class="tl-swatch" style="background:#DC2626"></div>Кариес</div>
        <div class="tl-item"><div class="tl-swatch" style="background:#94A3B8"></div>Пломба</div>
        <div class="tl-item"><div class="tl-swatch" style="background:#CA8A04"></div>Коронка</div>
        <div class="tl-item"><div class="tl-swatch" style="background:#2563EB"></div>Имплант</div>
        <div class="tl-item"><div class="tl-swatch" style="background:#7C3AED"></div>Эндо</div>
        <div class="tl-item"><div class="tl-swatch" style="background:transparent;border-style:dashed"></div>Удалён</div>
      </div>
      <div class="jaw-label">Верхняя челюсть</div>
      ${renderRow([18,17,16,15,14,13,12,11],[21,22,23,24,25,26,27,28])}
      <div class="jaw-label">Нижняя челюсть</div>
      ${renderRow([48,47,46,45,44,43,42,41],[31,32,33,34,35,36,37,38])}
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border-2)">
      ${[{n:stats.caries,l:'Кариес',c:'#DC2626'},{n:stats.filling,l:'Пломбы',c:'#94A3B8'},{n:stats.crown,l:'Коронки',c:'#CA8A04'},{n:stats.implant,l:'Импланты',c:'#2563EB'},{n:stats.extracted,l:'Удалены',c:'#94A3B8'}].map(s=>`<div style="text-align:center"><div style="font-size:22px;font-weight:700;color:${s.c}">${s.n}</div><div style="font-size:11.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-top:2px">${s.l}</div></div>`).join('')}
      </div>
    </div>
    <div class="card" style="align-self:start">
    ${STATE.selectedTooth?`
      <div class="tp-head">
        <div><div class="tp-tooth">Зуб ${STATE.selectedTooth}</div><div class="tp-tooth-name">${toothName(STATE.selectedTooth)}</div></div>
        <div class="badge ${condBadgeClass(data[STATE.selectedTooth])}">${conditionLabel(data[STATE.selectedTooth])}</div>
      </div>
      <div class="tp-body">
        <div class="tp-section">История зуба</div>
        ${selectedHistory.length?selectedHistory.map(h=>`<div class="tp-history-item"><div class="tp-h-date">${fmt.date(h.d)}</div><div class="tp-h-text">${h.t}</div></div>`).join(''):'<div style="font-size:12px;color:var(--text-3);padding:6px 0">Без записей. Зуб без замечаний.</div>'}
        <div style="display:flex;gap:6px;margin-top:14px">
          <button class="btn btn-primary btn-sm" style="flex:1;justify-content:center">${I.plus}Процедура</button>
          <button class="btn btn-ghost btn-sm">${I.doc}</button>

function toothName(num){
  const pos=num%10;
  const names=['','Центральный резец','Боковой резец','Клык','1-й премоляр','2-й премоляр','1-й моляр','2-й моляр','Зуб мудрости'];
  const jaw=num<30?'верх':'низ';
  const side=(num>=11&&num<=18)||(num>=41&&num<=48)?'право':'лево';
  return `${names[pos]} · ${jaw} ${side}`;
}
function condBadgeClass(c){
  if(!c)return 'b-green';
  if(c.state==='extracted')return 'b-gray';
  if(c.state==='implant')return 'b-blue';
  if(c.state==='crown')return 'b-gold';
  if(c.seg&&Object.values(c.seg).includes('caries'))return 'b-red';
  return 'b-teal';
}
function conditionLabel(c){
  if(!c)return 'Здоров';
  if(c.state==='extracted')return 'Удалён';
  if(c.state==='implant')return 'Имплант';
  if(c.state==='crown')return 'Коронка';
  if(c.state==='endo')return 'Эндо-лечение';
  if(c.seg){const types=[...new Set(Object.values(c.seg))];return types.map(t=>({caries:'Кариес',filling:'Пломба'})[t]||t).join(', ')}
  return 'Норма';
}

function switchVariant(pid,key){
  if(!TREATMENT_PLANS[pid])return;
  TREATMENT_PLANS[pid].activeVariant=key;
  $('pcTabContent').innerHTML=renderPatientTab(patient(pid),'plan');
  toast(`Активный вариант: ${TREATMENT_PLANS[pid].variants[key].name}`);
}

function bookVisit(vid){
  const plan=TREATMENT_PLANS[STATE.patientId];
  const v=plan.visits.find(x=>x.id===vid);
  if(!v)return;
  toast(`Открыта запись пациента на «${v.title}» — ${fmt.dateFull(v.date)}`);
  openModal('newAppt',{visitId:vid});
}

function removeStage(pid,vid,sid){
  if(!confirm('Удалить процедуру из плана?'))return;
  const v=TREATMENT_PLANS[pid].visits.find(x=>x.id===vid);
  v.stages=v.stages.filter(s=>s.id!==sid);
  if(v.stages.length===0){
    TREATMENT_PLANS[pid].visits=TREATMENT_PLANS[pid].visits.filter(x=>x.id!==vid);
  }
  $('pcTabContent').innerHTML=renderPatientTab(patient(pid),'plan');
  toast('Процедура удалена из плана');
}

function sendTreatmentOffer(pid){
  toast('Предложение отправлено в WhatsApp и Telegram');
}

// Toast helper
function toast(msg){
  let t=document.getElementById('__toast');
  if(!t){t=document.createElement('div');t.id='__toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F1F1E;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:300;opacity:0;transition:opacity .2s,transform .2s';document.body.appendChild(t);}
  t.textContent=msg;
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(8px)'},2400);
}

function toggleAI(){
  const p=$('aiPanel'),f=$('aiFab');

  f.style.display=isOpen?'none':'flex';
  if(isOpen && !$('aiMsgs').innerHTML.trim()){

    $('aiSuggest').innerHTML=AI_SUGGEST.map(s=>`<div class="ai-sg" onclick="aiPick('${s}')">${s}</div>`).join('');

function renderAIMsgs(msgs){

let AI_STATE=AI_INIT.slice();
function aiPick(q){$('aiInput').value=q;aiSend();}
function aiSend(){
  const v=$('aiInput').value.trim();if(!v)return;
  AI_STATE.push({role:'user',html:escapeHTML(v)});
  AI_STATE.push({role:'bot',html:'<span class="typing"><span></span><span></span><span></span></span>'});
  renderAIMsgs(AI_STATE);
  $('aiInput').value='';
  setTimeout(()=>{
    AI_STATE.pop();
    const lower=v.toLowerCase();
    let reply=AI_REPLIES.default;
    for(const k of Object.keys(AI_REPLIES)){if(k!=='default' && lower.includes(k)){reply=AI_REPLIES[k];break}}
    AI_STATE.push({role:'bot',html:reply});
    renderAIMsgs(AI_STATE);
  },800);
}

  ];
  const patientHits=PATIENTS.filter(p=>!q||p.name.toLowerCase().includes(q)||p.phone.includes(q)).slice(0,5).map(p=>({
    ico:`<div class="avatar sm" style="background:${doctor(p.doc).c};width:30px;height:30px;font-size:11px">${ini(p.name)}</div>`,

    act:()=>{closeCmdK();setView('patient',{patientId:p.id,patientTab:'overview',selectedTooth:null})}
  }));
  const procHits=PROCEDURES.filter(pr=>!q||pr.n.toLowerCase().includes(q)).slice(0,4).map(pr=>({
    ico:I.tooth,title:pr.n,sub:`${fmt.money(pr.p)} · ${PROC_TYPES[pr.t].name}`,sec:'Процедуры',act:closeCmdK
  }));
  const actHits=actions.filter(a=>!q||a.title.toLowerCase().includes(q)||a.sub.toLowerCase().includes(q));
  const groups={};
  [...actHits,...patientHits,...procHits].forEach(it=>{(groups[it.sec]=groups[it.sec]||[]).push(it)});
  const all=[];
  let html='';
  Object.entries(groups).forEach(([sec,items])=>{
    html+=`<div class="cmdk-section">${sec}</div>`;
    items.forEach(it=>{
      const idx=all.length;
      html+=`<div class="cmdk-item ${idx===STATE.cmdkSel?'sel':''}" data-idx="${idx}"><div class="ci-ico">${it.ico}</div><div class="ci-text"><div class="ci-title">${it.title}</div><div class="ci-sub">${it.sub}</div></div></div>`;
      all.push(it);
    });
  });
  if(!all.length)html=`<div style="padding:30px;text-align:center;color:var(--text-3);font-size:13px">Ничего не найдено</div>`;
  $('cmdkResults').innerHTML=html;
  window._cmdkAll=all;
  document.querySelectorAll('.cmdk-item').forEach(el=>el.onclick=()=>all[parseInt(el.dataset.idx)].act());
}

    <button class="icon-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" style="max-width:680px">
    <div style="display:flex;flex-direction:column;gap:14px">
      ${field('Название плана',modalInput(d.title,'','oninput="MODAL_STATE.data.title=this.value"'))}

      <div>
        <div style="font-size:11.5px;color:var(--text-3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px">Вариант лечения</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[['economy','Эконом','Базовые материалы'],['standard','Стандарт','Оптимально'],['premium','Премиум','Топ материалы']].map(v=>`
          <div onclick="MODAL_STATE.data.variant='${v[0]}';renderModal()" style="padding:11px;border:1.5px solid ${d.variant===v[0]?'var(--primary)':'var(--border)'};border-radius:9px;cursor:pointer;background:${d.variant===v[0]?'var(--primary-tint)':'#fff'};text-align:center">
            <div style="font-weight:700;font-size:13px">${v[1]}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">${v[2]}</div>
          </div>`).join('')}
        </div>
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Этапы плана <span style="background:var(--primary-tint);color:var(--primary-2);padding:1px 7px;border-radius:5px;margin-left:4px">${d.stages.length}</span></div>
          ${d.addingStage?'':`<button class="btn btn-primary btn-sm" onclick="addStageToPlan()">${I.plus}Добавить процедуру</button>`}
        </div>
        ${d.addingStage?renderAddStageForm():(d.stages.length===0?`<div style="padding:24px;text-align:center;border:1.5px dashed var(--border);border-radius:10px;color:var(--text-3);font-size:13px">Пока нет ни одной процедуры. Нажмите «Добавить процедуру», чтобы начать.</div>`:`
        <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">
        ${d.stages.map((s,i)=>`<div style="display:grid;grid-template-columns:54px 1fr 110px 30px;gap:10px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--border-2);${i===d.stages.length-1?'border:none':''}">
          <div class="stage-tooth">${s.tooth}</div>
          <div style="font-weight:500;font-size:13px">${s.proc}</div>
          <div style="text-align:right;font-weight:600">${fmt.money(s.price)}</div>
          <button class="icon-btn" style="width:26px;height:26px" onclick="MODAL_STATE.data.stages.splice(${i},1);renderModal()">✕</button>
        </div>`).join('')}
        </div>`)}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end">
        ${field('Скидка, %',`<input type="number" class="search-input" value="${d.discount||0}" style="height:38px;width:100%;padding-left:12px" oninput="MODAL_STATE.data.discount=parseFloat(this.value)||0;renderModal()">`)}
        <div style="background:var(--primary-tint);border-radius:9px;padding:10px 14px">
          <div style="font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Итого</div>
          <div style="font-size:18px;font-weight:700;color:var(--primary-2);letter-spacing:-.3px">${fmt.money(discounted)}</div>
          ${d.discount>0?`<div style="font-size:11px;color:var(--text-3);text-decoration:line-through">${fmt.money(total)}</div>`:''}
        </div>
      </div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-ghost" onclick="submitPlan('draft')">Сохранить черновик</button>
    <button class="btn btn-primary" onclick="submitPlan('agreed')" ${d.stages.length===0?'style="opacity:.5;pointer-events:none"':''}>Согласовать с пациентом</button>
  </div>`;
}
function addStageToPlan(){
  MODAL_STATE.data.addingStage={tooth:11,procIdx:0};
  renderModal();
}
function confirmAddStage(){
  const a=MODAL_STATE.data.addingStage;
  if(!a)return;
  const proc=PROCEDURES[a.procIdx];
  MODAL_STATE.data.stages.push({tooth:parseInt(a.tooth)||0,proc:proc.n,price:proc.p,type:proc.t});
  delete MODAL_STATE.data.addingStage;
  renderModal();
}
function cancelAddStage(){
  delete MODAL_STATE.data.addingStage;
  renderModal();
}
function renderAddStageForm(){
  const a=MODAL_STATE.data.addingStage;
  if(!a)return '';
  // Quick tooth picker — common teeth + manual input
  const commonTeeth=[11,12,13,14,15,16,17,21,22,23,24,25,26,27,31,32,33,34,35,36,37,41,42,43,44,45,46,47];
  return `<div style="padding:14px;background:var(--primary-tint);border:1.5px solid var(--primary);border-radius:10px;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;font-weight:600;color:var(--primary-2)">Добавить процедуру</div>
      <button class="icon-btn" style="width:24px;height:24px" onclick="cancelAddStage()">✕</button>
    </div>
    <div>
      <div style="font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:5px;text-transform:uppercase">Зуб (FDI)</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" class="search-input" value="${a.tooth}" style="height:34px;width:80px;padding-left:10px;text-align:center;font-weight:600" oninput="MODAL_STATE.data.addingStage.tooth=this.value">
        <div style="font-size:11px;color:var(--text-2);flex:1">или выберите быстро:</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;max-height:60px;overflow-y:auto">
      ${commonTeeth.map(t=>`<button onclick="MODAL_STATE.data.addingStage.tooth=${t};renderModal()" style="padding:3px 7px;background:${parseInt(a.tooth)===t?'var(--primary)':'#fff'};color:${parseInt(a.tooth)===t?'#fff':'var(--text)'};border:1px solid ${parseInt(a.tooth)===t?'var(--primary)':'var(--border)'};border-radius:5px;font-size:11px;font-weight:600;cursor:pointer">${t}</button>`).join('')}
      </div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:5px;text-transform:uppercase">Процедура из прайса</div>
      <select class="search-input" style="height:34px;width:100%;padding-left:10px" onchange="MODAL_STATE.data.addingStage.procIdx=parseInt(this.value);renderModal()">
        ${PROCEDURES.map((pr,i)=>`<option value="${i}" ${a.procIdx===i?'selected':''}>${pr.n} — ${fmt.money(pr.p)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid rgba(15,118,110,.2)">
      <div style="font-size:11px;color:var(--text-3)">Будет добавлено в план</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="cancelAddStage()">Отмена</button>
        <button class="btn btn-primary btn-sm" onclick="confirmAddStage()">${I.plus}Добавить</button>
      </div>
    </div>
  </div>`;
}
function submitPlan(status){
  const d=MODAL_STATE.data;
  const pid=STATE.patientId;
  const total=d.stages.reduce((s,x)=>s+x.price,0);
  TREATMENT_PLANS[pid]={
    id:'plan-'+pid+'-'+Date.now(),
    title:d.title,
    status:status==='agreed'?'in_progress':'draft',
    agreedAt:status==='agreed'?new Date().toISOString().slice(0,10):null,
    docId:DOCTORS[0].id,
    discount:d.discount||0,
    activeVariant:d.variant,
    variants:{
      economy:{name:'Эконом',sub:'Базовые материалы',total:Math.round(total*0.7),duration:'4–5 мес'},
      standard:{name:'Стандарт',sub:'Оптимально',total:total,duration:'5–6 мес'},
      premium:{name:'Премиум',sub:'Топ материалы',total:Math.round(total*1.4),duration:'6–7 мес'}
    },
    visits:[{
      id:'v'+Date.now(),
      date:new Date().toISOString().slice(0,10),
      title:'Первый визит — '+(d.stages[0]?d.stages[0].proc:'осмотр'),
      docId:DOCTORS[0].id,duration:60,status:'planned',
      stages:d.stages.map((s,i)=>({id:'s'+Date.now()+'_'+i,tooth:s.tooth,proc:s.proc,price:s.price,status:'planned'}))
    }],
    payments:[]
  };
  closeModal();
  toast(status==='agreed'?'План согласован и отправлен пациенту':'Черновик плана сохранён');
  if(STATE.view==='patient')$('pcTabContent').innerHTML=renderPatientTab(patient(pid),'plan');
}

/* ----- ADD VISIT TO EXISTING PLAN ----- */
function modalAddVisit(){
  const d=MODAL_STATE.data;
  const total=d.stages.reduce((s,x)=>s+x.price,0);
  return `<div class="modal-head">
    <div><div class="modal-title">Новый визит в план</div><div style="font-size:12px;color:var(--text-2);margin-top:2px">${patient(STATE.patientId)?patient(STATE.patientId).name:''}</div></div>
    <button class="icon-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" style="max-width:620px">
    <div style="display:flex;flex-direction:column;gap:12px">
      ${field('Название визита',modalInput(d.title,'Например: Лечение кариеса 12 и 47','oninput="MODAL_STATE.data.title=this.value"'))}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${field('Дата визита',`<input type="date" class="search-input" value="${d.date}" style="height:38px;width:100%;padding-left:12px" oninput="MODAL_STATE.data.date=this.value">`)}
        ${field('Длительность, мин',`<input type="number" step="15" class="search-input" value="${d.duration}" style="height:38px;width:100%;padding-left:12px" oninput="MODAL_STATE.data.duration=parseInt(this.value)||60">`)}
      </div>
      ${field('Врач',`<select class="search-input" style="height:38px;width:100%;padding-left:12px" onchange="MODAL_STATE.data.docId=this.value">
        ${DOCTORS.map(doc=>`<option value="${doc.id}" ${d.docId===doc.id?'selected':''}>${doc.name} — ${doc.spec}</option>`).join('')}
      </select>`)}

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Процедуры в визите <span style="background:var(--primary-tint);color:var(--primary-2);padding:1px 7px;border-radius:5px;margin-left:4px">${d.stages.length}</span></div>
          ${d.addingStage?'':`<button class="btn btn-primary btn-sm" onclick="addStageToPlan()">${I.plus}Добавить</button>`}
        </div>
        ${d.addingStage?renderAddStageForm():(d.stages.length===0?`<div style="padding:20px;text-align:center;border:1.5px dashed var(--border);border-radius:10px;color:var(--text-3);font-size:13px">Добавьте хотя бы одну процедуру</div>`:`
        <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">
        ${d.stages.map((s,i)=>`<div style="display:grid;grid-template-columns:54px 1fr 110px 30px;gap:10px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--border-2);${i===d.stages.length-1?'border:none':''}">
          <div class="stage-tooth">${s.tooth}</div>
          <div style="font-weight:500;font-size:13px">${s.proc}</div>
          <div style="text-align:right;font-weight:600">${fmt.money(s.price)}</div>
          <button class="icon-btn" style="width:26px;height:26px" onclick="MODAL_STATE.data.stages.splice(${i},1);renderModal()">✕</button>
        </div>`).join('')}
        </div>`)}
      </div>

      ${total>0?`<div style="display:flex;justify-content:space-between;padding:11px 14px;background:var(--primary-tint);border-radius:9px"><span style="font-weight:500">Стоимость визита</span><b style="color:var(--primary-2);font-size:15px">${fmt.money(total)}</b></div>`:''}
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="submitAddVisit()" ${d.stages.length===0||!d.title?'style="opacity:.5;pointer-events:none"':''}>Добавить в план</button>
  </div>`;
}
function submitAddVisit(){
  const d=MODAL_STATE.data;
  const pid=STATE.patientId;
  if(!TREATMENT_PLANS[pid])return;
  TREATMENT_PLANS[pid].visits.push({
    id:'v'+Date.now(),date:d.date,title:d.title,docId:d.docId,duration:d.duration,status:'planned',
    stages:d.stages.map((s,i)=>({id:'s'+Date.now()+'_'+i,tooth:s.tooth,proc:s.proc,price:s.price,status:'planned'}))
  });
  // Sort visits by date
  TREATMENT_PLANS[pid].visits.sort((a,b)=>a.date.localeCompare(b.date));
  closeModal();
  toast('Визит добавлен в план лечения');
  $('pcTabContent').innerHTML=renderPatientTab(patient(pid),'plan');
}


/* ===== NOTIFICATIONS ===== */
function toggleNotif(e){
  e&&e.stopPropagation();
  const p=$('notifPop');
  const open=p.classList.toggle('show');
  if(open && !p.innerHTML.trim()){
    p.innerHTML=`<div class="notif-head"><div style="font-weight:600">Уведомления</div><div style="font-size:12px;color:var(--primary);cursor:pointer">Прочитать все</div></div>
    ${NOTIFICATIONS.map(n=>{const colors={amber:'#FEF3C7',red:'#FEE2E2',green:'#D1FAE5',teal:'#CCFBF1'};const colorsT={amber:'#D97706',red:'#DC2626',green:'#059669',teal:'#0F766E'};return `<div class="notif-item">
      <div style="width:32px;height:32px;border-radius:8px;background:${colors[n.c]||'#F1F3F4'};color:${colorsT[n.c]||'#475569'};display:flex;align-items:center;justify-content:center;flex-shrink:0">${I[n.ico]||I.bell}</div>
      <div class="ni-text"><div style="font-weight:500">${n.title}</div><div class="ni-meta">${n.meta} <span class="dot-sep">·</span> ${n.time}</div></div>
    </div>`}).join('')}
    <div style="padding:11px 16px;text-align:center;background:var(--surface-2);font-size:12.5px;color:var(--primary);font-weight:500;cursor:pointer">Все уведомления →</div>`;
  }
}

/* ===== MIC (speech-to-text mock) ===== */
function toggleMic(){
  const btn=$('micBtn'),lbl=$('micLabel'),sub=$('micSub'),res=$('micResult');
  if(STATE.recording){
    STATE.recording=false;
    btn.classList.remove('recording');
    lbl.textContent='Расшифровываю…';
    sub.textContent='AI анализирует и структурирует речь';
    setTimeout(()=>{
      lbl.textContent='Готово! Протокол сформирован';
      sub.textContent='Можно отредактировать и сохранить';
      res.style.display='block';
      res.innerHTML=`<div style="font-weight:600;margin-bottom:8px;color:var(--primary)">Протокол приёма · 22.05.2026 14:38</div>
      <div style="margin-bottom:8px"><b>Жалобы:</b> Чувствительность зуба 12 при употреблении холодного и сладкого, эпизодическая ноющая боль.</div>
      <div style="margin-bottom:8px"><b>Объективно:</b> 12 — кариозная полость по мезиальной поверхности, ЭОД 6-8 мкА, перкуссия безболезненна, слизистая в проекции верхушки без изменений.</div>
      <div style="margin-bottom:8px"><b>Диагноз:</b> К02.1 Кариес дентина зуба 12 (мезиальная поверхность).</div>
      <div style="margin-bottom:8px"><b>План:</b> Препарирование, изоляция коффердамом, реставрация композитом Filtek Ultimate A2, шлифовка, полировка.</div>
      <div><b>Назначения:</b> Реминтерапия фторлаком через 2 недели, контроль через 6 месяцев.</div>`;
    },1500);
  } else {
    STATE.recording=true;
    btn.classList.add('recording');
    lbl.textContent='Слушаю…';
    sub.textContent='Говорите, я записываю. Нажмите снова, чтобы остановить.';
    res.style.display='none';
  }
}

/* ===== INIT ===== */
document.querySelectorAll('.nav-item').forEach(n=>{
  n.onclick=()=>setView(n.dataset.view);
});
document.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openCmdK()}
  if(e.key==='Escape'){closeCmdK();closeModal();$('notifPop').classList.remove('show')}
  if($('cmdkBg').classList.contains('show')){
    if(e.key==='ArrowDown'){e.preventDefault();STATE.cmdkSel=Math.min((window._cmdkAll||[]).length-1,STATE.cmdkSel+1);renderCmdK()}
    if(e.key==='ArrowUp'){e.preventDefault();STATE.cmdkSel=Math.max(0,STATE.cmdkSel-1);renderCmdK()}
    if(e.key==='Enter'){e.preventDefault();(window._cmdkAll||[])[STATE.cmdkSel]?.act()}
  }
});
document.addEventListener('click',(e)=>{
  if(!e.target.closest('#notifPop')&&!e.target.closest('[onclick*="toggleNotif"]'))$('notifPop').classList.remove('show');
});

render();
</script>
</body>
</html>
