<!DOCTYPE html>
<html lang="ru">
<head>
<script src="/app/gate.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL · Фонды проектов</title>
<style>
  :root{
    --ink:#1a2230;--paper:#eef0f3;--line:#d5d9e0;--muted:#5d6472;--card:#fff;
    --green:#0f6f52;--green-bg:#e4f0eb;--red:#b23b3b;--red-bg:#f6e6e6;
    --blue:#345b8f;--blue-bg:#e7edf5;--amber:#8a6f4a;--amber-bg:#f0ebe3;--navy:#1a2536;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
  .top{background:var(--navy);color:#fff;padding:13px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
  .top b{font-size:16px;letter-spacing:-.3px}.top span.v{font-size:11px;color:#7d8aa3}
  .top .sp{flex:1}
  .tbtn{background:rgba(255,255,255,.1);border:none;color:#dfe6f0;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit}
  .tbtn:hover{background:rgba(255,255,255,.2)}
  .tbtn.acc{background:#3f6ea8}.tbtn.acc:hover{background:#4c7fbd}
  .wrap{max-width:1060px;margin:0 auto;padding:22px 18px 80px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:26px 0 10px;font-weight:700}
  .explain{font-size:12.5px;color:#41495a;background:#eef1f5;border:1px solid var(--line);border-left:3px solid var(--blue);padding:10px 14px;border-radius:8px;margin-bottom:12px;line-height:1.55}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .kpi .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .kpi .v{font-size:18px;font-weight:700;margin-top:4px;letter-spacing:-.4px;font-variant-numeric:tabular-nums}
  .kpi .d{font-size:10.5px;color:var(--muted);margin-top:2px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  input,select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:#fbfaf7;color:var(--ink);font-family:inherit;width:100%}
  input:focus,select:focus{outline:none;border-color:var(--blue);background:#fff}
  label{display:block;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:13.5px;font-weight:700;padding:10px 18px;cursor:pointer;font-family:inherit}
  .btn:hover{background:#2b4d7a}
  .btn.grn{background:var(--green)}.btn.grn:hover{background:#0c5940}
  .btn.red{background:var(--red)}.btn.red:hover{background:#943030}
  .btn.ghost{background:none;border:1px dashed var(--line);color:var(--blue);font-weight:600}
  .btn.ghost:hover{background:var(--blue-bg);border-color:var(--blue)}
  .del{color:var(--muted);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px;flex-shrink:0}
  .del:hover{background:var(--red-bg);color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:right;padding:8px 9px;border-bottom:1px solid var(--line);font-weight:700;white-space:nowrap}
  th:first-child{text-align:left}
  td{padding:8px 9px;border-bottom:1px solid #eef0f3;text-align:right;font-variant-numeric:tabular-nums;vertical-align:middle}
  td:first-child{text-align:left}tr:last-child td{border-bottom:none}
  .plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;cursor:pointer;transition:box-shadow .15s}
  .pcard:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:var(--blue)}
  .pcard .nm{font-weight:700;font-size:15px}.pcard .cu{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .pcard .row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
  .pcard .row span:last-child{font-weight:600;font-variant-numeric:tabular-nums}
  .gap-warn{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--red-bg);color:var(--red);margin-top:8px}
  .gap-ok{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--green-bg);color:var(--green);margin-top:8px}
  .fund-row{display:grid;grid-template-columns:14px 1.3fr 70px 118px 1fr 1.15fr auto auto;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid #eef0f3}
  .fbtns{display:flex;gap:5px}
  .fbtns span{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;cursor:pointer;border:1px solid var(--line);color:var(--muted);background:#fbfaf7;white-space:nowrap}
  .fbtns span:first-child:hover{background:var(--green-bg);color:var(--green);border-color:var(--green)}
  .fbtns span:last-child:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
  .nf-row{display:grid;grid-template-columns:1.5fr 80px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:7px}
  .plan-row.with-fund{grid-template-columns:125px 1fr 1fr 1.1fr auto auto}
  .fund-row:last-child{border-bottom:none}
  .fdot{width:11px;height:11px;border-radius:50%}
  .fbal{font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
  .fio{font-size:10.5px;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
  .fund-bar{display:flex;height:13px;border-radius:7px;overflow:hidden;margin:6px 0 14px;border:1px solid var(--line)}
  .forms{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  @media(max-width:760px){.forms{grid-template-columns:1fr}.fund-row{grid-template-columns:14px 1.1fr 60px 95px 1fr auto auto}.fio{display:none}}
  .fgrid{display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:8px}
  .fgrid3{display:grid;grid-template-columns:120px 1fr 1fr;gap:8px;margin-bottom:8px}
  .alloc{font-size:11.5px;color:var(--muted);background:var(--green-bg);border-radius:8px;padding:8px 11px;margin:8px 0;line-height:1.6;display:none}
  .warn{font-size:11.5px;color:#7a5c1e;background:var(--amber-bg);border-radius:8px;padding:8px 11px;margin:8px 0;display:none}
  .plan-row{display:grid;grid-template-columns:125px 1fr 1.3fr auto auto;gap:8px;align-items:center;margin-bottom:7px}
  .mv{display:flex;gap:3px}
  .mv button{border:1px solid var(--line);background:#fff;border-radius:5px;font-size:9px;padding:3px 7px;cursor:pointer;color:var(--muted)}
  .mv button:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
  .late{font-size:9.5px;font-weight:700;color:var(--red);background:var(--red-bg);border-radius:5px;padding:2px 6px;white-space:nowrap}
  .oprow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #eef0f3;font-size:12.5px}
  .oprow:last-child{border-bottom:none}
  .oprow .dt{color:var(--muted);width:80px;flex-shrink:0;font-variant-numeric:tabular-nums;font-size:11.5px}
  .oprow .ds{flex:1;min-width:0}.oprow .ds .p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oprow .ds .c{font-size:10.5px;color:var(--muted)}
  .oprow .am{font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
  /* канбан этапов */
  .kb{display:flex;gap:10px;overflow-x:auto;align-items:flex-start;padding-bottom:10px}
  .kb-col{min-width:238px;width:238px;flex:none;background:#e9ebef;border:1px solid var(--line);border-radius:12px;padding:8px;min-height:120px}
  .kb-col.drop-hot{outline:2.5px solid var(--blue);background:var(--blue-bg)}
  .kb-head{display:flex;align-items:center;gap:5px;padding:2px 4px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .kb-head .cnt{background:#fff;border-radius:10px;padding:1px 7px;font-size:10.5px}
  .kb-head input{padding:5px 8px;font-size:12px;border-radius:6px;min-width:0}
  .kb-head .st-btn{border:1px solid var(--line);background:#fff;border-radius:5px;font-size:10px;padding:3px 7px;cursor:pointer;color:var(--muted);flex-shrink:0}
  .kb-head .st-btn:hover{color:var(--blue);border-color:var(--blue)}
  .kb-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px;cursor:grab;touch-action:none}
  .kb-card:active{cursor:grabbing}
  .kb-card.dragging{opacity:.45}
  .kb-card:hover{border-color:var(--blue)}
  .kb-ghost{position:fixed;z-index:99;opacity:.92;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.25)}
  .kb-card .nm{font-weight:700;font-size:13px}
  .kb-card .cu{font-size:10.5px;color:var(--muted);margin-bottom:5px}
  .kb-card .row{display:flex;justify-content:space-between;font-size:11px;padding:1px 0}
  .kb-card .row b{font-variant-numeric:tabular-nums}
  .kb-empty{color:var(--muted);font-size:11.5px;font-style:italic;padding:6px}
  .kb-bar{display:flex;align-items:center;gap:10px;margin:4px 0 12px;flex-wrap:wrap}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:12px 22px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:.3s;z-index:99;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .month-red td{background:#fcf0ee}
  .tag-plan{font-size:9px;font-weight:700;color:var(--blue);background:var(--blue-bg);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:1px}
  .newgrid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px;margin-bottom:10px}
  @media(max-width:760px){.newgrid{grid-template-columns:1fr}}
  .back{font-size:12.5px;color:var(--blue);cursor:pointer;font-weight:600;margin-bottom:10px;display:inline-block}
  .back:hover{text-decoration:underline}
  .htitle{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .htitle h1{font-size:22px;letter-spacing:-.5px}
  .htitle .cu{font-size:12.5px;color:var(--muted)}
</style>

<body>
<div class="top">
  <b>RL · Фонды проектов</b><span class="v">учёт по проектам и фондам</span>
  <div class="sp"></div>
  <button class="tbtn acc" onclick="showNew()">+ Новый проект</button>
  <button class="tbtn" onclick="exportData()">Скачать данные</button>
  <button class="tbtn" onclick="document.getElementById('impFile').click()">Загрузить</button>
  <input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)">
</div>
<div class="wrap" id="main"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ ДАННЫЕ ============ */
const LS='rl-fondy-v1';
const FUND_COLORS=['#345b8f','#0f6f52','#8a6f4a','#7c828e','#1a2536','#6b4d8f','#b3691f','#2d7a7a'];
// базовый набор фондов строительного проекта — редактируется в каждом проекте
const DEFAULT_FUNDS=[
  {name:'Материалы и субподряд',pct:55},
  {name:'ФОТ рабочих',pct:20},
  {name:'Налоги',pct:8},
  {name:'Накладные (офис, техника, транспорт)',pct:7},
  {name:'Прибыль (резерв)',pct:10}];
let DB={projects:[],sel:null};
let _id=1;
const uid=()=>'x'+(_id++)+'_'+DB.projects.length;
function save(){localStorage.setItem(LS,JSON.stringify({...DB,_id}))}
function load(){
  try{const raw=localStorage.getItem(LS);if(!raw)return false;
    const d=JSON.parse(raw);DB={projects:d.projects||[],stages:d.stages||null,sel:d.sel||null};_id=d._id||1000;
    DB.projects.forEach(p=>{p.tasks=p.tasks||[];p.finIn=p.finIn||[];p.finOut=p.finOut||[]});
    return DB.projects.length>0;
  }catch(e){return false}
}
const fmt=n=>(n||n===0)?new Intl.NumberFormat('ru-RU').format(Math.round(n)):'—';
const fmtM=n=>(n<0?'−':'')+(Math.abs(n)/1e6).toFixed(Math.abs(n)<1e7?1:0).replace('.',',')+' млн';
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const todayIso=()=>new Date().toISOString().slice(0,10);
const dRu=iso=>iso?iso.split('-').reverse().join('.'):'—';
function toast(m,t){const e=document.getElementById('toast');e.textContent=m;e.style.background=t==='err'?'var(--red)':'var(--green)';e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2400)}
const P=()=>DB.projects.find(p=>p.id===DB.sel);

/* ============ РАСЧЁТЫ ============ */
function fundBalances(p){
  // баланс фонда = доли от приходов − расходы из фонда ± перекладки ± ручные пополнения/снятия
  const b={};p.funds.forEach(f=>b[f.id]={in:0,out:0,mv:0,adj:0});
  p.ops.forEach(o=>{
    if(o.type==='in'&&o.alloc)Object.entries(o.alloc).forEach(([fid,a])=>{if(b[fid])b[fid].in+=a});
    if(o.type==='out'&&b[o.fund])b[o.fund].out+=Math.abs(o.amt);
    if(o.type==='adj'&&b[o.fund])b[o.fund].adj+=o.amt;
    if(o.type==='move'){if(b[o.from])b[o.from].mv-=o.amt;if(b[o.to])b[o.to].mv+=o.amt}
  });
  Object.values(b).forEach(x=>x.bal=x.in-x.out+x.mv+x.adj);
  return b;
}
function fundDebts(p){
  // непогашенные перекладки: из какого фонда сколько взято и куда (сальдо по паре фондов)
  const net={};
  p.ops.forEach(o=>{if(o.type!=='move')return;
    const [a,b]=[o.from,o.to].sort();const dir=o.from===a?1:-1;
    const k=a+'¦'+b;net[k]=(net[k]||0)+dir*o.amt});
  const out=[];
  Object.entries(net).forEach(([k,v])=>{if(Math.round(v)===0)return;
    const[a,b]=k.split('¦');
    out.push(v>0?{from:a,to:b,amt:v}:{from:b,to:a,amt:-v})});
  return out; // {from: фонд-донор, to: фонд-должник, amt: сколько вернуть}
}
function fundPlan(p,f){
  // план фонда на весь проект: заданная сумма, иначе — доля от договора
  return f.plan>0?f.plan:Math.round((p.contract||0)*(f.pct||0)/100);
}
function allocByPct(p,amt){
  // распределение прихода по долям, без потери копеек
  const total=p.funds.reduce((s,f)=>s+f.pct,0)||100;
  const alloc={};let acc=0;
  p.funds.forEach((f,i)=>{
    let a=i===p.funds.length-1?amt-acc:Math.round(amt*f.pct/total);
    acc+=a;alloc[f.id]=a;
  });
  return alloc;
}
function monthKey(iso){return (iso||'').slice(0,7)}
function monthly(p){
  // прошлое — фактом (операции), будущее — планом (строки плана с датой >= сегодня)
  const t=todayIso();
  const ev=[];
  p.ops.forEach(o=>{if(o.type==='in')ev.push({m:monthKey(o.date),fin:o.amt});
    if(o.type==='out')ev.push({m:monthKey(o.date),fout:-Math.abs(o.amt)});
    if(o.type==='adj')ev.push(o.amt>0?{m:monthKey(o.date),fin:o.amt}:{m:monthKey(o.date),fout:o.amt})});
  p.planIn.forEach(r=>{if(r.date>=t)ev.push({m:monthKey(r.date),pin:r.amt})});
  p.planOut.forEach(r=>{if(r.date>=t)ev.push({m:monthKey(r.date),pout:-Math.abs(r.amt)})});
  (p.finIn||[]).forEach(r=>{if(r.date>=t)ev.push({m:monthKey(r.date),pin:r.amt})});
  (p.finOut||[]).forEach(r=>{if(r.date>=t)ev.push({m:monthKey(r.date),pout:-Math.abs(r.amt)})});
  const keys=[...new Set(ev.map(e=>e.m))].filter(Boolean).sort();
  if(!keys.length)return[];
  // непрерывный диапазон месяцев
  const months=[];let [y,m]=keys[0].split('-').map(Number);const [ey,em]=keys[keys.length-1].split('-').map(Number);
  while(y<ey||(y===ey&&m<=em)){months.push(y+'-'+String(m).padStart(2,'0'));m++;if(m>12){m=1;y++}}
  let run=0;
  return months.map(k=>{
    const r={m:k,fin:0,fout:0,pin:0,pout:0};
    ev.forEach(e=>{if(e.m===k){r.fin+=e.fin||0;r.fout+=e.fout||0;r.pin+=e.pin||0;r.pout+=e.pout||0}});
    r.net=r.fin+r.fout+r.pin+r.pout;run+=r.net;r.run=run;
    return r;
  });
}
function firstGap(p){const rows=monthly(p);const g=rows.find(r=>r.run<0);return g?{m:g.m,short:g.run}:null}

/* ============ ЭТАПЫ (КАНБАН) ============ */
const DEFAULT_STAGES=['Переговоры','Заход · аванс','В работе','Сдача · акты','Завершён'];
let _kbEdit=false;
function ensureStages(){
  if(!DB.stages||!DB.stages.length)DB.stages=DEFAULT_STAGES.map(n=>({id:uid(),name:n}));
  const def=DB.stages[Math.min(2,DB.stages.length-1)].id;
  DB.projects.forEach(p=>{if(!p.stage||!DB.stages.some(s=>s.id===p.stage))p.stage=def});
}
function renameStage(id,val){const s=DB.stages.find(x=>x.id===id);if(s&&val.trim())s.name=val.trim();render()}
function moveStage(id,dir){const i=DB.stages.findIndex(x=>x.id===id);const j=i+dir;
  if(i<0||j<0||j>=DB.stages.length)return;
  [DB.stages[i],DB.stages[j]]=[DB.stages[j],DB.stages[i]];render()}
function delStage(id){
  if(DB.stages.length<=1){toast('Нельзя удалить последний этап','err');return}
  const has=DB.projects.some(p=>p.stage===id);
  if(has&&!confirm('На этом этапе есть проекты — они переедут в первый этап. Удалить этап?'))return;
  DB.stages=DB.stages.filter(s=>s.id!==id);
  DB.projects.forEach(p=>{if(p.stage===id)p.stage=DB.stages[0].id});
  render()}
function addStage(){DB.stages.push({id:uid(),name:'Новый этап'});render()}
function setStage(v){const p=P();if(p){p.stage=v;save();toast('Этап проекта обновлён ✓')}}
function bindKbDrag(){
  document.querySelectorAll('.kb-card').forEach(el=>{el.onpointerdown=ev=>{
    if(ev.button!==undefined&&ev.button!==0)return;
    ev.preventDefault();
    const pid=el.dataset.pid;const st={moved:false,sx:ev.clientX,sy:ev.clientY,ghost:null,hot:null};
    el.setPointerCapture(ev.pointerId);
    const move=e=>{
      if(!st.moved&&Math.abs(e.clientX-st.sx)+Math.abs(e.clientY-st.sy)<7)return;
      if(!st.moved){st.moved=true;el.classList.add('dragging');
        st.ghost=el.cloneNode(true);st.ghost.classList.add('kb-ghost');
        st.ghost.style.width=el.offsetWidth+'px';document.body.appendChild(st.ghost);}
      st.ghost.style.left=(e.clientX+10)+'px';st.ghost.style.top=(e.clientY+8)+'px';
      const t=document.elementFromPoint(e.clientX,e.clientY);
      const col=t&&t.closest?t.closest('.kb-col'):null;
      if(st.hot&&st.hot!==col)st.hot.classList.remove('drop-hot');
      st.hot=col;if(col)col.classList.add('drop-hot');
    };
    const up=()=>{
      el.onpointermove=null;el.onpointerup=null;el.onpointercancel=null;
      el.classList.remove('dragging');if(st.ghost)st.ghost.remove();
      document.querySelectorAll('.kb-col').forEach(c=>c.classList.remove('drop-hot'));
      if(!st.moved){openProject(pid);return}
      if(!st.hot)return;
      const p=DB.projects.find(x=>x.id===pid);const stg=DB.stages.find(s=>s.id===st.hot.dataset.st);
      if(p&&stg&&p.stage!==stg.id){p.stage=stg.id;toast('Проект → «'+stg.name+'» ✓')}
      render();
    };
    el.onpointermove=move;el.onpointerup=up;el.onpointercancel=up;
  }});
}

function newSum(){
  const s=(sel)=>[...document.querySelectorAll(sel+' .nr-amt')].reduce((a,i)=>a+(parseFloat(i.value)||0),0);

function createProject(){
  const name=document.getElementById('npName').value.trim();
  const contract=parseFloat(document.getElementById('npContract').value)||0;
  if(!name||!contract){toast('Укажи название и сумму договора','err');return}
  // фонды: название, доля, стартовая сумма
  const fundRows=[...document.querySelectorAll('#npFunds .nf-row')].map(r=>({
    name:r.querySelector('.nf-name').value.trim(),
    pct:parseFloat(r.querySelector('.nf-pct').value)||0,
    plan:Math.abs(parseFloat(r.querySelector('.nf-plan')?.value)||0),
    start:Math.abs(parseFloat(r.querySelector('.nf-start').value)||0)
  })).filter(f=>f.name);
  if(!fundRows.length){toast('Добавь хотя бы один фонд','err');return}
  const psum=fundRows.reduce((s,f)=>s+f.pct,0);
  if(Math.round(psum)!==100&&!confirm('Доли фондов дают '+psum+'%, а не 100%. Так тоже можно — но авто-раскладка приходов по долям будет недоступна, поступления будешь раскладывать по фондам вручную суммами.\n\nСоздать проект?'))return;
  const funds=fundRows.map((f,i)=>({id:uid(),name:f.name,pct:f.pct,plan:f.plan||0,color:FUND_COLORS[i%FUND_COLORS.length]}));
  const rowsIn=[...document.querySelectorAll('#npIn .plan-row')].map(r=>({
    id:uid(),date:r.querySelector('.nr-date').value,amt:Math.abs(parseFloat(r.querySelector('.nr-amt').value)||0),
    note:r.querySelector('.nr-note').value})).filter(r=>r.date&&r.amt);
  const rowsOut=[...document.querySelectorAll('#npOut .plan-row')].map(r=>({
    id:uid(),date:r.querySelector('.nr-date').value,amt:-Math.abs(parseFloat(r.querySelector('.nr-amt').value)||0),
    note:r.querySelector('.nr-note').value,
    fund:(funds[+(r.querySelector('.nr-fund')?.value||0)]||funds[0]).id})).filter(r=>r.date&&r.amt);
  const p={id:uid(),name,customer:document.getElementById('npCust').value.trim(),contract,
    funds,planIn:rowsIn,planOut:rowsOut,ops:[],tasks:[]};
  // стартовые суммы — ручным пополнением фондов, чтобы всё движение шло через фонды
  fundRows.forEach((f,i)=>{if(f.start)p.ops.push({id:uid(),type:'adj',date:todayIso(),fund:funds[i].id,amt:f.start,note:'стартовое наполнение фонда'})});
  DB.projects.push(p);DB.sel=p.id;
  toast('Проект заведён ✓');render();
}

    <div class="kpi"><div class="k">Потрачено</div><div class="v neg">${fmtM(spent)}</div><div class="d">факт из фондов</div></div>
    <div class="kpi"><div class="k">Финансирование · долг</div><div class="v" style="color:var(--amber)">${(finGot||finRet)?fmtM(finGot-finRet):'—'}</div><div class="d">${(finGot||finRet)?('получено '+fmtM(finGot)+' · возвращено '+fmtM(finRet)):'займы и инвестиции в проект'}</div></div>
    <div class="kpi"><div class="k">Касса проекта</div><div class="v ${cash>=0?'pos':'neg'}">${fmtM(cash)}</div><div class="d">лежит на фондах сейчас</div></div>
    <div class="kpi"><div class="k">Останется по плану</div><div class="v ${marginPlan>=0?'pos':'neg'}">${fmtM(marginPlan)}</div><div class="d">договор − траты (факт+план)</div></div>
    <div class="kpi"><div class="k">Кассовый разрыв</div><div class="v ${gap?'neg':'pos'}">${gap?mLabel(gap.m):'не виден'}</div><div class="d">${gap?'не хватит '+fmtM(gap.short):'по текущему плану денег хватает'}</div>
      ${gap?`<button class="btn ghost" style="padding:5px 10px;font-size:11px;margin-top:7px" onclick="quickTask('Найти ${fmtM(-gap.short)} ₸ к ${mLabel(gap.m)} — закрыть кассовый разрыв','${gap.m}-01')">+ задача на разрыв</button>`:''}
    </div>
  </div>

  <h2>Касса по месяцам</h2>
  <div class="explain">До сегодняшнего дня — факт по операциям, дальше — план. Красный месяц — денег проекта не хватит: видно, сколько именно. Лечится сдвигом трат (кнопки ◀ ▶ в плане) или ускорением поступления.</div>
  <div class="card" style="overflow-x:auto">${mtable}</div>

  <h2>Фонды проекта</h2>
  <div class="explain">Каждое поступление расходится по фондам (по долям или вручную). Траты списываются из своего фонда. У каждого фонда есть <b>план на весь проект</b>: впиши сумму (ФОТ известен заранее) или оставь пусто — посчитается как % от договора (налоги, прибыль). В строке фонда видно факт и «потрачено из плана · осталось».</div>
  <div class="card">
    <div class="fund-bar">${p.funds.map(f=>`<div style="flex:${f.pct||.001};background:${f.color}" title="${esc(f.name)} ${f.pct}%"></div>`).join('')}</div>
    ${fundRows}
    <div style="display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap">
      <button class="btn ghost" onclick="addFund()">+ добавить фонд</button>
      <span style="font-size:11.5px;color:${Math.round(pctSum)===100?'var(--muted)':'var(--red)'};font-weight:${Math.round(pctSum)===100?'400':'700'}">сумма долей: ${pctSum}%${Math.round(pctSum)!==100?' — приведи к 100%':''}</span>
      <span style="flex:1"></span>
      <span style="font-size:12px;color:var(--muted)">итого на фондах: <b class="${cash>=0?'pos':'neg'}">${fmt(cash)} ₸</b> · план по фондам: <b>${fmt(p.funds.reduce((s,f)=>s+fundPlan(p,f),0))} ₸</b></span>
    </div>
    ${(()=>{const debts=fundDebts(p);const fn=id=>p.funds.find(f=>f.id===id)?.name||'фонд удалён';
      if(!debts.length)return '';
      return `<div style="border-top:1px solid var(--line);margin-top:14px;padding-top:12px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--amber);margin-bottom:8px">Взято из фондов — надо вернуть</div>
        ${debts.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12.5px;border-bottom:1px solid #f2efe8;flex-wrap:wrap">
          <span>из <b>${esc(fn(d.from))}</b> взято в <b>${esc(fn(d.to))}</b></span>
          <span style="flex:1"></span>
          <b style="color:var(--amber);font-variant-numeric:tabular-nums">${fmt(d.amt)} ₸</b>
          <button class="btn" style="background:var(--amber);padding:6px 12px;font-size:11.5px" onclick="returnDebt('${d.from}','${d.to}',${d.amt})">вернуть всё</button>
          <button class="btn ghost" style="padding:6px 12px;font-size:11.5px" onclick="quickTask('Вернуть ${fmt(d.amt)} ₸ в фонд «${esc(fn(d.from))}»',null)">+ задача</button>
        </div>`).join('')}
        <div style="font-size:11px;color:var(--muted);margin-top:7px">Частичный возврат — через «⇄ Перекинуть» в обратную сторону: долг пересчитается сам.</div>
      </div>`})()}
  </div>

  <div class="forms">
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;color:var(--green)">+ Внести поступление</div>
      <div class="fgrid3"><div><label>Дата</label><input type="date" id="inDate" value="${t}"></div>
        <div><label>Сумма, ₸</label><input type="number" id="inAmt" placeholder="0" inputmode="numeric" oninput="previewAlloc()"></div>
        <div><label>Источник</label><select id="inSrc"><option value="contract">оплата по договору</option><option value="fin">финансирование</option></select></div></div>
      <label>Комментарий</label><input id="inNote" placeholder="аванс / оплата этапа / займ" style="margin-bottom:10px">
      <label>Раскладка по фондам</label>
      <div style="display:flex;gap:14px;margin-bottom:9px">
        <label style="display:flex;align-items:center;gap:5px;text-transform:none;letter-spacing:0;font-size:12.5px;font-weight:600;cursor:pointer;margin:0"><input type="radio" name="amode" value="pct" style="width:auto" ${Math.round(pctSum)===100?'checked':'disabled'} onchange="allocModeUI()"> по долям %${Math.round(pctSum)!==100?' <span style="color:var(--red);font-weight:400">(доли дают '+pctSum+'%)</span>':''}</label>
        <label style="display:flex;align-items:center;gap:5px;text-transform:none;letter-spacing:0;font-size:12.5px;font-weight:600;cursor:pointer;margin:0"><input type="radio" name="amode" value="manual" style="width:auto" ${Math.round(pctSum)!==100?'checked':''} onchange="allocModeUI()"> вручную суммами</label>
      </div>
      <div id="manualAlloc" style="display:${Math.round(pctSum)!==100?'block':'none'};margin-bottom:8px">
        ${p.funds.map(f=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span class="fdot" style="background:${f.color}"></span><span style="flex:1;font-size:12px">${esc(f.name)}</span><input type="number" class="ma-amt" data-fid="${f.id}" placeholder="0" style="width:135px;text-align:right" inputmode="numeric" oninput="previewAlloc()"></div>`).join('')}
        <div id="maLeft" style="font-size:11.5px;color:var(--muted);margin-top:4px"></div>
      </div>
      <div class="alloc" id="allocPrev"></div>
      <button class="btn grn" onclick="addIncome()">Провести — разложить по фондам</button>
      <div style="border-top:1px solid var(--line);margin-top:14px;padding-top:12px">
        <div style="font-weight:700;font-size:12.5px;margin-bottom:8px;color:var(--blue)">± Пополнить / снять из фонда вручную</div>
        <div style="display:grid;grid-template-columns:1.2fr 1fr 100px auto;gap:8px;align-items:end">
          <div><label>Фонд</label><select id="faFund">${fundOpts}</select></div>
          <div><label>Действие</label><select id="faDir"><option value="in">+ пополнить</option><option value="out">− снять</option></select></div>
          <div><label>Сумма</label><input type="number" id="faAmt" inputmode="numeric"></div>
          <button class="btn" onclick="addFundAdj()">OK</button>
        </div>
        <div style="margin-top:8px"><label>Комментарий</label><input id="faNote" placeholder="докинули из компании / забрали в кассу компании"></div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">Это деньги в проект / из проекта мимо договора: попадают в кассу по месяцам и в журнал. Кнопки «+ −» на фондах сверху подставляют фонд сюда.</div>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;color:var(--red)">− Внести расход</div>
      <div class="fgrid3"><div><label>Дата</label><input type="date" id="outDate" value="${t}"></div>
        <div><label>Сумма, ₸</label><input type="number" id="outAmt" placeholder="0" inputmode="numeric" oninput="previewOut()"></div>
        <div><label>Из фонда</label><select id="outFund" onchange="previewOut()">${fundOpts}</select></div></div>
      <label>Комментарий</label><input id="outNote" placeholder="за что платёж" style="margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;letter-spacing:0;font-size:12.5px;font-weight:600;cursor:pointer;margin:0 0 8px"><input type="checkbox" id="outFin" style="width:auto"> это возврат финансирования (займа / инвестору)</label>
      <div class="warn" id="outWarn"></div>
      <button class="btn red" onclick="addExpense()">Провести — списать из фонда</button>
      <div style="border-top:1px solid var(--line);margin-top:14px;padding-top:12px">
        <div style="font-weight:700;font-size:12.5px;margin-bottom:8px;color:var(--amber)">⇄ Перекинуть между фондами</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 110px auto;gap:8px;align-items:end">
          <div><label>Откуда</label><select id="mvFrom">${fundOpts}</select></div>
          <div><label>Куда</label><select id="mvTo">${fundOpts}</select></div>
          <div><label>Сумма</label><input type="number" id="mvAmt" inputmode="numeric"></div>
          <button class="btn" style="background:var(--amber)" onclick="moveFund()">⇄</button>
        </div>
        <div style="margin-top:8px"><label>На что (комментарий)</label><input id="mvNote" placeholder="например: срочный закуп, вернуть с оплаты этапа"></div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">Каждая перекладка запоминается: сверху в фондах будет видно, из какого фонда сколько взято и что вернуть.</div>
      </div>
    </div>
  </div>

  <h2>План финансирования · займы и инвестиции в проект</h2>
  <div class="explain">Деньги, которые зайдут в проект не по договору: займ компании, инвестор, собственное вливание. В кассе по месяцам — приход. Факт вносится формой «Внести поступление» с источником «финансирование».</div>
  <div class="card">${(p.finIn||[]).length?(p.finIn||[]).map(r=>planRow(r,'finin')).join(''):'<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">строк нет</div>'}
    <button class="btn ghost" onclick="addPlan('finin')">+ строка финансирования</button></div>

  <h2>План возврата инвестиций</h2>
  <div class="explain">Когда и сколько вернуть: возврат займа, выплата инвестору — и из какого фонда вернём (обычно прибыль/резерв). В кассе по месяцам — расход. Факт — формой «Внести расход» с галочкой «возврат финансирования».</div>
  <div class="card">${(p.finOut||[]).length?(p.finOut||[]).map(r=>planRow(r,'finout')).join(''):'<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">строк нет</div>'}
    <button class="btn ghost" onclick="addPlan('finout')">+ строка возврата</button></div>

  <h2>Задачи по деньгам · ${taskArr(p).filter(x=>!x.done).length} открытых</h2>
  <div class="explain">Что сделать, чтобы деньги были: собрать дебиторку, найти недостающее к разрыву, вернуть взятое в фонд. Быстрые кнопки «+ задача» есть у разрыва и у долгов фондов.</div>
  <div class="card">
    ${taskArr(p).length?taskArr(p).map(tk=>{const od=tk.due&&!tk.done&&tk.due<t;
      return `<div class="oprow" style="${tk.done?'opacity:.45':''}">
      <input type="checkbox" ${tk.done?'checked':''} onchange="toggleTask('${tk.id}')" style="width:auto;flex-shrink:0">
      <div class="ds"><div class="p" style="${tk.done?'text-decoration:line-through':''}">${esc(tk.title)}</div>${tk.due?`<div class="c">до ${dRu(tk.due)}</div>`:''}</div>
      ${od?'<span class="late">просрочено</span>':''}
      <span class="del" onclick="delTask('${tk.id}')">×</span></div>`}).join(''):'<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">задач нет</div>'}
    <div style="display:grid;grid-template-columns:1fr 140px auto;gap:8px;margin-top:10px">
      <input id="tkTitle" placeholder="что сделать: собрать дебиторку, найти деньги…">
      <input type="date" id="tkDue">
      <button class="btn ghost" onclick="addTask()">+ задача</button>
    </div>
  </div>

  <h2>План поступлений</h2>
  <div class="card">${p.planIn.length?p.planIn.map(r=>planRow(r,'in')).join(''):'<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">строк нет</div>'}
    <button class="btn ghost" onclick="addPlan('in')">+ строка поступления</button></div>

  <h2>План трат</h2>
  <div class="card">${p.planOut.length?p.planOut.map(r=>planRow(r,'out')).join(''):'<div style="color:var(--muted);font-size:12.5px;margin-bottom:8px">строк нет</div>'}
    <button class="btn ghost" onclick="addPlan('out')">+ строка траты</button></div>

  <h2>Журнал операций · ${p.ops.length}</h2>
  <div class="card" style="max-height:420px;overflow:auto">${opRows}</div>`;
}

/* ============ ДЕЙСТВИЯ ============ */
function updFund(id,key,val){const p=P();const f=p.funds.find(x=>x.id===id);if(!f)return;
  if(key==='pct')f.pct=Math.max(0,Math.min(100,parseFloat(val)||0));
  else if(key==='plan')f.plan=Math.abs(parseFloat(val)||0);
  else f.name=val.trim()||f.name;render()}
function addFund(){const p=P();p.funds.push({id:uid(),name:'Новый фонд',pct:0,color:FUND_COLORS[p.funds.length%FUND_COLORS.length]});render()}
function delFund(id){const p=P();const b=fundBalances(p)[id];
  if(Math.round(b.bal)!==0){toast('На фонде '+fmt(b.bal)+' ₸ — сначала перекинь деньги в другой фонд','err');return}
  const used=p.ops.some(o=>(o.type==='out'&&o.fund===id)||(o.type==='in'&&o.alloc&&o.alloc[id])||(o.type==='move'&&(o.from===id||o.to===id)));
  if(used&&!confirm('По фонду были операции — история сохранится, но фонд исчезнет из списка. Удалить?'))return;
  p.funds=p.funds.filter(f=>f.id!==id);render()}
function allocMode(){return document.querySelector('input[name="amode"]:checked')?.value||'manual'}
function allocModeUI(){const box=document.getElementById('manualAlloc');if(box)box.style.display=allocMode()==='manual'?'block':'none';previewAlloc()}
function previewAlloc(){const p=P();const amt=parseFloat(document.getElementById('inAmt').value)||0;
  const el=document.getElementById('allocPrev');if(!el)return;
  if(allocMode()==='pct'){
    if(!amt){el.style.display='none';return}
    const a=allocByPct(p,amt);el.style.display='block';
    el.innerHTML='<b>Разложится по долям:</b><br>'+p.funds.map(f=>`${esc(f.name)} (${f.pct}%) → <b>${fmt(a[f.id])}</b>`).join('<br>');
  }else{
    el.style.display='none';
    const left=document.getElementById('maLeft');if(!left)return;
    const s=[...document.querySelectorAll('.ma-amt')].reduce((x,i)=>x+(Math.abs(parseFloat(i.value))||0),0);
    if(!amt&&!s){left.textContent='';return}
    const d=amt-s;
    left.innerHTML=Math.round(d)===0&&amt?'<span style="color:var(--green);font-weight:700">распределено полностью ✓</span>'
      :d>0?'осталось распределить: <b>'+fmt(d)+' ₸</b>'
      :'<span style="color:var(--red);font-weight:700">перебор на '+fmt(-d)+' ₸</span>';
  }}
function addIncome(){const p=P();
  const date=document.getElementById('inDate').value,amt=parseFloat(document.getElementById('inAmt').value);
  if(!date||!amt||amt<=0){toast('Укажи дату и сумму','err');return}
  let alloc;
  if(allocMode()==='pct'){
    const pctSum=p.funds.reduce((s,f)=>s+f.pct,0);
    if(Math.round(pctSum)!==100){toast('Доли фондов дают '+pctSum+'% — разложи вручную или поправь доли','err');return}
    alloc=allocByPct(p,Math.abs(amt));
  }else{
    alloc={};let s=0;
    document.querySelectorAll('.ma-amt').forEach(i=>{const v=Math.abs(parseFloat(i.value))||0;if(v){alloc[i.dataset.fid]=v;s+=v}});
    if(Math.round(s)!==Math.round(Math.abs(amt))){toast('Разложи всю сумму: распределено '+fmt(s)+' из '+fmt(Math.abs(amt))+' ₸','err');return}
  }
  const src=document.getElementById('inSrc')?.value==='fin'?'fin':undefined;
  p.ops.push({id:uid(),type:'in',date,amt:Math.abs(amt),note:document.getElementById('inNote').value.trim(),alloc,src});
  toast(src?'Финансирование разложено по фондам ✓':'Поступление разложено по фондам ✓');render()}
function previewOut(){const p=P();const amt=parseFloat(document.getElementById('outAmt').value)||0;
  const fid=document.getElementById('outFund').value;const el=document.getElementById('outWarn');
  const b=fundBalances(p)[fid];if(!amt||!b){el.style.display='none';return}
  if(amt>b.bal){el.style.display='block';el.textContent='В фонде '+fmt(b.bal)+' ₸ — после списания уйдёт в минус на '+fmt(amt-b.bal)+' ₸. Либо перекинь из другого фонда.'}
  else el.style.display='none'}
function addExpense(){const p=P();
  const date=document.getElementById('outDate').value,amt=parseFloat(document.getElementById('outAmt').value);
  if(!date||!amt||amt<=0){toast('Укажи дату и сумму','err');return}
  const oSrc=document.getElementById('outFin')?.checked?'fin':undefined;
  p.ops.push({id:uid(),type:'out',date,amt:-Math.abs(amt),fund:document.getElementById('outFund').value,note:document.getElementById('outNote').value.trim(),src:oSrc});
  toast(oSrc?'Возврат финансирования списан из фонда ✓':'Расход списан из фонда ✓');render()}
function moveFund(){const p=P();
  const from=document.getElementById('mvFrom').value,to=document.getElementById('mvTo').value;
  const amt=parseFloat(document.getElementById('mvAmt').value);
  if(!amt||amt<=0){toast('Укажи сумму','err');return}
  if(from===to){toast('Выбери разные фонды','err');return}
  p.ops.push({id:uid(),type:'move',date:todayIso(),from,to,amt:Math.abs(amt),note:document.getElementById('mvNote')?.value.trim()||''});
  toast('Перекинуто между фондами ✓');render()}
function returnDebt(from,to,amt){const p=P();
  const fn=id=>p.funds.find(f=>f.id===id)?.name||'—';
  if(!confirm('Вернуть '+fmt(amt)+' ₸ из «'+fn(to)+'» обратно в «'+fn(from)+'»?'))return;
  p.ops.push({id:uid(),type:'move',date:todayIso(),from:to,to:from,amt,note:'возврат в фонд'});
  toast('Возвращено в фонд ✓');render()}

/* ---- задачи по деньгам ---- */
function taskArr(p){p.tasks=p.tasks||[];return p.tasks}
function addTask(){const p=P();
  const t=document.getElementById('tkTitle').value.trim();
  if(!t){toast('Напиши, что сделать','err');return}
  taskArr(p).push({id:uid(),title:t,due:document.getElementById('tkDue').value||null,done:false});
  toast('Задача добавлена ✓');render()}
function quickTask(title,due){const p=P();
  if(taskArr(p).some(x=>x.title===title&&!x.done)){toast('Такая задача уже стоит','err');return}
  taskArr(p).push({id:uid(),title,due:due||null,done:false});
  toast('Задача добавлена ✓');render()}
function toggleTask(id){const p=P();const t=taskArr(p).find(x=>x.id===id);if(t)t.done=!t.done;render()}
function delTask(id){const p=P();p.tasks=taskArr(p).filter(x=>x.id!==id);render()}
function delOp(id){const p=P();if(!confirm('Удалить операцию?'))return;p.ops=p.ops.filter(o=>o.id!==id);render()}
function planArr(p,kind){
  if(kind==='in')return p.planIn;
  if(kind==='out')return p.planOut;
  if(kind==='finin')return p.finIn=p.finIn||[];
  return p.finOut=p.finOut||[];
}
function addPlan(kind){const p=P();planArr(p,kind).push({id:uid(),date:todayIso(),amt:0,note:''});render()}
function updPlan(kind,id,key,val){const p=P();const r=planArr(p,kind).find(x=>x.id===id);if(!r)return;
  const sign=(kind==='in'||kind==='finin')?1:-1;
  if(key==='amt')r.amt=sign*Math.abs(parseFloat(val)||0);
  else if(key==='date')r.date=val;
  else if(key==='fund')r.fund=val;
  else r.note=val;render()}
/* ручное пополнение / снятие из фонда — любая транзакция идёт через фонд */
function addFundAdj(){const p=P();
  const fund=document.getElementById('faFund').value,dir=document.getElementById('faDir').value;
  const amt=parseFloat(document.getElementById('faAmt').value);
  if(!fund){toast('Выбери фонд','err');return}
  if(!amt||amt<=0){toast('Укажи сумму','err');return}
  p.ops.push({id:uid(),type:'adj',date:todayIso(),fund,amt:dir==='in'?Math.abs(amt):-Math.abs(amt),note:document.getElementById('faNote').value.trim()});
  toast(dir==='in'?'Фонд пополнен ✓':'Снято из фонда ✓');render()}
function fundAdjPrefill(fid,dir){
  const f=document.getElementById('faFund'),d=document.getElementById('faDir');
  if(!f||!d)return;f.value=fid;d.value=dir;
  const a=document.getElementById('faAmt');a.scrollIntoView({block:'center',behavior:'smooth'});a.focus()}
function movePlan(kind,id,days){const p=P();const r=planArr(p,kind).find(x=>x.id===id);if(!r||!r.date)return;
  const d=new Date(r.date);d.setDate(d.getDate()+days);r.date=d.toISOString().slice(0,10);
  toast(days>0?'Сдвинуто на неделю позже ✓':'Сдвинуто на неделю раньше ✓');render()}
function delPlan(kind,id){const p=P();const arr=planArr(p,kind);const i=arr.findIndex(x=>x.id===id);if(i>=0)arr.splice(i,1);render()}

/* ============ ЭКСПОРТ / ИМПОРТ ============ */
function exportData(){
  const blob=new Blob([JSON.stringify({...DB,_id},null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='rl-fondy-данные-'+todayIso()+'.json';a.click();
  toast('Файл с данными скачан ✓')}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    if(!Array.isArray(d.projects))throw 0;
    DB={projects:d.projects,stages:d.stages||null,sel:null};_id=d._id||9000;
    DB.projects.forEach(p=>{p.tasks=p.tasks||[];p.finIn=p.finIn||[];p.finOut=p.finOut||[]});
    ensureStages();toast('Данные загружены ✓');render();
  }catch(e){toast('Не получилось прочитать файл','err')}};
  rd.readAsText(f);inp.value='';
}
