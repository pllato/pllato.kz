<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELC — Тест на определение уровня</title>
<style>
  /* Фирменный стиль ELC: синий #373D8D, красный #E31E24, жёлтый #FFCC00, белый фон */
  :root{
    --bg:#eef1f8; --card:#ffffff; --card2:#f7f9fd; --line:#dfe4f1;
    --txt:#1c2247; --muted:#6b7299; --accent:#373D8D; --accent2:#2a3070;
    --ok:#1f9d57; --bad:#E31E24; --gold:#FFCC00;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Trebuchet MS",Tahoma,Verdana,-apple-system,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#ffffff,#eef1f8);color:var(--txt);min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:24px 18px 60px}
  .brand{display:flex;align-items:baseline;gap:9px;margin-bottom:18px}
  .brand .logo{font-weight:800;font-size:22px;letter-spacing:1px;color:var(--accent)}
  .brand .logo .c{color:var(--bad)}
  .brand .sub{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .brand b{color:var(--txt)}
  .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:18px;padding:26px;box-shadow:0 10px 30px rgba(55,61,141,.10)}
  h1{font-size:26px;margin:0 0 8px}
  h2{font-size:20px;margin:0 0 14px}
  p.lead{color:var(--muted);line-height:1.6;margin:0 0 18px}
  .btn{appearance:none;border:0;cursor:pointer;font-size:16px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));padding:14px 22px;border-radius:12px;
    transition:transform .08s ease,filter .15s ease}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .progress{height:8px;background:#f1f4fc;border-radius:99px;overflow:hidden;margin:0 0 20px;border:1px solid var(--line)}
  .progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s ease}
  .meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:10px}
  .badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;
    background:#f1f4fc;border:1px solid var(--line);color:var(--muted)}
  .q{font-size:20px;line-height:1.5;margin:6px 0 6px}
  .q .blank{color:var(--bad);font-weight:800;letter-spacing:2px}
  .hint{color:var(--muted);font-size:15px;margin:0 0 20px}
  .opts{display:grid;gap:12px}
  .opt{display:flex;align-items:center;gap:12px;text-align:left;background:#f1f4fc;border:1px solid var(--line);
    color:var(--txt);padding:15px 16px;border-radius:12px;font-size:17px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--accent);background:#e7edfb}
  .opt .key{width:26px;height:26px;flex:0 0 26px;display:grid;place-items:center;border-radius:7px;
    background:#ffffff;border:1px solid var(--line);font-size:13px;color:var(--muted)}
  .result .big{font-size:15px;color:var(--muted);margin:0 0 4px}
  .result .lesson{font-size:30px;font-weight:800;margin:0 0 4px;line-height:1.2}
  .result .lvl{display:inline-block;margin:6px 0 16px}
  .struct{background:#f1f4fc;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:0 0 18px}
  .struct .s-name{font-size:17px;font-weight:700}
  .struct .s-sub{color:var(--muted);font-size:13px;margin-top:3px}
  table{width:100%;border-collapse:collapse;margin:8px 0 20px;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  td.score{font-weight:700;text-align:right}
  .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
  .center{text-align:center}
  .small{font-size:13px;color:var(--muted)}
  a.btn{display:inline-block;text-decoration:none;text-align:center}
  ul.tips{margin:0 0 16px;padding-left:18px;color:var(--muted);line-height:1.7;font-size:14px}
  ul.tips li{margin:2px 0}
  audio{width:100%;margin-top:12px}
  .rec-live{display:flex;align-items:center;gap:10px;font-size:16px;color:var(--txt);margin:2px 0 16px}
  .rec-dot{width:14px;height:14px;border-radius:50%;background:var(--bad);box-shadow:0 0 0 0 rgba(255,107,107,.6);animation:pulse 1.1s infinite}
  @keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,107,107,.55)}70%{transform:scale(1.15);box-shadow:0 0 0 10px rgba(255,107,107,0)}100%{transform:scale(1)}}
  .btn.rec{background:linear-gradient(135deg,#ff6b6b,#c0392b)}
  .steps{display:flex;gap:8px;margin:0 0 18px}
  .steps .step{flex:1;text-align:center;font-size:12px;font-weight:700;color:var(--muted);
    background:#f1f4fc;border:1px solid var(--line);border-radius:10px;padding:8px 6px}
  .steps .step.on{color:#fff;border-color:var(--accent);background:#e7edfb}
  .brandline{font-size:13px;color:var(--muted);margin:0 0 14px}
  .brandline b{color:var(--txt)}
  .inp{width:100%;background:#ffffff;border:1px solid var(--line);color:var(--txt);
    padding:13px 14px;border-radius:11px;font-size:16px;outline:none}
  .inp:focus{border-color:var(--accent)}
  .fld{display:block;margin:0 0 14px;font-size:13px;color:var(--muted)}
  .fld .inp{margin-top:6px}
  .roster{display:grid;gap:8px;margin:12px 0 6px;max-height:340px;overflow:auto}
  .rost{display:flex;justify-content:space-between;align-items:center;gap:10px;text-align:left;
    background:#f1f4fc;border:1px solid var(--line);color:var(--txt);padding:13px 15px;
    border-radius:11px;font-size:16px;cursor:pointer;transition:.12s}
  .rost:hover{border-color:var(--accent);background:#e7edfb}
  .rost-name{font-weight:600}
  .rost-phone{color:var(--muted);font-size:14px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .chip{font-size:11px;color:var(--muted);background:#ffffff;border:1px solid var(--line);
    border-radius:99px;padding:2px 8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="logo">EL<span class="c">C</span></span><span class="sub">English Lifestyle Communication</span></div>
  <div class="card" id="app"></div>
  <p class="small center" style="margin-top:16px">7 уровней программы · адаптивное размещение</p>
</div>

<script>
/* ===== 7 уровней программы ELC ===== */
const LEVELS = [
  {n:1, name:'Beginner 1',             cefr:'A1',  lessons:'1–15',  desc:'Глагол to be, артикли a/an, this/that, множественное число, базовое have got.'},
  {n:2, name:'Beginner 2',             cefr:'A1',  lessons:'16–31', desc:'Present Simple (do/does), can, there is/are, was/were, Present Continuous.'},
  {n:3, name:'Elementary',             cefr:'A2',  lessons:'32–54', desc:'Past Simple, сравнительная и превосходная степень, going to, базовый Present Perfect.'},
  {n:4, name:'Pre-Intermediate',       cefr:'B1',  lessons:'55–68', desc:'Present Perfect vs Past, will / going to, 1-й кондишн, Past Continuous, quantifiers.'},
  {n:5, name:'Intermediate',           cefr:'B1+', lessons:'69–81', desc:'2-й кондишн, Past Perfect, Present Perfect Continuous, used to.'},
  {n:6, name:'Upper-Intermediate 2.0', cefr:'B2',  lessons:'82–86', desc:'3-й кондишн, пассивный залог, модальные предположения, относительные придаточные.'},
  {n:7, name:'Upper-Intermediate 3.0', cefr:'B2+', lessons:'87–92', desc:'Смешанные кондишены, инверсия, продвинутый пассив и перфект, wish / regret.'},
];
function levelByN(n){ return LEVELS.find(l=>l.n===n); }

/* ===== Темы для разговорной части (часть 2), подобраны под уровень теории ===== */
const SPEAK = {
  1:{topic:'About me · О себе',
     prompt:'Расскажи о себе: как тебя зовут, сколько тебе лет, откуда ты, твоя семья и что ты любишь.',
     tips:['My name is… / I am … years old','I am from… / I live in…','I have got a… (family)','I like… / I don’t like…'],
     minutes:'около 1 минуты'},
  2:{topic:'My typical day · Мой обычный день',
     prompt:'Опиши свой обычный день: что ты делаешь утром, днём и вечером. Что ты умеешь делать (can)?',
     tips:['I get up at… / I go to…','Every day I…','I can… / I can’t…','In the evening I…'],
     minutes:'1–1.5 минуты'},
  3:{topic:'My last weekend · Мои прошлые выходные',
     prompt:'Расскажи, как прошли твои последние выходные или поездка: куда ходил, что делал, что понравилось. Используй Past Simple.',
     tips:['Last weekend I went…','I saw / ate / visited…','It was… (great / boring)','…was better than…'],
     minutes:'около 1.5 минуты'},
  4:{topic:'My plans and dreams · Мои планы и мечты',
     prompt:'Расскажи о планах на будущее и о своей мечте. Что ты собираешься делать? Что сделаешь, если будет время?',
     tips:['I’m going to… / I will…','I have already…','If I have time, I will…','I’d like to…'],
     minutes:'около 2 минут'},
  5:{topic:'If I had more free time · Если бы было больше времени',
     prompt:'Опиши, что бы ты делал, если бы у тебя было больше свободного времени или денег. Расскажи о привычке из прошлого (used to).',
     tips:['If I had…, I would…','I used to…','I’ve been …-ing for…','By the time I…'],
     minutes:'около 2 минут'},
  6:{topic:'Remote work: pros and cons · Удалёнка: за и против',
     prompt:'Обсуди плюсы и минусы удалённой работы (или соцсетей). Приведи аргументы обеих сторон и сделай вывод.',
     tips:['On the one hand… on the other hand…','It can be done… (passive)','People who work from home…','must / might / could (предположения)'],
     minutes:'2–3 минуты'},
  7:{topic:'Should technology replace teachers? · Заменят ли технологии учителей?',
     prompt:'Выскажи аргументированное мнение по теме. Используй сложные конструкции: условные, инверсию, сожаления (wish).',
     tips:['Not only… but also…','Had I…, I would have…','I wish schools…','It could be argued that…'],
     minutes:'около 3 минут'},
};
function speakFor(n){ return SPEAK[n] || SPEAK[7]; }

/* ===== Банк вопросов: по нарастанию сложности, ~4 на каждый уровень =====
   level: № уровня (1..7) ; q: предложение с пропуском ___ ; ru: подсказка-перевод ; o: варианты ; a: индекс верного (до перемешивания) */
const QUESTIONS = [
  /* --- 1. Beginner 1 (A1) --- */
  {level:1, q:'I ___ a teacher.',            ru:'Я учитель.',                 o:['am','is','are','be'],           a:0},
  {level:1, q:'This ___ my book.',           ru:'Это моя книга.',             o:['is','are','am','do'],           a:0},
  {level:1, q:'She has ___ orange.',         ru:'У неё есть апельсин.',       o:['an','a','the','some'],          a:0},
  {level:1, q:'They ___ my friends.',        ru:'Они мои друзья.',            o:['are','is','am','be'],           a:0},
  /* --- 2. Beginner 2 (A1) --- */
  {level:2, q:'___ you like coffee?',        ru:'Ты любишь кофе?',            o:['Do','Does','Are','Is'],         a:0},
  {level:2, q:'He ___ to school every day.', ru:'Он ходит в школу каждый день.', o:['goes','go','is going','went'], a:0},
  {level:2, q:'___ there a bank near here?', ru:'Здесь рядом есть банк?',     o:['Is','Are','Do','Has'],          a:0},
  {level:2, q:'I ___ swim very well.',       ru:'Я умею хорошо плавать.',     o:['can','am','do','have'],         a:0},
  /* --- 3. Elementary (A2) --- */
  {level:3, q:'Yesterday we ___ to the cinema.', ru:'Вчера мы ходили в кино.', o:['went','go','have gone','were going'], a:0},
  {level:3, q:'She is ___ than her sister.', ru:'Она выше своей сестры.',     o:['taller','more tall','tallest','tall'], a:0},
  {level:3, q:'Listen! The baby ___.',       ru:'Послушай! Малыш плачет.',    o:['is crying','cries','cry','cried'], a:0},
  {level:3, q:'I have ___ been to Paris.',   ru:'Я никогда не был в Париже.', o:['never','ever','yet','already'], a:0},
  /* --- 4. Pre-Intermediate (B1) --- */
  {level:4, q:'If it rains, we ___ at home.', ru:'Если пойдёт дождь, мы останемся дома.', o:['will stay','stay','stayed','would stay'], a:0},
  {level:4, q:'I ___ here since 2015.',      ru:'Я живу здесь с 2015 года.',  o:['have lived','live','lived','am living'], a:0},
  {level:4, q:'While I ___, the phone rang.', ru:'Пока я готовил, зазвонил телефон.', o:['was cooking','cooked','cook','have cooked'], a:0},
  {level:4, q:'There isn’t ___ milk in the fridge.', ru:'В холодильнике мало молока.', o:['much','many','a lot','few'], a:0},
  /* --- 5. Intermediate (B1+) --- */
  {level:5, q:'If I ___ rich, I would travel a lot.', ru:'Если бы я был богат, я бы много путешествовал.', o:['were','am','was being','will be'], a:0},
  {level:5, q:'I ___ for an hour and I’m still waiting.', ru:'Я жду уже час и всё ещё жду.', o:['have been waiting','have waited','am waiting','wait'], a:0},
  {level:5, q:'When I arrived, the film ___ already started.', ru:'Когда я пришёл, фильм уже начался.', o:['had','has','was','did'], a:0},
  {level:5, q:'I ___ play tennis when I was young.', ru:'Раньше я играл в теннис, когда был молод.', o:['used to','use to','am used to','was used to'], a:0},
  /* --- 6. Upper-Intermediate 2.0 (B2) --- */
  {level:6, q:'If he had studied, he ___ the exam.', ru:'Если бы он учился, он бы сдал экзамен.', o:['would have passed','would pass','passed','will pass'], a:0},
  {level:6, q:'The bridge ___ in 1995.',     ru:'Мост был построен в 1995 году.', o:['was built','built','has built','is building'], a:0},
  {level:6, q:'You’ve worked all day — you ___ be tired.', ru:'Ты работал весь день — ты, должно быть, устал.', o:['must','can','should','would'], a:0},
  {level:6, q:'The woman ___ bag was stolen called the police.', ru:'Женщина, чью сумку украли, вызвала полицию.', o:['whose','who','which','that'], a:0},
  /* --- 7. Upper-Intermediate 3.0 (B2+) --- */
  {level:7, q:'If I had taken that job, I ___ in Paris now.', ru:'Если бы я взял ту работу, я бы сейчас жил в Париже.', o:['would be living','would have lived','will live','lived'], a:0},
  {level:7, q:'Never ___ such a beautiful view.', ru:'Никогда я не видел такого красивого вида.', o:['have I seen','I have seen','I saw','did I see'], a:0},
  {level:7, q:'She wishes she ___ harder at school.', ru:'Она жалеет, что не училась усерднее в школе.', o:['had studied','studied','studies','would study'], a:0},
  {level:7, q:'The report ___ by the time the boss arrived.', ru:'Отчёт был закончен к приходу начальника.', o:['had been finished','was finished','has been finished','finished'], a:0},
];

/* ===== Состояние ===== */
const app = document.getElementById('app');
let idx = 0;
let answers = []; // {level, correct}
let curCorrect = -1; // позиция верного варианта в текущем (перемешанном) показе
const LETTERS = ['A','B','C','D'];
let placedLevel = 1; // уровень по итогам теории — для подбора темы монолога
let mr=null, recChunks=[], recStream=null, recBlobUrl=null, recBlob=null, recSecs=0, recTimer=null; // запись голоса

/* ===== Режим CRM (ссылка филиала) ===== */
const API = 'https://pllato-elc-worker.uurraa.workers.dev';
let BRANCH = null;                 // {code,label} — если открыто по ссылке филиала
let student = { contactId:'', name:'', lastName:'', phone:'', email:'', birthdate:'', maskedPhone:'' };
let rosterList = [];
let rosterTimer = null;
let resultId = null;
let submitting = false;
function CRM(){ return !!(BRANCH && student.contactId); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function goHome(){ if(BRANCH){ student={contactId:'',name:'',lastName:'',phone:'',email:'',birthdate:'',maskedPhone:''}; resultId=null; renderIdentify(); } else { renderStart(); } }

/* раннее завершение: студент упёрся в потолок (3 ошибки из последних 4, после минимум 6 ответов).
   Вопросы идут по нарастанию сложности, поэтому устойчивые ошибки = достигнут предел. */
function shouldStop(){
  if(answers.length < 6) return false;
  const last4 = answers.slice(-4);
  return last4.filter(a=>!a.correct).length >= 3;
}

function start(){ idx=0; answers=[]; renderQuestion(); }

function renderStart(){
  app.innerHTML = `
    <h1>Тест на определение уровня</h1>
    <p class="lead">Тест из двух частей:<br>
      <b>1. Теория</b> — адаптивный тест по грамматике (до 28 вопросов) определит, в какой из <b>7 уровней</b>
      программы ELC посадить студента: Beginner 1, Beginner 2, Elementary, Pre-Intermediate, Intermediate,
      Upper-Intermediate 2.0 и 3.0.<br>
      <b>2. Разговор</b> — по итогам теории студент получит тему монолога под свой уровень и запишет голос,
      чтобы преподаватель прослушал речь.<br><br>
      Вопросы идут от простого к сложному. Если вопрос слишком трудный — не угадывай, выбирай «Не знаю»:
      так система определит уровень точнее.</p>
    <button class="btn" onclick="renderSelfIdentify()">Начать тест →</button>`;
}

/* Этап 2: создать placement-сессию (с итогами теста) и перейти к разговору с преподавателем.
   Преподаватель в панели выставит уровень, после чего откроется программа этого уровня. */
const LESSON_BASE = 'https://elc-lesson-worker.uurraa.workers.dev';
function startConversation(btn){
  if(btn){ btn.disabled = true; btn.textContent = 'Создаём заявку…'; }
  const payload = {
    placement: true,
    level: placedLevel,
    cefr: (levelByN(placedLevel)||{}).cefr || '',
    student: { name:student.name, lastName:student.lastName, phone:student.phone, email:student.email, contactId:student.contactId },
    theory: buildTheoryPayload(),
    branch: BRANCH ? { code:BRANCH.code, label:BRANCH.label } : null,
  };
  fetch(LESSON_BASE + '/api/start', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) })
    .then(r=>r.json())
    .then(j=>{ if(j && j.ok){ location.href = LESSON_BASE + '/lesson?id=' + j.id; }
               else { if(btn){ btn.disabled=false; btn.textContent='К разговору с преподавателем →'; } alert('Не удалось создать заявку. Попробуйте ещё раз.'); } })
    .catch(()=>{ if(btn){ btn.disabled=false; btn.textContent='К разговору с преподавателем →'; } alert('Сеть недоступна. Попробуйте ещё раз.'); });
}

/* Ссылка на пробный урок по итогам теста (lesson-воркер) — с результатами теста */
function lessonUrl(level, score, total, cefr){
  const o = { level:String(level), name:student.name||'', last:student.lastName||'', phone:student.phone||'', email:student.email||'' };
  if(Number.isFinite(score)) o.score = String(score);
  if(Number.isFinite(total)) o.total = String(total);
  if(cefr) o.cefr = cefr;
  return 'https://elc-lesson-worker.uurraa.workers.dev/lesson?' + new URLSearchParams(o).toString();
}

/* Standalone-режим: сбор контактов перед тестом */
function renderSelfIdentify(){
  app.innerHTML = `
    <h1 style="font-size:22px;margin-bottom:6px">Ваши данные</h1>
    <p class="lead">Заполните контакты — по ним преподаватель свяжется с вами, а результат теста и урок сохранятся за вами.</p>
    <label class="fld">Имя
      <input id="s_name" class="inp" placeholder="Имя" autocomplete="given-name" value="${esc(student.name)}"></label>
    <label class="fld">Телефон
      <input id="s_phone" class="inp" type="tel" placeholder="+7 (___) ___-____" autocomplete="tel" value="${esc(student.phone)}"></label>
    <label class="fld">Email
      <input id="s_email" class="inp" type="email" placeholder="you@mail.com" autocomplete="email" value="${esc(student.email)}"></label>
    <div id="siErr" class="small" style="color:var(--bad);min-height:18px"></div>
    <div class="row">
      <button class="btn" onclick="submitSelfIdentify()">Начать тест →</button>
      <button class="btn ghost" onclick="renderStart()">← Назад</button>
    </div>`;
}
function submitSelfIdentify(){
  const v = id => (document.getElementById(id).value || '').trim();
  const name = v('s_name');
  if(!name){ document.getElementById('siErr').textContent = 'Пожалуйста, укажите имя.'; return; }
  student.name = name; student.phone = v('s_phone'); student.email = v('s_email');
  start();
}

function renderQuestion(){
  if(idx >= QUESTIONS.length){ return renderResult(); } // обзор по ВСЕМ уровням (без раннего стопа)
  const Q = QUESTIONS[idx];
  const lvl = levelByN(Q.level);
  const pct = Math.round((answers.length / QUESTIONS.length) * 100);
  const stem = Q.q.replace('___','<span class="blank">▁▁▁</span>');
  // перемешиваем варианты (Fisher–Yates), чтобы верный ответ не был всегда на одном месте
  const order = Q.o.map((text,i)=>({text, correct:i===Q.a}));
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  curCorrect = order.findIndex(o=>o.correct);
  const opts = order.map((o,i)=>`
    <button class="opt" onclick="answer(${i})">
      <span class="key">${LETTERS[i]}</span><span>${o.text}</span>
    </button>`).join('');
  app.innerHTML = `
    <div class="meta"><span>Вопрос ${answers.length+1}</span><span class="badge">${lvl.name} · ${lvl.cefr}</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="q">${stem}</div>
    <div class="hint">${Q.ru}</div>
    <div class="opts">
      ${opts}
      <button class="opt" style="opacity:.8" onclick="answer(-1)">
        <span class="key">?</span><span>Не знаю / затрудняюсь</span>
      </button>
    </div>`;
}

function answer(choice){
  const Q = QUESTIONS[idx];
  answers.push({ level:Q.level, correct: choice===curCorrect });
  idx++;
  renderQuestion();
}

/* ===== Расчёт размещения ===== */
const PASS = 0.6; // порог освоения уровня (например, 3 из 4)

function levelAgg(){
  const m = {};
  LEVELS.forEach(l=>m[l.n]={ok:0,total:0});
  answers.forEach(a=>{ m[a.level].total++; if(a.correct) m[a.level].ok++; });
  return m;
}

/* Обзорный тест по всем уровням: берём САМЫЙ ВЫСОКИЙ уровень, который студент освоил
   (доля верных >= PASS), и рекомендуем следующий за ним. Так ошибки на лёгких вопросах
   не занижают уровень, если на сложных студент справляется. Финальный уровень уточняет
   преподаватель в разговоре. */
function computePlacement(){
  const m = levelAgg();
  let highest = 0;
  for(const l of LEVELS){
    const s = m[l.n];
    if(s.total > 0 && s.ok / s.total >= PASS) highest = l.n;
  }
  if(highest >= 7) return { rec:7, graduated:true };   // освоил всё — потолок программы
  return { rec: Math.max(1, highest + 1), graduated:false }; // старт со следующего за освоенным
}

function renderResult(){
  const { rec, graduated } = computePlacement();
  const m = levelAgg();
  const correctTotal = answers.filter(a=>a.correct).length;
  placedLevel = graduated ? 7 : rec; // тему монолога берём по уровню теории

  // разбивка по уровням (только те, что реально проверялись)
  const statsRows = LEVELS.filter(l=>m[l.n].total>0).map(l=>{
    const s = m[l.n];
    const pass = s.ok/s.total >= PASS;
    const col = pass ? 'var(--ok)' : (s.ok===0 ? 'var(--bad)' : '#c98a00');
    return `<tr><td>${l.name} <span style="color:var(--muted)">· ${l.cefr}</span></td>
            <td class="score" style="color:${col}">${s.ok}/${s.total}</td></tr>`;
  }).join('');

  let lessonBlock, headline;
  if(graduated){
    headline = `Студент уверенно прошёл все 7 уровней теста.`;
    lessonBlock = `
      <div class="lesson" style="color:#c98a00">Выше Upper-Intermediate 3.0</div>
      <p class="lead">Грамматика программы 201 освоена полностью — можно ставить на выпускной модуль /
        повторение верхних уровней или на следующую ступень.</p>`;
  } else {
    const L = levelByN(rec);
    headline = `Предварительный уровень (уточнит преподаватель):`;
    lessonBlock = `
      <div class="lesson">${L.name}</div>
      <span class="badge lvl" style="color:var(--accent)">CEFR: ${L.cefr}</span>
      <div class="struct">
        <div class="s-name">${L.desc}</div>
        <div class="s-sub">Рекомендуем начать с этого уровня. Финальный уровень подтвердит
          преподаватель в коротком разговоре. Грамматика: уроки ${L.lessons} программы 201.</div>
      </div>`;
  }

  app.innerHTML = `
    <div class="result">
      <div class="steps"><span class="step">1 · Теория ✓</span><span class="step">2 · Разговор</span></div>
      <p class="big">Часть 1 (теория) · верных ответов: ${correctTotal} из ${answers.length}</p>
      <h2 style="margin-bottom:6px">${headline}</h2>
      ${lessonBlock}
      <h2 style="font-size:16px;color:var(--muted);margin:10px 0 4px">Разбивка по уровням</h2>
      <table><thead><tr><th>Уровень</th><th class="score">Верно</th></tr></thead><tbody>${statsRows}</tbody></table>
      <p class="small">Уровень считается освоенным при ≥60% верных ответов (одиночная ошибка не понижает уровень).</p>
      <div class="row">
        ${BRANCH ? '' : `<button class="btn" onclick="startConversation(this)">К разговору с преподавателем →</button>`}
        ${BRANCH ? `<button class="btn" onclick="renderSpeaking()">Перейти к части 2 · Разговор →</button>` : ''}
        <button class="btn ghost" onclick="goHome()">${BRANCH ? '← К началу' : '← На главную'}</button>
        ${BRANCH ? '' : '<button class="btn ghost" onclick="start()">Пройти заново</button>'}
      </div>
      ${BRANCH ? '' : '<p class="small center" style="margin-top:8px">Вы перейдёте к преподавателю — он уточнит уровень и откроет вам нужную программу.</p>'}
    </div>`;
}

/* ===== Часть 2: разговорная (запись монолога) ===== */
function fmt(s){ const m=Math.floor(s/60), x=s%60; return m+':'+(x<10?'0':'')+x; }

function renderSpeaking(){
  const L = levelByN(placedLevel);
  const sp = speakFor(placedLevel);
  const supported = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
  const tips = sp.tips.map(t=>`<li>${t}</li>`).join('');
  app.innerHTML = `
    <div class="steps"><span class="step">1 · Теория ✓</span><span class="step on">2 · Разговор</span></div>
    <div class="meta"><span>Часть 2 · Разговорная речь</span><span class="badge">${L.name} · ${L.cefr}</span></div>
    <h1 style="font-size:22px;margin-bottom:6px">Запиши монолог</h1>
    <p class="lead">По итогам теории твой уровень — <b>${L.name} (${L.cefr})</b>. Тема подобрана под него.
       Говори ${sp.minutes}, не спеши. Запись можно прослушать и переписать.</p>
    <div class="struct">
      <div class="s-name">🎙 ${sp.topic}</div>
      <div class="s-sub" style="margin-top:6px;line-height:1.6">${sp.prompt}</div>
    </div>
    <p class="hint" style="margin:0 0 6px">Полезные фразы:</p>
    <ul class="tips">${tips}</ul>
    <div id="rec"></div>
    <div class="row" style="margin-top:18px">
      <button class="btn ghost" onclick="renderResult()">← К результату теста</button>
    </div>`;
  const box = document.getElementById('rec');
  if(!supported){
    box.innerHTML = `<p class="hint" style="color:#c98a00">Запись с микрофона не поддерживается в этом браузере.
      Открой страницу в Chrome или Safari (или на телефоне) — и кнопка записи появится. Тему выше можно проговорить вживую с преподавателем.</p>`
      + (CRM() ? `<button class="btn" onclick="sendResults(false)">Отправить результат преподавателю (без записи) →</button>` : '');
  } else {
    box.innerHTML = recBtnHtml()
      + (CRM() ? `<p class="small" style="margin-top:10px"><a href="#" onclick="sendResults(false);return false" style="color:var(--muted)">Пропустить запись и отправить только результат теста</a></p>` : '');
  }
}

function recBtnHtml(){ return `<button class="btn rec" onclick="startRec()">🎙 Записать монолог</button>`; }

async function startRec(){
  const box = document.getElementById('rec');
  try{
    recStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    box.innerHTML = `<p class="hint" style="color:var(--bad)">Не удалось получить доступ к микрофону.
      Разреши доступ в браузере и попробуй снова.</p>` + recBtnHtml();
    return;
  }
  recChunks = [];
  try{ mr = new MediaRecorder(recStream); }
  catch(e){ mr = new MediaRecorder(recStream, {}); }
  mr.ondataavailable = e=>{ if(e.data && e.data.size) recChunks.push(e.data); };
  mr.onstop = ()=>{
    const blob = new Blob(recChunks, {type:(mr && mr.mimeType) || 'audio/webm'});
    recBlob = blob;
    if(recBlobUrl) URL.revokeObjectURL(recBlobUrl);
    recBlobUrl = URL.createObjectURL(blob);
    if(recStream) recStream.getTracks().forEach(t=>t.stop());
    showPlayback();
  };
  mr.start();
  recSecs = 0;
  box.innerHTML = `
    <div class="rec-live"><span class="rec-dot"></span> Идёт запись… <b id="rtime">0:00</b></div>
    <button class="btn rec" onclick="stopRec()">■ Остановить запись</button>`;
  recTimer = setInterval(()=>{ recSecs++; const el=document.getElementById('rtime'); if(el) el.textContent=fmt(recSecs); }, 1000);
}

function stopRec(){
  if(recTimer){ clearInterval(recTimer); recTimer=null; }
  if(mr && mr.state !== 'inactive') mr.stop();
}

function showPlayback(){
  const L = levelByN(placedLevel);
  const date = new Date().toISOString().slice(0,10);
  const safe = L.name.replace(/[^A-Za-z0-9]+/g,'_');
  const fname = `ELC_speaking_${safe}_${date}.webm`;
  const actions = CRM()
    ? `<div class="row">
         <button class="btn" onclick="sendResults(true)">✓ Отправить преподавателю</button>
         <button class="btn ghost" onclick="startRec()">↺ Переписать</button>
       </div>
       <p class="small">Запись и результат теста уйдут в вашу карточку — преподаватель прослушает монолог и подтвердит уровень.</p>`
    : `<div class="row">
         <a class="btn" href="${recBlobUrl}" download="${fname}">⬇ Скачать запись</a>
         <button class="btn ghost" onclick="startRec()">↺ Переписать</button>
       </div>
       <p class="small">Скачай файл и отправь преподавателю ELC — он прослушает твой монолог и подтвердит уровень.</p>`;
  document.getElementById('rec').innerHTML = `
    <div class="struct" style="text-align:center">
      <div class="s-name" style="color:var(--ok)">✓ Запись готова · ${fmt(recSecs)}</div>
      <audio controls src="${recBlobUrl}"></audio>
    </div>
    ${actions}`;
}

/* ═══════════════════════════════════════════════════════════════════════
   Режим филиала: ?branch=CODE → найти студента → форма данных → тест → отправка
   ═══════════════════════════════════════════════════════════════════════ */

// Экран «найди себя»
function renderIdentify(){
  app.innerHTML = `
    <div class="brandline">Филиал: <b>${esc(BRANCH.label)}</b></div>
    <h1 style="font-size:22px;margin-bottom:6px">Найдите себя в списке</h1>
    <p class="lead">Введите своё имя, фамилию или номер телефона и выберите свою карточку —
       результат теста подошьётся именно к вам.</p>
    <input id="q" class="inp" placeholder="Имя, фамилия или телефон…" autocomplete="off">
    <div id="roster" class="roster"></div>
    <p class="small">Не нашли себя? Обратитесь к администратору филиала — он добавит вас в систему.</p>`;
  const q = document.getElementById('q');
  q.addEventListener('input', onRosterInput);
  q.focus();
}

function onRosterInput(e){
  const v = e.target.value.trim();
  clearTimeout(rosterTimer);
  const box = document.getElementById('roster');
  if(v.length < 2){ box.innerHTML = `<p class="small">Введите минимум 2 символа…</p>`; return; }
  box.innerHTML = `<p class="small">Поиск…</p>`;
  rosterTimer = setTimeout(async ()=>{
    try{
      const r = await fetch(`${API}/api/placement/roster?branch=${encodeURIComponent(BRANCH.code)}&q=${encodeURIComponent(v)}`);
      const j = await r.json();
      renderRoster(j.results || [], !!j.capped);
    }catch(err){ box.innerHTML = `<p class="small" style="color:var(--bad)">Ошибка поиска. Попробуйте ещё раз.</p>`; }
  }, 300);
}

function renderRoster(list, capped){
  rosterList = list;
  const box = document.getElementById('roster');
  if(!list.length){ box.innerHTML = `<p class="small">Никого не нашли. Уточните запрос или обратитесь к администратору.</p>`; return; }
  box.innerHTML = list.map((s,i)=>`
    <button class="rost" onclick="selectStudent(${i})">
      <span class="rost-name">${esc(s.name)}</span>
      <span class="rost-phone">${esc(s.maskedPhone||'—')}</span>
    </button>`).join('')
    + (capped ? `<p class="small">Показаны первые 20. Уточните запрос, если себя не видите.</p>` : '');
}

function selectStudent(i){
  const s = rosterList[i];
  if(!s) return;
  student.contactId = s.id;
  student.maskedPhone = s.maskedPhone || '';
  // имя в ростере = "Фамилия Имя" (если фамилия есть)
  const parts = (s.name||'').trim().split(/\s+/);
  if(parts.length > 1){ student.lastName = parts[0]; student.name = parts.slice(1).join(' '); }
  else { student.lastName = ''; student.name = parts[0] || ''; }
  student.phone = ''; student.email = ''; student.birthdate = '';
  renderDataForm();
}

// Форма данных студента
function renderDataForm(){
  app.innerHTML = `
    <div class="brandline">Филиал: <b>${esc(BRANCH.label)}</b></div>
    <h1 style="font-size:22px;margin-bottom:6px">Проверьте свои данные</h1>
    <p class="lead">Подтвердите или дополните — эти данные сохранятся в вашей карточке.</p>
    <label class="fld">Имя
      <input id="f_name" class="inp" value="${esc(student.name)}" autocomplete="given-name"></label>
    <label class="fld">Фамилия
      <input id="f_last" class="inp" value="${esc(student.lastName)}" autocomplete="family-name"></label>
    <label class="fld">Телефон
      <input id="f_phone" class="inp" type="tel" placeholder="+7 (___) ___-____" value="${esc(student.phone)}" autocomplete="tel">
      ${student.maskedPhone ? `<span class="chips"><span class="chip">в карточке: ${esc(student.maskedPhone)}</span></span>` : ''}</label>
    <label class="fld">Email
      <input id="f_email" class="inp" type="email" placeholder="you@mail.com" value="${esc(student.email)}" autocomplete="email"></label>
    <label class="fld">Дата рождения
      <input id="f_birth" class="inp" type="date" value="${esc(student.birthdate)}"></label>
    <div id="formErr" class="small" style="color:var(--bad);min-height:18px"></div>
    <div class="row">
      <button class="btn" onclick="submitDataForm()">Начать тест →</button>
      <button class="btn ghost" onclick="renderIdentify()">← Назад к списку</button>
    </div>`;
}

function submitDataForm(){
  const v = id => (document.getElementById(id).value || '').trim();
  const name = v('f_name');
  if(!name){ document.getElementById('formErr').textContent = 'Пожалуйста, укажите имя.'; return; }
  student.name = name;
  student.lastName = v('f_last');
  student.phone = v('f_phone');
  student.email = v('f_email');
  student.birthdate = v('f_birth');
  start(); // → теория
}

// Сбор результата теории
function buildTheoryPayload(){
  const { graduated } = computePlacement();
  const correctTotal = answers.filter(a=>a.correct).length;
  const m = levelAgg();
  const breakdown = {};
  LEVELS.forEach(l=>{ if(m[l.n].total>0) breakdown[l.n] = { ok:m[l.n].ok, total:m[l.n].total }; });
  const L = levelByN(placedLevel);
  const sp = speakFor(placedLevel);
  return {
    levelN: graduated ? 8 : placedLevel,
    levelName: graduated ? 'Выше Upper-Intermediate 3.0' : L.name,
    cefr: graduated ? '>B2+' : L.cefr,
    graduated,
    correct: correctTotal,
    total: answers.length,
    breakdown,
    speakingTopic: sp.topic,
  };
}

async function submitToCRM(withAudio){
  const payload = {
    branch: BRANCH.code,
    contactId: student.contactId,
    student: { name:student.name, lastName:student.lastName, phone:student.phone, email:student.email, birthdate:student.birthdate },
    theory: buildTheoryPayload(),
  };
  const r = await fetch(`${API}/api/placement/submit`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload),
  });
  const j = await r.json();
  if(!j || !j.ok) throw new Error((j && j.error) || 'submit failed');
  resultId = j.resultId;
  if(withAudio && recBlob){
    await fetch(`${API}/api/placement/audio/${resultId}`, {
      method:'POST',
      headers:{ 'Content-Type': recBlob.type || 'audio/webm', 'X-Audio-Secs': String(recSecs||0) },
      body: recBlob,
    });
  }
  return resultId;
}

async function sendResults(withAudio){
  if(submitting) return;
  submitting = true;
  const box = document.getElementById('rec');
  if(box) box.innerHTML = `<p class="hint">Отправляем результат…</p>`;
  try{
    await submitToCRM(withAudio);
    renderSubmitted(withAudio && !!recBlob);
  }catch(e){
    submitting = false;
    if(box) box.innerHTML = `<p class="hint" style="color:var(--bad)">Не удалось отправить: ${esc(e.message)}.</p>
      <button class="btn" onclick="sendResults(${withAudio?'true':'false'})">Повторить отправку</button>`;
    return;
  }
  submitting = false;
}

function renderSubmitted(withAudio){
  const L = levelByN(placedLevel);
  const { graduated } = computePlacement();
  const lvlLine = graduated ? 'Выше Upper-Intermediate 3.0' : `${L.name} · ${L.cefr}`;
  app.innerHTML = `
    <div class="result center">
      <div class="lesson" style="color:var(--ok);font-size:26px">✓ Результат отправлен</div>
      <p class="lead" style="margin-top:10px">Спасибо, ${esc(student.name)}! Результат теста${withAudio ? ' и запись монолога' : ''}
        подшиты в вашу карточку в CRM филиала «${esc(BRANCH.label)}».</p>
      <div class="struct" style="text-align:left">
        <div class="s-name">Рекомендуемый уровень: ${esc(lvlLine)}</div>
        <div class="s-sub" style="margin-top:4px">Преподаватель свяжется с вами и подтвердит зачисление.</div>
      </div>
      <p class="small">Можно закрыть страницу.</p>
    </div>`;
}

// Точка входа: режим филиала vs standalone
function init(){
  const code = new URLSearchParams(location.search).get('branch');
  if(!code){ renderStart(); return; } // обычный тест без CRM
  app.innerHTML = `<p class="lead">Загрузка…</p>`;
  fetch(`${API}/api/placement/branch/${encodeURIComponent(code)}`)
    .then(r=>r.json())
    .then(j=>{
      if(j && j.ok){ BRANCH = { code:j.code, label:j.label }; renderIdentify(); }
      else { renderStart(); } // неизвестный филиал → обычный режим
    })
    .catch(()=>renderStart());
}

init();
</script>
