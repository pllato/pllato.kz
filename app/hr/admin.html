<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель анализа — Pllato HR</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="../../pllato_favicon_64.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--bronze:#b8895a;--bronze-deep:#8b6740;--bronze-tint:rgba(184,137,90,.09);
  --bg:#f4f2ec;--surface:#fff;--surface-2:#f3f0e8;--text:#0f1620;--text-2:#4a5163;--text-3:#8a8d96;
  --line:#e3ddcf;--green:#16794a;--green-l:#e7f5ee;--red:#c0392b;--red-l:#fbeae8;--amber:#c47d1d;--amber-l:#fdf3e2;
  --r:12px;--shadow:0 6px 26px -14px rgba(10,22,40,.3);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5}
.top{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.top .brand{font-weight:800}.top .tag{font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bronze);color:#1a1205;padding:3px 8px;border-radius:6px}
.top .sp{flex:1}
.top a{color:#cfe0ee;font-size:13px;text-decoration:none;margin-left:14px}.top a:hover{color:#fff}
.wrap{max-width:1000px;margin:0 auto;padding:20px 16px 80px}
h1{font-size:22px;margin:0 0 4px;letter-spacing:-.3px}h2{font-size:17px;margin:26px 0 12px}h3{font-size:14px;margin:16px 0 8px;color:var(--text-2)}
p{color:var(--text-2);margin:0 0 12px}.muted{color:var(--text-3);font-size:13px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
textarea{width:100%;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px;border:1px solid var(--line);border-radius:10px;min-height:90px;resize:vertical}
.btn{border:none;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;border-radius:10px;padding:12px 20px;background:var(--navy);color:#fff}
.btn.ghost{background:var(--surface-2);color:var(--text)}.btn:disabled{opacity:.4}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px}
.pill.good{background:var(--green-l);color:var(--green)}.pill.warn{background:var(--amber-l);color:var(--amber)}.pill.bad{background:var(--red-l);color:var(--red)}
.verdict{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.gauge{width:120px;height:120px;flex:0 0 auto;position:relative}
.val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.val b{font-size:30px;line-height:1}.val small{font-size:10px;color:var(--text-3)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:none;background:#fff;padding:8px 14px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;color:var(--text-2)}
.seg button.on{background:var(--navy);color:#fff}
/* bars */
.barrow{display:grid;grid-template-columns:150px 1fr 46px;gap:10px;align-items:center;margin-bottom:8px}
.barrow .lb{font-size:13px;font-weight:600;text-align:right;color:var(--text-2)}
.track{position:relative;height:22px;background:var(--surface-2);border-radius:6px;overflow:hidden}
.track > i{position:absolute;top:0;bottom:0;left:0;border-radius:6px}
.track .sem{position:absolute;top:0;bottom:0;background:rgba(0,0,0,.12)}
.barrow .num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;text-align:right}
/* OCA graph */
.oca{position:relative;padding:0 0 0 0}
.ocarow{display:grid;grid-template-columns:150px 1fr;gap:10px;align-items:center;margin-bottom:6px}
.ocatrack{position:relative;height:24px;background:linear-gradient(90deg,#fbeae8 0%,#fdf3e2 40%,#eef6f0 60%,#e7f5ee 100%);border-radius:5px;border:1px solid var(--line)}
.ocatrack .mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--text-3)}
.ocatrack .bar{position:absolute;top:3px;bottom:3px;background:var(--navy);border-radius:3px;opacity:.85}
.flag{display:flex;gap:10px;padding:11px 13px;border-radius:10px;margin-bottom:8px;font-size:14px;align-items:flex-start}
.flag.red{background:var(--red-l);color:#7a241a}.flag.yellow{background:var(--amber-l);color:#7a4e12}.flag .i{font-weight:800}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:14px}.kv b{color:var(--text-2);font-weight:600}
.qz{border-left:3px solid var(--bronze);padding:6px 0 6px 12px;margin:0 0 10px}
.qz .c{font-weight:700;font-size:14px}.qz .q{font-size:14px;color:var(--text-2);margin-top:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}th{color:var(--text-3);font-weight:600;font-size:12px}
td.n,th.n{text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700}
.chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px}
details{border:1px solid var(--line);border-radius:10px;padding:0 14px;margin-bottom:10px;background:#fff}
details summary{cursor:pointer;font-weight:700;padding:12px 0}
.legend{font-size:12px;color:var(--text-3);margin-top:6px}
.hidden{display:none}
@media print{.top,.noprint{display:none}.card{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<div class="top">
  <span class="brand">Pllato</span><span class="tag">ПАНЕЛЬ АНАЛИЗА</span>
  <span class="sp"></span>
  <a href="index.html">Тест кандидата</a><a href="guide.html">Методичка</a>
</div>
<div class="wrap">
  <div class="card noprint" id="inputCard">
    <h1>Анализ результата кандидата</h1>
    <p>Вставьте код результата, который прислал кандидат (начинается с <code>HR1.</code>), или загрузите файл.</p>
    <textarea id="codeInput" placeholder="HR1.xxxxx.yyyyy..."></textarea>
    <div class="row" style="margin-top:12px">
      <button class="btn" id="analyzeBtn">Разобрать</button>
      <button class="btn ghost" id="fileBtn">Загрузить файл</button>
      <input type="file" id="fileInput" accept=".txt" class="hidden">
      <span class="muted" id="inputMsg"></span>
    </div>
  </div>
  <div id="report"></div>
</div>

<script src="data/positions.js"></script>
<script src="data/personality.js"></script>
<script src="data/cognitive.js"></script>
<script src="data/abstract.js"></script>
<script src="data/knowledge.js"></script>
<script src="data/sjt.js"></script>
<script src="data/integrity.js"></script>
<script src="data/biodata.js"></script>
<script src="data/interview.js"></script>
<script src="core.js"></script>
<script>
const $=s=>document.querySelector(s);
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
const MODULE_LABELS={personality:'Личность',cognitive:'Способности',sjt:'Рабочие ситуации',integrity:'Надёжность',biodata:'Продуктивность',knowledge:'Профзнания',attention:'Внимательность'};
let currentMode='evidence';
let lastScored=null;

/* Полный скоринг из декодированных данных */
function scoreAll(d){
  const P=window.HR_POSITIONS[d.fam];
  const pers=HR.scorePersonality(d.ans.personality||{});
  // cognitive
  const lookup={}; window.HR_COGNITIVE.items.forEach(it=>lookup[it.id]=it);
  window.HR_ABSTRACT.items.forEach(it=>lookup[it.id]=Object.assign({section:'A'},it));
  let cog=null, cogFlags=[];
  if((d.ans.cognitive||[]).length){
    const admin=d.ans.cognitive.map(c=>lookup[c.id]).filter(Boolean);
    const ans=d.ans.cognitive.map(c=>c.a);
    cog=HR.scoreCognitive(admin,ans);
    cogFlags=cognitiveCheatFlags(d,admin,ans);
  }
  const sjtBank=P.sjtBank?window.HR_SJT[P.sjtBank]:null;
  // считаем SJT только если модуль реально пройден (у ИТР его нет в батарее)
  const sjt=(sjtBank&&d.ans.sjt&&d.ans.sjt.length)?HR.scoreSJT(sjtBank,d.ans.sjt):null;
  const intItems=window.HR_INTEGRITY.core.concat(window.HR_INTEGRITY[d.fam]||[]);
  const integ=(d.ans.integrity&&Object.keys(d.ans.integrity).length)?HR.scoreIntegrity(intItems,d.ans.integrity):null;
  const bioItems=window.HR_BIODATA.core.concat(window.HR_BIODATA[d.fam]||[]);
  const bio=(d.ans.biodata&&Object.keys(d.ans.biodata).length)?HR.scoreBiodata(bioItems,d.ans.biodata,d.fam):null;
  let know=null;
  if((d.ans.knowledge||[]).length){
    const kl={}; window.HR_KNOWLEDGE.items.forEach(it=>kl[it.id]=it);
    let correct=0,n=0; d.ans.knowledge.forEach(k=>{const it=kl[k.id];if(it){n++;if(k.a===it.answerIndex)correct++;}});
    know={score:n?Math.round(correct/n*100):0,correct,n};
  }
  const att=d.ans.attention?HR.scoreAttention(d.ans.attention):null;
  const persAnswered=d.ans.personality&&Object.keys(d.ans.personality).length;
  const persFit=persAnswered?HR.personalityFit(P,pers):null;
  const moduleScores={};
  if(persFit!=null)moduleScores.personality=persFit;
  if(cog)moduleScores.cognitive=cog.composite.score;
  if(sjt)moduleScores.sjt=sjt.percent;
  if(integ)moduleScores.integrity=integ.score;
  if(bio)moduleScores.biodata=bio.score;
  if(know)moduleScores.knowledge=know.score;
  if(att)moduleScores.attention=att.score;
  const fit=HR.computeFit(P,moduleScores);
  // сбор флагов и красных зон
  const flags=[].concat(pers.flags,cogFlags,sjt?sjt.flags:[],integ?integ.flags:[],bio?bio.flags:[]);
  // пороговые красные флаги позиции
  if(integ && integ.score<(P.redFlags.integrityBelow||50)) {/* уже во флагах integ */}
  if(P.redFlags.knowledgeBelow && know && know.score<P.redFlags.knowledgeBelow) flags.push({level:'red',code:'KNOW',text:'Профзнания ниже '+P.redFlags.knowledgeBelow+'% — квалификация не подтверждена.'});
  (P.redFlags.personalityRisk||[]).forEach(dom=>{ const sc=pers.scales[dom]; if(sc&&sc.pct<16) flags.push({level:'red',code:'P-'+dom,text:'Очень низкий балл по шкале «'+domLabel(dom)+'» (перц. '+sc.pct+') — риск для этой должности.'}); });
  // когнитивные пороги
  if(cog){ const c=P.cognitive; if(cog.composite.score<c.min) flags.push({level:'yellow',code:'COG',text:'Способности ниже минимума для должности (балл '+cog.composite.score+' < '+c.min+').'}); }
  const invalid = pers.invalid || flags.some(f=>f.code==='ATT'&&f.level==='red');
  return {d,P,pers,cog,cogFlags,sjt,integ,bio,know,att,persFit,moduleScores,fit,flags,invalid,verify:bio?bio.verify:[]};
}
function domLabel(k){const m={C:'Добросовестность',ES:'Эмоц. стабильность',H:'Честность',E:'Экстраверсия',A:'Доброжелательность',O:'Открытость/обучаемость',C1:'Трудолюбие',C2:'Организованность',C3:'Самодисциплина',C4:'Целеустремлённость',ES1:'Стрессоустойчивость',ES2:'Контроль эмоций',Hf:'Справедливость',Hs:'Искренность',Hm:'Скромность'};return m[k]||k}

function cognitiveCheatFlags(d,admin,ans){
  const flags=[]; const times=(d.ans.cognitive||[]).map(c=>c.t).filter(t=>t!=null&&t>=0);
  const tel=d.telemetry||{};
  if(tel.blur>=6) flags.push({level:'red',code:'BLUR',text:'Кандидат покидал окно теста '+tel.blur+' раз — возможен поиск ответов.'});
  else if(tel.blur>=3) flags.push({level:'yellow',code:'BLUR',text:'Переключения окна во время теста: '+tel.blur+'.'});
  if(tel.paste>0) flags.push({level:'yellow',code:'PASTE',text:'Попытки вставки текста: '+tel.paste+'.'});
  if(times.length>4){
    const med=times.slice().sort((a,b)=>a-b)[Math.floor(times.length/2)];
    let acc=0; admin.forEach((it,i)=>{if(ans[i]===it.answerIndex)acc++;}); acc=acc/admin.length;
    if(med<4 && acc>0.85) flags.push({level:'red',code:'FAST',text:'Очень быстрые и точные ответы (медиана '+med+' c) — перепроверить очным ретестом.'});
    const mean=times.reduce((a,b)=>a+b,0)/times.length;
    const sd=Math.sqrt(times.reduce((a,b)=>a+(b-mean)**2,0)/times.length);
    if(mean>0 && sd/mean<0.2) flags.push({level:'yellow',code:'CV',text:'Слишком равномерное время на задания — возможны случайные/шаблонные ответы.'});
  }
  return flags;
}

/* ---------- РЕНДЕР ---------- */
function analyze(code){
  const dec=HR.decodeResult(code);
  if(dec.error){ $('#inputMsg').textContent=dec.error; $('#inputMsg').style.color='var(--red)'; return; }
  $('#inputMsg').textContent='';
  const s=scoreAll(dec.data); lastScored=s;
  saveCandidate(s);
  renderReport(s);
  window.scrollTo(0,0);
}

function gauge(fit,tone){
  const col=tone==='good'?'var(--green)':tone==='warn'?'var(--amber)':'var(--red)';
  const c=2*Math.PI*52, off=c*(1-fit/100);
  return `<svg class="gauge" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="var(--surface-2)" stroke-width="12"/>
    <circle cx="60" cy="60" r="52" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/></svg>
    <div class="val"><b>${fit}</b><small>Fit Score</small></div>`;
}

function renderReport(s){
  const d=s.d, P=s.P;
  const verd=s.fit;
  let h=`<div class="card">
    <div class="row" style="justify-content:space-between">
      <div><h1>${esc(d.cand.name||'Кандидат')}</h1>
      <div class="muted">${P.icon} ${P.label}${d.kp?' · профиль: '+d.kp:''} · пройдено ${d.ts||''} · ${Math.round((d.total||0)/60)} мин</div></div>
      <div class="noprint"><button class="btn ghost" onclick="window.print()">Печать</button></div>
    </div>
    <div class="verdict" style="margin-top:16px">
      <div style="position:relative;width:120px;height:120px">${gauge(verd.fit,verd.tone)}</div>
      <div style="flex:1;min-width:220px">
        <span class="pill ${verd.tone}">${verd.verdict}</span>
        <p style="margin:10px 0 6px">${verd.note}</p>
        ${s.invalid?`<div class="flag red"><span class="i">⚠</span> Протокол сомнительной достоверности — результат интерпретировать осторожно или предложить повторное тестирование.</div>`:''}
        <div class="muted">Ожидаемая точность прогноза по тесту ≈ 0.45–0.50. Со структурированным интервью (ниже) — до 0.55–0.60.</div>
      </div>
    </div>`;
  // вклад модулей
  h+=`<h3>Из чего сложился Fit Score</h3>`;
  verd.contrib.forEach(c=>{
    h+=barRow(MODULE_LABELS[c.module]||c.module, c.score, {sub:'вес '+Math.round(c.norm*100)+'%'});
  });
  h+=`</div>`;

  // флаги
  if(s.flags.length){
    const reds=s.flags.filter(f=>f.level==='red'), yels=s.flags.filter(f=>f.level==='yellow');
    h+=`<div class="card"><h2 style="margin-top:0">⚑ Флаги и зоны внимания</h2>`;
    reds.concat(yels).forEach(f=>h+=`<div class="flag ${f.level==='red'?'red':'yellow'}"><span class="i">${f.level==='red'?'●':'○'}</span><div>${esc(f.text)}</div></div>`);
    h+=`</div>`;
  }

  // личность — два режима
  h+=`<div class="card"><div class="row" style="justify-content:space-between"><h2 style="margin:0">Личностный профиль</h2>
    <div class="seg noprint"><button class="${currentMode==='evidence'?'on':''}" onclick="setMode('evidence')">Научный профиль</button><button class="${currentMode==='oca'?'on':''}" onclick="setMode('oca')">График 10 шкал</button></div></div>`;
  h+= currentMode==='oca'? renderOCA(s.pers) : renderEvidence(s.pers);
  h+=`</div>`;

  // способности
  if(s.cog){
    h+=`<div class="card"><h2 style="margin-top:0">Способности (тест интеллекта)</h2>`;
    h+=barRow('Общий балл', s.cog.composite.score, {big:true, band:true});
    if(s.cog.V)h+=barRow('Логика и слова', s.cog.V.score,{band:true});
    if(s.cog.N)h+=barRow('Числа', s.cog.N.score,{band:true});
    if(s.cog.A)h+=barRow('Фигуры/логика', s.cog.A.score,{band:true});
    if(s.att)h+=barRow('Внимательность', s.att.score,{band:true,sub:s.att.correct+'−'+s.att.errors+' из '+s.att.total});
    const c=P.cognitive;
    h+=`<div class="legend">Порог для должности: рекомендуемо ≥${c.recommend}, минимум ${c.min}. ${esc(c.note)}. Показаны перцентильные баллы (0–99).</div></div>`;
  }
  // профзнания
  if(s.know){ h+=`<div class="card"><h2 style="margin-top:0">Профессиональные знания</h2>`+barRow('Правильных ответов', s.know.score,{big:true,sub:s.know.correct+' из '+s.know.n})+`<div class="legend">Порог: не ниже 50% для подтверждения квалификации.</div></div>`; }

  // рабочее поведение
  if(s.sjt||s.integ||s.bio){
    h+=`<div class="card"><h2 style="margin-top:0">Рабочее поведение</h2>`;
    if(s.sjt)h+=barRow('Верные решения ситуаций', s.sjt.percent,{big:true,sub:'сырой '+s.sjt.raw+'/'+s.sjt.max});
    if(s.integ)h+=barRow('Надёжность / установки', s.integ.score,{band:true});
    if(s.bio)h+=barRow('Подтверждаемая продуктивность', s.bio.score,{band:true});
    h+=`<div class="legend">SJT: ≥75 высокий уровень суждений, 55–74 средний, &lt;55 зона риска. Надёжность/продуктивность: ≥70 хорошо, 50–69 средне, &lt;50 внимание.</div></div>`;
  }

  // что проверить (биодата)
  if(s.verify&&s.verify.length){
    h+=`<div class="card"><h2 style="margin-top:0">Что проверить по фактам и рекомендациям</h2><ul style="margin:0;padding-left:20px;color:var(--text-2)">`;
    s.verify.forEach(v=>h+=`<li>${esc(v)}</li>`); h+=`</ul></div>`;
  }

  // гайд интервью
  h+=renderInterview(s);

  // сравнение кандидатов
  h+=renderComparison(P.id);

  // дисклеймер
  h+=`<div class="card"><div class="muted">Инструмент носит рекомендательный характер, не является психодиагностикой состояния здоровья и не может быть единственным основанием отказа в приёме на работу. Личностные шкалы основаны на пунктах International Personality Item Pool (общественное достояние); нормы предварительные (международная выборка) — для точности накапливайте собственную статистику. Обработка данных кандидата — с его согласия (Закон РК «О персональных данных и их защите»).</div></div>`;

  $('#report').innerHTML=h;
  $('#inputCard').classList.add('hidden');
}

function barRow(label,val,opt){
  opt=opt||{}; const band=HR.band(val); const col=opt.band?band.color:(val>=60?'var(--green)':val>=40?'var(--bronze)':'var(--red)');
  const sem=opt.sem?`<div class="sem" style="left:${Math.max(0,val-opt.sem)}%;width:${opt.sem*2}%"></div>`:'';
  return `<div class="barrow"><div class="lb">${esc(label)}${opt.sub?`<br><span class="muted" style="font-weight:400">${esc(opt.sub)}</span>`:''}</div>
    <div class="track"><i style="width:${val}%;background:${col}"></i>${sem}</div>
    <div class="num">${val}${opt.band?`<br><span class="muted" style="font-weight:400;font-size:10px">${band.label}</span>`:''}</div></div>`;
}

function renderEvidence(pers){
  const doms=['C','ES','H','E','A','O'];
  let h=`<p class="muted">Перцентили относительно нормы (0–99). Затемнённая полоса — погрешность измерения (±1 SEM). Разницу меньше погрешности не трактуйте как значимую.</p>`;
  doms.forEach(k=>{ const sc=pers.scales[k]; if(!sc)return; h+=barRow(domLabel(k),sc.pct,{band:true,sem:Math.round(sc.semZ*20)}); });
  // фасетки C и ES
  h+=`<details><summary>Детализация: Добросовестность и Стабильность</summary><div style="padding:8px 0">`;
  ['C1','C2','C3','C4','ES1','ES2','Hf','Hs','Hm'].forEach(k=>{const sc=pers.scales[k];if(sc)h+=barRow(domLabel(k),sc.pct,{band:true});});
  h+=`</div></details>`;
  h+=`<h3>Панель достоверности</h3><div class="kv">
    <b>Соц. желательность</b><span>${pers.sdMean.toFixed(2)} из 5 ${pers.sdMean>=4.2?'— высокая (приукрашивание)':pers.sdMean>=3.6?'— умеренная':'— норма'}</span>
    <b>Проверки внимания</b><span>${pers.attFail===0?'пройдены':'провалено '+pers.attFail}</span>
    <b>Одинаковых подряд</b><span>${pers.longstring}</span></div>`;
  return h;
}
function renderOCA(pers){
  let h=`<div class="flag yellow" style="margin-bottom:12px"><span class="i">i</span><div>Это <b>иллюстративный формат</b> в стиле привычного «графика 10 шкал». Сами данные — из наших научных шкал (Big Five), а не из методики OCA. Для решений используйте научный профиль.</div></div><div class="oca">`;
  window.HR_OCA_SCALES.forEach(sc=>{
    const src=pers.scales[sc.from[0]]; if(!src)return; const v=src.oca; // -100..100
    const left=v>=0?50:50+v/2; const width=Math.abs(v)/2;
    h+=`<div class="ocarow"><div class="lb" style="text-align:right;font-size:13px;font-weight:600;color:var(--text-2)">${sc.label}</div>
      <div class="ocatrack"><div class="mid"></div><div class="bar" style="left:${left}%;width:${width}%"></div></div></div>`;
  });
  h+=`</div><div class="legend">Шкала −100…+100. Правее центра — сильнее выражено. Зелёная зона справа — «желательно», красная слева — «зона внимания».</div>`;
  return h;
}

function renderInterview(s){
  const kit=window.HR_INTERVIEW; const fam=s.d.fam; const comps=kit.families[fam]||[];
  let zones=[];
  s.flags.forEach(f=>{ if(f.level==='red') zones.push(f.text); });
  // низкие домены
  ['C','ES','H'].forEach(k=>{const sc=s.pers.scales[k];if(sc&&sc.pct<30)zones.push('Низкий балл по шкале «'+domLabel(k)+'» — попросить конкретные примеры.');});
  if(s.pers.sdMean>=3.6) zones.push('Высокая социальная желательность — задать верификационные вопросы: «приведите пример, когда вы сорвали срок / ошиблись».');
  let h=`<div class="card"><h2 style="margin-top:0">Гайд структурированного интервью</h2>
    <p>Задайте одни и те же вопросы всем кандидатам. Оценивайте каждый ответ сразу по шкале 1–5 (ниже), в конце суммируйте — так интервью добавляет больше всего к точности прогноза.</p>`;
  if(zones.length){ h+=`<h3>⚑ Обязательно проверить у этого кандидата</h3>`; zones.forEach(z=>h+=`<div class="flag yellow"><span class="i">○</span><div>${esc(z)}</div></div>`); }
  h+=`<h3>Вопросы по компетенциям</h3>`;
  comps.forEach(c=>{ h+=`<div class="qz"><div class="c">${esc(c.c)}</div><div class="q"><b>Опыт:</b> ${esc(c.B)}</div><div class="q"><b>Ситуация:</b> ${esc(c.S)}</div></div>`; });
  h+=`<details><summary>Шкала оценки ответа (BARS 1–5)</summary><div class="kv" style="padding:8px 0">`;
  kit.bars.forEach(b=>h+=`<b>${b.score}</b><span>${esc(b.text)}</span>`); h+=`</div></details>`;
  h+=`<div class="legend">${esc(kit.scoring.note)}</div>`;
  if(s.P.recommendWorkSample) h+=`<div class="flag yellow" style="margin-top:10px"><span class="i">○</span><div>Для рабочей должности: обязательно дайте практическую пробу на объекте и проверьте действующие допуски/удостоверения — это добавляет к прогнозу больше теста.</div></div>`;
  h+=`</div>`;
  return h;
}

/* ---------- Сравнение кандидатов (localStorage) ---------- */
function saveCandidate(s){
  const key='hr_candidates_'+s.P.id;
  let arr=[]; try{arr=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){}
  const rec={name:s.d.cand.name||'Без имени',ts:s.d.ts,fit:s.fit.fit,verdict:s.fit.verdict,tone:s.fit.tone,scores:s.moduleScores,invalid:s.invalid};
  arr=arr.filter(x=>!(x.name===rec.name&&x.ts===rec.ts)); arr.push(rec);
  arr=arr.slice(-20);
  try{localStorage.setItem(key,JSON.stringify(arr))}catch(e){}
}
function renderComparison(posId){
  let arr=[]; try{arr=JSON.parse(localStorage.getItem('hr_candidates_'+posId)||'[]')}catch(e){}
  if(arr.length<2) return '';
  arr.sort((a,b)=>b.fit-a.fit);
  const mods=['personality','cognitive','sjt','integrity','biodata','knowledge','attention'];
  const used=mods.filter(m=>arr.some(a=>a.scores&&a.scores[m]!=null));
  let h=`<div class="card noprint"><div class="row" style="justify-content:space-between"><h2 style="margin:0">Сравнение кандидатов (${esc(POS_LABEL(posId))})</h2><button class="btn ghost" onclick="clearCompare('${posId}')">Очистить</button></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Кандидат</th><th class="n">Fit</th><th>Вердикт</th>`;
  used.forEach(m=>h+=`<th class="n">${MODULE_LABELS[m]}</th>`); h+=`</tr></thead><tbody>`;
  arr.forEach(a=>{ h+=`<tr><td>${esc(a.name)}${a.invalid?' <span class="chip bad" style="background:var(--red-l);color:var(--red)">?</span>':''}</td>
    <td class="n"><span class="chip ${a.tone==='good'?'':a.tone==='warn'?'':''}" style="background:${a.tone==='good'?'var(--green-l)':a.tone==='warn'?'var(--amber-l)':'var(--red-l)'};color:${a.tone==='good'?'var(--green)':a.tone==='warn'?'var(--amber)':'var(--red)'}">${a.fit}</span></td>
    <td class="muted">${esc(a.verdict)}</td>`;
    used.forEach(m=>h+=`<td class="n">${a.scores&&a.scores[m]!=null?a.scores[m]:'—'}</td>`); h+=`</tr>`; });
  h+=`</tbody></table></div><div class="legend">Данные хранятся только в этом браузере. «?» — сомнительная достоверность протокола.</div></div>`;
  return h;
}
function POS_LABEL(id){return (window.HR_POSITIONS[id]||{}).label||id}
function clearCompare(id){ if(confirm('Удалить сохранённые сравнения для этой должности?')){localStorage.removeItem('hr_candidates_'+id); if(lastScored)renderReport(lastScored);} }
function setMode(m){ currentMode=m; if(lastScored)renderReport(lastScored); }

/* ---------- события ---------- */
$('#analyzeBtn').onclick=()=>analyze($('#codeInput').value);
$('#fileBtn').onclick=()=>$('#fileInput').click();
$('#fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{$('#codeInput').value=r.result.trim();analyze(r.result.trim())};r.readAsText(f)};
</script>
