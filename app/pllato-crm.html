<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRM Pllato</title>
  <link rel="icon" type="image/svg+xml" href="/pllato_favicon_64.svg?v=20260724">
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#f4f5fb}
    iframe{display:block;width:100%;height:100%;border:0;background:#f4f5fb}
    .loading{position:fixed;inset:0;z-index:2;display:grid;place-items:center;background:#f4f5fb;color:#737a91;font:600 14px Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;transition:opacity .2s}
    .loading.done{opacity:0;pointer-events:none}
    .spinner{width:34px;height:34px;margin:0 auto 12px;border:3px solid #dde0ee;border-top-color:#484ca5;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading" class="loading"><div><div class="spinner"></div>Открываем CRM Pllato…</div></div>
  <iframe
    id="crm-frame"
    src="../team.html?page=deals&pllatoApp=1"
    title="CRM Pllato"
    allow="microphone; camera; clipboard-read; clipboard-write; notifications"
  ></iframe>
  <script>
    const frame = document.getElementById('crm-frame');
    const loading = document.getElementById('loading');
    const targetPipelines = new Set(['Pllato Старт', 'Pllato Производство']);
    let pipelineChosen = false;

    function syncPllatoWorkspace() {
      let doc;
      try { doc = frame.contentDocument; } catch (_) { return; }
      if (!doc) return;

      // В App оставляем две рабочие воронки Pllato. Внутренний экран,
      // карточки сделок, календарь и действия остаются оригинальными из team.html.
      const tabs = [...doc.querySelectorAll('.pipe-tab[data-pipeline-id]')];
      if (tabs.length) {
        for (const tab of tabs) {
          const label = (tab.getAttribute('title') || '').split(' · ')[0].trim();
          tab.style.display = targetPipelines.has(label) ? '' : 'none';
        }

        const visible = tabs.filter(tab => tab.style.display !== 'none');
        const activeIsVisible = visible.some(tab => tab.classList.contains('active'));
        if (!activeIsVisible && visible.length && !pipelineChosen) {
          pipelineChosen = true;
          const start = visible.find(tab => (tab.textContent || '').includes('Pllato Старт')) || visible[0];
          start.click();
        }
      }

      const newPipeline = doc.querySelector('.pipe-tab[data-action="new-pipeline"]');
      const managePipelines = doc.querySelector('.pipe-tab[data-action="manage-pipelines"]');
      if (newPipeline) newPipeline.style.display = 'none';
      if (managePipelines) managePipelines.style.display = 'none';

      if (doc.querySelector('#app.active')) loading.classList.add('done');
    }

    frame.addEventListener('load', () => {
      syncPllatoWorkspace();
      let doc;
      try { doc = frame.contentDocument; } catch (_) { return; }
      if (!doc || !doc.documentElement) return;
      new MutationObserver(syncPllatoWorkspace).observe(doc.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class']
      });
      setTimeout(() => loading.classList.add('done'), 2500);
    });
  </script>
</body>
</html>
