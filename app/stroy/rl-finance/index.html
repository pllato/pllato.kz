<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Finance — Электромонтаж</title>
<style>
:root {
  --bg:#0d1521; --surface:#14202f; --surface-2:#172537; --surface-3:#1f3145;
  --line:#26384d; --line-2:#33485f; --text:#e9eff6; --text-dim:#9fb0c2;
  --text-mute:#6b7e92; --brand:#4d8df5; --brand-dim:#1e3a63;
  --amber:#fbbf24; --green:#34d399; --red:#f87171; --violet:#a78bfa;
  --cyan:#22d3ee; --radius:11px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,sans-serif;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}

.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:width .2s}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0}
.logo-text{font-weight:700;font-size:15px}
.logo-sub{font-size:11px;color:var(--text-mute)}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--text-dim);cursor:pointer;transition:background .15s,color .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-size:13.5px}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-dim);color:var(--brand)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-divider{height:1px;background:var(--line);margin:8px 4px}
.nav-add-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--green);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-size:13.5px;font-weight:500}
.nav-add-btn:hover{background:rgba(52,211,153,.1)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;min-height:56px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-title{font-weight:600;font-size:16px;flex:1}
.topbar-bc{font-size:12px;color:var(--text-mute)}
.topbar-actions{display:flex;gap:8px}
.page-content{flex:1;overflow-y:auto;padding:24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;transition:background .15s,opacity .15s;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--surface-3);color:var(--text-dim)}
.btn-ghost:hover{background:var(--line);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-mute);margin-bottom:14px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.kpi-label{font-size:12px;color:var(--text-mute);margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--text-mute);margin-top:4px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.chip-green{background:rgba(52,211,153,.15);color:var(--green)}
.chip-red{background:rgba(248,113,113,.15);color:var(--red)}
.chip-amber{background:rgba(251,191,36,.15);color:var(--amber)}
.chip-violet{background:rgba(167,139,250,.15);color:var(--violet)}
.chip-gray{background:var(--surface-3);color:var(--text-mute)}
.chip-blue{background:var(--brand-dim);color:var(--brand)}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);padding:8px 12px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-mute);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.ftab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:none;color:var(--text-mute);transition:all .15s}
.ftab:hover{background:var(--surface-2);color:var(--text)}
.ftab.active{background:var(--brand-dim);color:var(--brand);border-color:transparent}

/* OBJECT CARDS */
.obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.obj-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s}
.obj-card:hover{border-color:var(--line-2);transform:translateY(-1px)}
.obj-card-top{height:4px}
.obj-card-body{padding:16px}

/* DETAIL */
.detail-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
.detail-kpi{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.detail-kpi-label{font-size:11px;color:var(--text-mute);margin-bottom:4px}
.detail-kpi-val{font-size:18px;font-weight:700}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* CASH FLOW ROW */
.cf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.cf-row:last-child{border:none}
.cf-label{font-size:13px;color:var(--text-dim)}
.cf-val{font-size:13px;font-weight:600}

/* TIMELINE */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-22px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--brand);border:2px solid var(--surface)}
.tl-dot.in{background:var(--green)}
.tl-dot.out{background:var(--red)}
.tl-dot.tr{background:var(--violet)}
.tl-date{font-size:11px;color:var(--text-mute)}
.tl-desc{font-size:13px;margin-top:1px}
.tl-amount{font-size:12px;font-weight:600}

/* RISK */
.risk-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.risk-item:last-child{border:none}
.risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--line-2);border-radius:14px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-weight:700;font-size:16px}
.modal-close{background:none;border:none;color:var(--text-mute);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-mute);margin-bottom:5px;display:block}
.form-control{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.form-control:focus{border-color:var(--brand)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.radio-group{display:flex;gap:6px}
.radio-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--text-dim);text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.radio-btn.sel-in{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}
.radio-btn.sel-out{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}

/* FUND SPLIT */
.fund-split-box{background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:14px;margin-top:2px}
.fund-split-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-mute);margin-bottom:10px}
.fund-split-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}

/* WATERFALL */
.waterfall{display:flex;height:18px;border-radius:6px;overflow:hidden;gap:2px;margin:8px 0}
.wf-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.wf-legend-item{display:flex;align-items:center;gap:5px;font-size:12px}
.wf-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* FUND INPUTS */
.fund-input-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.fund-input-row:last-child{border:none}
.fund-input-name{width:90px;font-size:13px;font-weight:500}
.fund-pct-input{width:65px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:6px;padding:5px 8px;color:var(--text);font-size:13px;outline:none;text-align:right}
.fund-pct-input:focus{border-color:var(--brand)}

/* PL */
.pl-row{padding:9px 0;border-bottom:1px solid var(--line)}
.pl-row:last-child{border:none}
.pl-total{background:var(--surface-2);border-radius:9px;padding:14px 16px;margin-top:10px}

/* GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}

/* PROJ STRIP */
.proj-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.proj-mini{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:12px 14px;min-width:145px;cursor:pointer;transition:border-color .15s}
.proj-mini:hover{border-color:var(--line-2)}

/* BACK */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text-mute);font-size:13px;cursor:pointer;background:none;border:none;padding:4px 0;margin-bottom:12px;transition:color .15s}
.back-btn:hover{color:var(--text)}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:var(--brand);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(77,141,245,.45);display:flex;align-items:center;justify-content:center;transition:transform .15s;z-index:500}
.fab:hover{transform:scale(1.1)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}

/* RESPONSIVE */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
  .detail-kpis{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .sidebar{width:52px;min-width:52px}
  .logo-text,.logo-sub,.nav-item span,.nav-add-btn span{display:none}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr}
  .detail-kpis{grid-template-columns:1fr 1fr}
  .obj-grid{grid-template-columns:1fr}
}

/* DEBT ROWS */
.debt-hot td{background:rgba(248,113,113,.05)}
.debt-warn td{background:rgba(251,191,36,.04)}

/* FUND OVERVIEW */
.fo-row{margin-bottom:13px}
.fo-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.fo-bar-track{height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden;display:flex}
</style>
</head>

// ============================================================
// FINANCIAL MODEL
// ============================================================
function calcObj(obj) {
  const id = obj.id;
  const objTx = tx.filter(t => t.obj === id);
  const received = objTx.filter(t => t.dir==='in').reduce((s,t)=>s+t.amount,0);
  const paidOut = objTx.filter(t => t.dir==='out').reduce((s,t)=>s+t.amount,0);
  const matPaid = objTx.filter(t=>t.dir==='out'&&t.cat==='materials').reduce((s,t)=>s+t.amount,0);
  const salary = objTx.filter(t=>t.dir==='out'&&t.cat==='salary').reduce((s,t)=>s+t.amount,0);
  const transport = objTx.filter(t=>t.dir==='out'&&(t.cat==='transport'||t.cat==='other')).reduce((s,t)=>s+t.amount,0);

  const objDebts = debts.filter(d=>d.obj===id);
  const debtOpen = objDebts.filter(d=>d.status==='open').reduce((s,d)=>s+d.amount,0);
  const debtAll = objDebts.reduce((s,d)=>s+d.amount,0);

  const tOut = transfers.filter(t=>t.from===id).reduce((s,t)=>s+t.amount,0);
  const tIn  = transfers.filter(t=>t.to===id).reduce((s,t)=>s+t.amount,0);

  const totalCost = paidOut + debtAll;
  const profit = obj.contract - totalCost;
  const margin = obj.contract > 0 ? profit/obj.contract*100 : 0;
  const cashBalance = received - paidOut - tOut + tIn - debtOpen;

  const f = obj.funds;
  const funds = {
    materials:{pct:f.materials, allocated:received*f.materials/100, spent:matPaid},
    salary:   {pct:f.salary,    allocated:received*f.salary/100,    spent:salary},
    logistics:{pct:f.logistics, allocated:received*f.logistics/100, spent:transport},
    profit:   {pct:f.profit,    allocated:received*f.profit/100,    spent:0},
    reserve:  {pct:f.reserve,   allocated:received*f.reserve/100,   spent:0},
  };
  Object.keys(funds).forEach(k=>{ funds[k].balance = funds[k].allocated - funds[k].spent; });

  let risk = 'ok';
  if (cashBalance < -300000 || profit < 0) risk = 'hi';
  else if (cashBalance < 300000 || margin < 12) risk = 'mid';

  return {received, paidOut, matPaid, salary, transport,
          debtOpen, debtAll, tOut, tIn,
          totalCost, profit, margin, cashBalance, funds, risk};
}

function calcGlobal() {
  const all = objects.map(o=>({obj:o, c:calcObj(o)}));
  const totalCash = all.reduce((s,x)=>s+x.c.received-x.c.paidOut, 0);
  const totalDebtOpen = all.reduce((s,x)=>s+x.c.debtOpen, 0);
  const reserve = totalCash > 0 ? Math.round(totalCash * 0.35) : 0;
  const freeCash = totalCash - totalDebtOpen - reserve;
  const totalProfit = all.reduce((s,x)=>s+x.c.profit, 0);
  const riskCount = all.filter(x=>x.c.risk==='hi').length;
  const keys = ['materials','salary','logistics','profit','reserve'];
  const ft = {};
  keys.forEach(k=>{ ft[k]={allocated:0,spent:0}; });
  all.forEach(x=>keys.forEach(k=>{
    ft[k].allocated += x.c.funds[k].allocated;
    ft[k].spent += x.c.funds[k].spent;
  }));
  return {totalCash, totalDebtOpen, reserve, freeCash, totalProfit, riskCount, all, ft};
}

const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
function fmt(n){ return Math.round(n).toLocaleString('ru-RU')+' ₸'; }
function fmtS(n){
  const a=Math.abs(n), s=n<0?'−':'';
  if(a>=1000000) return s+(a/1000000).toFixed(1).replace('.',',')+' млн';
  if(a>=1000) return s+Math.round(a/1000)+' тыс';
  return s+Math.round(a)+' ₸';
}
function fmtD(str){
  if(!str) return '—';
  const d=new Date(str);
  return d.getDate()+' '+MONTHS[d.getMonth()];
}
function fmtDL(str){
  if(!str) return '—';
  const d=new Date(str);
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function daysTo(str){
  const now=new Date(TODAY), due=new Date(str);
  return Math.round((due-now)/86400000);
}
function oBy(id){ return objects.find(o=>o.id===id); }

// ============================================================

function svgGauge(value, max, color, size=180){
  const pct = max>0 ? Math.max(0,Math.min(1,value/max)) : 0;
  const r = size/2-14, cx=size/2, cy=size/2;
  const circ = Math.PI*r;
  const dash = (pct*circ).toFixed(2);
  return `<svg width="${size}" height="${Math.round(size/2)+22}" viewBox="0 0 ${size} ${Math.round(size/2)+22}" style="display:block">
    <path d="M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="var(--surface-3)" stroke-width="14" stroke-linecap="round"/>
    <path d="M ${cx-r},${cy} A ${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="${dash} ${circ.toFixed(2)}"/>
    <text x="${cx}" y="${cy+2}" text-anchor="middle" fill="${color}" font-size="22" font-weight="700" font-family="Inter,sans-serif">${Math.round(pct*100)}%</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" fill="var(--text-mute)" font-size="11" font-family="Inter,sans-serif">${fmtS(value)} / ${fmtS(max)}</text>
  </svg>`;
}

function bar(value, max, color, h=7){
  const pct = max>0 ? Math.max(0,Math.min(100,value/max*100)).toFixed(1) : 0;
  return `<div style="background:var(--surface-3);border-radius:4px;height:${h}px;overflow:hidden">
    <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:.3s"></div>
  </div>`;
}

function buildDonut(slices, size=130){
  const total = slices.reduce((s,x)=>s+x.v,0);
  if(!total) return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-12}" fill="none" stroke="var(--surface-3)" stroke-width="18"/></svg>`;
  const cx=size/2, cy=size/2, ro=size/2-10, ri=size/2-28;
  let angle=-Math.PI/2, paths='';
  slices.forEach(s=>{
    const a = s.v/total*Math.PI*2;
    const x1=cx+ro*Math.cos(angle), y1=cy+ro*Math.sin(angle);
    const x2=cx+ro*Math.cos(angle+a), y2=cy+ro*Math.sin(angle+a);
    const ix1=cx+ri*Math.cos(angle), iy1=cy+ri*Math.sin(angle);
    const ix2=cx+ri*Math.cos(angle+a), iy2=cy+ri*Math.sin(angle+a);
    const lg=a>Math.PI?1:0;
    paths+=`<path d="M ${ix1.toFixed(1)},${iy1.toFixed(1)} L ${x1.toFixed(1)},${y1.toFixed(1)} A ${ro},${ro} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L ${ix2.toFixed(1)},${iy2.toFixed(1)} A ${ri},${ri} 0 ${lg},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${s.color}" opacity=".85"/>`;
    angle+=a;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">${paths}</svg>`;
}

      <div class="detail-kpi"><div class="detail-kpi-label">Сальдо кассы</div><div class="detail-kpi-val" style="color:${bcol}">${c.cashBalance>=0?'+':''}${fmtS(c.cashBalance)}</div></div>

    <div class="tabs" id="obj-tabs">
      ${[['overview','Обзор'],['pl','P&L'],['funds','Фонды'],['transactions','Транзакции']].map(([k,l])=>
        `<button class="tab ${activeObjTab===k?'active':''}" onclick="setObjTab('${id}','${k}')">${l}</button>`
      ).join('')}

  `;
  renderObjTab(id);
}

function setObjTab(id,tab){
  activeObjTab=tab;
  document.querySelectorAll('#obj-tabs .tab').forEach((t,i)=>{
    const k=['overview','pl','funds','transactions'][i];
    t.classList.toggle('active',k===tab);
  });
  renderObjTab(id);
}

function renderObjTab(id){
  const obj=oBy(id); if(!obj) return;
  const c=calcObj(obj);
  const el=document.getElementById('obj-tab-body'); if(!el) return;
  if(activeObjTab==='overview') el.innerHTML=renderOverview(obj,c);
  else if(activeObjTab==='pl') el.innerHTML=renderPL(obj,c);
  else if(activeObjTab==='funds') el.innerHTML=renderFunds(obj,c,id);
  else el.innerHTML=renderTxTab(obj,c,id);
}

// --- OVERVIEW TAB ---
function renderOverview(obj,c){
  const tOut=transfers.filter(t=>t.from===obj.id);
  const tIn =transfers.filter(t=>t.to===obj.id);
  const allTx=tx.filter(t=>t.obj===obj.id).sort((a,b)=>new Date(b.date)-new Date(a.date));

  let riskMsg='Проект в хорошем состоянии.';
  if(c.profit<0) riskMsg='Проект убыточен! Затраты превысили сумму договора. Срочно пересмотреть смету.';
  else if(c.cashBalance<-300000) riskMsg='Касса проекта в минусе — нужна переброска или аванс.';
  else if(c.margin<12) riskMsg=`Маржа ${c.margin.toFixed(0)}% ниже нормы. Контролируйте расходы.`;
  else if(c.cashBalance<300000) riskMsg='Сальдо кассы низкое. Следите за ликвидностью.';

  const donutSlices = FUND_KEYS.map(k=>({v:c.funds[k].allocated,color:FUND_COLORS[k]}));
  const donutSvg = buildDonut(donutSlices,130);

  return `<div class="two-col">
    <div style="display:flex;flex-direction:column;gap:16px">
      <!-- GAUGE -->
      <div class="card">
        <div class="card-title">Выполнение договора</div>
        <div class="gauge-wrap">
          ${svgGauge(c.received,obj.contract,obj.color,180)}
          <div style="font-size:12px;color:var(--text-mute);margin-top:6px">Получено от заказчика</div>
        </div>
        ${c.received<obj.contract?`<div style="text-align:center;font-size:12px;color:var(--text-mute);margin-top:6px">Ожидается ещё: <strong style="color:var(--text)">${fmt(obj.contract-c.received)}</strong></div>`:''}
      </div>

      <!-- CASH FLOW -->
      <div class="card">
        <div class="card-title">Движение денег</div>
        <div class="cf-row"><span class="cf-label">▼ Получено от заказчика</span><span class="cf-val" style="color:var(--green)">+${fmt(c.received)}</span></div>
        <div class="cf-row"><span class="cf-label">▲ Оплачено расходы</span><span class="cf-val" style="color:var(--red)">−${fmt(c.paidOut)}</span></div>
        ${tOut.map(t=>`<div class="cf-row"><span class="cf-label">→ Перебр. на ${oBy(t.to)?.name||t.to}</span><span class="cf-val" style="color:var(--red)">−${fmt(t.amount)}</span></div>`).join('')}
        ${tIn.map(t=>`<div class="cf-row"><span class="cf-label">← Перебр. с ${oBy(t.from)?.name||t.from}</span><span class="cf-val" style="color:var(--green)">+${fmt(t.amount)}</span></div>`).join('')}
        <div class="cf-row"><span class="cf-label">⊘ Долги поставщикам (откр.)</span><span class="cf-val" style="color:var(--red)">−${fmt(c.debtOpen)}</span></div>
        <div class="cf-row" style="border-top:2px solid var(--line-2);margin-top:4px;padding-top:10px">
          <span class="cf-label" style="font-weight:700;color:var(--text)">= Сальдо кассы</span>
          <span class="cf-val" style="font-size:15px;color:${c.cashBalance<0?'var(--red)':c.cashBalance<300000?'var(--amber)':'var(--green)'}">${c.cashBalance>=0?'+':''}${fmt(c.cashBalance)}</span>
        </div>
      </div>

      <!-- RISK -->
      <div class="card" style="border-color:${c.risk==='hi'?'rgba(248,113,113,.3)':c.risk==='mid'?'rgba(251,191,36,.3)':'var(--line)'}">
        <div class="card-title">Оценка рисков</div>
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:42px;height:42px;border-radius:50%;background:${c.risk==='hi'?'rgba(248,113,113,.15)':c.risk==='mid'?'rgba(251,191,36,.15)':'rgba(52,211,153,.15)'};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
            ${c.risk==='hi'?'⚡':c.risk==='mid'?'⚠':'✓'}
          </div>
          <div>
            <div style="font-weight:600;margin-bottom:4px">${c.risk==='hi'?'Высокий риск':c.risk==='mid'?'Средний риск':'Норма'}</div>
            <div style="font-size:13px;color:var(--text-dim)">${riskMsg}</div>
            <div style="margin-top:8px;font-size:12px;color:var(--text-mute)">Маржа: <strong>${c.margin.toFixed(1)}%</strong> &nbsp;·&nbsp; Сальдо: <strong>${fmtS(c.cashBalance)}</strong></div>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px">
      <!-- FUND DONUT -->
      <div class="card">
        <div class="card-title">Распределение аванса по фондам</div>
        <div style="display:flex;gap:16px;align-items:flex-start">
          ${donutSvg}
          <div style="flex:1;padding-top:6px">
            ${FUND_KEYS.map(k=>{
              const f=c.funds[k];
              return `<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
                <div style="width:8px;height:8px;border-radius:50%;background:${FUND_COLORS[k]};flex-shrink:0"></div>
                <span style="font-size:12px;flex:1">${FUND_LABELS[k]}</span>
                <span style="font-size:11px;color:var(--text-mute)">${obj.funds[k]}%</span>

        </div>
      </div>

      <!-- TIMELINE -->
      <div class="card">
        <div class="card-title">Лента событий</div>
        <div class="timeline">
          ${[...allTx.slice(0,8), ...transfers.filter(t=>t.from===obj.id||t.to===obj.id)].sort((a,b)=>new Date(b.date||b.date)-new Date(a.date||a.date)).slice(0,10).map(item=>{
            if(item.dir){
              return `<div class="tl-item">
                <div class="tl-dot ${item.dir}"></div>
                <div class="tl-date">${fmtD(item.date)}</div>
                <div class="tl-desc">${item.desc}</div>
                <div class="tl-amount" style="color:${item.dir==='in'?'var(--green)':'var(--red)'}">${item.dir==='in'?'+':'−'}${fmt(item.amount)}</div>
              </div>`;
            } else {
              const dir = item.from===obj.id?'out':'in';
              const other = dir==='out'?oBy(item.to):oBy(item.from);
              return `<div class="tl-item">
                <div class="tl-dot tr"></div>
                <div class="tl-date">${fmtD(item.date)}</div>
                <div class="tl-desc"><span style="font-size:11px;background:rgba(167,139,250,.15);color:var(--violet);padding:1px 6px;border-radius:20px">⇄ Переброска</span> ${item.note}</div>
                <div class="tl-amount" style="color:${dir==='out'?'var(--red)':'var(--green)'}">${dir==='out'?'−':'+'}${fmt(item.amount)}</div>
              </div>`;
            }
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// --- P&L TAB ---
function renderPL(obj,c){
  const maxV = obj.contract||1;
  const bp = v => Math.max(0,Math.min(100,Math.abs(v)/maxV*100)).toFixed(1);
  const rows=[
    {label:'Материалы (оплачено)',  v:c.matPaid,   color:'#4d8df5'},
    {label:'Материалы в долг',      v:c.debtAll,   color:'#6366f1'},
    {label:'Зарплата',              v:c.salary,    color:'#34d399'},
    {label:'Логистика / прочее',    v:c.transport, color:'#22d3ee'},
  ];
  const totalC = rows.reduce((s,r)=>s+r.v,0);
  return `<div class="card" style="max-width:680px">
    <div class="card-title">P&L — ${obj.name}</div>

    <div class="pl-row">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:var(--text-dim)">Сумма договора</span>
        <span style="font-size:14px;font-weight:700">${fmt(obj.contract)}</span>
      </div>
      ${bar(obj.contract,maxV,'var(--brand)',6)}
    </div>

    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-mute);padding:8px 0 6px;border-bottom:1px solid var(--line)">Затраты</div>

    ${rows.map(r=>`<div class="pl-row">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:var(--text-dim)">${r.label}</span>
        <span style="font-size:13px;font-weight:600;color:var(--red)">− ${fmt(r.v)}</span>
      </div>
      <div style="background:var(--surface-3);border-radius:3px;height:5px;overflow:hidden">
        <div style="width:${bp(r.v)}%;height:100%;background:${r.color}"></div>
      </div>
    </div>`).join('')}

    <div style="height:1px;background:var(--line-2);margin:10px 0 14px"></div>
    <div class="pl-total">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text-dim)">Итого затрат</span>
        <span style="font-weight:600;color:var(--red)">− ${fmt(c.totalCost)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:16px;font-weight:700">= Прибыль</span>
        <span style="font-size:20px;font-weight:800;color:${c.profit>=0?'var(--green)':'var(--red)'}">${c.profit>=0?'+':''}${fmt(c.profit)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--text-mute)">Маржинальность</span>
        <span style="font-size:14px;font-weight:700;color:${c.margin>=15?'var(--green)':c.margin>=10?'var(--amber)':'var(--red)'}">${c.margin.toFixed(1)}%</span>
      </div>
    </div>

    ${c.debtOpen>0?`<div style="margin-top:16px;padding:12px 14px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);border-radius:9px;font-size:13px">
      <strong style="color:var(--red)">⚠ Открытые долги поставщикам: ${fmt(c.debtOpen)}</strong><br>
      <span style="color:var(--text-mute);font-size:12px">Включены в затраты по методу начисления. Физически ещё не выплачены.</span>
    </div>`:''}

    <div style="margin-top:20px">

      <div style="display:flex;height:14px;border-radius:6px;overflow:hidden;gap:1px">

      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
        ${rows.map(r=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mute)">

      </div>
    </div>
  </div>`;
}

    materials: c.funds.materials.balance<0?'Перерасход! Нужно доп. финансирование.':c.funds.materials.balance===0?'Фонд выбран полностью.':'Остаток есть — можно докупить материалы.',

          <thead><tr><th>Фонд</th><th>Выделено</th><th>Потрачено</th><th>Остаток</th><th>Заполнено</th><th>Статус</th></tr></thead>
          <tbody>
            ${FUND_KEYS.map(k=>{
              const f=c.funds[k];
              const pct=f.allocated>0?f.spent/f.allocated*100:0;
              const st = f.balance<0?'<span class="chip chip-red">Перерасход</span>':pct>=90?'<span class="chip chip-amber">На исходе</span>':'<span class="chip chip-green">✓ Норма</span>';
              return `<tr>
                <td><span style="display:inline-flex;align-items:center;gap:7px">
                  <span style="width:8px;height:8px;border-radius:50%;background:${FUND_COLORS[k]}"></span>
                  <strong>${FUND_LABELS[k]}</strong>
                </span></td>
                <td style="white-space:nowrap">${fmt(f.allocated)}</td>
                <td style="color:${f.spent>0?'var(--red)':'var(--text-mute)'}; white-space:nowrap">${f.spent>0?fmt(f.spent):'—'}</td>
                <td style="font-weight:600;color:${f.balance<0?'var(--red)':f.balance===0?'var(--amber)':'var(--green)'};white-space:nowrap">${f.balance>=0?'+':''}${fmt(f.balance)}</td>
                <td style="min-width:100px">${bar(f.spent,f.allocated||1,FUND_COLORS[k],6)}<span style="font-size:10px;color:var(--text-mute)">${pct.toFixed(0)}%</span></td>
                <td>${st}</td>
              </tr>`;
            }).join('')}
            <tr style="background:var(--surface-2)">
              <td><strong>Итого</strong></td>
              <td><strong style="white-space:nowrap">${fmt(FUND_KEYS.reduce((s,k)=>s+c.funds[k].allocated,0))}</strong></td>
              <td><strong style="color:var(--red);white-space:nowrap">−${fmt(c.paidOut)}</strong></td>
              <td><strong style="white-space:nowrap">${fmt(FUND_KEYS.reduce((s,k)=>s+c.funds[k].allocated,0)-c.paidOut)}</strong></td>
              <td colspan="2"></td>
            </tr>
          </tbody>
        </table>
      </div>
      ${c.received===0?`<div style="text-align:center;padding:16px;color:var(--text-mute);font-size:13px">Нет поступлений — запишите аванс, чтобы увидеть разбивку по фондам.</div>`:''}
    </div>

    <!-- INSIGHTS -->
    <div class="card">
      <div class="card-title">Комментарии</div>
      ${FUND_KEYS.map(k=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">
        <div style="width:8px;height:8px;border-radius:50%;background:${FUND_COLORS[k]};margin-top:4px;flex-shrink:0"></div>
        <div>
          <strong style="font-size:13px">${FUND_LABELS[k]}</strong>
          <div style="font-size:13px;color:var(--text-mute);margin-top:2px">${insights[k]}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function updFund(id,key,val){
  const obj=oBy(id); if(!obj) return;
  obj.funds[key]=Math.max(0,Math.min(100,parseFloat(val)||0));
  const sum=FUND_KEYS.reduce((s,k)=>s+(obj.funds[k]||0),0);
  const el=document.getElementById(`fsum-${id}`);
  if(el) el.innerHTML=`Сумма: <strong style="color:${sum===100?'var(--green)':'var(--red)'}">${sum}%</strong>${sum!==100?`<button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="normFunds('${id}')">Нормализовать</button>`:''}`;
  saveState();
}

function normFunds(id){
  const obj=oBy(id); if(!obj) return;
  const sum=FUND_KEYS.reduce((s,k)=>s+(obj.funds[k]||0),0);
  if(!sum) return;
  let rem=100;
  FUND_KEYS.forEach((k,i)=>{
    if(i<FUND_KEYS.length-1){ obj.funds[k]=Math.round(obj.funds[k]/sum*100); rem-=obj.funds[k]; }
    else obj.funds[k]=rem;
  });
  saveState(); renderDetail(id);
}

// --- TRANSACTIONS TAB ---
function renderTxTab(obj,c,id){
  const cat = activeTxCat;
  const filtered = tx.filter(t=>t.obj===id&&(cat==='all'||t.cat===cat)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const objDebts = debts.filter(d=>d.obj===id);
  const objTr = transfers.filter(t=>t.from===id||t.to===id);

  const cats=[['all','Все'],['prepayment','Предоплата'],['stage','Этапы'],['final','Финал'],['materials','Материалы'],['salary','Зарплата'],['transport','Логистика']];
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="filter-tabs" style="margin-bottom:0">
        ${cats.map(([v,l])=>`<button class="ftab ${cat===v?'active':''}" onclick="setTxCat('${id}','${v}')">${l}</button>`).join('')}
      </div>
      <button class="btn btn-primary btn-sm" onclick="openModal('${id}')">＋ Транзакция</button>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Дата</th><th>Тип</th><th>Категория</th><th>Описание</th><th>Сумма</th></tr></thead>
          <tbody>
            ${filtered.length===0
              ?`<tr><td colspan="5" style="text-align:center;color:var(--text-mute);padding:24px">Нет транзакций</td></tr>`
              :filtered.map(t=>`<tr>
                <td style="color:var(--text-mute);white-space:nowrap">${fmtD(t.date)}</td>
                <td>${t.dir==='in'?'<span class="chip chip-green">Приход</span>':'<span class="chip chip-red">Расход</span>'}</td>
                <td><span style="font-size:12px;color:var(--text-dim)">${catL(t.cat)}</span></td>
                <td style="color:var(--text-dim);font-size:13px">${t.desc}</td>
                <td style="font-weight:600;white-space:nowrap;color:${t.dir==='in'?'var(--green)':'var(--red)'}">${t.dir==='in'?'+':'−'}${fmt(t.amount)}</td>
              </tr>`).join('')
            }
          </tbody>
        </table>
      </div>
    </div>

    ${objDebts.length?`<div class="card" style="margin-bottom:16px">
      <div class="card-title">Долги поставщикам</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Поставщик</th><th>Сумма</th><th>Взято</th><th>Срок</th><th>Статус</th></tr></thead>
          <tbody>
            ${objDebts.map(d=>`<tr>
              <td>${d.supplier}</td>
              <td style="color:var(--red);font-weight:600;white-space:nowrap">${fmt(d.amount)}</td>
              <td style="color:var(--text-mute)">${fmtD(d.taken)}</td>
              <td>${fmtD(d.due)}</td>
              <td>${d.status==='paid'?'<span class="chip chip-green">Оплачен</span>':'<span class="chip chip-amber">Открыт</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`:''}

    ${objTr.length?`<div class="card">
      <div class="card-title">Переброски</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Дата</th><th>Направление</th><th>Сумма</th><th>Примечание</th></tr></thead>
          <tbody>
            ${objTr.map(t=>`<tr>
              <td style="color:var(--text-mute);white-space:nowrap">${fmtD(t.date)}</td>
              <td>${t.from===id
                ?`<span style="color:var(--red)">→ ${oBy(t.to)?.name||t.to}</span>`
                :`<span style="color:var(--green)">← ${oBy(t.from)?.name||t.from}</span>`}</td>
              <td style="font-weight:600;white-space:nowrap;color:${t.from===id?'var(--red)':'var(--green)'}">${t.from===id?'−':'+'}${fmt(t.amount)}</td>
              <td style="color:var(--text-mute);font-size:12px">${t.note}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`:''}
  </div>`;
}

function setTxCat(id,cat){
  activeTxCat=cat;
  const el=document.getElementById('obj-tab-body');
  if(el){ const obj=oBy(id); el.innerHTML=renderTxTab(obj,calcObj(obj),id); }
}

// ============================================================
// MODAL
// ============================================================
function openModal(preselObj){
  _modalObjId = preselObj||null;
  _modalTab='tx';
  buildModal();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function buildModal(){
  document.getElementById('modal-body').innerHTML=`
    <div class="tabs" style="margin-bottom:16px">
      <button class="tab ${_modalTab==='tx'?'active':''}" onclick="_modalTab='tx';buildModal()">Транзакция</button>
      <button class="tab ${_modalTab==='tr'?'active':''}" onclick="_modalTab='tr';buildModal()">Переброска</button>
    </div>
    <div id="mtab"></div>
  `;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="submitModal()">Сохранить</button>
  `;
  if(_modalTab==='tx') buildTxForm();
  else buildTrForm();
}

function buildTxForm(){
  const dir=_modalDir||'in';
  const selObjId=_modalObjId||objects[0]?.id;
  const selObj=oBy(selObjId);
  const inCats=[{v:'prepayment',l:'Предоплата'},{v:'stage',l:'Этап'},{v:'final',l:'Финальная оплата'},{v:'other',l:'Прочее'}];
  const outCats=[{v:'materials',l:'Материалы'},{v:'salary',l:'Зарплата'},{v:'transport',l:'Логистика'},{v:'other',l:'Прочее'}];
  const cats=dir==='in'?inCats:outCats;
  const amount=parseFloat(_modalAmount)||0;

  let splitHtml='';
  if(dir==='in'&&selObj&&amount>0){
    splitHtml=`<div class="fund-split-box">
      <div class="fund-split-title">Разбивка по фондам при поступлении ${fmt(amount)}</div>
      ${FUND_KEYS.map(k=>{
        const alloc=amount*selObj.funds[k]/100;
        return `<div class="fund-split-row">
          <span style="color:${FUND_COLORS[k]};width:85px">${FUND_LABELS[k]}</span>
          <span style="color:var(--text-mute);width:28px;text-align:right">${selObj.funds[k]}%</span>
          <div style="flex:1;margin:0 10px;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden">
            <div style="width:${selObj.funds[k]}%;height:100%;background:${FUND_COLORS[k]}"></div>
          </div>
          <span style="font-weight:600;color:${FUND_COLORS[k]};white-space:nowrap">${fmt(alloc)}</span>
        </div>`;
      }).join('')}
      <div style="border-top:1px solid var(--line);margin-top:7px;padding-top:7px;display:flex;justify-content:space-between;font-size:12px">
        <span style="color:var(--text-mute)">Итого</span><span style="font-weight:600">${fmt(amount)}</span>
      </div>
    </div>`;
  }

  document.getElementById('mtab').innerHTML=`
    <div class="form-group">
      <label class="form-label">Объект</label>
      <select class="form-control" id="m-obj" onchange="_modalObjId=this.value;buildTxForm()">
        ${objects.map(o=>`<option value="${o.id}" ${selObjId===o.id?'selected':''}>${o.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-control" type="date" id="m-date" value="${TODAY}">
      </div>
      <div class="form-group">
        <label class="form-label">Тип</label>
        <div class="radio-group">
          <button class="radio-btn ${dir==='in'?'sel-in':''}" onclick="_modalDir='in';buildTxForm()">▼ Приход</button>
          <button class="radio-btn ${dir==='out'?'sel-out':''}" onclick="_modalDir='out';buildTxForm()">▲ Расход</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Категория</label>
        <select class="form-control" id="m-cat">
          ${cats.map(c=>`<option value="${c.v}">${c.l}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Сумма, ₸</label>
        <input class="form-control" type="number" id="m-amount" value="${_modalAmount||''}" placeholder="0" oninput="_modalAmount=this.value;buildTxForm()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <input class="form-control" type="text" id="m-desc" placeholder="Краткое описание...">
    </div>
    ${splitHtml}
  `;
}

function buildTrForm(){
  const fromId=_trFrom||_modalObjId||objects[0]?.id;
  const activeObjs=objects.filter(o=>o.status!=='planning');
  document.getElementById('mtab').innerHTML=`
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Откуда</label>
        <select class="form-control" id="tr-from" onchange="_trFrom=this.value;buildTrForm()">
          ${activeObjs.map(o=>`<option value="${o.id}" ${fromId===o.id?'selected':''}>${o.name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Куда</label>
        <select class="form-control" id="tr-to">
          ${activeObjs.filter(o=>o.id!==fromId).map(o=>`<option value="${o.id}">${o.name}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Сумма, ₸</label>
        <input class="form-control" type="number" id="tr-amount" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-control" type="date" id="tr-date" value="${TODAY}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Примечание</label>
      <input class="form-control" type="text" id="tr-note" placeholder="Причина переброски...">
    </div>
  `;
}

function submitModal(){
  if(_modalTab==='tx'){
    const objId=document.getElementById('m-obj')?.value;
    const date=document.getElementById('m-date')?.value;
    const dir=_modalDir||'in';
    const cat=document.getElementById('m-cat')?.value;
    const amount=parseFloat(document.getElementById('m-amount')?.value);
    const desc=document.getElementById('m-desc')?.value||'';
    if(!objId||!date||!cat||!amount||amount<=0){ alert('Заполните все поля'); return; }
    tx.push({id:'t'+Date.now(),obj:objId,dir,cat,amount,date,desc});
  } else {
    const from=document.getElementById('tr-from')?.value;
    const to=document.getElementById('tr-to')?.value;
    const amount=parseFloat(document.getElementById('tr-amount')?.value);
    const date=document.getElementById('tr-date')?.value;
    const note=document.getElementById('tr-note')?.value||'';
    if(!from||!to||!amount||amount<=0||!date){ alert('Заполните все поля'); return; }
    if(from===to){ alert('Откуда и куда совпадают'); return; }
    transfers.push({id:'tr'+Date.now(),from,to,amount,date,note});
  }
  saveState();
  _modalAmount='';
  _modalDir='in';
  closeModal();
  router();
}

window.addEventListener('hashchange', router);
window.addEventListener('load', ()=>{
  if(!window.location.hash) window.location.hash='#dashboard';
  router();
});
