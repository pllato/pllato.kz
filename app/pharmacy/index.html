<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c1512">
<title>Зубная аптека Revyline — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root{
  --bg:#0c1512; --bg2:#101d18; --panel:#13211b; --panel2:#172a22;
  --line:#1e3329; --line2:#2a4636;
  --txt:#e9f3ee; --muted:#90a89c; --muted2:#65806f;
  --accent:#10b981; --accent2:#34d399; --accent-soft:#10b98122;
  --green:#16a34a; --green-soft:#16a34a22;
  --amber:#d97706; --amber-soft:#d9770622;
  --red:#dc2626; --red-soft:#dc262622;
  --blue:#2563eb; --blue-soft:#2563eb22;
  --cyan:#0891b2; --violet:#7c3aed; --pink:#db2777;
  --wa:#25d366; --ig:#e1306c;
  --radius:14px; --radius-sm:10px;
  --shadow:0 10px 30px -12px rgba(0,0,0,.55);
  --shadow-lg:0 24px 60px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:radial-gradient(1200px 700px at 82% -10%,#163328 0%,transparent 55%),
             radial-gradient(900px 600px at -10% 110%,#10231a 0%,transparent 50%),var(--bg);
  color:var(--txt);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#274536;border-radius:8px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
.svg-i{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:none}
.svg-i.sm{width:15px;height:15px}.svg-i.lg{width:22px;height:22px}
.hide{display:none!important}

/* ===== APP SHELL ===== */
.shell{display:grid;grid-template-columns:252px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,#0f1c16,#0c1512);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:16px 16px 14px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px}
.brand-logo{width:42px;height:42px;border-radius:11px;background:transparent;
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px;flex:0 0 auto}
.brand-logo svg{width:100%;height:100%;display:block;filter:drop-shadow(0 4px 10px rgba(26,167,232,.35))}
.brand-name{font-weight:800;font-size:17px;letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
.company-pill{margin-top:13px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px}
.company-pill .cn{font-weight:600;font-size:13px}
.company-pill .cc{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.company-pill .cd{margin-left:auto;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.nav{padding:8px 10px;flex:1;overflow-y:auto}
.nav-group{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);padding:13px 12px 5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:var(--muted);
  font-size:13.5px;font-weight:500;transition:.13s;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--panel);color:var(--txt)}
.nav-item.active{background:linear-gradient(90deg,var(--accent-soft),transparent);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--accent2)}
.nav-item .badge{margin-left:auto;background:var(--accent);color:#06231a;font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px}
.nav-item .badge.alt{background:var(--amber);color:#2a1503}
.side-bottom{padding:12px;border-top:1px solid var(--line)}
.user-chip{display:flex;align-items:center;gap:10px;padding:9px;border-radius:11px;background:var(--panel);border:1px solid var(--line)}
.user-chip .av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none}
.user-chip .ui{flex:1;min-width:0;display:flex;flex-direction:column}
.user-chip .un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip .ut{font-size:11px;color:var(--muted)}

/* ===== MAIN ===== */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{min-height:62px;display:flex;align-items:center;gap:14px;padding:10px 22px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:#0c1512cc;backdrop-filter:blur(10px);z-index:20;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--muted);margin-top:1px}
.topbar .search{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;width:220px;color:var(--muted)}
.topbar .search input{background:none;border:none;outline:none;color:var(--txt);width:100%;font-size:13px}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{padding:6px 11px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--accent);color:#06231a}
.icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:var(--muted);
  background:var(--panel);border:1px solid var(--line);position:relative}
.icon-btn:hover{color:var(--txt);border-color:var(--line2)}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--panel)}
.docs-wrap{position:relative}
.docs-pop{position:absolute;top:48px;right:0;width:344px;max-width:86vw;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:8px;z-index:90;animation:dpop .14s ease}
@keyframes dpop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.docs-pop .dp-h{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 11px;border-bottom:1px solid var(--line);margin-bottom:6px}
.docs-pop .dp-h b{font-size:14px}
.docs-pop .dp-h .dp-cnt{font-size:11px;color:var(--muted);font-weight:600}
.doc-row{display:flex;gap:11px;align-items:center;padding:9px 10px;border-radius:10px;cursor:pointer;text-decoration:none;color:inherit}
.doc-row:hover{background:var(--accent-soft)}
.doc-row .di{width:40px;height:40px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;background:var(--red-soft);color:var(--red);font-weight:800;font-size:10px;letter-spacing:.03em}
.doc-row .dt{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row .ds{font-size:11.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-row .dl{margin-left:auto;color:var(--muted);flex:0 0 auto}
.docs-pop .dp-empty{padding:22px 14px;text-align:center;color:var(--muted);font-size:12.5px}
.docs-pop .dp-foot{margin-top:6px;padding:9px 10px 5px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center}
.role-pick{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:12.5px;font-weight:600;color:var(--txt)}
.role-pick select{background:none;border:none;outline:none;color:var(--txt);font-weight:700;font-size:12.5px}
.content{padding:22px 24px 70px;overflow-y:auto}

/* ===== PRIMITIVES ===== */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;
  background:var(--panel);border:1px solid var(--line);color:var(--txt);transition:.14s}
.btn:hover{border-color:var(--line2);background:var(--panel2)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#06231a;box-shadow:0 8px 20px -8px #10b981aa}
.btn.primary:hover{filter:brightness(1.07)}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.ghost{background:transparent}
.btn.danger{color:#fca5a5;border-color:#5b1d1d;background:#2a1212}
.btn:disabled{opacity:.5;cursor:not-allowed}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:var(--panel2);color:var(--muted);border:1px solid var(--line);white-space:nowrap}
.tag.green{background:var(--green-soft);color:#4ade80;border-color:#16653433}
.tag.amber{background:var(--amber-soft);color:#fbbf24;border-color:#92400e33}
.tag.red{background:var(--red-soft);color:#f87171;border-color:#7f1d1d33}
.tag.blue{background:var(--blue-soft);color:#93c5fd;border-color:#1e40af33}
.tag.violet{background:#7c3aed22;color:#c4b5fd;border-color:#5b21b633}
.tag.cyan{background:#0891b222;color:#67e8f9;border-color:#155e7533}
.tag.pink{background:#db277722;color:#f9a8d4;border-color:#9d174d33}
.tag.wa{background:#25d36622;color:#5ee89a;border-color:#15803d44}
.tag.ig{background:#e1306c22;color:#f4a6c4;border-color:#9d174d44}
.dot-i{width:8px;height:8px;border-radius:50%;display:inline-block}
.muted{color:var(--muted)}.muted2{color:var(--muted2)}
.row{display:flex;align-items:center;gap:10px}
.wrap{flex-wrap:wrap}
.spacer{flex:1}
.section-gap{margin-top:20px}
.set-wrap>*+*{margin-top:22px}
.set-wrap .grid-2{gap:22px}
.set-wrap .panel-b{padding:18px 20px}
h2.sec{font-size:15px;font-weight:700;margin:2px 0 12px}

.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px}
.cards-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.kpi{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;position:relative;overflow:hidden;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.28)}
.kpi:hover{border-color:var(--line2);transform:translateY(-2px)}
.kpi .k-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;margin-bottom:12px}
.kpi .k-lbl{font-size:12px;color:var(--muted);font-weight:500}
.kpi .k-val{font-size:23px;font-weight:800;letter-spacing:-.6px;margin-top:3px}
.kpi .k-sub{font-size:11.5px;margin-top:7px;display:flex;align-items:center;gap:5px}
.up{color:#4ade80}.down{color:#f87171}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
.panel-h h3{font-size:14.5px;font-weight:700}
.panel-h .ph-sub{font-size:12px;color:var(--muted)}
.panel-b{padding:16px 18px}
.grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:24px}
.grid-2b{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted2);
  font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr.clickable{transition:.1s}
.tbl tbody tr.clickable:hover{background:var(--panel2);cursor:pointer}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.avatar-xs{width:28px;height:28px;border-radius:50%;display:inline-grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:none}
.cell-name{display:flex;align-items:center;gap:9px}
.mini-bar{height:6px;border-radius:6px;background:var(--line);overflow:hidden;min-width:64px}
.mini-bar>i{display:block;height:100%;border-radius:6px}

.toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:14px}
.fld-in{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 11px;color:var(--muted)}
.fld-in input,.fld-in select{background:none;border:none;outline:none;color:var(--txt);font-size:13px}
select.sel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 11px;color:var(--txt);font-size:13px;outline:none}

/* ===== KANBAN ===== */
.kanban{display:flex;gap:13px;overflow-x:auto;padding-bottom:14px}
.kcol{flex:0 0 280px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 210px)}
.kcol.drop-hot{border-color:var(--accent2);box-shadow:0 0 0 2px var(--accent-soft) inset}
.kcol-h{padding:12px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.kcol-h .kc-name{font-size:12.5px;font-weight:700}
.kcol-h .kc-count{font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-weight:600}
.kcol-h .kc-sum{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
.kcol-h .kc-tools{margin-left:auto;display:flex;gap:1px}
.kc-tool{font-size:12px;color:var(--muted2);padding:1px 5px;border-radius:5px;line-height:1.5}
.kc-tool:hover{background:var(--panel);color:var(--txt)}
.kcol.kcol-add{flex:0 0 200px;background:transparent;border:1px dashed var(--line2);align-items:flex-start;padding:10px;max-height:none}
.kcol-b{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;flex:1;min-height:60px}
.kcard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:11px;padding:11px;
  cursor:grab;transition:.13s;border-left:3px solid var(--accent2)}
.kcard.b2b{border-left-color:var(--violet)}
.kcard:hover{border-color:var(--line2);transform:translateY(-1px);box-shadow:var(--shadow)}
.kcard:active{cursor:grabbing}.kcard.dragging{opacity:.4}
.kcard .kc-top{display:flex;justify-content:space-between;align-items:start;gap:8px}
.kcard .kc-client{font-size:13px;font-weight:600;line-height:1.3}
.kcard .kc-prod{font-size:11.5px;color:var(--muted);margin-top:3px}
.kcard .kc-sum{font-size:15px;font-weight:800;margin-top:9px;letter-spacing:-.3px}
.kcard .kc-meta{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.kcard .kc-days{margin-left:auto;font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:4px}
/* доска задач: ровная фиксированная ширина колонок */
#tkBoard .kcol{flex:0 0 286px;max-width:286px}
#tkBoard .kcol.kcol-add{flex:0 0 200px;max-width:200px}

/* ===== INBOX ===== */
.inbox{display:grid;grid-template-columns:340px 1fr 300px;gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;height:calc(100vh - 150px);background:var(--panel)}
.ib-channels{border-right:1px solid var(--line);overflow-y:auto;background:var(--bg2)}
.ib-ch-group{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);padding:13px 14px 5px;font-weight:700}
.ib-ch{display:flex;align-items:center;gap:9px;padding:9px 13px;width:100%;text-align:left;font-size:13px;color:var(--muted);border-left:3px solid transparent}
.ib-ch:hover{background:var(--panel)}
.ib-ch.on{background:var(--panel);color:var(--txt);border-left-color:var(--accent2)}
.ib-ch .ci{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;font-size:12px}
.ib-ch .cn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ib-ch .cb{font-size:10px;font-weight:800;background:var(--accent);color:#06231a;border-radius:20px;padding:0 6px;min-width:18px;text-align:center}
.ib-threads{border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
.ib-thead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:13px 15px;border-bottom:1px solid var(--line);background:var(--bg2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.ib-thead .b{background:var(--accent);color:#06231a;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800}
.ib-search{padding:11px;border-bottom:1px solid var(--line)}
.thread{display:flex;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);text-align:left;width:100%;position:relative}
.thread:hover{background:var(--panel2)}
.thread.on{background:var(--panel2)}
.thread .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none;position:relative}
.thread .av .src{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;border:2px solid var(--panel);display:grid;place-items:center;font-size:8px}
.thread .ti{flex:1;min-width:0}
.thread .tn{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.thread .tm{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.thread .tt{font-size:10.5px;color:var(--muted2);position:absolute;top:11px;right:13px}
.thread .un{position:absolute;bottom:11px;right:13px;background:var(--accent);color:#06231a;font-size:10px;font-weight:800;border-radius:20px;padding:0 6px}
.ib-chat{display:flex;flex-direction:column;min-width:0}
.chat-h{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
.chat-h .av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:none}
.chat-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;
  background:linear-gradient(180deg,var(--bg2),var(--bg))}
.msg{max-width:74%;padding:9px 13px;border-radius:13px;font-size:13px;line-height:1.45;position:relative}
.msg .mt{font-size:9.5px;color:var(--muted2);margin-top:4px;text-align:right}
.msg.in{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.out{align-self:flex-end;background:linear-gradient(135deg,#0f5132,#16794a);color:#eafff3;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-end;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#eaf2ff;border-bottom-right-radius:4px}
.msg.ai::before{content:"AI";position:absolute;top:-8px;right:8px;font-size:8px;font-weight:800;background:#2563eb;color:#fff;padding:1px 5px;border-radius:6px}
.day-sep{align-self:center;font-size:10.5px;color:var(--muted2);background:var(--panel);border:1px solid var(--line);padding:3px 11px;border-radius:20px;margin:6px 0}
.chat-input{padding:11px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.chat-input .ci-box{flex:1;display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px 13px}
.chat-input input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:13.5px}
.ib-context{border-left:1px solid var(--line);overflow-y:auto;background:var(--bg2)}
.ctx-card{padding:15px 16px;border-bottom:1px solid var(--line)}
.ctx-card h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);margin-bottom:11px;font-weight:700}
.ctx-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--muted)}
.ctx-row b{color:var(--txt);font-weight:600;text-align:right}

/* order builder */
.ob-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.ob-item .ob-n{flex:1;min-width:0}
.ob-item .ob-q{width:42px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:3px;color:var(--txt);font-size:12px}
.ob-item .ob-rm{color:var(--muted2)}
.ob-tot{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;color:var(--muted)}
.ob-tot.grand{font-size:16px;font-weight:800;color:var(--txt);border-top:1px solid var(--line);padding-top:11px;margin-top:5px}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:#04080699;backdrop-filter:blur(6px);display:grid;place-items:center;z-index:100;padding:24px;animation:fade .15s}
.modal{width:100%;max-width:640px;max-height:90vh;background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--line2);border-radius:18px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:pop .18s}
.modal.wide{max-width:820px}.modal.xwide{max-width:960px}
.modal-h{display:flex;align-items:center;gap:14px;padding:17px 22px;border-bottom:1px solid var(--line)}
.modal-h h3{font-size:16.5px;font-weight:700}
.modal-h .mh-sub{font-size:12px;color:var(--muted);margin-top:2px}
.modal-h .x{margin-left:auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.modal-h .x:hover{background:var(--panel);color:var(--txt)}
.modal-b{padding:20px 22px;overflow-y:auto}
.modal-f{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
@keyframes fade{from{opacity:0}}
@keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}}

.fld{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
.fld label{font-size:11.5px;color:var(--muted);font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--txt);font-size:13.5px;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent2)}
/* единая стрелка селекта (нативная позиционируется нестабильно) */
.fld select,select.sel{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2390a89c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;background-size:13px;padding-right:32px}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg2);font-size:12px;font-weight:600;color:var(--muted);transition:.12s}
.chip.on{background:var(--accent-soft);border-color:var(--accent2);color:#86efac}
.chip:hover{border-color:var(--line2)}
/* квадратный чекбокс для чек-листов */
.ck-box{width:22px;height:22px;flex:none;border:1.6px solid var(--line2);border-radius:6px;display:grid;place-items:center;font-size:13px;font-weight:800;color:transparent;cursor:pointer;transition:.12s;user-select:none}
.ck-box:hover{border-color:var(--accent2)}
.ck-box.on{background:var(--accent);border-color:var(--accent);color:#06231a}
/* календарь задач */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cal-title{font-weight:700;font-size:15px;text-transform:capitalize;min-width:150px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dows{margin-bottom:6px}
.cal-dow{font-size:11px;color:var(--muted2);font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.4px}
.cal-cell{background:var(--bg2);border:1px solid var(--line);border-radius:9px;min-height:98px;padding:6px;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-cell.cal-out{opacity:.4}
.cal-cell.cal-today{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent-soft) inset}
.cal-d{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:2px}
.cal-today .cal-d{color:var(--accent2)}
.cal-task{display:flex;align-items:center;gap:5px;font-size:11px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:2px 6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-task:hover{border-color:var(--line2)}
.cal-task.ov{border-color:var(--red)}
.cal-task.soon{border-color:var(--amber)}
.cal-dot{width:7px;height:7px;border-radius:50%;flex:none}
.cal-more{font-size:10px;color:var(--muted2);padding-left:3px}

.tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.tab.on{background:var(--accent);color:#06231a}
.tab:hover:not(.on){color:var(--txt)}

.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px;padding-bottom:15px;position:relative}
.tl-item::before{content:"";position:absolute;left:9px;top:20px;bottom:-4px;width:2px;background:var(--line)}
.tl-item:last-child::before{display:none}
.tl-dot{width:20px;height:20px;border-radius:50%;flex:none;display:grid;place-items:center;z-index:1}
.tl-c .tl-t{font-size:12.5px;font-weight:600}
.tl-c .tl-d{font-size:11px;color:var(--muted);margin-top:2px}

.bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:130px 1fr auto;gap:12px;align-items:center;font-size:12px}
.bar-row .bl{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
.bar-track{height:22px;background:var(--bg2);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px;display:flex;align-items:center;padding-left:9px;font-size:10.5px;font-weight:700;color:#fff;min-width:fit-content;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.bar-row .bv{font-weight:700;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}

.funnel-vis{display:flex;flex-direction:column;gap:6px}
.fv-row{display:flex;align-items:center;gap:11px}
.fv-lbl{width:120px;font-size:12px;color:var(--muted);text-align:right;flex:none}
.fv-bar{height:32px;border-radius:8px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:700;font-size:12.5px;
  transition:width .6s cubic-bezier(.2,.8,.2,1);min-width:90px;justify-content:space-between;gap:8px}
.fv-conv{font-size:11px;color:var(--muted2);width:46px;flex:none}

.empty{text-align:center;padding:46px 20px;color:var(--muted2)}
.empty .svg-i{width:40px;height:40px;margin:0 auto 13px;stroke-width:1.3;opacity:.5}
.legend{display:flex;gap:15px;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast .t{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:12px 17px;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:11px;font-size:13px;font-weight:500;animation:toastin .25s;max-width:440px}
.toast .t .ti{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
@keyframes toastin{from{opacity:0;transform:translateY(14px)}}

.donut{--p:0;width:120px;height:120px;border-radius:50%;flex:none;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center;position:relative}
.donut::after{content:"";position:absolute;inset:14px;background:var(--panel);border-radius:50%}
.donut .dv{position:relative;z-index:1;font-size:22px;font-weight:800}

.toggle{width:42px;height:24px;border-radius:20px;background:var(--line);position:relative;transition:.18s;flex:none;cursor:pointer}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s}
.toggle.on{background:var(--accent)}
.toggle.on::after{left:21px}

.intg-card{display:flex;align-items:center;gap:14px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.28)}
.intg-card .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;flex:none;font-weight:800;color:#fff}
.intg-card .ii{flex:1;min-width:0}
.intg-card .in{font-weight:700;font-size:14px}
.intg-card .id{font-size:12px;color:var(--muted);margin-top:2px}

.note{background:var(--accent-soft);border:1px solid #10b98144;border-radius:11px;padding:12px 14px;font-size:12.5px;color:#bff3df;line-height:1.55;display:flex;gap:10px}
.note.amber{background:var(--amber-soft);border-color:#92400e55;color:#fcd9a3}
.note.blue{background:var(--blue-soft);border-color:#1e40af55;color:#bfdbfe}
.note .svg-i{flex:none;margin-top:1px}

.perm-tbl .yes{color:#4ade80}.perm-tbl .no{color:#3a5446}
.list-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px}
.demo-banner{position:fixed;bottom:18px;right:18px;z-index:55;display:inline-flex;align-items:center;gap:8px;
  background:var(--panel2);border:1px solid var(--line2);border-radius:30px;padding:8px 15px;font-size:12px;color:var(--muted);box-shadow:var(--shadow)}
.demo-banner b{color:var(--accent2)}
.menu-toggle{display:none}

@media (max-width:1180px){.inbox{grid-template-columns:300px 1fr}.ib-context{display:none}}
@media (max-width:980px){.grid-2,.grid-2b,.grid-3,.cards-5{grid-template-columns:1fr}.cards-5{grid-template-columns:repeat(2,1fr)}}
@media (max-width:760px){.shell{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-270px;z-index:50;transition:.2s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}.content{padding:14px}.topbar{padding:10px 14px}.topbar .search{display:none}
  .menu-toggle{display:grid!important}.inbox{grid-template-columns:1fr;height:auto}.ib-context{display:none}}

/* ===== LIGHT THEME ===== */
body.light{
  --bg:#eef2f0; --bg2:#e6ece9; --panel:#ffffff; --panel2:#f4f8f6;
  --line:#dde6e1; --line2:#c7d6ce;
  --txt:#0e1f18; --muted:#5d7569; --muted2:#90a89c;
  --accent:#0d9c6e; --accent2:#0b7d58; --accent-soft:#10b98114;
  --green:#16a34a; --green-soft:#16a34a16;
  --amber-soft:#d9770616; --red-soft:#dc262612; --blue-soft:#2563eb12;
  --shadow:0 10px 30px -14px rgba(20,45,35,.18);
  --shadow-lg:0 24px 60px -20px rgba(20,45,35,.26);
  background:radial-gradient(1200px 700px at 82% -10%,#d8efe6 0%,transparent 55%),
            radial-gradient(900px 600px at -10% 110%,#dceee6 0%,transparent 50%),var(--bg);
  color:var(--txt);
}

body.light .msg.in{background:#eef3f0}

body.light .tag.red{color:#b91c1c}
body.light .tag.blue{color:#1d4ed8}

body.light .tag.cyan{color:#0e7490}
