<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Генератор временных ссылок · Pllato</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f4;color:#1c1917;min-height:100vh;padding:40px 20px}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#78716c;margin-bottom:24px}
.card{background:#fff;border:1px solid #e7e5e4;border-radius:16px;padding:22px;margin-bottom:16px}
label{font-size:12px;font-weight:700;color:#78716c;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
select,input{width:100%;border:1.5px solid #e7e5e4;border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;margin-bottom:16px;outline:none}
select:focus,input:focus{border-color:#d97706}
.btn{width:100%;background:#d97706;color:#fff;font-weight:800;font-size:15px;padding:13px;border-radius:12px;border:none;cursor:pointer}
.btn:hover{background:#b45309}
.result{display:none;margin-top:16px}
.result.show{display:block}
.link-box{background:#1c1917;color:#fbbf24;font-size:12px;padding:14px;border-radius:10px;word-break:break-all;font-family:monospace;margin-bottom:10px}
.row2{display:flex;gap:8px}
.btn2{flex:1;background:#fff;border:1.5px solid #e7e5e4;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn2:hover{border-color:#d97706}
.exp-note{font-size:12.5px;color:#16a34a;font-weight:600;margin-bottom:10px}
.self{font-size:12px;color:#78716c;margin-top:20px;text-align:center}
.self a{color:#d97706;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔗 Генератор временных ссылок</h1>
  <p class="sub">Ссылка работает до указанной даты, потом клиент видит «Срок истёк». Страница-генератор непубличная — не давайте её клиентам.</p>
  <div class="card">
    <label>Страница</label>
    <select id="target">
      <option value="demo-bakery.html">🥐 Демо — вся система (4 роли)</option>
      <option value="demo-bakery-app.html">📱 Мокап мобильного приложения</option>
      <option value="kp-bakery.html">📄 КП — Мобильный Агент</option>
    </select>
    <label>Доступ на</label>
    <select id="period">
      <option value="1">1 день</option>
      <option value="3">3 дня</option>
      <option value="7" selected>7 дней</option>
      <option value="14">14 дней</option>
      <option value="30">30 дней</option>
      <option value="custom">Выбрать дату…</option>
    </select>
    <input type="date" id="customDate" style="display:none">
    <button class="btn" onclick="gen()">Сгенерировать ссылку</button>
    <div class="result" id="result">
      <div class="exp-note" id="expNote"></div>
      <div class="link-box" id="linkBox"></div>
      <div class="row2">
        <button class="btn2" onclick="copyLink()">📋 Скопировать</button>
        <button class="btn2" onclick="waLink()">💬 Отправить в WhatsApp</button>
        <button class="btn2" onclick="window.open(genUrl,'_blank')">↗ Открыть</button>
      </div>
    </div>
  </div>
  <div class="self">Для себя: <a href="#" onclick="selfAccess();return false">открыть вечный доступ на этом устройстве</a></div>
</div>
<script>
const SECRET='pllato-nan-dan-2026';
function h(s){let x=7;for(let i=0;i<s.length;i++){x=((x*31)+s.charCodeAt(i))>>>0}return x.toString(36)}
function makeToken(expTs){return btoa(expTs+'.'+h(expTs+SECRET)).replace(/=+$/,'')}
let genUrl='';
document.getElementById('period').addEventListener('change',e=>{
  document.getElementById('customDate').style.display=e.target.value==='custom'?'block':'none';
});
function gen(){
  const p=document.getElementById('period').value;
  let exp;
  if(p==='custom'){
    const d=document.getElementById('customDate').value;
    if(!d){alert('Выберите дату');return}
    exp=new Date(d+'T23:59:59').getTime();
  }else{
    exp=Date.now()+parseInt(p)*86400000;
  }
  const t=makeToken(String(exp));
  const target=document.getElementById('target').value;
  const base=location.href.replace(/linkgen\.html.*$/,'');
  genUrl=base+target+(target.includes('?')?'&':'?')+'k='+t;
  document.getElementById('linkBox').textContent=genUrl;
  document.getElementById('expNote').textContent='✅ Действует до: '+new Date(exp).toLocaleString('ru-RU',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('result').classList.add('show');
}
function copyLink(){navigator.clipboard.writeText(genUrl).then(()=>alert('Скопировано!'))}
function waLink(){window.open('https://wa.me/?text='+encodeURIComponent('Демо системы «Мобильный Агент» (доступ временный): '+genUrl),'_blank')}
function selfAccess(){
  const exp=String(Date.now()+3650*86400000);
  localStorage.setItem('plk',makeToken(exp));
  alert('Готово! На этом устройстве все демо открываются без ссылки (10 лет).');
}
</script>
</body>
</html>
