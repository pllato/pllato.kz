<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подписание договора — Pllato</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="pllato_favicon_64.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="contracts/styles.css">
<style>
  .sign-wrap { max-width: 820px; margin: 0 auto; padding: 24px 18px 80px; }
  .doc-frame { width: 100%; height: 560px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
  .doc-fallback { padding: 40px; text-align: center; }
  .summary { display: flex; flex-wrap: wrap; gap: 10px 22px; margin: 14px 0 20px; }
  .summary div span { display: block; font-size: 12px; color: var(--text-3); }
  .summary div b { font-size: 15px; }
  .sign-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 22px; }
  .result-box { padding: 22px; border-radius: 12px; text-align: center; font-size: 16px; }
  .result-box.ok { background: #ecfdf5; color: var(--green); }
  .result-box.declined { background: #fef2f2; color: var(--red); }
  .hint { font-size: 13px; color: var(--text-2); background: var(--surface-2); padding: 12px 14px; border-radius: 10px; }
  .hint a { font-weight: 600; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand"><img src="pllato_logo_transparent_navy.svg" alt="Pllato" onerror="this.style.display='none'"><span>Подписание договора</span></span>
    <div id="nca-badge" class="nca-badge"><span class="dot"></span><span id="nca-text">Проверяю NCALayer…</span></div>
  </div>

  <div class="sign-wrap" id="root">
    <div class="empty">Загрузка…</div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.config.js"></script>
  <script type="module" src="contracts/sign.js?v=20260608-1"></script>
</body>
</html>
