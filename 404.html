<script>
/* GitHub Pages не умеет серверные редиректы, поэтому короткие ссылки
   видеовстреч /m/<код> обрабатываем здесь: переадресуем на meet.html.
   (GitHub отдаёт этот 404.html для любого несуществующего пути.) */
(function () {
  var m = location.pathname.match(/^\/m\/([A-Za-z0-9_-]+)\/?$/);
  if (m) {
    location.replace('/meet.html?room=' + encodeURIComponent(m[1].toLowerCase()) + location.hash);
  }
})();
</script>
