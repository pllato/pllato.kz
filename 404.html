<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pllato</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/pllato_favicon_64.svg">
<script>
/* GitHub Pages не умеет серверные редиректы, поэтому короткие ссылки
   видеовстреч /m/<код> обрабатываем здесь: переадресуем на meet.html.
   (GitHub отдаёт этот 404.html для любого несуществующего пути.) */
(function () {
  var m = location.pathname.match(/^\/m\/([A-Za-z0-9_-]+)\/?$/);
  if (m) {
    location.replace('/meet.html?room=' + encodeURIComponent(m[1].toLowerCase()) + location.hash);
  }
})();
</script>
<style>
:root{--navy:#0a1628;--bronze:#b8895a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0b0f1a;color:#f3f5fa;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.box{max-width:380px}
h1{font-size:64px;font-weight:800;letter-spacing:-.03em;color:var(--bronze)}
p{color:#aeb6c8;font-size:15px;line-height:1.6;margin:8px 0 24px}
a{display:inline-block;padding:12px 22px;border-radius:11px;background:var(--bronze);color:#1a1206;
  text-decoration:none;font-weight:700;font-size:14.5px}
</style>
</head>
<body>
<div class="box">
  <h1>404</h1>
  <p>Страница не найдена.<br>Если вы переходили по ссылке на видеовстречу — секунду, открываем…</p>
  <a href="/">На главную Pllato</a>
</div>
</body>
</html>
