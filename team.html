<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELC — English Lifestyle Communication</title>
<link rel="icon" type="image/png" href="elc-favicon-source.png">
<script>
  // Применяем тему до загрузки CSS чтобы избежать вспышки тёмного при светлой
  (function() {
    try {
      var saved = localStorage.getItem('pllato:theme');
      if (!saved) {
        // Используем системные настройки если ничего не сохранено
        saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Unbounded:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ─── ELC brand palette ───
   * Blue   #373D8D (Pantone 2117 C) — primary accent
   * Red    #E31E24 (Pantone 485 C)  — danger / highlight
   * Yellow #FFCC00 (Pantone 116 C)  — secondary accent
   * см. брендбук, стр. 9
   */
  /* Dark theme (default) — синяя ночь */
  --bg: #0d1024;
  --bg2: #161a35;
  --bg3: #1f2447;
  --bg4: #2a305a;
  --b1: rgba(255,255,255,0.08);
  --b2: rgba(255,255,255,0.15);
  --t1: #f0f1ff;
  --t2: #a4a8c8;
  --t3: #6f7398;
  --ac: #6168c4;        /* ELC blue, brightened для контраста на тёмном */
  --ac2: #8b91dc;
  --acbg: rgba(55,61,141,0.22);
  --acb: rgba(55,61,141,0.50);
  --gn: #3fd88e;
  --gnbg: rgba(63,216,142,0.12);
  --am: #ffcc00;        /* ELC yellow — для warning/важных */
  --ambg: rgba(255,204,0,0.14);
  --rd: #e31e24;        /* ELC red */
  --rdbg: rgba(227,30,36,0.14);
  --tl: #3fc8d8;
  --tlbg: rgba(63,200,216,0.1);
  --r: 10px;
  --rl: 14px;
  --fd: 'Trebuchet MS', 'Manrope', Verdana, sans-serif;
  --fb: 'Manrope', Tahoma, Verdana, sans-serif;
  --shadow: 0 4px 24px rgba(0,0,0,.45);
  --modal-overlay: rgba(8,10,28,0.78);
  --bubble-client: rgba(255,255,255,0.06);
  --bubble-staff: rgba(97,104,196,0.22);
  --skeleton: rgba(255,255,255,0.04);
  /* legacy aliases */
  --yl: var(--am);
}

/* Light theme — фирменная ELC */
:root[data-theme="light"] {
  --bg: #f5f6fb;
  --bg2: #ffffff;
  --bg3: #eef0fa;
  --bg4: #dde1f3;
  --b1: rgba(55,61,141,0.10);
  --b2: rgba(55,61,141,0.20);
  --t1: #161a35;
  --t2: #4a4f72;
  --t3: #7d82a0;
  --ac: #373d8d;        /* ELC blue exact */
  --ac2: #2a2f70;       /* darker для hover */
  --acbg: rgba(55,61,141,0.08);
  --acb: rgba(55,61,141,0.30);
  --gn: #1fa869;
  --gnbg: rgba(31,168,105,0.1);
  --am: #b58700;        /* приглушённый ELC yellow для читаемости */
  --ambg: rgba(255,204,0,0.20);
  --rd: #e31e24;        /* ELC red */
  --rdbg: rgba(227,30,36,0.08);
  --tl: #1894a3;
  --tlbg: rgba(24,148,163,0.09);
  --shadow: 0 4px 24px rgba(55,61,141,.12);
  --modal-overlay: rgba(22,26,53,0.50);
  --bubble-client: rgba(20,18,40,0.06);
  --bubble-staff: rgba(55,61,141,0.13);
  --skeleton: rgba(20,18,40,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--t1);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Login screen ─────────────────────────────────── */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 420px;
}
.elc-brand {
  margin-bottom: 24px;
}
.elc-brand-img {
  display: block;
  height: 36px;
  width: auto;
  max-width: 100%;
}
/* На тёмной теме — белая подложка под лого (правило брендбука стр 5) */
:root:not([data-theme="light"]) .elc-brand-img {
  background: #ffffff;
  padding: 6px 10px;
  border-radius: 6px;
  box-sizing: content-box;
}
/* Sidebar: чуть меньше, влево */
.sidebar .elc-brand { margin-bottom: 22px; padding: 0 6px; }
.sidebar .elc-brand-img { height: 26px; }
/* Login screen: больше */
.login-wrap .elc-brand { margin-bottom: 20px; }
.login-wrap .elc-brand-img { height: 44px; }
.tagline {
  font-size: 13px;
  color: var(--t3);
  margin-bottom: 24px;
}
.btn {
  background: var(--ac);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-family: var(--fb);
  font-size: 13px;
  font-weight: 600;
  padding: 11px 22px;
  transition: opacity .15s;
  width: 100%;
  margin-bottom: 8px;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.google {
  background: var(--bg2);
  color: var(--t1);
  border: 1px solid var(--b2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
:root[data-theme="light"] .btn.google {
  background: #fff;
  border-color: var(--b2);
}
.btn.secondary {
  background: var(--bg3);
  color: var(--t1);
  border: 1px solid var(--b2);
}
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .05em;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--b1);
}
.input {
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 10px;
  color: var(--t1);
  font-family: var(--fb);
  font-size: 13px;
  padding: 11px 14px;
  width: 100%;
  margin-bottom: 8px;
}
.input:focus { outline: none; border-color: var(--ac); }
.error {
  background: rgba(240,89,117,.08);
  border: 1px solid rgba(240,89,117,.3);
  border-radius: 8px;
  color: var(--rd);
  font-size: 12px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.success {
  background: rgba(63,216,142,.08);
  border: 1px solid rgba(63,216,142,.3);
  border-radius: 8px;
  color: var(--gn);
  font-size: 12px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.link {
  color: var(--ac2);
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  margin-top: 8px;
}
.link:hover { text-decoration: underline; }

/* ── Buttons (robeng-style, distinct from login .btn) ─────────── */
.tbtn {
  padding: 7px 15px;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--fb);
  border-radius: var(--r);
  border: 1px solid var(--b2);
  background: var(--bg3);
  color: var(--t2);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.tbtn:hover { background: var(--bg4); color: var(--t1); }
.tbtn-a { background: var(--ac); border-color: var(--ac); color: #fff; }
.tbtn-a:hover { background: var(--ac2); border-color: var(--ac2); color: #fff; }
.tbtn-g { background: var(--gnbg); border-color: rgba(63,216,142,.3); color: var(--gn); }
.tbtn-g:hover { background: var(--gn); color: var(--bg); }
.tbtn-r { background: var(--rdbg); border-color: rgba(240,89,117,.3); color: var(--rd); }
.tbtn-r:hover { background: var(--rd); color: #fff; }
.tbtn-sm { padding: 5px 11px; font-size: 12px; }
.tbtn-xs { padding: 3px 8px; font-size: 11px; }

/* ── Pager (серверная пагинация) ─────────────────── */
.pager {
  margin: 14px 0 6px;
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.pager-btn {
  min-width: 32px;
  height: 30px;
  padding: 0 9px;
  border: 1px solid var(--b1);
  background: var(--bg3);
  color: var(--t1);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.pager-btn:hover:not(:disabled):not(.active) { background: var(--bg4); border-color: var(--ac2); }
.pager-btn.active { background: var(--ac2); color: #fff; border-color: var(--ac2); cursor: default; }
.pager-btn:disabled { opacity: .35; cursor: default; }
.pager-gap { color: var(--t3); padding: 0 4px; user-select: none; }
.pager-info { margin-left: 10px; color: var(--t3); font-size: 12px; }

/* ── Stat cards ──────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: var(--rl);
  padding: 15px 17px;
}
.stat-lbl {
  font-size: 10px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 600;
  margin-bottom: 7px;
}
.stat-val {
  font-family: var(--fd);
  font-size: 22px;
  font-weight: 700;
}
.cv { color: var(--ac2); }
.cg { color: var(--gn); }
.ca { color: var(--am); }
.ct { color: var(--tl); }
.cr { color: var(--rd); }

/* ── Toolbars (search + filters) ──────────────────── */
.tb {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.tb-search {
  flex: 1;
  min-width: 200px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: var(--r);
  color: var(--t1);
  font-family: var(--fb);
  font-size: 13px;
  padding: 8px 12px;
}
.tb-search:focus { outline: none; border-color: var(--ac); }
.tb-select {
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: var(--r);
  color: var(--t1);
  font-family: var(--fb);
  font-size: 12px;
  padding: 7px 11px;
  cursor: pointer;
}

/* ── Data table ───────────────────────────────────── */
.dtable-wrap {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: var(--rl);
  overflow: hidden;
}
.dtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.dtable th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--b1);
  background: var(--bg3);
  position: sticky;
  top: 0;
  z-index: 2;
}
.dtable td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--b1);
  color: var(--t2);
  vertical-align: middle;
}
.dtable tr:last-child td { border-bottom: none; }
.dtable tr.row { cursor: pointer; transition: background .12s; }
.dtable tr.row:hover td { background: var(--bg3); }
.dtable .name-cell {
  color: var(--t1);
  font-weight: 600;
}

/* ── Badges/chips ─────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.badge-ac { background: var(--acbg); border-color: var(--acb); color: var(--ac2); }
.badge-g { background: var(--gnbg); border-color: rgba(63,216,142,.3); color: var(--gn); }
.badge-a { background: var(--ambg); border-color: rgba(245,200,66,.3); color: var(--am); }
.badge-r { background: var(--rdbg); border-color: rgba(240,89,117,.3); color: var(--rd); }
.badge-t { background: var(--tlbg); border-color: rgba(63,200,216,.3); color: var(--tl); }
.badge-n { background: var(--bg3); border-color: var(--b2); color: var(--t3); }

/* ── Empty state ──────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--t3);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .5; }
.empty-text { font-size: 13px; }

/* ── Page header ──────────────────────────────────── */
.page-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}
.page-head h1 {
  font-family: var(--fd);
  font-size: 18px;
  font-weight: 700;
  color: var(--t1);
}
.page-head .count {
  font-size: 12px;
  color: var(--t3);
  font-weight: 400;
  margin-left: 8px;
}

/* ── View toggle (kanban / list) ──────────────────── */
.view-toggle {
  display: flex;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: var(--r);
  overflow: hidden;
}
.vt-btn {
  padding: 6px 13px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--fb);
  border: none;
  background: transparent;
  color: var(--t2);
  cursor: pointer;
  transition: all .15s;
}
.vt-btn:hover { color: var(--t1); }
.vt-btn.active { background: var(--ac); color: #fff; }

/* ── App layout ───────────────────────────────────── */
.app { display: none; min-height: 100vh; }
.app.active { display: flex; }
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--b1);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
}
.sidebar .logo {
  font-family: var(--fd);
  font-size: 22px;
  font-weight: 800;
  color: var(--ac);
  margin-bottom: 4px;
  padding: 0 6px;
  letter-spacing: .04em;
}
.sidebar .logo-sub {
  padding: 0 6px;
  margin-bottom: 22px;
  font-size: 7px;
}
.nav-section {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--t3);
  padding: 10px 8px 6px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--t2);
  transition: background .15s;
}
.nav-item:hover { background: var(--bg3); color: var(--t1); }
.nav-item.active { background: var(--acbg); color: var(--ac2); font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-spacer { flex: 1; }
.user-card {
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--ac);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
}
.user-name {
  font-size: 12px;
  color: var(--t1);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.user-email {
  font-size: 11px;
  color: var(--t3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.signout-btn {
  background: transparent;
  border: 1px solid var(--b2);
  border-radius: 6px;
  color: var(--t3);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
}
.signout-btn:hover { color: var(--rd); border-color: var(--rd); }

.theme-toggle {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--b1);
  color: var(--t2);
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  padding: 0;
}
.theme-toggle:hover {
  background: var(--bg4);
  color: var(--ac2);
  border-color: var(--acb);
}

.main {
  flex: 1;
  padding: 24px 32px;
  overflow-y: auto;
}
.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 13px;
  color: var(--t3);
  margin-bottom: 22px;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 14px;
}
.card h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--t2);
}
.empty {
  color: var(--t3);
  font-size: 13px;
  padding: 30px 20px;
  text-align: center;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.stat {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 12px;
  padding: 14px 16px;
}
.stat-label { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; color: var(--t1); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.btn-sm {
  padding: 8px 14px;
  font-size: 12px;
  width: auto;
  margin-bottom: 0;
}
.log-area {
  background: #0a0a0e;
  border: 1px solid var(--b1);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 11px;
  color: var(--t2);
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.6;
}
.log-area .ok { color: var(--gn); }
.log-area .err { color: var(--rd); }
.log-area .info { color: var(--ac2); }
.log-area .gray { color: var(--t3); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--b1); }
th { color: var(--t3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
td { color: var(--t2); }
tr:hover td { background: var(--bg3); }

@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; }
  .main { padding: 16px; }
}

/* ── Deals page ───────────────────────────────────── */
.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar input, .toolbar select {
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px;
  color: var(--t1);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 11px;
}
.toolbar input { flex: 1; min-width: 180px; }
.toolbar input:focus, .toolbar select:focus { outline: none; border-color: var(--ac); }
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 7px 14px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px;
  color: var(--t2);
  cursor: pointer;
  font-size: 12px;
}
.view-tab.active {
  background: var(--acbg);
  border-color: var(--ac);
  color: var(--ac2);
  font-weight: 600;
}
.deals-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.deals-table th, .deals-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--b1);
}
.deals-table th {
  color: var(--t3);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .04em;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 2;
}
.deals-table td { color: var(--t2); }
.deals-table tr.row { cursor: pointer; }
.deals-table tr.row:hover td { background: var(--bg3); }
.deals-table .deal-title {
  color: var(--t1);
  font-weight: 600;
  max-width: 350px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stage-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg3);
  color: var(--t2);
  border: 1px solid var(--b1);
  white-space: nowrap;
}
.stage-badge.success { background: rgba(63,216,142,.12); color: var(--gn); border-color: rgba(63,216,142,.3); }
.stage-badge.failed { background: rgba(240,89,117,.12); color: var(--rd); border-color: rgba(240,89,117,.3); }
.money { color: var(--gn); font-weight: 600; font-variant-numeric: tabular-nums; }
.money.zero { color: var(--t3); font-weight: 400; }
.pagination {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.pagination .pg-btn {
  background: var(--bg3);
  border: 1px solid var(--b2);
  color: var(--t2);
  border-radius: 6px;
  padding: 6px 11px;
  cursor: pointer;
  font-size: 12px;
}
.pagination .pg-btn:hover { background: var(--bg4); }
.pagination .pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.pagination .pg-info { color: var(--t3); font-size: 12px; padding: 0 8px; }

/* Kanban */
.kanban-wrap {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 16px;
  margin: 0 -8px;
  padding-left: 8px;
}
.kanban-col {
  flex-shrink: 0;
  width: 240px;
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: var(--rl);
  padding: 0;
  max-height: calc(100vh - 240px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--b1);
  font-size: 12px;
  color: var(--t2);
  font-weight: 600;
  flex-shrink: 0;
  background: var(--bg2);
}
.kanban-col-header .stage-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.kanban-col-header .col-count {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 999px;
  letter-spacing: .03em;
}
.kanban-col-sum {
  font-family: var(--fd);
  font-size: 11px;
  color: var(--t3);
  padding: 6px 12px 4px;
  border-bottom: 1px solid var(--b1);
  background: var(--bg2);
  font-weight: 600;
  flex-shrink: 0;
}
.kanban-col-cards {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  background: var(--bg);
}
.kanban-card {
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color .12s, transform .12s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  user-select: none;
}
.kanban-card:hover { border-color: var(--b2); transform: translateY(-1px); }
.kanban-card-title {
  font-size: 12px;
  color: var(--t1);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-height: 1.4;
}
.kanban-card-money {
  color: var(--gn);
  font-weight: 700;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  font-family: var(--fd);
}
.kanban-card-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 2px;
}
.kanban-card-resp {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.kanban-av {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--acbg);
  color: var(--ac2);
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: var(--fd);
  border: 1px solid var(--acb);
}
.kanban-card-resp-name {
  font-size: 11px;
  color: var(--t2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.kanban-card-date {
  font-size: 10px;
  color: var(--t3);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.kanban-more {
  text-align: center;
  padding: 8px;
  color: var(--t3);
  font-size: 11px;
  border: 1px dashed var(--b2);
  border-radius: 8px;
}
.kanban-empty {
  text-align: center;
  padding: 24px 8px;
  color: var(--t3);
  font-size: 11px;
  border: 1px dashed var(--b2);
  border-radius: 8px;
  transition: all .15s;
}
.kanban-card.dragging {
  opacity: .35;
  cursor: grabbing;
}
.kanban-col-cards.drag-over,
.kanban-empty.drag-over {
  background: rgba(124,92,252,.08);
  border-color: var(--ac);
  box-shadow: inset 0 0 0 2px var(--ac);
  border-radius: 8px;
}
.kanban-card-phone {
  font-size: 11px;
  color: var(--t3);
  margin-top: -2px;
}
.kanban-stale {
  font-size: 10px;
  color: var(--rd);
  font-weight: 600;
  flex-shrink: 0;
}
.kanban-card-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  align-items: center;
}
.kca-btn {
  border: 1px solid var(--b2);
  background: var(--bg4);
  color: var(--t2);
  border-radius: 5px;
  cursor: pointer;
  padding: 3px 8px;
  font-size: 11px;
  font-family: var(--fb);
  transition: all .12s;
}
.kca-btn:hover { background: var(--bg2); transform: translateY(-1px); }
.kca-wa { background: rgba(63,216,142,.1); border-color: rgba(63,216,142,.3); color: var(--gn); }
.kca-wa:hover { background: var(--gn); color: var(--bg); }
.kca-call { background: rgba(124,92,252,.1); border-color: rgba(124,92,252,.3); color: var(--ac2); }
.kca-call:hover { background: var(--ac); color: #fff; }
.kca-stage { font-size: 10px; padding: 3px 9px; }

/* Stage quick pick popover */
.stage-quick-pick {
  position: fixed;
  z-index: 9999;
  background: var(--bg2);
  border: 1px solid var(--b2);
  border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 6px;
  min-width: 200px;
  max-height: 360px;
  overflow-y: auto;
}
.sqp-header {
  font-size: 10px;
  color: var(--t3);
  padding: 4px 9px 7px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.sqp-item {
  padding: 7px 10px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  color: var(--t1);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background .12s;
}
.sqp-item:hover { background: var(--bg3); }
.sqp-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-block;
}

/* Toast */
.app-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg2);
  border: 1px solid var(--gn);
  color: var(--t1);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-family: var(--fb);
  box-shadow: var(--shadow);
  opacity: 0;
  transition: all .25s;
  z-index: 10000;
  pointer-events: none;
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.app-toast.err { border-color: var(--rd); }

/* Task unread indicators */
.task-unread-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--ac);
  margin-right: 7px;
  vertical-align: middle;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(124,92,252,0.18);
}
.task-unread-kids-badge {
  display: inline-block;
  margin-left: 8px;
  background: var(--acbg);
  color: var(--ac2);
  border: 1px solid var(--acb);
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 7px;
  vertical-align: middle;
}
.row.selected { background: var(--acbg) !important; }
.row.selected td { border-bottom-color: var(--acb); }
.row.unread .name-cell {
  background: linear-gradient(90deg, var(--acbg) 0%, transparent 100%);
}
.task-more-row {
  background: var(--bg3);
  cursor: pointer;
  transition: background .12s;
}
.task-more-row:hover {
  background: var(--bg4);
}
.task-card-subs {
  font-size: 10px;
  color: var(--ac2);
  margin-top: 2px;
}
.task-card-deadline {
  font-size: 11px;
  margin-top: 4px;
}
.task-card-comments {
  font-size: 10px;
  color: var(--t3);
  margin-left: auto;
}
.kanban-card.unread {
  border-color: var(--acb);
}

/* Parent task card */
.parent-task-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-left: 3px solid var(--ac);
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 8px;
}
.parent-task-card:hover {
  background: var(--bg4);
  border-color: var(--ac);
  transform: translateX(2px);
}
.ptc-arrow {
  font-size: 16px;
  color: var(--ac2);
  flex-shrink: 0;
}
.ptc-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--t1);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ptc-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.ptc-resp {
  color: var(--ac2);
}
.ptc-open {
  font-size: 11px;
  color: var(--t3);
  flex-shrink: 0;
}

/* Subtasks list */
.subtasks-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 360px;
  overflow-y: auto;
}
.subtask-row {
  display: flex;
  align-items: center;
  gap: 9px;
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all .12s;
}
.subtask-row:hover {
  background: var(--bg4);
  border-color: var(--b2);
  transform: translateX(2px);
}
.subtask-row.closed {
  opacity: .58;
}
.subtask-row.closed .st-title {
  text-decoration: line-through;
  text-decoration-color: var(--t3);
}
.st-arrow {
  color: var(--t3);
  font-size: 14px;
  flex-shrink: 0;
}
.st-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--t1);
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.st-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  flex-wrap: wrap;
}
.st-resp {
  color: var(--ac2);
}
.st-comments, .st-subs {
  color: var(--t3);
  font-size: 10px;
}

/* Deal card modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  z-index: 100;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--b1);
  border-radius: 14px;
  padding: 22px 26px;
  width: 100%;
  max-width: 760px;
  margin: 20px auto;
  position: relative;
}
.modal.modal-xl {
  max-width: 1100px;
  width: 96vw;
}
.modal .close-x {
  position: absolute;
  top: 14px;
  right: 16px;
  background: transparent;
  border: none;
  color: var(--t3);
  font-size: 24px;
  cursor: pointer;
  width: auto;
  padding: 0;
  margin: 0;
  line-height: 1;
}
.modal .close-x:hover { color: var(--t1); }
.modal h2 { font-size: 18px; margin-bottom: 4px; padding-right: 30px; font-family: var(--fd); font-weight: 700; }
.modal-sub { color: var(--t3); font-size: 12px; margin-bottom: 18px; }

/* Deal card layout (2-col with chat) */
.dc-head {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 16px;
}
.dc-head .close-x { position: static; flex-shrink: 0; }

.dc-stagebar {
  display: flex;
  gap: 0;
  margin-bottom: 18px;
  border: 1px solid var(--b1);
  border-radius: var(--r);
  overflow: hidden;
  flex-wrap: wrap;
}
.dc-stage-btn {
  flex: 1;
  min-width: 100px;
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--fb);
  border: none;
  border-right: 1px solid var(--b1);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dc-stage-btn:last-child { border-right: none; }
.dc-stage-btn:hover { filter: brightness(1.15); }
.dc-stage-btn.active { font-weight: 700; box-shadow: inset 0 -3px 0 rgba(255,255,255,.25); }

.dc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 16px;
}
@media (max-width: 900px) {
  .dc-grid { grid-template-columns: 1fr; }
}
.dc-left, .dc-right { min-width: 0; }
.dc-section-h {
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 14px 0 8px;
  font-weight: 600;
}
.dc-section-h:first-child { margin-top: 0; }

.dc-contact-card {
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 12px 14px;
}
.dc-contact-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--t1);
  margin-bottom: 6px;
}
.dc-contact-phone {
  font-size: 13px;
  color: var(--t2);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.dc-contact-email a {
  color: var(--ac2);
  font-size: 12px;
  text-decoration: none;
}
.dc-contact-email a:hover { text-decoration: underline; }
.dc-contact-actions {
  display: flex;
  gap: 6px;
  margin: 8px 0;
  flex-wrap: wrap;
}

.dc-chat-wrap {
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 8px;
  min-height: 200px;
  max-height: 520px;
  overflow-y: auto;
}
.dc-timeline-side {
  background: var(--bg3);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 6px 10px;
  max-height: 520px;
  overflow-y: auto;
}
.dc-timeline-side .tl-wrap { margin: 0; }

.field-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 8px 18px;
  font-size: 13px;
  margin-bottom: 18px;
}
.field-grid .fl { color: var(--t3); padding: 4px 0; }
.field-grid .fv { color: var(--t1); padding: 4px 0; word-break: break-word; }
.section-h {
  font-size: 12px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin: 18px 0 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--b1);
}
.muted { color: var(--t3); }
.empty-cell { color: var(--t3); font-style: italic; font-size: 12px; }
.cf-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 14px;
  font-size: 12px;
}
@media (max-width: 600px) {
  .field-grid { grid-template-columns: 1fr; gap: 2px 0; }
  .field-grid .fl { color: var(--t3); padding-top: 8px; padding-bottom: 0; font-size: 11px; }
  .field-grid .fv { padding-top: 0; padding-bottom: 8px; }
  .cf-grid { grid-template-columns: 1fr; }
  .kanban-col { width: 240px; }
}

/* ─── Таймлайн дел сделки/контакта ─── */
.tl-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.tl-filter {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg3);
  border: 1px solid transparent;
  color: var(--t3);
  padding: 5px 10px;
  border-radius: 18px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.tl-filter:hover { background: var(--bg2); }
.tl-filter.active { background: rgba(127,99,232,.15); color: var(--t1); border-color: rgba(127,99,232,.4); }
.tl-filter .tl-count {
  background: rgba(0,0,0,.3);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 10px;
}
.tl-filter.active .tl-count { background: rgba(127,99,232,.3); }

.tl-wrap {
  border-left: 1px solid var(--bg3);
  margin-left: 14px;
  padding-left: 18px;
  position: relative;
}
.tl-day-label {
  font-size: 11px;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin: 18px 0 8px -32px;
  padding-left: 32px;
  font-weight: 600;
}
.tl-day-label:first-child { margin-top: 0; }

.tl-item {
  position: relative;
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--b1);
}
.tl-item:last-child { border-bottom: none; }

.tl-icon {
  position: absolute;
  left: -32px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  border: 2px solid var(--bg2);
}

.tl-body { flex: 1; min-width: 0; padding-left: 4px; }

.tl-head {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--t3);
  margin-bottom: 3px;
}
.tl-type-label { color: var(--t2); font-weight: 600; }
.tl-time { margin-left: auto; }
.tl-provider { background: rgba(127,99,232,.15); color: var(--ac2); padding: 1px 7px; border-radius: 8px; font-size: 10px; }
.tl-dir.incoming { color: #3fd88e; font-size: 10px; }
.tl-dir.outgoing { color: #f0a23a; font-size: 10px; }
.tl-duration { color: var(--t3); font-size: 11px; }
.tl-completed { color: #3fd88e; font-weight: 700; }

.tl-subject {
  font-size: 13px;
  color: var(--t1);
  font-weight: 500;
  margin-bottom: 3px;
  word-break: break-word;
}
.tl-desc {
  font-size: 12px;
  color: var(--t2);
  line-height: 1.5;
  word-break: break-word;
}
.tl-files {
  font-size: 11px;
  color: var(--t3);
  margin-top: 6px;
  padding: 5px 10px;
  background: var(--bg3);
  border-radius: 6px;
  display: inline-block;
}
.tl-files-status {
  margin-left: 6px;
  font-size: 10px;
  color: var(--t3);
}
.tl-files-block {
  margin-top: 6px;
  padding: 6px 10px;
  background: var(--bg3);
  border-radius: 6px;
}
.tl-files-block .tl-files-head {
  font-size: 11px;
  color: var(--t2);
  font-weight: 600;
}

/* ─── Кнопка показать переписку и сама переписка ─── */
.tl-show-chat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 6px 12px;
  background: rgba(63,216,142,.1);
  border: 1px solid rgba(63,216,142,.3);
  color: var(--gn);
  border-radius: 18px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.tl-show-chat:hover {
  background: rgba(63,216,142,.18);
}
.tl-show-chat.active {
  background: var(--gn);
  color: #0e0e12;
}

.tl-chat-thread {
  margin-top: 10px;
  background: var(--bg3);
  border-radius: 10px;
  padding: 12px 14px;
  max-height: 500px;
  overflow-y: auto;
  border: 1px solid var(--b1);
}

.chat-thread-inner {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chat-day {
  text-align: center;
  font-size: 10px;
  color: var(--t3);
  padding: 8px 0 4px;
  text-transform: uppercase;
  letter-spacing: .5px;

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword,
  sendPasswordResetEmail, onAuthStateChanged, signOut as fbSignOut

import {

  onChildAdded, onChildChanged, onChildRemoved, query, orderByChild, limitToLast, startAt
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';

// ── Config ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC3Cw3nX6b1zpE1-lqW1whwUsPPUQ7TIhc",
  authDomain: "pllato-crm.firebaseapp.com",
  databaseURL: "https://pllato-crm-default-rtdb.firebaseio.com",
  projectId: "pllato-crm",
  storageBucket: "pllato-crm.firebasestorage.app",
  messagingSenderId: "690738857241",
  appId: "1:690738857241:web:2356e97c435656890ab188"
};
const WORKER_URL = 'https://pllato-crm-worker.uurraa.workers.dev';
const WORKER_RTDB_URL = 'https://pllato-elc-worker.uurraa.workers.dev/api/rtdb';
// === ELC IndexedDB RTDB cache ===
// Monkey-patch window.fetch для WORKER_RTDB_URL: коллекции (users.json, contacts.json,
// deals.json, tasks.json, groupChats.json, customFieldsSchema/*.json, pipelines/*.json)
// кешируются в IndexedDB на 24 часа. PATCH/PUT/DELETE инвалидируют соответствующую
// коллекцию. Цель — после первого захода (8 секунд на contacts) не дёргать worker
// при каждом переключении раздела.
(function installElcRtdbCache() {
  const IDB_NAME = 'elc-rtdb-cache';
  const IDB_STORE = 'responses';
  const IDB_VERSION = 1;
  const CACHE_TTL_MS = 24 * 60 * 60 * 1000;

  // Коллекции, которые имеет смысл кешировать (большие/часто запрашиваемые).
  // Одиночные записи и служебные (referenceLists, migrationState) не трогаем.
  const CACHEABLE_PATHS = new Set([
    'users.json',
    'contacts.json',
    'deals.json',
    'tasks.json',
    'companies.json',
    'groupChats.json',
    'openlinesSessions.json',
  ]);
  // Префиксы (для path вида customFieldsSchema/deal.json, pipelines/pipeline_3.json)
  const CACHEABLE_PREFIXES = ['customFieldsSchema/', 'pipelines/'];

  let dbPromise = null;
  function idbOpen() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  async function idbGet(key) {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbSet(key, val) {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbDelByPrefix(prefix) {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const store = tx.objectStore(IDB_STORE);
      const range = IDBKeyRange.bound(prefix, prefix + '\uffff');
      const req = store.openKeyCursor(range);
      req.onsuccess = () => {
        const c = req.result;
        if (c) { store.delete(c.key); c.continue(); }
      };
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbClear() {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  function parseRtdbPath(url) {
    try {
      const u = new URL(url);
      if (!url.startsWith(WORKER_RTDB_URL)) return null;
      const p = u.pathname.replace(/^\/api\/rtdb\//, '');
      return { path: p, search: u.search };
    } catch { return null; }
  }

  function isCacheable(path) {
    if (CACHEABLE_PATHS.has(path)) return true;
    for (const pref of CACHEABLE_PREFIXES) {
      if (path.startsWith(pref)) return true;
    }
    return false;
  }

  function collectionRoot(path) {
    // 'deals/deal_100.json' → 'deals.json'
    // 'tasks.json' → 'tasks.json'
    // 'customFieldsSchema/deal.json' → 'customFieldsSchema/deal.json'
    const head = path.split('/')[0];
    return head + '.json';
  }

  // Бампать при изменении формата ответа или после исправления corruption-багов.
  // Старые записи с другим префиксом останутся в IDB неиспользуемыми и истекут по TTL.
  // v2: после фикса resp.clone() race в Phase 2.2 (corrupted bodies of contacts/tasks)
  // v3: после sparse-fix для users/companies/pipelines (PR #42)
  // v4: после фикса cache-key — buildCacheKey не учитывал ?shallow=true и
  //     `fetchShallowKeys('users')` затирал нормальный users.json shallow-форматом
  //     {uid: true}. renderDeals → localeCompare(undefined) → TypeError.
  const CACHE_VERSION = 'v4';

  // ВАЖНО: query-параметры (shallow/orderBy/limitToLast) дают разные ответы
  // и должны храниться в кеше под разными ключами. auth/_v выкидываем —
  // они только меняют токен или cache-bust, не содержание.
  function buildCacheKey(path, search) {
    if (!search || search === '?') return `/${CACHE_VERSION}/api/rtdb/` + path;
    const params = new URLSearchParams(search.startsWith('?') ? search.slice(1) : search);
    params.delete('auth');
    params.delete('_v');
    const q = params.toString();
    return `/${CACHE_VERSION}/api/rtdb/` + path + (q ? '?' + q : '');
  }

  const _origFetch = window.fetch.bind(window);
  window.fetch = async function(input, init) {
    const url = typeof input === 'string' ? input : (input && input.url);
    if (!url || !url.startsWith(WORKER_RTDB_URL)) {
      return _origFetch(input, init);
    }
    const method = ((init && init.method) || 'GET').toUpperCase();
    const parsed = parseRtdbPath(url);

    // PATCH/PUT/DELETE — инвалидируем кеш коллекции при успехе
    if (method === 'PATCH' || method === 'PUT' || method === 'DELETE') {
      const resp = await _origFetch(input, init);
      if (resp && resp.ok && parsed) {
        const rootKey = buildCacheKey(collectionRoot(parsed.path));
        idbDelByPrefix(rootKey).catch(e => console.warn('[idb] invalidate fail', e));
      }
      return resp;
    }

    if (method !== 'GET' || !parsed || !isCacheable(parsed.path)) {
      return _origFetch(input, init);
    }

    const cacheKey = buildCacheKey(parsed.path, parsed.search);

    // Попытка отдать из кеша
    try {
      const cached = await idbGet(cacheKey);
      if (cached && (Date.now() - cached.fetchedAt) < CACHE_TTL_MS) {
        // Cheap validity check: JSON-объект/массив должен начинаться и
        // заканчиваться парными скобками. Truncated body завершается случайным
        // байтом (буква/цифра) — отлавливаем за O(1).
        const body = cached.body;
        const isValid = body && body.length >= 2 && (
          (body[0] === '{' && body[body.length - 1] === '}') ||
          (body[0] === '[' && body[body.length - 1] === ']')
        );
        if (!isValid) {
          console.warn('[idb-cache] corrupt entry purged', parsed.path, body ? body.length + 'B' : 'empty');
          idbDelByPrefix(cacheKey).catch(() => {});
          // fall through to network
        } else {
          const ageSec = Math.round((Date.now() - cached.fetchedAt) / 1000);
          console.log('[idb-cache] hit', parsed.path, ageSec + 's', body.length + 'B');
          return new Response(body, {
            status: 200,
            headers: { 'Content-Type': 'application/json; charset=utf-8', 'X-Elc-Cache': 'hit' },
          });
        }
      }
    } catch (e) {
      console.warn('[idb-cache] read fail (network fallback)', e);
    }

    // Network + сохраняем в кеш.
    // ВАЖНО: читаем тело ОДИН раз и возвращаем фронту новый Response из строки.
    // Старый вариант с resp.clone().text() — tee'д ReadableStream — на больших
    // ответах (80MB contacts) даёт race/truncation, и `r.json()` падает в фронте
    // с "Expected ',' or '}' at position ...".
    const t0 = performance.now();
    const resp = await _origFetch(input, init);
    if (!resp || !resp.ok) return resp;
    let body;
    try {
      body = await resp.text();
    } catch (e) {
      console.warn('[idb-cache] body read fail', e);
      throw e; // resp уже частично consumed — нечего вернуть, пусть фронт увидит ошибку
    }
    idbSet(cacheKey, { body, fetchedAt: Date.now() })
      .catch(e => console.warn('[idb-cache] write fail', e));
    const ms = Math.round(performance.now() - t0);
    console.log('[idb-cache] stored', parsed.path, ms + 'ms', body.length + 'B');
    return new Response(body, {
      status: 200,
      headers: { 'Content-Type': 'application/json; charset=utf-8', 'X-Elc-Cache': 'fresh' },
    });
  };

  // Экспонируем минимальный API для debug/ручной очистки
  window.elcRtdbCache = {
    clear: idbClear,
    purge: idbDelByPrefix,
    get: idbGet,
  };

  console.log('[elc-rtdb-cache] installed (IDB, 24h TTL)');
})();
// === /ELC IndexedDB RTDB cache ===

};

window.loginEmail = async function() {

  const pass = document.getElementById('login-password').value;
  if (!email || !pass) { showError('Введите email и пароль'); return; }

  try {

  } catch (e) {

  }
};

  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('Сначала введите email'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess('Письмо для сброса пароля отправлено на ' + email);
  } catch (e) {
    showError(humanizeAuthError(e));
  }
};

  await fbSignOut(auth);
};

function humanizeAuthError(e) {
  const code = e.code || '';
  if (code.includes('user-not-found')) return 'Пользователь не найден';
  if (code.includes('wrong-password') || code.includes('invalid-credential')) return 'Неверный пароль';
  if (code.includes('invalid-email')) return 'Неправильный формат email';
  if (code.includes('too-many-requests')) return 'Слишком много попыток. Попробуйте позже';
  if (code.includes('popup-closed-by-user')) return 'Окно закрыто';
  if (code.includes('popup-blocked')) return 'Браузер заблокировал всплывающее окно. Разрешите popups для этого сайта.';
  return e.message || 'Ошибка авторизации';
}
function showError(msg) {
  const el = document.getElementById('login-error');
  if (msg) { el.textContent = msg; el.style.display = ''; } else { el.style.display = 'none'; }
  document.getElementById('login-success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('login-success');
  if (msg) { el.textContent = msg; el.style.display = ''; } else { el.style.display = 'none'; }
  document.getElementById('login-error').style.display = 'none';
}

// ── Auth state listener ──────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.add('active');
    initApp(user);
  } else {
    document.getElementById('login').style.display = '';
    document.getElementById('app').classList.remove('active');
  }
});

// ── App init ─────────────────────────────────────────────
async function initApp(user) {
  console.log('[initApp] start, uid=', user.uid, 'email=', user.email);
  // Сохраняем профиль текущего пользователя
  const profile = {
    email: user.email,
    name: user.displayName || user.email.split('@')[0],
    photoURL: user.photoURL || '',
    lastLogin: new Date().toISOString(),
    provider: user.providerData[0]?.providerId || 'unknown',
  };
  // Phase 2.1: SDK update отключён — пишем профиль в Phase 3 (worker write API).
  // try {
  //   await update(ref(db, `users/${user.uid}`), profile);
  //   console.log('[initApp] profile saved');
  // } catch (e) {
  //   console.warn('[initApp] profile update failed (non-fatal, continuing):', e);
  // }
  console.log('[initApp] profile save skipped (Phase 2.1 read-only)');

  // UI
  try {
    const initials = (profile.name || 'U').split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
    const av = document.getElementById('ux-avatar');
    const nm = document.getElementById('ux-name');
    const em = document.getElementById('ux-email');
    if (av) av.textContent = initials;
    if (nm) nm.textContent = profile.name;
    if (em) em.textContent = user.email;
  } catch (e) {
    console.warn('[initApp] sidebar UI fill failed (non-fatal):', e);
  }

  // Default page
  console.log('[initApp] navigating to dashboard');
  navigate('dashboard');

  // Если есть deep link — открываем после загрузки
  if (location.hash.startsWith('#deal/')) {
    navigate('deals');
    setTimeout(() => handleDeepLink(), 500);
  }

  // Setup nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => navigate(el.dataset.page);
  });

  // Theme toggle
  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) {
    updateThemeButton();
    themeBtn.onclick = toggleTheme;
  }

  // Фоновая прелоадка — пока пользователь смотрит дашборд, грузим данные
  // Поэтапно (не разом) чтобы не нагружать сеть
  setTimeout(() => preloadInBackground(), 800);
}

async function preloadInBackground() {
  // 1. Users — самые маленькие (88), нужны всем разделам
  await ensureUsersLoaded();
  // 2. Reference lists — копейки
  ensureRefListsLoaded();
  // 3. Сделки (22k, ~3-5 МБ) — параллельно
  if (!dealsState.loaded) {
    loadDealsData().then(() => {
      // После загрузки — подключаем live-listener
      attachDealsLiveListener();
    });
  } else {
    attachDealsLiveListener();
  }
  // 4. Задачи (38k, ~30 МБ) — самые тяжёлые, через 2 секунды после сделок
  setTimeout(() => {
    if (!tasksState.loaded) {
      loadTasks().then(() => {
        populateTaskAssigneeFilter();
        attachTasksLiveListener();
      });
    } else {
      attachTasksLiveListener();
    }
  }, 2000);
  // Контакты больше не префетчим — серверная пагинация подгружает первую
  // страницу (50 записей) мгновенно при открытии раздела.

function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
}

function updateThemeButton() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  btn.textContent = current === 'light' ? '☀️' : '🌙';
  btn.title = current === 'light' ? 'Переключить на тёмную тему' : 'Переключить на светлую тему';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem('pllato:theme', next); } catch {}
  updateThemeButton();
}

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);

}

async function fetchShallowKeys(path) {
  // Worker /api/rtdb/{path}.json?shallow=true — возвращает {key: true} для всех
  // верхних ключей коллекции. Используем для дашборд-счётчиков.
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const url = `${WORKER_RTDB_URL}/${path}.json?shallow=true&auth=${idToken}`;
    const r = await fetch(url);
    if (!r.ok) return 0;
    const data = await r.json();
    if (!data) return 0;
    return Object.keys(data).length;
  } catch (e) {
    return 0;
  }
}

  try {
    const idToken = await fbAuth.currentUser.getIdToken();

      fetch(`${dbUrl}/deals.json?auth=${idToken}`).then(r => r.ok ? r.json() : null),

// ─── Realtime listener для сделок ────────────────────────────────
let _dealsListenerAttached = false;
let _dealsListenerLastSync = null;
function attachDealsLiveListener() {
  if (_dealsListenerAttached) return;
  if (!dealsState.loaded) return;
  _dealsListenerAttached = true;

  // Слушаем только новые/изменённые после нашего последнего sync
  // Используем bitrixDateModify (есть на каждой сделке) для фильтрации
  // ВАЖНО: indexOn для bitrixDateModify должен быть в Firebase rules
  // Иначе фолбэк на простой child_changed без фильтра
  const dealsRef = window.dbRef(window.fbDb, 'deals');

  // Последний модифицированный момент в наших данных
  const lastTs = dealsState.deals.reduce((max, d) => {
    const t = d.bitrixDateModify || d.bitrixDateCreate || '';
    return t > max ? t : max;
  }, '');
  _dealsListenerLastSync = lastTs;

  // child_added — для новых сделок (которые появились после нашего sync)
  // Listener срабатывает СРАЗУ для всех существующих детей; мы фильтруем по дате
  window.dbOnChildAdded(dealsRef, (snap) => {
    const deal = snap.val();
    if (!deal) return;
    const ts = deal.bitrixDateModify || deal.bitrixDateCreate || '';
    // Игнорируем уже известные (initial flush) — мы их видели в snapshot
    if (lastTs && ts <= lastTs) return;
    // Новая сделка — добавляем в state
    const existsIdx = dealsState.deals.findIndex(d => d.bitrixId === deal.bitrixId);
    if (existsIdx === -1) {
      dealsState.deals.unshift(deal);
      console.log('[Live] new deal:', deal.bitrixId, deal.title);
      // Если открыта страница — перерисовываем
      if (document.querySelector('[data-page="deals"].active')) {
        renderDealsContent();
      }
      saveCacheDealsThrottled();
    }
  });

  window.dbOnChildChanged(dealsRef, (snap) => {
    const deal = snap.val();
    if (!deal) return;
    const idx = dealsState.deals.findIndex(d => d.bitrixId === deal.bitrixId);
    if (idx >= 0) {
      // Обновляем сохраняя позицию
      dealsState.deals[idx] = deal;
      console.log('[Live] deal changed:', deal.bitrixId);
      if (document.querySelector('[data-page="deals"].active')) {
        renderDealsContent();
      }
      saveCacheDealsThrottled();
    }
  });

  window.dbOnChildRemoved(dealsRef, (snap) => {
    const deal = snap.val();
    if (!deal) return;
    const idx = dealsState.deals.findIndex(d => d.bitrixId === deal.bitrixId);
    if (idx >= 0) {
      dealsState.deals.splice(idx, 1);
      console.log('[Live] deal removed:', deal.bitrixId);
      if (document.querySelector('[data-page="deals"].active')) {
        renderDealsContent();
      }
      saveCacheDealsThrottled();
    }
  });
}

let _saveCacheDealsTimer = null;
function saveCacheDealsThrottled() {
  if (_saveCacheDealsTimer) clearTimeout(_saveCacheDealsTimer);
  _saveCacheDealsTimer = setTimeout(() => {
    cacheSet('deals:full:v1', {
      deals: dealsState.deals,
      pipeline: dealsState.pipeline,
      customSchema: dealsState.customSchema,
      users: dealsState.users,
    });
  }, 5000);
}

function updateDealsCount() {
  const total = dealsState.deals.length;
  const filtered = getFilteredDeals().length;
  const el = document.getElementById('deals-count');
  if (el) {
    el.textContent = filtered === total
      ? total.toLocaleString('ru')
      : `${total.toLocaleString('ru')} · отф. ${filtered.toLocaleString('ru')}`;
  }
}

function getFilteredDeals() {
  let arr = dealsState.deals;
  if (dealsState.search) {
    const q = dealsState.search.toLowerCase();
    arr = arr.filter(d => (d.title || '').toLowerCase().includes(q));
  }
  if (dealsState.stageFilter) {
    arr = arr.filter(d => d.stageId === dealsState.stageFilter);
  }
  if (dealsState.responsibleFilter) {
    arr = arr.filter(d => d.responsibleUid === dealsState.responsibleFilter);
  }
  return arr;
}

function renderDealsContent() {
  const c = document.getElementById('deals-content');
  if (!c) return;
  const arr = getFilteredDeals();

  if (dealsState.view === 'list') {
    renderDealsList(c, arr);
  } else {
    renderDealsKanban(c, arr);
  }
}

function renderDealsList(c, arr) {
  if (!arr.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Не найдено сделок по фильтрам</div></div>`;
    return;
  }
  const totalPages = Math.ceil(arr.length / dealsState.pageSize);
  const page = Math.min(dealsState.page, totalPages - 1);
  const start = page * dealsState.pageSize;
  const end = Math.min(start + dealsState.pageSize, arr.length);
  const slice = arr.slice(start, end);

  let html = `<div class="dtable-wrap" style="overflow-x:auto">
    <table class="dtable">
      <thead>
        <tr>
          <th style="width:42%">Название</th>
          <th style="width:18%">Стадия</th>
          <th style="width:14%">Сумма</th>
          <th style="width:18%">Ответственный</th>
          <th style="width:8%">Создано</th>
        </tr>
      </thead>
      <tbody>`;

  for (const d of slice) {
    const stage = dealsState.pipeline?.stages?.[d.stageId];
    const stageName = stage?.name || d.stageId || '—';
    const stageColor = stage?.semantics === 'S' ? 'var(--gn)' : (stage?.semantics === 'F' ? 'var(--rd)' : 'var(--ac2)');
    const respUser = dealsState.users[d.responsibleUid];
    const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
    const opp = d.opportunity || 0;
    const date = d.bitrixDateCreate ? new Date(d.bitrixDateCreate).toLocaleDateString('ru', { day: '2-digit', month: '2-digit', year: '2-digit' }) : '—';

    html += `<tr class="row" data-deal-id="${escapeHtml(d.bitrixId)}">
      <td class="name-cell" style="width:42%">${escapeHtml(d.title || '(без названия)')}</td>
      <td style="width:18%"><span class="badge" style="color:${stageColor};border-color:${stageColor}55;background:${stageColor}22">${escapeHtml(stageName)}</span></td>
      <td style="width:14%;color:${opp ? 'var(--gn)' : 'var(--t3)'};font-variant-numeric:tabular-nums;font-weight:600">${opp ? opp.toLocaleString('ru') + ' ' + (d.currency || '') : '—'}</td>
      <td style="width:18%;color:var(--ac2)">${escapeHtml(respName)}</td>
      <td style="width:8%;color:var(--t3);font-size:11px">${date}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  html += `<div class="pagination">
    <button class="pg-btn" data-pg="first" ${page === 0 ? 'disabled' : ''}>« Первая</button>
    <button class="pg-btn" data-pg="prev" ${page === 0 ? 'disabled' : ''}>‹ Назад</button>
    <span class="pg-info">${page + 1} из ${totalPages} · показано ${start + 1}–${end} из ${arr.length.toLocaleString('ru')}</span>
    <button class="pg-btn" data-pg="next" ${page >= totalPages - 1 ? 'disabled' : ''}>Вперёд ›</button>
    <button class="pg-btn" data-pg="last" ${page >= totalPages - 1 ? 'disabled' : ''}>Последняя »</button>
  </div>`;

  c.innerHTML = html;

  c.querySelectorAll('tr.row').forEach(r => {
    r.addEventListener('click', () => openDealCard(r.dataset.dealId));
  });
  c.querySelectorAll('[data-pg]').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.pg === 'first') dealsState.page = 0;
      else if (b.dataset.pg === 'prev') dealsState.page = Math.max(0, page - 1);
      else if (b.dataset.pg === 'next') dealsState.page = Math.min(totalPages - 1, page + 1);
      else if (b.dataset.pg === 'last') dealsState.page = totalPages - 1;
      renderDealsContent();
    });
  });
}

// Универсальная сортировка сделок в канбане:
// сначала непрочитанные/недавние сверху
function sortDealsForKanban(deals) {
  return deals.slice().sort((a, b) => {
    const da = a.bitrixDateModify || a.bitrixDateCreate || '';
    const db = b.bitrixDateModify || b.bitrixDateCreate || '';
    return db.localeCompare(da);
  });
}

let _kanbanDragId = null;
let _kanbanScrollTimer = null;

function renderDealsKanban(c, arr) {
  const stages = getStagesSorted();
  if (!stages.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Нет стадий воронки</div></div>`;
    return;
  }

  const byStage = {};
  for (const s of stages) byStage[s.statusId] = [];
  for (const d of arr) {
    if (byStage[d.stageId]) byStage[d.stageId].push(d);
  }

  let html = `<div class="kanban-wrap" id="kanban-wrap">`;
  const MAX_PER_COL = 100;

  for (const s of stages) {
    const cards = sortDealsForKanban(byStage[s.statusId] || []);
    const totalSum = cards.reduce((acc, d) => acc + (d.opportunity || 0), 0);
    const stageColor = s.semantics === 'S' ? '#3fd88e' : s.semantics === 'F' ? '#f05975' : '#a87fff';

    html += `<div class="kanban-col" data-stage="${escapeHtml(s.statusId)}">
      <div class="kanban-col-header" style="border-top:3px solid ${stageColor}">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <span class="stage-dot" style="background:${stageColor}"></span>
          <span style="color:${stageColor};font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(s.name)}</span>
        </div>
        <span class="col-count" style="color:${stageColor};background:${stageColor}22;border:1px solid ${stageColor}55">${cards.length.toLocaleString('ru')}</span>
      </div>
      ${totalSum > 0 ? `<div class="kanban-col-sum">${totalSum.toLocaleString('ru')} ₸</div>` : ''}
      <div class="kanban-col-cards" data-stage="${escapeHtml(s.statusId)}">`;

    for (const d of cards.slice(0, MAX_PER_COL)) {
      html += buildDealCard(d, stageColor);
    }
    if (cards.length > MAX_PER_COL) {
      html += `<div class="kanban-more">… ещё ${(cards.length - MAX_PER_COL).toLocaleString('ru')}</div>`;
    }
    if (cards.length === 0) {
      html += `<div class="kanban-empty" data-stage="${escapeHtml(s.statusId)}">Перетащи сюда</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;

  c.innerHTML = html;

  initKanbanDragDrop();

  // Кнопки действий внутри карточек — нужны event delegation
  c.addEventListener('click', handleKanbanCardAction);
}

function buildDealCard(d, stageColor) {
  const respUser = getUserById(d.responsibleUid);
  const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '';
  const respShort = respName ? respName.split(' ').filter(Boolean).map(p => p[0]).slice(0, 2).join('').toUpperCase() : '?';
  const opp = d.opportunity || 0;

  // Контактный телефон — приоритет d.phones потом ищем у контакта
  let phone = '';
  if (Array.isArray(d.phones) && d.phones.length > 0) phone = d.phones[0]?.value || '';
  else if (d._contactPhone) phone = d._contactPhone;
  // Поиск телефона у привязанного контакта
  if (!phone && d.contactId) {
    // dealsState.contactPhones — кэш телефонов контактов (см. ниже buildDealCard cache)
    phone = dealsState.contactPhones?.[d.contactId] || '';
  }

  // Дата последнего изменения (если давно — пометить stale)
  const lastDate = d.bitrixDateModify || d.bitrixDateCreate;
  const daysSince = lastDate ? Math.floor((Date.now() - new Date(lastDate).getTime()) / 86400000) : null;
  const staleWarn = daysSince !== null && daysSince > 7;
  const created = d.bitrixDateCreate ? new Date(d.bitrixDateCreate).toLocaleDateString('ru', { day: '2-digit', month: '2-digit' }) : '';

  // Граница карточки по приоритету
  const borderColor = staleWarn ? 'rgba(240,89,117,.35)' : 'var(--b1)';
  const stageBorderLeft = `3px solid ${stageColor}`;

  return `<div class="kanban-card" draggable="true" data-deal-id="${escapeHtml(d.bitrixId)}" data-stage="${escapeHtml(d.stageId)}" style="border-left:${stageBorderLeft};border-color:${borderColor}">
    <div class="kanban-card-title">${escapeHtml(d.title || '(без названия)')}</div>
    ${opp > 0 ? `<div class="kanban-card-money">${opp.toLocaleString('ru')} ₸</div>` : ''}
    ${phone ? `<div class="kanban-card-phone">📱 ${escapeHtml(phone)}</div>` : ''}
    <div class="kanban-card-foot">
      <div class="kanban-card-resp" title="${escapeHtml(respName || 'Без ответственного')}">
        <span class="kanban-av">${escapeHtml(respShort)}</span>
        <span class="kanban-card-resp-name">${escapeHtml(respName.split(' ')[0] || '—')}</span>
      </div>
      ${staleWarn ? `<span class="kanban-stale">${daysSince}д</span>` : (created ? `<span class="kanban-card-date">${created}</span>` : '')}
    </div>
    <div class="kanban-card-actions">
      ${phone ? `<button class="kca-btn kca-wa" data-action="wa" data-phone="${escapeHtml(phone)}" title="Открыть WhatsApp">💬</button>` : ''}
      ${phone ? `<button class="kca-btn kca-call" data-action="call" data-phone="${escapeHtml(phone)}" title="Позвонить">📞</button>` : ''}
      <button class="kca-btn kca-stage" data-action="stage" data-deal-id="${escapeHtml(d.bitrixId)}" title="Сменить стадию" style="margin-left:auto">→</button>
    </div>
  </div>`;
}

function handleKanbanCardAction(e) {
  const btn = e.target.closest('[data-action]');
  if (btn) {
    e.stopPropagation();
    e.preventDefault();
    const action = btn.dataset.action;
    if (action === 'wa') {
      const phone = (btn.dataset.phone || '').replace(/\D/g, '');
      if (phone) window.open(`https://wa.me/${phone}`, '_blank');
    } else if (action === 'call') {
      const phone = btn.dataset.phone || '';
      if (phone) window.location.href = `tel:${phone}`;
    } else if (action === 'stage') {
      showStageQuickPick(btn.dataset.dealId, btn);
    }
    return;
  }
  // Иначе — обычный клик по карточке
  const card = e.target.closest('.kanban-card');
  if (card && !e.defaultPrevented) {
    openDealCard(card.dataset.dealId);
  }
}

// Quick stage picker — поповер со списком стадий
function showStageQuickPick(dealId, anchorBtn) {
  document.getElementById('_stage-pick')?.remove();
  const stages = getStagesSorted();
  const rect = anchorBtn.getBoundingClientRect();
  const pick = document.createElement('div');
  pick.id = '_stage-pick';
  pick.className = 'stage-quick-pick';
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow > 240) {
    pick.style.top = (rect.bottom + 4) + 'px';
    pick.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  } else {
    pick.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    pick.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  }
  let html = `<div class="sqp-header">Перенести в стадию</div>`;
  for (const s of stages) {
    const stageColor = s.semantics === 'S' ? '#3fd88e' : s.semantics === 'F' ? '#f05975' : '#a87fff';
    html += `<div class="sqp-item" data-stage-id="${escapeHtml(s.statusId)}">
      <span class="sqp-dot" style="background:${stageColor}"></span>
      <span>${escapeHtml(s.name)}</span>
    </div>`;
  }
  pick.innerHTML = html;
  document.body.appendChild(pick);

  pick.querySelectorAll('.sqp-item').forEach(item => {
    item.addEventListener('click', () => {
      const newStageId = item.dataset.stageId;
      moveDealToStage(dealId, newStageId);
      pick.remove();
    });
  });

  setTimeout(() => {
    document.addEventListener('click', function h(e) {
      if (!pick.contains(e.target)) {
        pick.remove();
        document.removeEventListener('click', h, true);
      }
    }, { capture: true });
  }, 10);
}

// Перенести сделку в новую стадию
async function moveDealToStage(bitrixId, newStageId) {
  const deal = dealsState.deals.find(d => String(d.bitrixId) === String(bitrixId));
  if (!deal) return;
  if (deal.stageId === newStageId) return; // ничего не менять

  const oldStageId = deal.stageId;
  // Optimistic update
  deal.stageId = newStageId;
  deal.bitrixDateModify = new Date().toISOString();
  // Перерисовываем
  renderDealsContent();

  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const dealKey = `deal_${bitrixId}`;
    const r = await fetch(`${dbUrl}/deals/${dealKey}.json?auth=${idToken}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        stageId: newStageId,
        bitrixDateModify: new Date().toISOString(),
      }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    // Обновим кеш сделок
    cacheSet('deals:full:v1', {
      deals: dealsState.deals,
      pipeline: dealsState.pipeline,
      customSchema: dealsState.customSchema,
      users: dealsState.users,
    });
    showToast('Стадия обновлена');
  } catch (e) {
    // Revert on failure
    deal.stageId = oldStageId;
    renderDealsContent();
    showToast('Ошибка: ' + e.message, true);
  }
}

function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.className = 'app-toast' + (isError ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 250);
  }, 2200);
}

function initKanbanDragDrop() {
  const wrap = document.getElementById('kanban-wrap');
  if (!wrap) return;

  // Колонки и пустые-зоны принимают drop
  wrap.querySelectorAll('.kanban-col-cards, .kanban-empty').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      const target = col.classList.contains('kanban-empty') ? col : col;
      target.classList.add('drag-over');
      // Auto-scroll wrap при приближении к краям
      const rect = wrap.getBoundingClientRect();
      const edge = 80;
      if (e.clientX > rect.right - edge) {
        if (!_kanbanScrollTimer) _kanbanScrollTimer = setInterval(() => { wrap.scrollLeft += 18; }, 16);
      } else if (e.clientX < rect.left + edge) {
        if (!_kanbanScrollTimer) _kanbanScrollTimer = setInterval(() => { wrap.scrollLeft -= 18; }, 16);
      } else {
        clearInterval(_kanbanScrollTimer);
        _kanbanScrollTimer = null;
      }
    });
    col.addEventListener('dragleave', () => {
      col.classList.remove('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      col.classList.remove('drag-over');
      clearInterval(_kanbanScrollTimer);
      _kanbanScrollTimer = null;
      const newStageId = col.dataset.stage;
      if (newStageId && _kanbanDragId) {
        moveDealToStage(_kanbanDragId, newStageId);
      }
    });
  });

  // Карточки — draggable
  wrap.querySelectorAll('.kanban-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      _kanbanDragId = card.dataset.dealId;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      clearInterval(_kanbanScrollTimer);
      _kanbanScrollTimer = null;
      wrap.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      _kanbanDragId = null;
    });
  });
}

function getStagesSorted() {
  const stages = dealsState.pipeline?.stages || {};
  return Object.values(stages).sort((a, b) => (a.sort || 0) - (b.sort || 0));
}

function getUsersForFilter() {
  // Только те юзеры что реально упомянуты в сделках как ответственные
  const seen = new Set();
  for (const d of dealsState.deals) {
    if (d.responsibleUid) seen.add(d.responsibleUid);
  }
  const arr = [];
  for (const uid of seen) {
    const u = dealsState.users[uid];
    if (u) {
      arr.push({
        uid,
        fullName: `${u.lastName || ''} ${u.name || ''}`.trim() || u.email,
      });
    }
  }
  return arr.sort((a, b) => a.fullName.localeCompare(b.fullName, 'ru'));
}

async function openDealCard(bitrixId) {
  const deal = dealsState.deals.find(d => d.bitrixId === bitrixId);
  if (!deal) return;

  // Обновляем URL для глубокой ссылки
  const newHash = `#deal/${bitrixId}`;
  if (location.hash !== newHash) {
    history.pushState({ deal: bitrixId }, '', newHash);
  }

  const stage = dealsState.pipeline?.stages?.[deal.stageId];
  const stageName = stage?.name || deal.stageId || '—';
  const respUser = getUserById(deal.responsibleUid);
  const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
  const respEmail = respUser?.email || '';
  const createdByUser = getUserById(deal.createdByUid);
  const createdByName = createdByUser ? `${createdByUser.lastName || ''} ${createdByUser.name || ''}`.trim() : '—';

  const bitrixUrl = `https://elcalmaty.bitrix24.kz/crm/deal/details/${deal.bitrixId}/`;

  const idToken = await fbAuth.currentUser.getIdToken();
  const dbUrl = WORKER_RTDB_URL;
  const fetches = [];
  if (deal.contactId) {
    fetches.push(fetch(`${dbUrl}/contacts/${deal.contactId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null));
  } else {
    fetches.push(Promise.resolve(null));
  }
  if (deal.companyId) {
    fetches.push(fetch(`${dbUrl}/companies/${deal.companyId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null));
  } else {
    fetches.push(Promise.resolve(null));
  }
  fetches.push(fetch(`${dbUrl}/timeline/deal_${deal.bitrixId}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null).catch(() => null));

  const [contact, company, timelineRaw] = await Promise.all(fetches);

  const timeline = timelineRaw
    ? Object.entries(timelineRaw).map(([k, v]) => ({ ...v, _key: k })).sort((a, b) => {
        const da = a.bitrixCreated || a.start || '';
        const db = b.bitrixCreated || b.start || '';
        return db.localeCompare(da);
      })
    : [];

  // Поиск активной openlines-сессии для отображения переписки в правой колонке
  const openlinesActivities = timeline.filter(a => a.openlinesSessionId);
  const latestOpenlinesActivity = openlinesActivities[0] || null;

  // Контактный телефон
  let contactPhone = '';
  let contactName = '';
  if (contact) {
    contactName = [contact.lastName, contact.name, contact.secondName].filter(Boolean).join(' ').trim();
    if (Array.isArray(contact.phones) && contact.phones.length > 0) {
      contactPhone = contact.phones[0]?.value || '';
    }
    // Кешируем для канбана
    if (!dealsState.contactPhones) dealsState.contactPhones = {};
    if (deal.contactId && contactPhone) dealsState.contactPhones[deal.contactId] = contactPhone;
  }

  // Stage pipeline bar — горизонтальные стадии
  const stages = getStagesSorted();
  const currentStageIdx = stages.findIndex(s => s.statusId === deal.stageId);
  const stageBarHtml = stages.map((s, idx) => {
    const isPast = currentStageIdx >= 0 && idx < currentStageIdx;
    const isCurrent = s.statusId === deal.stageId;
    const sColor = s.semantics === 'S' ? '#3fd88e' : s.semantics === 'F' ? '#f05975' : '#a87fff';
    const bg = isCurrent ? sColor : (isPast ? `${sColor}33` : 'var(--bg3)');
    const color = isCurrent ? '#fff' : (isPast ? sColor : 'var(--t3)');
    return `<button class="dc-stage-btn ${isCurrent ? 'active' : ''}" data-stage-id="${escapeHtml(s.statusId)}" style="background:${bg};color:${color};border-color:${isCurrent || isPast ? sColor + '55' : 'var(--b1)'}">
      ${escapeHtml(s.name)}
    </button>`;
  }).join('');

  let html = `<div class="modal-overlay" onclick="if(event.target===this)closeDealCard()">
    <div class="modal modal-xl">
      <div class="dc-head">
        <div style="flex:1;min-width:0">
          <h2 style="margin:0">${escapeHtml(deal.title || '(без названия)')}</h2>
          <div class="modal-sub" style="margin-top:4px">

            <a href="${bitrixUrl}" target="_blank" style="color:var(--ac2)">Открыть в Битриксе ↗</a> ·
            <button class="tbtn-xs dc-copy-link" data-deal-id="${escapeHtml(deal.bitrixId)}" style="background:none;border:none;color:var(--ac2);cursor:pointer;font-size:11px;padding:0">🔗 Копировать ссылку</button>
          </div>
        </div>
        <button class="close-x" onclick="closeDealCard()">×</button>
      </div>

      <div class="dc-stagebar">${stageBarHtml}</div>

      <div class="dc-grid">
        <div class="dc-left">
          <div class="dc-section-h">Основное</div>
          <div class="field-grid">
            <div class="fl">Сумма</div>
            <div class="fv">${deal.opportunity ? `<span class="money">${deal.opportunity.toLocaleString('ru')} ${escapeHtml(deal.currency || '')}</span>` : '<span class="empty-cell">не указана</span>'}</div>
            ${deal.probability ? `<div class="fl">Вероятность</div><div class="fv">${deal.probability}%</div>` : ''}
            <div class="fl">Ответственный</div>
            <div class="fv">${escapeHtml(respName)} ${respEmail ? `<span class="muted">· ${escapeHtml(respEmail)}</span>` : ''}</div>
            <div class="fl">Создал</div>
            <div class="fv">${escapeHtml(createdByName)}</div>
            <div class="fl">Создана</div>
            <div class="fv">${deal.bitrixDateCreate ? new Date(deal.bitrixDateCreate).toLocaleString('ru') : '—'}</div>
            <div class="fl">Изменена</div>
            <div class="fv">${deal.bitrixDateModify ? new Date(deal.bitrixDateModify).toLocaleString('ru') : '—'}</div>
            <div class="fl">Закрыто</div>
            <div class="fv">${deal.closed ? '<span style="color:var(--gn)">✓ Да</span> ' + (deal.closeDate ? new Date(deal.closeDate).toLocaleDateString('ru') : '') : '<span class="muted">Нет</span>'}</div>
            ${deal.sourceId ? `<div class="fl">Источник</div>
              <div class="fv">${escapeHtml(getSourceName(deal.sourceId))}${deal.sourceDescription ? ` <span class="muted">· ${escapeHtml(deal.sourceDescription)}</span>` : ''}</div>` : ''}
          </div>

          ${contact ? `<div class="dc-section-h">Контакт</div>
            <div class="dc-contact-card">
              <div class="dc-contact-name">${escapeHtml(contactName || '(без имени)')}</div>
              ${contactPhone ? `<div class="dc-contact-phone">📱 ${escapeHtml(contactPhone)}</div>
                <div class="dc-contact-actions">
                  <button class="tbtn tbtn-g tbtn-xs" onclick="window.open('https://wa.me/${contactPhone.replace(/\\D/g, '')}', '_blank')">💬 WhatsApp</button>
                  <button class="tbtn tbtn-xs" onclick="window.location.href='tel:${escapeHtml(contactPhone)}'">📞 Позвонить</button>
                  <button class="tbtn tbtn-xs" onclick="navigator.clipboard.writeText('${escapeHtml(contactPhone)}');showToast('Телефон скопирован')">📋 Копировать</button>
                </div>` : ''}
              ${Array.isArray(contact.emails) && contact.emails[0]?.value ? `<div class="dc-contact-email">📧 <a href="mailto:${escapeHtml(contact.emails[0].value)}">${escapeHtml(contact.emails[0].value)}</a></div>` : ''}
              <button class="tbtn tbtn-xs" style="margin-top:8px" onclick="closeDealCard();setTimeout(()=>openContactCard('${escapeHtml(deal.contactId)}'),100)">Открыть карточку контакта →</button>

              <div class="dc-contact-name">${escapeHtml(company.title || '—')}</div>
