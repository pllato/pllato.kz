<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Команды — переезд</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="pllato_favicon_64.svg">
  <style>
    :root {
      --bg: #f6f5f2;
      --surface: #ffffff;
      --text: #1f1f1b;
      --muted: #67645b;
      --line: rgba(41, 40, 36, 0.12);
      --accent: #b8895a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      width: min(640px, 100%);
      background: var(--surface);
      border: .5px solid var(--line);
      border-radius: 16px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--muted);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: .5px solid var(--line);
      text-decoration: none;
      color: var(--text);
      background: #fff;
      font-weight: 500;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
  <script src="app.config.js"></script>
</head>
<body>
  <div class="card">
    <h1>CRM Команды переехала</h1>
    <p>Эта страница работает в режиме редиректа. Рабочая версия CRM находится в <code>/crm/</code> и использует Cloudflare Worker + D1.</p>
    <p id="state-text">Проверяем сессию и перенаправляем…</p>
    <div class="row">
      <a class="btn primary" id="open-crm" href="/crm/">Открыть CRM</a>
      <a class="btn" href="app.html">Назад в App</a>
    </div>
  </div>

  <script type="module">
    import { requireSession } from './pllato-kz-shared/pllato-api.js';

    const stateText = document.getElementById('state-text');
    const session = requireSession({ redirectTo: 'login.html' });
    if (!session) {
      stateText.textContent = 'Сессия не найдена, переходим на страницу входа…';
    } else {
      stateText.textContent = 'Сессия активна, открываем CRM…';
      const tail = window.location.hash || '';
      setTimeout(() => {
        window.location.replace(`/crm/${tail}`);
      }, 220);
    }
  </script>
</body>
</html>
