// ─── Простейший рендер Битрикс-BBCode в HTML.
// Поддерживается:
//   [DISK FILE ID=xxx]      → плейсхолдер, потом resolveDiskFileRefs
//                             подтянет имя и привесит download-обработчик
//   [URL=link]label[/URL]   → <a href="link">label</a>
//   [URL]link[/URL]         → <a href="link">link</a>
//   просто http(s)://...    → <a href> (не трогаем если уже внутри тега)
function renderBitrixBBCode(text) {
  if (!text) return '';
  // Защищаем от инъекций
  let h = escapeHtml(text);

  // [DISK FILE ID=xxx] — плейсхолдер. ID может быть с префиксом 'n' или без;
  // у Битрикса 'n' появляется когда файл вставлен из редактора (n = "new").
  // Реальный bitrixFileId — без 'n'.
  h = h.replace(/\[DISK FILE ID=([A-Za-z0-9_-]+)\]/g, (m, id) => {
    const cleanId = String(id).replace(/^n/i, '');
    return `<span class="disk-file-ref" data-fid="${escapeHtml(cleanId)}" data-orig-id="${escapeHtml(id)}" style="display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--b1);border-radius:4px;padding:1px 8px;cursor:pointer;color:var(--ac2);font-size:12px;font-weight:500;vertical-align:baseline;text-decoration:none">📎 файл ${escapeHtml(id)}</span>`;
  });

  // [URL=link]label[/URL] и [URL]link[/URL]
  h = h.replace(/\[URL=([^\]]+?)\]([\s\S]*?)\[\/URL\]/gi, (m, url, label) => {
    const clean = url.replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
    return `<a href="${escapeHtml(clean)}" target="_blank" rel="noopener" style="color:var(--ac2);text-decoration:underline;word-break:break-all">${label}</a>`;
  });
  h = h.replace(/\[URL\]([\s\S]*?)\[\/URL\]/gi, (m, url) => {
    const clean = url.replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
    return `<a href="${escapeHtml(clean)}" target="_blank" rel="noopener" style="color:var(--ac2);text-decoration:underline;word-break:break-all">${escapeHtml(clean)}</a>`;
  });

  // Голые http(s)://... и mailto: — делаем кликабельными.
  // Учитываем что мы уже завернули некоторые в <a> — не дублируем (negative lookahead на href=).
  h = h.replace(/(^|[\s(])(https?:\/\/[^\s<>"']+[^\s<>"'.,;:!?()])/g, (m, pre, url) =>
    `${pre}<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="color:var(--ac2);text-decoration:underline;word-break:break-all">${escapeHtml(url)}</a>`);

  return h;
}

// ─── Резолвинг всех плейсхолдеров [DISK FILE ID=...] внутри контейнера.
// Параллельно фетчит метаданные из /filesQueue, после чего:
//   - если файл в R2 → показывает имя и навешивает downloadTaskFile
//   - если нет в очереди / провалился → 🔄 retry (worker сам тащит из Битрикса)
async function resolveDiskFileRefs(rootEl) {
  const refs = rootEl.querySelectorAll('.disk-file-ref');
  if (!refs.length) return;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const idsSet = new Set();
    refs.forEach(el => { if (el.dataset.fid) idsSet.add(el.dataset.fid); });
    const ids = Array.from(idsSet);
    const metas = await Promise.all(ids.map(id =>
      fetch(`${dbUrl}/filesQueue/${encodeURIComponent(id)}.json?auth=${idToken}`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    const byId = {};
    ids.forEach((id, i) => { byId[id] = metas[i]; });

    refs.forEach(el => {
      const id = el.dataset.fid;
      const meta = byId[id];
      if (meta && meta.migrated && meta.r2Key && !meta.permanentlyFailed) {
        const name = meta.fileName || `file_${id}`;
        const size = meta.fileSize ? humanFileSize(meta.fileSize) : '';
        el.innerHTML = `<span style="font-size:14px">${taskFileIcon(meta.contentType, name)}</span> <span style="text-decoration:underline">${escapeHtml(name)}</span>${size ? ` <span style="color:var(--t3);font-size:10px;font-weight:400">(${escapeHtml(size)})</span>` : ''}`;
        el.title = `Скачать ${name}`;
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadTaskFile(id, name, null);
        });
      } else {
        // Файла нет в R2 / нет в очереди — клик попробует rescue из Битрикса
        const origId = el.dataset.origId || id;
        el.innerHTML = `🔄 <span style="text-decoration:underline">файл ${escapeHtml(origId)}</span>`;
        el.title = 'Попробовать вытащить файл из Битрикса';
        el.addEventListener('click', async (e) => {
          e.stopPropagation();
          const old = el.innerHTML;
          el.innerHTML = '⏳ ...';
          try {
            const r = await fetch(WORKER_URL + '/api/file/' + encodeURIComponent(id), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ idToken: await fbAuth.currentUser.getIdToken() }),
            });
            if (!r.ok) {
              let msg = `HTTP ${r.status}`;
              try { const j = await r.json(); if (j && j.error) msg = j.error; } catch {}
              el.innerHTML = `<span style="color:var(--rd)">✗ ${escapeHtml(msg.slice(0, 60))}</span>`;
              el.title = msg;
              return;
            }
            // Имя из Content-Disposition
            let name = `file_${id}`;
            const cd = r.headers.get('content-disposition') || '';
            const m = cd.match(/filename\*=UTF-8''([^;]+)/i) || cd.match(/filename="([^"]+)"/i);
            if (m) { try { name = decodeURIComponent(m[1]); } catch { name = m[1]; } }
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1500);
            // Обновляем плейсхолдер
            el.innerHTML = `<span style="font-size:14px">${taskFileIcon(r.headers.get('content-type'), name)}</span> <span style="text-decoration:underline">${escapeHtml(name)}</span>`;
            el.title = `Скачать ${name}`;
            // Перевешиваем обработчик — теперь обычное скачивание
            el.replaceWith(el.cloneNode(true));
            const fresh = rootEl.querySelector(`.disk-file-ref[data-fid="${id}"]`);
            if (fresh) fresh.addEventListener('click', (ev) => {
              ev.stopPropagation();
              downloadTaskFile(id, name, null);
            });
          } catch (err) {
            el.innerHTML = `<span style="color:var(--rd)">✗ ${escapeHtml(err.message)}</span>`;
          }
        });
      }
    });
  } catch (e) {
    console.error('resolveDiskFileRefs:', e);
  }
}

// ─── Подгружаем файлы во всех timeline-элементах внутри контейнера
// (вызывается после рендера карточки сделки)
function wireUpTimelineFiles(rootEl) {
  if (!rootEl) return;
  const blocks = rootEl.querySelectorAll('.tl-files-list[data-fids]');
  blocks.forEach(el => {
    const fidsRaw = el.dataset.fids || '';
    const fileIds = fidsRaw.split(',').filter(Boolean);
    if (fileIds.length === 0) return;
    if (el.id) {
      loadFilesIntoContainer(el.id, fileIds, '');
    }
  });
}

// ─── Файлы (для задач, комментариев, активностей): подгрузка из /filesQueue + скачивание через worker
async function loadFilesIntoContainer(containerId, fileIds, taskKey) {
  const container = document.getElementById(containerId);
  if (!container) return;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const metas = await Promise.all(fileIds.map(id =>
      fetch(`${dbUrl}/filesQueue/${encodeURIComponent(id)}.json?auth=${idToken}`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    let html = '';
    fileIds.forEach((id, i) => {
      const m = metas[i];
      if (!m) {
        // Файла нет в очереди вообще — попробовать вытащить из Битрикса напрямую (worker создаст запись)
        html += `<div class="task-file-item" data-fid="${escapeHtml(String(id))}" style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;font-size:13px">
          <span style="font-size:16px;flex-shrink:0">📎</span>
          <span class="tf-name" style="flex:1;min-width:0;color:var(--t2)">файл #${escapeHtml(String(id))}</span>
          <span class="tf-size" style="color:var(--t3);font-size:11px"></span>
          <span class="tf-status"><span style="color:var(--ac2);font-size:10px;font-weight:600">не в очереди</span></span>
          <button class="tf-retry" data-fid="${escapeHtml(String(id))}" data-name="" data-task="${escapeHtml(taskKey)}" title="Попробовать вытащить файл из Битрикса напрямую" style="padding:4px 10px;background:var(--bg3);color:var(--ac2);border:1px solid var(--ac2);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">🔄 Попробовать</button>
        </div>`;
        return;
      }
      const name = m.fileName || `file_${id}`;
      const size = m.fileSize ? humanFileSize(m.fileSize) : '';
      const migrated = !!m.migrated && !m.permanentlyFailed;
      const statusBadge = migrated
        ? `<span style="color:var(--gn);font-size:10px;font-weight:600">✓ R2</span>`
        : (m.permanentlyFailed
          ? `<span style="color:var(--rd);font-size:10px;font-weight:600">✗ не загружен</span>`
          : `<span style="color:var(--ac2);font-size:10px;font-weight:600">⏳ в очереди</span>`);
      const btnHtml = migrated
        ? `<button class="tf-dl" data-fid="${escapeHtml(String(id))}" data-name="${escapeHtml(name)}" data-task="${escapeHtml(taskKey)}" style="padding:4px 10px;background:var(--ac1);color:#0e0e12;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">↓ Скачать</button>`
        : `<button class="tf-retry" data-fid="${escapeHtml(String(id))}" data-name="${escapeHtml(name)}" data-task="${escapeHtml(taskKey)}" title="Попробовать вытащить файл из Битрикса заново" style="padding:4px 10px;background:var(--bg3);color:var(--ac2);border:1px solid var(--ac2);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">🔄 Попробовать</button>`;
      // Inline-превью для картинок
      const isImage = migrated && typeof m.contentType === 'string' && m.contentType.startsWith('image/');
      if (isImage) {
        html += `<div class="tf-img-thumb" data-fid="${escapeHtml(String(id))}" data-name="${escapeHtml(name)}" style="background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:8px;display:flex;align-items:center;justify-content:center;min-height:80px;cursor:pointer">
          <span style="font-size:11px;color:var(--t3)">⏳ загружаю превью...</span>
        </div>`;
      }
      html += `<div class="task-file-item" data-fid="${escapeHtml(String(id))}" style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;font-size:13px">
        <span style="font-size:16px;flex-shrink:0">${taskFileIcon(m.contentType, name)}</span>
        <span class="tf-name" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
        <span class="tf-size" style="color:var(--t3);font-size:11px;flex-shrink:0">${escapeHtml(size)}</span>
        <span class="tf-status">${statusBadge}</span>
        ${btnHtml}
      </div>`;
    });
    container.innerHTML = html;
    container.querySelectorAll('.tf-dl').forEach(btn => {
      btn.addEventListener('click', () => downloadTaskFile(btn.dataset.fid, btn.dataset.name, btn));
    });
    container.querySelectorAll('.tf-retry').forEach(btn => {
      btn.addEventListener('click', () => retryTaskFile(btn.dataset.fid, btn.dataset.task, btn));
    });
    // Подгружаем превьюшки картинок (lazy-load через IntersectionObserver,
    // чтобы не качать сразу 20 картинок при открытии длинной задачи)
    const thumbs = container.querySelectorAll('.tf-img-thumb[data-fid]');
    if (thumbs.length > 0 && 'IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries, obs) => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            obs.unobserve(entry.target);
            loadImageThumb(entry.target);
          }
        }
      }, { rootMargin: '200px' });
      thumbs.forEach(el => io.observe(el));
    } else {
      thumbs.forEach(el => loadImageThumb(el));
    }
  } catch (e) {
    container.innerHTML = `<div style="font-size:12px;color:var(--rd)">Ошибка загрузки файлов: ${escapeHtml(e.message)}</div>`;
  }
}

async function downloadTaskFile(fileId, fileName, btn) {
  const original = btn ? btn.textContent : null;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ ...'; }
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/file/' + encodeURIComponent(fileId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });
    if (!r.ok) {
      let errMsg = `HTTP ${r.status}`;
      try { const j = await r.json(); if (j && j.error) errMsg = j.error; } catch {}
      throw new Error(errMsg);
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName || `file_${fileId}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  } catch (e) {
    alert('Ошибка скачивания: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = original; }
  }
}

// Retry для проваленных файлов: worker сам попробует вытащить из Битрикса.
// При успехе: скачиваем файл + перерисовываем строку (имя/размер/иконка обновлятся).
async function retryTaskFile(fileId, taskKey, btn) {
  const original = btn ? btn.textContent : null;
  const row = btn ? btn.closest('.task-file-item') : null;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Тащу...'; }
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/file/' + encodeURIComponent(fileId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });
    if (!r.ok) {
      let errMsg = `HTTP ${r.status}`;
      try { const j = await r.json(); if (j && j.error) errMsg = j.error; } catch {}
      // Не алерт — пишем в строку
      if (row) {
        const status = row.querySelector('.tf-status');
        if (status) status.innerHTML = `<span style="color:var(--rd);font-size:10px" title="${escapeHtml(errMsg)}">✗ Битрикс не отдал</span>`;
      }
      throw new Error(errMsg);
    }
    // Получаем имя из заголовка Content-Disposition
    let filename = `file_${fileId}`;
    const cd = r.headers.get('content-disposition') || '';
    const m = cd.match(/filename\*=UTF-8''([^;]+)/i) || cd.match(/filename="([^"]+)"/i);
    if (m) { try { filename = decodeURIComponent(m[1]); } catch { filename = m[1]; } }

    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    // Обновляем строку: вместо retry показываем готовый файл
    if (row) {
      const nameEl = row.querySelector('.tf-name');
      const sizeEl = row.querySelector('.tf-size');
      const statusEl = row.querySelector('.tf-status');
      if (nameEl) { nameEl.textContent = filename; nameEl.title = filename; }
      if (sizeEl) sizeEl.textContent = humanFileSize(blob.size);
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--gn);font-size:10px;font-weight:600" title="Спасён в R2">✓ R2 (rescued)</span>`;
      // Меняем кнопку на «Скачать»
      btn.classList.remove('tf-retry');
      btn.classList.add('tf-dl');
      btn.dataset.name = filename;
      btn.style.background = 'var(--ac1)';
      btn.style.color = '#0e0e12';
      btn.style.border = 'none';
      btn.textContent = '↓ Скачать';
      // Перенавешиваем обработчик: теперь это обычный download
      btn.replaceWith(btn.cloneNode(true));
      const newBtn = row.querySelector('button');
      if (newBtn) newBtn.addEventListener('click', () => downloadTaskFile(fileId, filename, newBtn));
    }
  } catch (e) {
    if (btn && btn.isConnected) { btn.disabled = false; btn.textContent = original; }
    return;
  }
  if (btn && btn.isConnected) btn.disabled = false;
}

// ─── Inline-превью картинок: фетчит blob через worker, рендерит <img>,
// клик → лайтбокс. Кэширует blobURL на узле — нет повторного фетча
// при кнопке Скачать.
async function loadImageThumb(el) {
  const fid = el.dataset.fid;
  const name = el.dataset.name || `file_${fid}`;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/file/' + encodeURIComponent(fid), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });
    if (!r.ok) {
      el.innerHTML = `<span style="font-size:11px;color:var(--t3)">не удалось загрузить превью</span>`;
      return;
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    el._cachedBlobUrl = url;
    el._cachedBlob = blob;
    el.innerHTML = '';
    el.style.padding = '0';
    el.style.minHeight = '0';
    el.style.overflow = 'hidden';
    const img = document.createElement('img');
    img.src = url;
    img.alt = name;
    img.loading = 'lazy';
    img.style.cssText = 'display:block;max-width:100%;max-height:280px;width:auto;height:auto;object-fit:contain;border-radius:8px;background:var(--bg2)';
    img.title = `${name} — клик для увеличения`;
    el.appendChild(img);
    el.addEventListener('click', () => openImageLightbox(url, name));
  } catch (e) {
    el.innerHTML = `<span style="font-size:11px;color:var(--rd)">${escapeHtml(e.message)}</span>`;
  }
}

// Простой лайтбокс для просмотра картинок в полный размер
function openImageLightbox(src, name) {
  const overlay = document.createElement('div');
  overlay.className = 'img-lightbox';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:zoom-out;padding:20px';
  overlay.innerHTML = `
    <div style="position:absolute;top:14px;right:18px;color:#fff;font-size:13px;cursor:pointer;padding:6px 14px;background:rgba(255,255,255,0.12);border-radius:8px;font-weight:600">✕ Закрыть (Esc)</div>
    <div style="color:#fff;font-size:13px;margin-bottom:14px;text-align:center;max-width:80%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(name || '')}</div>
  `;
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:96vw;max-height:84vh;object-fit:contain;border-radius:6px;background:#fff;box-shadow:0 12px 40px rgba(0,0,0,0.5)';
  img.addEventListener('click', e => e.stopPropagation());
  overlay.appendChild(img);
  overlay.addEventListener('click', () => { overlay.remove(); document.removeEventListener('keydown', escHandler); });
  function escHandler(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); }
  }
  document.addEventListener('keydown', escHandler);
  document.body.appendChild(overlay);
}

function humanFileSize(bytes) {
  if (!bytes || bytes < 0) return '';
  const u = ['B', 'KB', 'MB', 'GB'];
  let i = 0, n = bytes;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(n >= 10 || i === 0 ? 0 : 1)} ${u[i]}`;
}

function taskFileIcon(contentType, name) {
  const ct = (contentType || '').toLowerCase();
  const ext = (name || '').split('.').pop().toLowerCase();
  if (ct.startsWith('image/')) return '🖼';
  if (ct.startsWith('video/')) return '🎬';
  if (ct.startsWith('audio/')) return '🎵';
  if (ct.includes('pdf') || ext === 'pdf') return '📄';
  if (ct.includes('sheet') || ['xlsx', 'xls', 'csv', 'ods'].includes(ext)) return '📊';
  if (ct.includes('word') || ['docx', 'doc', 'odt'].includes(ext)) return '📝';
  if (ct.includes('zip') || ['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '🗜';
  if (ct.includes('presentation') || ['pptx', 'ppt'].includes(ext)) return '📽';
  return '📎';
}

async function loadAndRenderGroupChats() {
  const listEl = document.getElementById('chats-list');
  if (!listEl) return;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/groupChats.json?auth=${idToken}`);
    const data = await r.json();
    chatsState.groupChats = data || {};
    const arr = Object.entries(chatsState.groupChats)
      .map(([id, c]) => ({ id, ...c }))
      .sort((a, b) => (b.bitrixDateMessage || '').localeCompare(a.bitrixDateMessage || ''));
    if (arr.length === 0) {
      listEl.innerHTML = '<div style="padding:14px;color:var(--t3);font-size:12px">Групповых чатов нет</div>';
      return;
    }
    let html = '';
    for (const c of arr) {
      const last = c.bitrixDateMessage ? new Date(c.bitrixDateMessage).toLocaleDateString('ru', { day: '2-digit', month: '2-digit', year: '2-digit' }) : '';
      const status = c.migrationStatus === 'done' ? '✓' : (c.migrationStatus === 'in_progress' ? '⏳' : '·');
      html += `<div class="chat-list-item" data-chat-id="${escapeHtml(c.id)}" style="padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s">
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;color:var(--t1)">${escapeHtml(c.title || 'Без названия')}</div>
          <span style="font-size:10px;color:var(--t3)">${last}</span>
        </div>
        <div style="display:flex;gap:8px;font-size:11px;color:var(--t3)">
          <span>👥 ${c.memberCount || '?'}</span>
          <span>💬 ${c.messageCount || 0}</span>
          <span title="Статус миграции">${status}</span>
        </div>
        ${c.lastMessageText ? `<div style="font-size:11px;color:var(--t2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(c.lastMessageText.slice(0, 80))}</div>` : ''}
      </div>`;
    }
    listEl.innerHTML = html;
    listEl.querySelectorAll('.chat-list-item').forEach(it => {

      it.addEventListener('mouseleave', () => it.style.background = '');

    });
  } catch (e) {
    listEl.innerHTML = `<div style="padding:14px;color:var(--rd);font-size:12px">Ошибка: ${escapeHtml(e.message)}</div>`;
  }
}

async function openGroupChat(chatId) {
  chatsState.selectedChatId = chatId;
  document.querySelectorAll('.chat-list-item').forEach(it => {
    it.style.background = it.dataset.chatId === chatId ? 'var(--acbg)' : '';
  });
  const threadEl = document.getElementById('chat-thread');
  if (!threadEl) return;
  threadEl.innerHTML = '<div style="padding:30px;color:var(--t3);font-size:12px;text-align:center;margin:auto">⏳ Загружаем сообщения...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/groupChats/${encodeURIComponent(chatId)}.json?auth=${idToken}`);
    const chat = await r.json();
    if (!chat) {
      threadEl.innerHTML = '<div style="padding:30px;color:var(--rd);font-size:12px;text-align:center;margin:auto">Чат не найден</div>';
      return;
    }
    const msgs = Object.values(chat.messages || {})
      .sort((a, b) => parseInt(a.bitrixMessageId) - parseInt(b.bitrixMessageId));
    let msgsHtml = '';
    let lastDate = '';
    for (const m of msgs) {
      const d = m.date ? m.date.slice(0, 10) : '';
      if (d && d !== lastDate) {
        msgsHtml += `<div style="text-align:center;font-size:10px;color:var(--t3);padding:14px 0 6px">${new Date(d).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' })}</div>`;
        lastDate = d;
      }
      const time = m.date ? new Date(m.date).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';
      const author = m.senderFirebaseUid ? getUserById(m.senderFirebaseUid) : null;
      const authorName = author ? `${author.lastName || ''} ${author.name || ''}`.trim() : (m.senderName || 'Неизвестный');
      const fileBlock = Array.isArray(m.attachedFileIds) && m.attachedFileIds.length > 0
        ? `<div style="margin-top:6px;font-size:11px;color:var(--ac2)">📎 ${m.attachedFileIds.length} файл(ов)</div>` : '';
      msgsHtml += `<div style="display:flex;flex-direction:column;gap:2px;padding:6px 14px;font-size:13px">
        <div style="display:flex;gap:8px;align-items:baseline">
          <span style="color:var(--ac);font-weight:600;font-size:12px">${escapeHtml(authorName)}</span>
          <span style="color:var(--t3);font-size:10px">${time}</span>
        </div>
        <div style="color:var(--t1);white-space:pre-wrap;line-height:1.45">${renderBitrixBBCode(m.text || '')}</div>
        ${fileBlock}
      </div>`;
    }
    const headerHtml = `<div style="padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--bg3)">
      <div style="font-size:14px;font-weight:600;color:var(--t1)">${escapeHtml(chat.title || 'Без названия')}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">👥 ${chat.memberCount || '?'} участников · 💬 ${chat.messageCount || 0} сообщений · ${chat.migrationStatus === 'done' ? 'миграция завершена' : 'миграция: ' + (chat.migrationStatus || 'не запущена')}</div>
    </div>`;
    threadEl.innerHTML = `${headerHtml}<div style="flex:1;overflow-y:auto;min-height:0">${msgsHtml || '<div style="padding:30px;color:var(--t3);font-size:12px;text-align:center">Сообщений нет</div>'}</div>`;

    const scrollEl = threadEl.querySelector('div[style*="overflow-y:auto"]');
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
    // Резолвим disk-file-ref внутри отрендеренных сообщений
    resolveDiskFileRefs(threadEl);
  } catch (e) {
    threadEl.innerHTML = `<div style="padding:30px;color:var(--rd);font-size:12px;text-align:center;margin:auto">Ошибка: ${escapeHtml(e.message)}</div>`;
  }
}

async function loadAndRenderOpenlinesList() {
  const listEl = document.getElementById('chats-list');
  if (!listEl) return;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    // 780 сессий — берём только мета (shallow + потом limited fetch)
    // Чтобы не качать всё, грузим только ключи + последнее сообщение через orderBy
    const r = await fetch(`${dbUrl}/openlinesSessions.json?orderBy=%22lastMessageAt%22&limitToLast=200&auth=${idToken}`);
    const data = await r.json();
    const arr = Object.entries(data || {})
      .map(([id, c]) => ({ id, ...c }))
      .sort((a, b) => (b.lastMessageAt || '').localeCompare(a.lastMessageAt || ''));
    if (arr.length === 0) {
      listEl.innerHTML = '<div style="padding:14px;color:var(--t3);font-size:12px">Нет внешних чатов</div>';
      return;
    }
    let html = `<div style="padding:10px 14px;font-size:11px;color:var(--t3);background:var(--bg3);border-bottom:1px solid var(--b1)">Последние ${arr.length} сессий (всего 780)</div>`;
    for (const c of arr) {
      const last = c.lastMessageAt ? new Date(c.lastMessageAt).toLocaleDateString('ru', { day: '2-digit', month: '2-digit', year: '2-digit' }) : '';
      const provName = PROVIDER_NAMES_NORMALIZED[c.provider] || c.provider || 'мессенджер';
      html += `<div class="chat-list-item ol" data-session-id="${escapeHtml(c.id)}" style="padding:12px 14px;border-bottom:1px solid var(--b1);cursor:pointer">
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;color:var(--t1)">${escapeHtml(c.subject || 'Без темы')}</div>
          <span style="font-size:10px;color:var(--t3)">${last}</span>
        </div>
        <div style="display:flex;gap:8px;font-size:11px;color:var(--t3)">
          <span style="color:var(--ac2)">${escapeHtml(provName)}</span>
          <span>💬 ${c.messageCount || 0}</span>
        </div>
      </div>`;
    }
    listEl.innerHTML = html;
    listEl.querySelectorAll('.chat-list-item.ol').forEach(it => {
      it.addEventListener('mouseenter', () => it.style.background = 'var(--bg3)');
      it.addEventListener('mouseleave', () => it.style.background = '');
      it.addEventListener('click', () => openOpenlinesSession(it.dataset.sessionId));
    });
  } catch (e) {
    listEl.innerHTML = `<div style="padding:14px;color:var(--rd);font-size:12px">Ошибка: ${escapeHtml(e.message)}</div>`;
  }
}

async function openOpenlinesSession(sessionId) {
  document.querySelectorAll('.chat-list-item').forEach(it => {
    it.style.background = it.dataset.sessionId === sessionId ? 'var(--acbg)' : '';
  });
  const threadEl = document.getElementById('chat-thread');
  if (!threadEl) return;
  // Используем существующую функцию для openlines
  threadEl.innerHTML = '<div style="padding:30px;color:var(--t3);font-size:12px;text-align:center;margin:auto">⏳ Загружаем переписку...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/openlinesSessions/${encodeURIComponent(sessionId)}.json?auth=${idToken}`);
    const session = await r.json();
    if (!session) {
      threadEl.innerHTML = '<div style="padding:30px;color:var(--rd);font-size:12px;text-align:center;margin:auto">Сессия не найдена</div>';
      return;
    }
    const msgs = Object.values(session.messages || {}).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    let msgsHtml = '';
    let lastDate = '';
    for (const m of msgs) {
      const d = m.date ? m.date.slice(0, 10) : '';
      if (d && d !== lastDate) {
        msgsHtml += `<div style="text-align:center;font-size:10px;color:var(--t3);padding:14px 0 6px">${new Date(d).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' })}</div>`;
        lastDate = d;
      }
      const time = m.date ? new Date(m.date).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';
      const align = m.isFromClient ? 'flex-start' : 'flex-end';
      const bg = m.isFromClient ? 'var(--bg3)' : 'var(--acbg)';
      const sysMark = m.isSystem ? ' (система)' : '';
      msgsHtml += `<div style="display:flex;justify-content:${align};padding:4px 14px">
        <div style="max-width:75%;background:${bg};border:1px solid var(--b1);border-radius:10px;padding:8px 12px;font-size:13px">
          <div style="font-size:10px;color:var(--t3);margin-bottom:4px">${escapeHtml(m.senderName || '')}${sysMark} · ${time}</div>
          <div style="color:var(--t1);white-space:pre-wrap;line-height:1.45">${renderBitrixBBCode(m.text || '')}</div>
        </div>
      </div>`;
    }
    const provName = PROVIDER_NAMES_NORMALIZED[session.provider] || session.provider || 'мессенджер';
    const headerHtml = `<div style="padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--bg3)">
      <div style="font-size:14px;font-weight:600;color:var(--t1)">${escapeHtml(session.subject || 'Без темы')}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">${escapeHtml(provName)} · 💬 ${session.messageCount || 0} сообщений</div>
    </div>`;
    threadEl.innerHTML = `${headerHtml}<div style="flex:1;overflow-y:auto;min-height:0">${msgsHtml || '<div style="padding:30px;color:var(--t3);font-size:12px;text-align:center">Сообщений нет</div>'}</div>`;
    const scrollEl = threadEl.querySelector('div[style*="overflow-y:auto"]');
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
    resolveDiskFileRefs(threadEl);
  } catch (e) {
    threadEl.innerHTML = `<div style="padding:30px;color:var(--rd);font-size:12px;text-align:center;margin:auto">Ошибка: ${escapeHtml(e.message)}</div>`;
  }
}

async function renderUsers(el) {
  el.innerHTML = `
    <div class="page-title">🧑‍💼 Сотрудники</div>

      <h3>Список</h3>
      <div id="users-list"><div class="empty">Загрузка...</div></div>
    </div>
  `;

  // Phase 2.1: SDK onValue → fetch через Worker (read-only архивный CRM).
  const idToken = await fbAuth.currentUser.getIdToken();
  const users = await fetch(`${WORKER_RTDB_URL}/users.json?auth=${idToken}`)
    .then(r => r.ok ? r.json() : {})
    .catch(() => ({}));
  {
    const arr = Object.entries(users).map(([uid, u]) => ({ uid, ...u }));
    if (!arr.length) {
      document.getElementById('users-list').innerHTML = '<div class="empty">Пусто. Запустите миграцию пользователей из Битрикса.</div>';

    for (const u of arr) {

  }

window.migrateDeals = async function() {
  if (!confirm('Запустить миграцию ~22 600 сделок?\n\nЭто займёт ~20-30 минут. Идёт батчами по 50, прогресс сохраняется. Можно прервать и продолжить.')) return;

  // Wake Lock
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('deals-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию сделок...\n';

  let offset = 0;
  let totalProcessed = 0;
  let totalErrors = 0;
  let totalContactIds = new Set();
  let totalCompanyIds = new Set();
  let total = null;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(`${WORKER_URL}/api/migrate-deals`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, categoryId: 3, offset, limit: 50 })
      });
      const d = await r.json();

      if (!d.ok) {
        el.innerHTML += `\n<span class="err">✗ Ошибка: ${d.error}</span>\n`;
        el.innerHTML += `<span class="info">Можно нажать "Перенести сделки" снова — продолжится с offset ${offset}</span>\n`;
        break;
      }

      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const speed = totalProcessed > 0 ? (totalProcessed / elapsed).toFixed(1) : 0;
      const remaining = total - totalProcessed;
      const etaSec = speed > 0 ? Math.round(remaining / speed) : 0;
      const etaMin = Math.floor(etaSec / 60);
      const etaS = etaSec % 60;
      const pct = Math.round(totalProcessed / total * 100);

      el.innerHTML = `<span class="info">⚙ Обработано ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      el.innerHTML += `Прошло: ${Math.floor(elapsed/60)}м ${elapsed%60}с · Скорость: ${speed} сделок/сек · Осталось: ~${etaMin}м ${etaS}с\n`;
      el.innerHTML += `Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n\n`;
      el.innerHTML += `<span class="ok">█</span>`.repeat(Math.floor(pct/2)) + `<span class="gray">░</span>`.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        el.innerHTML += `\n<span class="ok">✓ Миграция сделок завершена!</span>\n\n`;
        el.innerHTML += `Всего обработано: <span class="ok">${totalProcessed.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${minutes}м ${seconds}с\n`;
        el.innerHTML += `Ошибок: ${totalErrors}\n\n`;
        el.innerHTML += `<span class="info">Дальше: миграция контактов и компаний (упомянутых в сделках)</span>`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        // Обновим счётчик на главной
        loadDashboardStatsIfPossible();
        break;
      }

      offset = d.nextOffset;

      // Маленькая пауза чтобы не перегружать
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать "Перенести сделки" снова — продолжится с offset ${offset}</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      break;
    }
  }
};

window.migrateContacts = async function() {
  if (!confirm('Запустить миграцию ~143 741 контактов?\n\nЭто займёт ~2-2.5 часа. Идёт батчами по 50, прогресс сохраняется. При 429 (рейт-лимит Битрикса) автоматически ждёт 60 сек и продолжает. Можно прервать и продолжить — миграция возобновится с последнего offset.')) return;

  // Wake Lock — не давать экрану засыпать
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('contacts-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию контактов...\n';

  // Если есть сохранённое состояние — стартуем с него
  let offset = 0;
  let totalProcessed = 0;
  let resumeOffset = 0; // сколько уже было обработано до этой сессии
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateR = await fetch(`${WORKER_RTDB_URL}/migrationState/contacts.json?auth=${idToken}`);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        totalProcessed = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += `<span class="info">↪ Продолжаем с offset ${offset.toLocaleString('ru')}</span>\n`;
      }
    }
  } catch {}

  let totalErrors = 0;
  let total = null;
  let companyIdsCollected = 0;
  let customFieldsCount = null;
  let retry429 = 0;
  const MAX_429_RETRIES = 20; // ~20 минут ожидания максимум подряд
  const RETRY_WAIT_MS = 60_000; // 60 секунд между ретраями
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(`${WORKER_URL}/api/migrate-contacts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, offset, limit: 50 })
      });
      const d = await r.json();

      if (!d.ok) {
        // ── Auto-retry на 429 (Bitrix rate limit) ──
        const is429 = (d.error || '').includes('429');
        if (is429 && retry429 < MAX_429_RETRIES) {
          retry429++;
          const baseHtml = el.innerHTML; // снимок до паузы
          const waitS = RETRY_WAIT_MS / 1000;
          for (let i = waitS; i > 0; i--) {
            el.innerHTML = baseHtml + '\n<span class="warn">[пауза] Bitrix лимит (429). Ждём ' + i + ' сек... (попытка ' + retry429 + '/' + MAX_429_RETRIES + ', offset ' + offset.toLocaleString('ru') + ')</span>';
            el.scrollTop = el.scrollHeight;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + '\n<span class="info">[повтор] Возобновляем запрос...</span>\n';
          continue; // не двигаем offset
        }
        el.innerHTML += `\n<span class="err">✗ Ошибка: ${d.error}</span>\n`;
        el.innerHTML += `<span class="info">Можно нажать "Перенести контакты" снова — продолжится с offset ${offset}</span>\n`;
        break;
      }

      // Успех — сбрасываем счётчик 429
      retry429 = 0;

      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors;
      companyIdsCollected = d.companyIdsCollected || companyIdsCollected;
      if (d.customFieldsCount !== null && d.customFieldsCount !== undefined) {
        customFieldsCount = d.customFieldsCount;
      }

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      // Скорость по текущей сессии (без уже-мигрированных при resume)
      const elapsedSafe = Math.max(elapsed, 1);
      const speedNum = (totalProcessed - resumeOffset) / elapsedSafe;
      const speed = speedNum > 0 ? speedNum.toFixed(1) : '0.0';
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const etaS = etaSec % 60;
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;

      const etaText = etaH > 0 ? `${etaH}ч ${etaMin}м` : `${etaMin}м ${etaS}с`;
      const elapsedText = elapsed >= 3600
        ? `${Math.floor(elapsed/3600)}ч ${Math.floor((elapsed%3600)/60)}м`
        : `${Math.floor(elapsed/60)}м ${elapsed%60}с`;

      el.innerHTML = `<span class="info">⚙ Обработано ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      el.innerHTML += `Прошло: ${elapsedText} · Скорость: ${speed} конт/сек · Осталось: ~${etaText}\n`;
      el.innerHTML += `Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n`;
      if (customFieldsCount !== null) el.innerHTML += `Кастомных полей в схеме: ${customFieldsCount}\n`;
      el.innerHTML += `Уникальных компаний для миграции: ${companyIdsCollected}\n\n`;
      el.innerHTML += `<span class="ok">█</span>`.repeat(Math.floor(pct/2)) + `<span class="gray">░</span>`.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        el.innerHTML += `\n<span class="ok">✓ Миграция контактов завершена!</span>\n\n`;
        el.innerHTML += `Всего обработано: <span class="ok">${totalProcessed.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${elapsedText}\n`;
        el.innerHTML += `Ошибок: ${totalErrors}\n`;
        el.innerHTML += `Компаний для миграции: <span class="ok">${companyIdsCollected}</span>\n\n`;
        el.innerHTML += `<span class="info">Дальше: миграция компаний и активностей</span>`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        loadDashboardStatsIfPossible();
        break;
      }

      offset = d.nextOffset;

      // Маленькая пауза
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать "Перенести контакты" снова — продолжится с offset ${offset}</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      break;
    }
  }
};

      .join('');

    const etaH = Math.floor(d.estimatedMigrationMinutes / 60);
    const etaM = d.estimatedMigrationMinutes % 60;
    const etaText = etaH > 0 ? `~${etaH}ч ${etaM}м` : `~${etaM}м`;

    el.innerHTML = `<div style="background:rgba(127,99,232,.06);border:1px solid rgba(127,99,232,.3);border-radius:10px;padding:14px 18px">
      <div style="color:var(--ac2);font-weight:600;font-size:13px;margin-bottom:10px">✅ Диагностика задач (Bitrix tasks)</div>

      <div style="font-size:12px;color:var(--t2);line-height:1.8">
        <b>Всего задач:</b> ${d.totalTasks.toLocaleString('ru')}<br>
        <b>В выборке (50):</b> с дедлайном ${d.withDeadline}, со ссылкой на CRM ${d.withCrmLink}, с комментариями ${d.withComments}, с чек-листом ${d.withChecklist}, в группах ${d.withGroup}<br>
        <b>Уникальных ответственных в выборке:</b> ${d.uniqueResponsibles}<br>
        <b>Рабочих групп в Битриксе:</b> ${d.groupsCount}<br>
        <b>С файлами в выборке:</b> ${d.tasksWithFilesInSample}/${d.sampleSize}<br>
        <b>Оценка общего числа файлов в задачах:</b> ~${d.estimatedTotalFiles.toLocaleString('ru')}<br>
        <b>Оценка времени миграции:</b> ${etaText}
      </div>

      <div style="margin-top:14px">
        <div style="font-size:11px;color:var(--t3);margin-bottom:4px">По статусам (sample)</div>
        <table style="font-size:11px;width:100%;max-width:380px">${statusRows}</table>
      </div>
    </div>`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${e.message}</div>`;
  }
};


// ═══════════════════════════════════════════════════════════════
//   Универсальный runner для батчевых миграций
//   Опции:
//     endpoint         — URL endpoint в worker
//     stateKey         — путь в Firebase /migrationState/{key}
//     resultElId       — id <div> для логов
//     entityName       — "контактов"/"дел"/"задач" (для сообщений)
//     entityNameShort  — "контакт"/"дело"/"задача" (для скорости)
//     totalLabel       — "143 741" (для confirm)
//     extraBody        — дополнительные поля в JSON body (опционально)
//     extraStats       — функция (response, accumulator) для накопления stats (опционально)
//     extraStatsRender — функция (accumulator) → HTML строка для показа (опционально)
//     onComplete       — callback после успешного завершения (опционально)
//     confirmText      — текст confirm перед запуском (опционально)
// ═══════════════════════════════════════════════════════════════
async function runBatchMigration(opts) {
  if (opts.confirmText && !confirm(opts.confirmText)) return;

  // Wake Lock
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById(opts.resultElId);
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию ' + opts.entityName + '...\n';

  // Auto-resume из migrationState
  let offset = 0;
  let totalProcessed = 0;
  let resumeOffset = 0;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateUrl = WORKER_RTDB_URL + '/migrationState/' + opts.stateKey + '.json?auth=' + idToken;
    const stateR = await fetch(stateUrl);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        totalProcessed = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += '<span class="info">↪ Продолжаем с offset ' + offset.toLocaleString('ru') + '</span>\n';
      }
    }
  } catch {}

  let totalErrors = 0;
  let total = null;
  let retry429 = 0;
  const MAX_429_RETRIES = 20;
  const RETRY_WAIT_MS = 60_000;
  const accumulator = {};
  const startedAt = Date.now();
  // Адаптивный лимит для случаев когда сервер просит уменьшить (комменты задач)
  let currentLimit = opts.initialLimit || 50;

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const body = Object.assign({ idToken, offset, limit: currentLimit }, opts.extraBody || {});
      const r = await fetch(WORKER_URL + opts.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const d = await r.json();

      if (!d.ok) {
        // Сервер просит попробовать меньшим лимитом (комменты задач)
        if (d.shouldRetryWithSmallerLimit && currentLimit > 1) {
          const newLimit = Math.max(1, Math.floor(currentLimit / 2));
          el.innerHTML += '\n<span class="warn">[адаптация] Уменьшаем размер батча: ' + currentLimit + ' → ' + newLimit + ' (offset ' + offset + ')</span>\n';
          currentLimit = newLimit;
          continue;
        }
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || httpCode === 403 ||
                            (httpCode !== null && httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry429 < MAX_429_RETRIES) {
          retry429++;
          const baseHtml = el.innerHTML;
          const waitS = RETRY_WAIT_MS / 1000;
          for (let i = waitS; i > 0; i--) {
            el.innerHTML = baseHtml + '\n<span class="warn">[пауза] Bitrix вернул HTTP ' + httpCode + '. Ждём ' + i + ' сек... (попытка ' + retry429 + '/' + MAX_429_RETRIES + ', offset ' + offset.toLocaleString('ru') + ')</span>';
            el.scrollTop = el.scrollHeight;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + '\n<span class="info">[повтор] Возобновляем запрос...</span>\n';
          continue;
        }
        el.innerHTML += '\n<span class="err">✗ Ошибка: ' + errStr + '</span>\n';
        el.innerHTML += '<span class="info">Можно нажать снова — продолжится с offset ' + offset + '</span>\n';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry429 = 0;
      // После успешного батча — пробуем понемногу увеличивать лимит обратно (если был сброшен)
      if (currentLimit < (opts.initialLimit || 50)) {
        currentLimit = Math.min((opts.initialLimit || 50), currentLimit * 2);
      }
      total = d.total;
      totalProcessed += d.processed;
      totalErrors += d.errors || 0;
      if (opts.extraStats) opts.extraStats(d, accumulator);

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const elapsedSafe = Math.max(elapsed, 1);
      const speedNum = (totalProcessed - resumeOffset) / elapsedSafe;
      const speed = speedNum > 0 ? speedNum.toFixed(1) : '0.0';
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const etaS = etaSec % 60;
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;
      const etaText = etaH > 0 ? etaH + 'ч ' + etaMin + 'м' : etaMin + 'м ' + etaS + 'с';
      const elapsedText = elapsed >= 3600
        ? Math.floor(elapsed/3600) + 'ч ' + Math.floor((elapsed%3600)/60) + 'м'
        : Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с';

      let html = '<span class="info">⚙ Обработано ' + totalProcessed.toLocaleString('ru') + ' из ' + total.toLocaleString('ru') + ' (' + pct + '%)</span>\n\n';
      html += 'Прошло: ' + elapsedText + ' · Скорость: ' + speed + ' ' + opts.entityNameShort + '/сек · Осталось: ~' + etaText + '\n';
      html += 'Ошибок: ' + (totalErrors > 0 ? '<span class="err">' + totalErrors + '</span>' : 0) + '\n';
      if (currentLimit !== (opts.initialLimit || 50)) html += 'Текущий размер батча: ' + currentLimit + '\n';
      if (opts.extraStatsRender) html += opts.extraStatsRender(accumulator) + '\n';
      html += '\n<span class="ok">█</span>'.repeat(Math.floor(pct/2)) + '<span class="gray">░</span>'.repeat(50 - Math.floor(pct/2)) + ' ' + pct + '%\n';
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        el.innerHTML += '\n<span class="ok">✓ Миграция ' + opts.entityName + ' завершена!</span>\n\n';
        el.innerHTML += 'Всего обработано: <span class="ok">' + totalProcessed.toLocaleString('ru') + '</span>\n';
        el.innerHTML += 'Время: ' + elapsedText + '\n';
        el.innerHTML += 'Ошибок: ' + totalErrors + '\n';
        if (opts.extraStatsRender) el.innerHTML += opts.extraStatsRender(accumulator) + '\n';
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        loadDashboardStatsIfPossible();
        if (opts.onComplete) opts.onComplete(accumulator);
        return;
      }

      offset = d.nextOffset;
      await new Promise(r => setTimeout(r, 200));
    } catch (e) {
      el.innerHTML += '\n<span class="err">✗ ' + e.message + '</span>\n';
      el.innerHTML += '<span class="info">Можно нажать снова — продолжится с offset ' + offset + '</span>\n';
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      return;
    }
  }
}

window.testFileDownload = async function(bitrixFileId = null) {
  const el = document.getElementById('file-test-result');
  el.style.display = '';
  el.innerHTML = '<div style="font-size:12px;color:var(--t3)">⏳ Тестируем разные методы скачивания файла из Битрикса...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/test-file-download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(bitrixFileId ? { idToken, bitrixFileId } : { idToken })
    });
    const d = await r.json();
    if (!d.ok) {
      el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(d.error || 'Ошибка')}</div>`;
      return;
    }

    const isSuccess = d.downloadResult?.r2Status === 'uploaded';
    const bgColor = isSuccess ? 'rgba(63,216,142,.06)' : 'rgba(240,162,58,.06)';
    const borderColor = isSuccess ? 'rgba(63,216,142,.3)' : 'rgba(240,162,58,.3)';
    const titleColor = isSuccess ? 'var(--gn)' : '#f0a23a';

    let html = `<div style="background:${bgColor};border:1px solid ${borderColor};border-radius:10px;padding:14px 18px">
      <div style="color:${titleColor};font-weight:600;font-size:13px;margin-bottom:10px">${escapeHtml(d.summary)}</div>
      <div style="font-size:12px;color:var(--t2);line-height:1.7">
        <b>FileID:</b> ${escapeHtml(String(d.fileId))} · <b>Найден в:</b> ${escapeHtml(d.foundIn || '(передан явно)')}<br>
        <b>Portal:</b> ${escapeHtml(d.portalBase)}<br>
      </div>`;

    html += `<div style="margin-top:12px"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Попытки методов:</div>`;
    for (const a of d.attempts) {
      const icon = a.ok ? '<span style="color:var(--gn)">✓</span>' : '<span style="color:var(--rd)">✗</span>';
      html += `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--b1)">
        ${icon} <code>${escapeHtml(a.method)}</code>`;
      if (a.ok && a.result) {
        const r = a.result;
        const bits = [];
        if (r.NAME) bits.push(`name=${escapeHtml(String(r.NAME))}`);
        if (r.SIZE) bits.push(`size=${escapeHtml(String(r.SIZE))}`);
        if (r.TYPE) bits.push(`type=${escapeHtml(String(r.TYPE))}`);
        if (r.DOWNLOAD_URL) bits.push(`<span style="color:var(--gn)">DOWNLOAD_URL ✓</span>`);
        if (a.contentType) bits.push(`ct=${escapeHtml(a.contentType)}`);
        if (a.contentLength) bits.push(`size=${escapeHtml(a.contentLength)}`);
        if (a.status !== undefined) bits.push(`status=${a.status}`);
        if (bits.length) html += ` — <span style="color:var(--t3)">${bits.join(' · ')}</span>`;
      } else if (!a.ok) {
        const errStr = a.result?.error || a.error || 'failed';
        html += ` — <span style="color:var(--rd);font-size:10px">${escapeHtml(typeof errStr === 'object' ? JSON.stringify(errStr) : String(errStr).slice(0, 100))}</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;

    if (d.downloadResult) {
      const dr = d.downloadResult;
      html += `<div style="margin-top:12px;padding:10px 12px;background:rgba(0,0,0,.2);border-radius:8px;font-size:11px;color:var(--t2)">
        <b>Скачивание:</b> ${dr.ok ? '<span style="color:var(--gn)">успех</span>' : '<span style="color:var(--rd)">ошибка</span>'}<br>
        ${dr.from ? '<b>Метод:</b> ' + escapeHtml(dr.from) + '<br>' : ''}
        ${dr.sizeBytes !== undefined ? '<b>Размер:</b> ' + (dr.sizeBytes / 1024).toFixed(1) + ' КБ<br>' : ''}
        ${dr.contentType ? '<b>Content-Type:</b> ' + escapeHtml(dr.contentType) + '<br>' : ''}
        ${dr.r2Key ? '<b>R2 ключ:</b> <code>' + escapeHtml(dr.r2Key) + '</code><br>' : ''}
        ${dr.error ? '<b>Ошибка:</b> ' + escapeHtml(dr.error) : ''}
      </div>`;
    }

    html += `</div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(e.message)}</div>`;
  }
};

async function runFileQueueBuild(source, label) {
  if (!confirm(`Построить очередь файлов для ${label}?\n\nСканирует Firebase, собирает все bitrixFileIds в /filesQueue. Можно прерывать — auto-resume сработает.`)) return;

  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('file-queue-result');
  el.style.display = '';
  el.innerHTML = `⏳ Запускаем построение очереди для ${label}...\n`;

  // Resume
  const stateKey = source === 'activities' ? 'fileQueueActivities' : 'fileQueueTasks';
  let offset = 0;
  let resumeOffset = 0;
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const stateUrl = WORKER_RTDB_URL + '/migrationState/' + stateKey + '.json?auth=' + idToken;
    const stateR = await fetch(stateUrl);
    if (stateR.ok) {
      const st = await stateR.json();
      if (st && st.processed && !st.isLast) {
        offset = st.processed;
        resumeOffset = st.processed;
        el.innerHTML += `<span class="info">↪ Продолжаем с offset ${offset.toLocaleString('ru')}</span>\n`;
      }
    }
  } catch {}

  let total = null;
  let totalProcessed = offset;
  let totalFilesAdded = 0;
  let retry = 0;
  const MAX_RETRY = 20;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(WORKER_URL + '/api/build-file-queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, source, offset, limit: 10 })
      });
      const d = await r.json();

      if (!d.ok) {
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || (httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry < MAX_RETRY) {
          retry++;
          const baseHtml = el.innerHTML;
          for (let i = 60; i > 0; i--) {
            el.innerHTML = baseHtml + `\n<span class="warn">[пауза] HTTP ${httpCode}, ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + `\n<span class="info">[повтор]</span>\n`;
          continue;
        }
        el.innerHTML += `\n<span class="err">✗ ${errStr}</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry = 0;
      total = d.total;
      totalProcessed = d.offset + d.processed;
      totalFilesAdded = d.cumulativeFiles;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const speedNum = elapsed > 0 ? (totalProcessed - resumeOffset) / elapsed : 0;
      const remaining = total - totalProcessed;
      const etaSec = speedNum > 0 ? Math.round(remaining / speedNum) : 0;
      const etaH = Math.floor(etaSec / 3600);
      const etaMin = Math.floor((etaSec % 3600) / 60);
      const pct = total > 0 ? Math.round(totalProcessed / total * 100) : 0;
      const etaText = etaH > 0 ? etaH + 'ч ' + etaMin + 'м' : etaMin + 'м';
      const elapsedText = elapsed >= 60 ? Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с' : elapsed + 'с';

      let html = `<span class="info">⚙ ${label}: ${totalProcessed.toLocaleString('ru')} из ${total.toLocaleString('ru')} (${pct}%)</span>\n\n`;
      html += `Прошло: ${elapsedText} · Скорость: ${speedNum.toFixed(1)} ключей/сек · ETA ~${etaText}\n`;
      html += `Файлов в очереди (${label}): ${totalFilesAdded.toLocaleString('ru')}\n\n`;
      html += '<span class="ok">█</span>'.repeat(Math.floor(pct/2)) + '<span class="gray">░</span>'.repeat(50 - Math.floor(pct/2)) + ` ${pct}%\n`;
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        el.innerHTML += `\n<span class="ok">✓ Очередь файлов (${label}) построена!</span>\n`;
        el.innerHTML += `Всего файлов добавлено: <span class="ok">${totalFilesAdded.toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Время: ${elapsedText}\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      offset = d.nextOffset;
      await new Promise(r => setTimeout(r, 100));
    } catch (e) {
      // Сетевая ошибка (Failed to fetch, timeout, etc) — ретраим, не сдаёмся
      const isNetwork = e.message && (
        e.message.includes('Failed to fetch') ||
        e.message.includes('NetworkError') ||
        e.message.includes('Load failed') ||
        e.message.includes('timeout') ||
        e.name === 'TypeError'
      );
      if (isNetwork && retry < MAX_RETRY) {
        retry++;
        const baseHtml = el.innerHTML;
        for (let i = 30; i > 0; i--) {
          el.innerHTML = baseHtml + `\n<span class="warn">[сеть] ${e.message.slice(0, 60)} — ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
          await new Promise(res => setTimeout(res, 1000));
        }
        el.innerHTML = baseHtml + `\n<span class="info">[повтор после сетевой ошибки]</span>\n`;
        continue;
      }
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать снова — продолжится с offset ${offset}</span>\n`;

window.migrateFilesRun = async function() {
  if (!confirm('Запустить миграцию файлов в R2?\n\nКачает по 8 файлов за вызов. Можно прерывать — следующий запуск продолжит. Если ещё не построил очередь — сначала построй!')) return;

  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('files-mig-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию файлов в R2...\n';

  let totalMigrated = 0;
  let totalErrors = 0;
  let totalBytes = 0;
  let retry = 0;
  const MAX_RETRY = 20;
  const startedAt = Date.now();

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(WORKER_URL + '/api/migrate-files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken, batchSize: 8 })
      });
      const d = await r.json();

      if (!d.ok) {
        if (d.needsIndex) {
          el.innerHTML += `\n<span class="err">✗ Нужен индекс в Firebase rules. Открой Firebase Console → Realtime Database → Rules и добавь:\n\n  "filesQueue": { ".indexOn": "migrated" }\n\nвнутри "rules": {...}</span>\n`;
          if (wakeLock) { wakeLock.release(); wakeLock = null; }
          return;
        }
        const errStr = d.error || '';
        const httpMatch = errStr.match(/HTTP\s+(\d+)/);
        const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
        const isRetryable = httpCode === 429 || httpCode === 401 || (httpCode >= 500 && httpCode < 600);
        if (isRetryable && retry < MAX_RETRY) {
          retry++;
          const baseHtml = el.innerHTML;
          for (let i = 60; i > 0; i--) {
            el.innerHTML = baseHtml + `\n<span class="warn">[пауза] HTTP ${httpCode}, ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
            await new Promise(res => setTimeout(res, 1000));
          }
          el.innerHTML = baseHtml + `\n<span class="info">[повтор]</span>\n`;
          continue;
        }
        el.innerHTML += `\n<span class="err">✗ ${errStr}</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      retry = 0;
      // Если done и в этом батче 0 — очередь кончилась
      if (d.done && d.processedInBatch === 0) {
        const cum = d.cumulative || {};
        el.innerHTML += `\n<span class="ok">✓ Миграция файлов завершена!</span>\n`;
        el.innerHTML += `Всего файлов в R2: <span class="ok">${(cum.cumulativeMigrated || totalMigrated).toLocaleString('ru')}</span>\n`;
        el.innerHTML += `Объём: ${((cum.cumulativeBytes || totalBytes) / 1024 / 1024).toFixed(1)} МБ\n`;
        el.innerHTML += `Ошибок: ${cum.cumulativeErrors || totalErrors}\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      totalMigrated = d.cumulativeMigrated;
      totalErrors = d.cumulativeErrors;
      totalBytes = d.cumulativeBytes;

      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      const elapsedText = elapsed >= 3600
        ? Math.floor(elapsed/3600) + 'ч ' + Math.floor((elapsed%3600)/60) + 'м'
        : (elapsed >= 60 ? Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с' : elapsed + 'с');
      const sizeText = totalBytes < 1024*1024
        ? (totalBytes/1024).toFixed(0) + ' КБ'
        : totalBytes < 1024*1024*1024
          ? (totalBytes/1024/1024).toFixed(1) + ' МБ'
          : (totalBytes/1024/1024/1024).toFixed(2) + ' ГБ';

      let html = `<span class="info">⚙ Файлов мигрировано: ${totalMigrated.toLocaleString('ru')}</span>\n\n`;
      html += `Прошло: ${elapsedText} · Объём в R2: ${sizeText}\n`;
      html += `Ошибок: ${totalErrors > 0 ? '<span class="err">' + totalErrors + '</span>' : 0}\n`;
      html += `В этом батче: ${d.migratedInBatch} из ${d.processedInBatch} (${(d.bytesInBatch/1024).toFixed(0)} КБ)\n`;
      if (d.errorDetails && d.errorDetails.length > 0) {
        html += `\nПоследние ошибки:\n`;
        for (const e of d.errorDetails.slice(0, 3)) {
          html += `  · file ${e.fileId} [${e.stage}]: ${escapeHtml(String(e.error || e.status || '?').slice(0, 80))}\n`;
        }
      }
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;

      // Если в батче было меньше чем просили — очередь кончилась
      if (d.done) {
        el.innerHTML += `\n<span class="ok">✓ Миграция файлов завершена! Очередь обработана полностью.</span>\n`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        return;
      }

      // Между батчами небольшая пауза
      await new Promise(r => setTimeout(r, 300));
    } catch (e) {
      const isNetwork = e.message && (
        e.message.includes('Failed to fetch') ||
        e.message.includes('NetworkError') ||
        e.message.includes('Load failed') ||
        e.message.includes('timeout') ||
        e.name === 'TypeError'
      );
      if (isNetwork && retry < MAX_RETRY) {
        retry++;
        const baseHtml = el.innerHTML;
        for (let i = 30; i > 0; i--) {
          el.innerHTML = baseHtml + `\n<span class="warn">[сеть] ${e.message.slice(0, 60)} — ждём ${i}с (${retry}/${MAX_RETRY})</span>`;
          await new Promise(res => setTimeout(res, 1000));
        }
        el.innerHTML = baseHtml + `\n<span class="info">[повтор после сетевой ошибки]</span>\n`;
        continue;
      }
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Можно нажать снова — продолжится с того же места</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      return;
    }
  }
};

window.migrateGroupChatsFetch = async function() {
  // Собираем выбранные chatId из чекбоксов
  const checkboxes = document.querySelectorAll('#group-chats-list-result input[type=checkbox]:checked');
  const selectedIds = Array.from(checkboxes).map(c => c.dataset.chatId);

  if (selectedIds.length === 0) {
    alert('Сначала собери список (📋) и отметь галочками какие чаты переносить.');
    return;
  }

  if (!confirm(`Качать историю ${selectedIds.length} групповых чатов?\n\nИдёт по чатам последовательно, страницами по 100 сообщений. Можно прервать — следующий запуск продолжит.`)) return;

  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }

  const el = document.getElementById('group-chats-fetch-result');
  el.style.display = '';
  el.innerHTML = `⏳ Качаем ${selectedIds.length} чатов...\n`;

  const startedAt = Date.now();
  let totalChats = 0;
  let totalMessages = 0;
  let totalErrors = 0;

  for (const chatId of selectedIds) {
    let lastId = null;
    let chatPagesDone = 0;
    let chatMessages = 0;
    let chatRetry = 0;
    const MAX_RETRY = 10;

    el.innerHTML += `\n<span class="info">⚙ chat_${chatId}</span>\n`;

    while (true) {
      try {
        const idToken = await fbAuth.currentUser.getIdToken();
        const r = await fetch(WORKER_URL + '/api/migrate-group-chats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken, mode: 'fetch', chatId, lastId })
        });
        const d = await r.json();

        if (!d.ok) {
          const errStr = d.error || '';
          const httpMatch = errStr.match(/HTTP\s+(\d+)/);
          const httpCode = httpMatch ? parseInt(httpMatch[1]) : null;
          if ((httpCode === 429 || httpCode === 401 || (httpCode >= 500 && httpCode < 600)) && chatRetry < MAX_RETRY) {
            chatRetry++;
            for (let i = 30; i > 0; i--) {
              await new Promise(res => setTimeout(res, 1000));
            }
            continue;
          }
          el.innerHTML += `  <span class="err">✗ ${escapeHtml(errStr).slice(0, 100)}</span>\n`;
          totalErrors++;
          break;
        }
        chatRetry = 0;

        chatPagesDone++;
        chatMessages += (d.messagesInBatch || 0);
        totalMessages += (d.messagesInBatch || 0);

        if (d.done) {
          el.innerHTML += `  <span class="ok">✓ ${chatMessages} сообщ. за ${chatPagesDone} стр.</span>\n`;
          el.scrollTop = el.scrollHeight;
          totalChats++;
          break;
        }

        lastId = d.nextLastId;
        await new Promise(r => setTimeout(r, 200));
      } catch (e) {
        const isNetwork = e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.name === 'TypeError');
        if (isNetwork && chatRetry < MAX_RETRY) {
          chatRetry++;
          await new Promise(res => setTimeout(res, 30000));
          continue;
        }
        el.innerHTML += `  <span class="err">✗ ${escapeHtml(e.message).slice(0, 100)}</span>\n`;
        totalErrors++;
        break;
      }
    }
  }

  const elapsed = Math.round((Date.now() - startedAt) / 1000);
  const elapsedText = elapsed >= 60 ? Math.floor(elapsed/60) + 'м ' + (elapsed%60) + 'с' : elapsed + 'с';

  el.innerHTML += `\n<span class="ok">✓ Миграция групповых чатов завершена</span>\n`;
  el.innerHTML += `Чатов обработано: ${totalChats} из ${selectedIds.length}\n`;
  el.innerHTML += `Сообщений перенесено: <span class="ok">${totalMessages.toLocaleString('ru')}</span>\n`;
  if (totalErrors > 0) el.innerHTML += `<span class="warn">Ошибок чатов: ${totalErrors}</span>\n`;
  el.innerHTML += `Время: ${elapsedText}\n`;

  if (wakeLock) { wakeLock.release(); wakeLock = null; }
};

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(e.message)}</div>`;
  }
};

window.migrateUsers = async function() {
  if (!confirm('Запустить миграцию пользователей? Это создаст до 88 учёток в Firebase Auth.\n\nМиграция идёт батчами по 20 человек. Прогресс сохраняется — если что-то прервётся, можно продолжить.')) return;

  // Wake Lock — не даём браузеру усыпить вкладку пока идёт миграция
  let wakeLock = null;
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock активирован');
    } catch (e) {
      console.warn('Wake Lock не сработал:', e.message);
    }
  }

  const el = document.getElementById('users-migration-result');
  el.style.display = '';
  el.innerHTML = '⏳ Запускаем миграцию...\n';

  let offset = 0;
  let totalCreated = 0;
  let totalExisted = 0;
  let totalSkipped = 0;
  let totalErrors = 0;
  let total = null;
  let allErrors = [];

  while (true) {
    try {
      const idToken = await fbAuth.currentUser.getIdToken();
      const r = await fetch(`${WORKER_URL}/api/migrate-users?batch=1&offset=${offset}&limit=8`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });
      const d = await r.json();

      if (!d.ok) {
        el.innerHTML += `\n<span class="err">✗ Ошибка: ${d.error}</span>\n`;
        el.innerHTML += `<span class="info">Можно попробовать снова — миграция продолжится с ${offset}</span>\n`;
        break;
      }

      total = d.total;
      totalCreated += d.created;
      totalExisted += d.alreadyExisted;
      totalSkipped += d.skipped;
      totalErrors += d.errors;
      if (d.errorDetails) allErrors.push(...d.errorDetails);

      // Прогресс-бар
      const processed = offset + d.processed;
      const pct = Math.round(processed / total * 100);
      el.innerHTML = `<span class="info">⚙ Обработано ${processed} из ${total} (${pct}%)</span>\n\n`;
      el.innerHTML += `Создано: <span class="ok">${totalCreated}</span> · Обновлено: ${totalExisted} · Пропущено (без email): ${totalSkipped} · Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n\n`;
      el.innerHTML += `Последний батч:\n`;
      for (const u of (d.processedNames || []).slice(-10)) {
        const statusColor = u.status === 'created' ? 'ok' : u.status.startsWith('error') ? 'err' : 'gray';
        el.innerHTML += `  <span class="${statusColor}">${u.id.padEnd(6)} ${(u.name || '—').padEnd(28)} ${u.status}</span>\n`;
      }
      el.scrollTop = el.scrollHeight;

      if (d.isLast) {
        el.innerHTML += `\n<span class="ok">✓ Миграция завершена!</span>\n\n`;
        el.innerHTML += `Всего создано: <span class="ok">${totalCreated}</span>\n`;
        el.innerHTML += `Уже существовало: ${totalExisted}\n`;
        el.innerHTML += `Пропущено (без email): ${totalSkipped}\n`;
        el.innerHTML += `Ошибок: ${totalErrors > 0 ? `<span class="err">${totalErrors}</span>` : 0}\n`;
        if (allErrors.length) {
          el.innerHTML += `\n<span class="err">Ошибки:</span>\n`;
          for (const e of allErrors.slice(0, 20)) {
            el.innerHTML += `  ${e.email || '—'}: ${e.error}\n`;
          }
        }
        el.innerHTML += `\n<span class="info">Откройте раздел "Сотрудники" чтобы увидеть всех пользователей.</span>`;
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        break;
      }

      offset = d.nextOffset;

      // Маленькая пауза между батчами чтобы не перегружать
      await new Promise(r => setTimeout(r, 500));

    } catch (e) {
      el.innerHTML += `\n<span class="err">✗ ${e.message}</span>\n`;
      el.innerHTML += `<span class="info">Сеть прервалась. Можно нажать "Запустить миграцию" заново — она пропустит тех кто уже создан.</span>\n`;
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      break;
    }
  }
};
