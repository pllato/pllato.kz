  const el = document.getElementById('bizproc-diag-result');
  el.style.display = '';
  el.innerHTML = '<div style="font-size:12px;color:var(--t3)">⏳ Анализируем бизнес-процессы...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/diagnose-bizproc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });
    const d = await r.json();
    if (!d.ok) {
      el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(d.error)}</div>`;
      return;
    }

    let html = `<div class="summary" style="background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.3);border-radius:10px;padding:14px 18px">
      <div style="color:var(--am);font-weight:600;font-size:13px;margin-bottom:10px">⚠ Read-only анализ — данные НЕ переносятся</div>`;

    if (d.note) {
      html += `<div style="font-size:11px;color:var(--t3);margin-bottom:10px;font-style:italic">${escapeHtml(d.note)}</div>`;
    }

    // Workflow templates
    if (d.workflows.error) {
      html += `<div style="color:var(--rd);margin-bottom:8px"><b>Шаблоны БП:</b> ${escapeHtml(d.workflows.error)}</div>`;
    } else if (d.workflows.total === 0) {
      html += `<div style="color:var(--t3);margin-bottom:8px;font-size:12px">Шаблонов бизнес-процессов не найдено</div>`;
    } else {
      html += `<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px">📋 Шаблоны БП: ${d.workflows.total}</div>
        <div style="font-size:11px;color:var(--t2);max-height:200px;overflow-y:auto;background:var(--bg3);border-radius:8px;padding:8px 10px;margin-bottom:10px">`;
      for (const t of d.workflows.templates) {
        const autoStr = t.autoExecute === '2' ? 'при создании' : t.autoExecute === '3' ? 'при изменении' : 'вручную';
        html += `<div style="padding:5px 0;border-bottom:1px solid var(--b1)">
          <b>${escapeHtml(t.name)}</b>
          <span style="color:var(--t3);font-size:10px;margin-left:6px">[${escapeHtml(t.entity || t.moduleId || '?')}]</span>
          <span style="color:var(--ac2);font-size:10px;margin-left:6px">${autoStr}</span>
          ${t.description ? `<div style="color:var(--t3);font-size:10px;margin-top:2px">${escapeHtml(t.description)}</div>` : ''}
        </div>`;
      }
      html += `</div>`;
    }

    // Triggers по сущностям
    html += `<div style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px">🎯 Триггеры автоматизации</div><div style="font-size:11px;color:var(--t2);background:var(--bg3);border-radius:8px;padding:8px 10px">`;
    for (const [entity, info] of Object.entries(d.triggers.byEntity || {})) {
      if (info.error) {
        html += `<div style="padding:3px 0"><b>${escapeHtml(entity)}</b>: <span style="color:var(--t3)">${escapeHtml(info.error)}</span></div>`;
      } else {
        html += `<div style="padding:3px 0"><b>${escapeHtml(entity)}</b>: <span style="color:var(--ac2)">${info.count}</span> триггеров</div>`;
      }
    }
    html += `</div>`;

    html += `</div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(e.message)}</div>`;
  }
};

window.syncDelta = async function() {
  const el = document.getElementById('delta-sync-result');
  el.style.display = '';
  el.innerHTML = '<div style="font-size:12px;color:var(--t3)">⏳ Подтягиваем изменения из Битрикса...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/sync-delta', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });
    const d = await r.json();
    if (!d.ok) {
      el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(d.error || 'Ошибка')}</div>`;
      return;
    }
    let html = `<div class="summary" style="background:rgba(63,216,142,.06);border:1px solid rgba(63,216,142,.3);border-radius:10px;padding:14px 18px">
      <div style="color:var(--gn);font-weight:600;font-size:13px;margin-bottom:8px">✓ Дельта-синхронизация выполнена</div>
      <div style="font-size:12px;color:var(--t2);line-height:1.7">
        <div>📅 С момента: <code>${escapeHtml(d.since || '—')}</code></div>
        <div>💼 Сделок обновлено: <span style="color:var(--ac2)">${d.deals.updated}</span>${d.deals.errors.length ? ` <span style="color:var(--rd)">(ошибок: ${d.deals.errors.length})</span>` : ''}</div>
        <div>✓ Задач обновлено: <span style="color:var(--ac2)">${d.tasks.updated}</span>${d.tasks.errors.length ? ` <span style="color:var(--rd)">(ошибок: ${d.tasks.errors.length})</span>` : ''}</div>
        <div>👥 Контактов обновлено: <span style="color:var(--ac2)">${d.contacts.updated}</span>${d.contacts.errors.length ? ` <span style="color:var(--rd)">(ошибок: ${d.contacts.errors.length})</span>` : ''}</div>
      </div>
      ${(d.deals.updated > 0 || d.tasks.updated > 0 || d.contacts.updated > 0)
        ? '<div style="font-size:11px;color:var(--t3);margin-top:8px;font-style:italic">💡 Если у тебя сейчас открыта вкладка с порталом — изменения должны появиться через несколько секунд (live listeners)</div>'
        : '<div style="font-size:11px;color:var(--t3);margin-top:8px">Изменений нет — портал актуален</div>'}
    </div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--rd)">✗ ${escapeHtml(e.message)}</div>`;
  }
};

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
</body>
</html>
