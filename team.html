          ${deal.comments ? `<div class="dc-section-h">Комментарии</div>
            <div style="font-size:13px;color:var(--t2);white-space:pre-wrap;background:var(--bg3);padding:12px 14px;border-radius:8px;line-height:1.5">${escapeHtml(deal.comments)}</div>` : ''}

          ${renderCustomFieldsBlock(deal.customFields)}
        </div>

        <div class="dc-right">
          <div class="dc-section-h">${latestOpenlinesActivity ? '💬 Переписка' : '📜 События'}</div>
          ${latestOpenlinesActivity
            ? `<div class="dc-chat-wrap" id="dc-chat-wrap" data-session-id="${escapeHtml(latestOpenlinesActivity.openlinesSessionId)}">
                <div style="padding:14px;color:var(--t3);font-size:12px;text-align:center">⏳ Загружаем переписку...</div>
              </div>
              ${openlinesActivities.length > 1 ? `<div style="font-size:11px;color:var(--t3);margin-top:6px;text-align:center">Других сессий: ${openlinesActivities.length - 1}</div>` : ''}`
            : `<div class="dc-timeline-side">${renderTimelineBlock(timeline)}</div>`
          }
        </div>
      </div>

      ${(() => {
        // Сводный блок Файлы по сделке: все file ids из всех активностей
        const allFids = new Set();
        for (const a of timeline) {
          if (Array.isArray(a.bitrixFileIds)) for (const f of a.bitrixFileIds) allFids.add(String(f));
          if (a.recordFileId) allFids.add(String(a.recordFileId));
        }
        if (allFids.size === 0) return '';

      // Перерисовываем модалку

    });
  }

  // Лоадим переписку в правую колонку, если есть openlines-сессия
  if (latestOpenlinesActivity) {
    const chatEl = modal.querySelector('#dc-chat-wrap');
    if (chatEl) loadAndRenderChatThread(latestOpenlinesActivity.openlinesSessionId, chatEl);
  }

  // Подгружаем файлы во всех timeline-элементах (звонки, email, переписка)
  wireUpTimelineFiles(modal);

  // Сводный блок 'Все файлы по сделке' — рендерим только при раскрытии
  // <details>, чтобы не качать все превью сразу
  modal.querySelectorAll('.dc-files-summary').forEach(d => {
    const list = d.querySelector('.deal-files-list[data-fids]');
    if (!list) return;
    let loaded = false;
    d.addEventListener('toggle', () => {
      if (!d.open || loaded) return;
      loaded = true;
      const fids = (list.dataset.fids || '').split(',').filter(Boolean);
      if (fids.length === 0) { list.innerHTML = '<div style="font-size:12px;color:var(--t3)">Нет файлов</div>'; return; }
      if (list.id) loadFilesIntoContainer(list.id, fids, '');
    });
  });

  // Timeline filters: остаются как раньше
  modal.querySelectorAll('.tl-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const type = btn.dataset.type;
      const active = btn.classList.contains('active');
      modal.querySelectorAll(`.tl-item[data-type="${type}"]`).forEach(it => {
        it.style.display = active ? '' : 'none';
      });
      // Скрываем дни в которых не осталось видимых элементов
      modal.querySelectorAll('.tl-day-label').forEach(dayLabel => {
        let next = dayLabel.nextElementSibling;
        let hasVisible = false;
        while (next && !next.classList.contains('tl-day-label')) {
          if (next.classList.contains('tl-item') && next.style.display !== 'none') {
            hasVisible = true;
            break;
          }
          next = next.nextElementSibling;
        }
        dayLabel.style.display = hasVisible ? '' : 'none';
      });
    });
  });

  // Кнопки "Показать переписку" — раскрытие/скрытие чата
  modal.querySelectorAll('.tl-show-chat').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sessionId = btn.dataset.sessionId;
      const threadEl = modal.querySelector(`#thread-${CSS.escape(sessionId)}`);
      if (!threadEl) return;
      const isOpen = threadEl.style.display !== 'none';
      if (isOpen) {
        threadEl.style.display = 'none';
        btn.classList.remove('active');
        btn.innerHTML = btn.innerHTML.replace('▼', '💬').replace('Скрыть переписку', `Показать переписку (${btn.dataset.msgCount || ''})`);
      } else {
        threadEl.style.display = '';
        btn.classList.add('active');
        // Загружаем только если ещё не загружали
        if (!threadEl.dataset.loaded) {
          await loadAndRenderChatThread(sessionId, threadEl);
          threadEl.dataset.loaded = '1';
        }
      }
    });
  });
}

function renderTimelineBlock(timeline) {
  if (!timeline || timeline.length === 0) {
    return `<div class="section-h">Таймлайн</div>
      <div style="font-size:13px;color:var(--t3);padding:12px 0">Нет дел в таймлайне</div>`;
  }

  // Группировка по дням
  const groups = {};
  for (const a of timeline) {
    const dateStr = a.bitrixCreated || a.start || a.bitrixLastUpdated || '';
    const dateKey = dateStr ? dateStr.slice(0, 10) : 'unknown';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(a);
  }
  const sortedDays = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  // Подсчёт по типам для фильтра
  const byType = {};
  for (const a of timeline) {
    const t = a.type || 'unknown';
    byType[t] = (byType[t] || 0) + 1;
  }

  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400_000).toISOString().slice(0, 10);

  let html = `<div class="section-h">Таймлайн (${timeline.length})</div>`;

  // Фильтры по типам
  const typeFilters = Object.entries(byType)
    .sort((a, b) => b[1] - a[1])
    .map(([t, n]) => {
      const meta = ACTIVITY_TYPE_META[t] || ACTIVITY_TYPE_META.unknown;
      return `<button class="tl-filter active" data-type="${escapeHtml(t)}">${meta.icon} ${escapeHtml(meta.label)} <span class="tl-count">${n}</span></button>`;
    }).join('');
  html += `<div class="tl-filters">${typeFilters}</div>`;

  html += `<div class="tl-wrap">`;
  for (const day of sortedDays) {
    let label = day;
    if (day === today) label = 'Сегодня';
    else if (day === yesterday) label = 'Вчера';
    else if (day !== 'unknown') label = new Date(day).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
    else label = 'Без даты';

    html += `<div class="tl-day-label">${label}</div>`;
    for (const a of groups[day]) {
      html += renderTimelineItem(a);
    }
  }
  html += `</div>`;
  return html;
}

function renderTimelineItem(a) {
  const type = a.type || 'unknown';
  const meta = ACTIVITY_TYPE_META[type] || ACTIVITY_TYPE_META.unknown;
  const author = a.responsibleUid ? dealsState.users[a.responsibleUid] : null;
  const authorName = author ? `${author.lastName || ''} ${author.name || ''}`.trim() : '';
  const time = a.bitrixCreated ? new Date(a.bitrixCreated).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';

  // Subject (тема/название)
  const subject = a.subject || '';

  // Description: чистим от HTML тегов для краткого превью если type=html, иначе как есть
  let desc = a.description || '';
  if (a.descriptionType === '3' || a.descriptionType === 3) {
    // HTML — убираем теги для превью
    desc = desc.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  }
  if (desc.length > 300) desc = desc.slice(0, 300) + '...';

  // Provider/направление для звонков
  let providerInfo = '';
  if (a.providerId) {
    const provName = PROVIDER_NAMES[a.providerId] || a.providerId;
    providerInfo = `<span class="tl-provider">${escapeHtml(provName)}</span>`;
  }
  let directionInfo = '';
  if (a.direction === '1' || a.direction === 1) directionInfo = '<span class="tl-dir incoming">↓ входящий</span>';
  else if (a.direction === '2' || a.direction === 2) directionInfo = '<span class="tl-dir outgoing">↑ исходящий</span>';

  // Длительность звонка
  let durationInfo = '';
  if (a.callDuration && parseInt(a.callDuration) > 0) {
    const sec = parseInt(a.callDuration);
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    durationInfo = `<span class="tl-duration">⏱ ${min}:${String(s).padStart(2, '0')}</span>`;
  }

  // Файлы — собираем все ID активности (вложения + запись звонка)
  const tlFileIds = [];
  if (Array.isArray(a.bitrixFileIds)) for (const fid of a.bitrixFileIds) tlFileIds.push(String(fid));
  if (a.recordFileId && !tlFileIds.includes(String(a.recordFileId))) tlFileIds.push(String(a.recordFileId));
  let filesInfo = '';
  if (tlFileIds.length > 0) {
    const fileCount = tlFileIds.length;
    const word = fileCount === 1 ? 'файл' : (fileCount < 5 ? 'файла' : 'файлов');
    const headerIcon = a.recordFileId ? '🎙' : '📎';
    filesInfo = `<div class="tl-files-block">
      <div class="tl-files-head">${headerIcon} ${fileCount} ${word}</div>
      <div class="tl-files-list" id="tl-files-${escapeHtml(a._key || a.bitrixId || '')}" data-fids="${escapeHtml(tlFileIds.join(','))}" style="display:flex;flex-direction:column;gap:4px;margin-top:4px">
        <div style="font-size:11px;color:var(--t3)">⏳ Загрузка...</div>
      </div>
    </div>`;
  }

  // Completed badge
  const completedBadge = a.completed ? '<span class="tl-completed">✓</span>' : '';

  // Openlines: ссылка на переписку (если activity связана с сессией openlines)
  let openlinesBlock = '';
  if (a.openlinesSessionId) {
    const msgCount = a.openlinesMessageCount || 0;
    const provName = a.openlinesProvider ? PROVIDER_NAMES_NORMALIZED[a.openlinesProvider] || a.openlinesProvider : 'мессенджер';
    openlinesBlock = `<button class="tl-show-chat" data-session-id="${escapeHtml(a.openlinesSessionId)}" data-activity-key="${escapeHtml(a._key || '')}">
      💬 Показать переписку (${msgCount} сообщ.)
    </button>
    <div class="tl-chat-thread" id="thread-${escapeHtml(a.openlinesSessionId)}" style="display:none"></div>`;
  }

  return `<div class="tl-item" data-type="${escapeHtml(type)}">
    <div class="tl-icon" style="background:${meta.color}22;color:${meta.color}">${meta.icon}</div>
    <div class="tl-body">
      <div class="tl-head">
        <span class="tl-type-label">${escapeHtml(meta.label)}</span>
        ${providerInfo}
        ${directionInfo}
        ${durationInfo}
        ${completedBadge}
        <span class="tl-time">${time}${authorName ? ' · ' + escapeHtml(authorName) : ''}</span>
      </div>
      ${subject ? `<div class="tl-subject">${escapeHtml(subject)}</div>` : ''}
      ${desc ? `<div class="tl-desc">${escapeHtml(desc)}</div>` : ''}
      ${filesInfo}
      ${openlinesBlock}
    </div>
  </div>`;
}

  'whatsapp': 'WhatsApp',
  'whatsapp_twilio': 'WhatsApp',
  'wazzup': 'WAZZUP',

// Загрузка и рендер чата-сессии
async function loadAndRenderChatThread(sessionId, threadEl) {
  threadEl.innerHTML = '<div style="padding:12px;color:var(--t3);font-size:11px">⏳ Загружаем переписку...</div>';
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/openlinesSessions/${encodeURIComponent(sessionId)}.json?auth=${idToken}`);
    if (!r.ok) {
      threadEl.innerHTML = `<div style="padding:12px;color:var(--rd);font-size:11px">✗ Не удалось загрузить переписку</div>`;
      return;
    }
    const session = await r.json();
    if (!session) {
      threadEl.innerHTML = `<div style="padding:12px;color:var(--t3);font-size:11px">Переписка не найдена в базе. Возможно session_id некорректный.</div>`;
      return;
    }

    const messagesObj = session.messages || {};
    const messages = Object.values(messagesObj);

    if (messages.length === 0) {
      threadEl.innerHTML = `<div style="padding:12px;color:var(--t3);font-size:11px">Сообщений нет</div>`;
      return;
    }

    // Сортируем по дате (старые сверху, как в обычной переписке)
    messages.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

    let html = '<div class="chat-thread-inner">';
    let lastDay = null;
    for (const m of messages) {
      const dateStr = m.date ? m.date.slice(0, 10) : '';
      // День-разделитель
      if (dateStr && dateStr !== lastDay) {
        const day = new Date(dateStr).toLocaleDateString('ru', { day: 'numeric', month: 'long', year: 'numeric' });
        html += `<div class="chat-day">${day}</div>`;
        lastDay = dateStr;
      }

      const time = m.date ? new Date(m.date).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }) : '';

      if (m.isSystem) {
        // Системные сообщения — компактно, серым
        const sysText = (m.textLegacy || m.text || '').replace(/<[^>]+>/g, ' ').replace(/\[USER=\d+ REPLACE\]([^[]+)\[\/USER\]/g, '$1').replace(/\[URL=[^\]]+\]([^[]+)\[\/URL\]/g, '$1').replace(/\[\/?b\]/g, '').replace(/\s+/g, ' ').trim();
        html += `<div class="chat-msg-sys">${escapeHtml(sysText)} <span class="chat-time">${time}</span></div>`;
        continue;
      }

      // Обычное сообщение от клиента или сотрудника
      let isClient = m.isFromClient;
      let textRender = String(m.text || '');

      // ── WAZZUP специфика: парсим служебный префикс и определяем направление
      // Формат: "=== Исходящее сообщение, автор: Имя ===" или "=== Входящее сообщение, автор: Имя ==="
      const wazzupMatch = textRender.match(/^={2,}\s*(Входящее|Исходящее)\s+сообщение,?\s*автор:?\s*([^=]+?)\s*={2,}\s*\n?/i);
      let wazzupAuthor = null;
      if (wazzupMatch) {
        const direction = wazzupMatch[1].toLowerCase();
        wazzupAuthor = wazzupMatch[2].trim();
        // "Исходящее" = от сотрудника к клиенту, "Входящее" = от клиента к сотруднику
        isClient = direction === 'входящее';
        // Удаляем служебный префикс из текста
        textRender = textRender.slice(wazzupMatch[0].length);
      }

      const senderName = wazzupAuthor || m.senderName || (isClient ? 'Клиент' : 'Сотрудник');

      // BBCode и форматирование
      textRender = textRender
        .replace(/\[b\]/gi, '<b>').replace(/\[\/b\]/gi, '</b>')
        .replace(/\[i\]/gi, '<i>').replace(/\[\/i\]/gi, '</i>')
        .replace(/\[USER=\d+ REPLACE\]([^[]+)\[\/USER\]/g, '<u>$1</u>')
        // [URL=...]label[/URL] — с лейблом
        .replace(/\[URL=([^\]]+)\]([^[]+)\[\/URL\]/g, '<a href="$1" target="_blank">$2</a>')
        // [URL]https://...[/URL] — без лейбла, ссылка = текст
        .replace(/\[URL\](https?:\/\/[^[]+)\[\/URL\]/g, '<a href="$1" target="_blank">$1</a>');

      // Автоконверсия голых URL в ссылки (после BBCode чтобы не пересекалось)
      textRender = textRender.replace(/(^|\s)(https?:\/\/[^\s<]+)/g, (match, p1, p2) => {
        return p1 + `<a href="${p2}" target="_blank">${p2}</a>`;
      });

      // Защита: убираем все теги кроме разрешённых
      textRender = textRender.replace(/<(?!\/?(b|i|u|a|br)(?:\s|>|\/))/g, '&lt;');
      // Переносы строк
      textRender = textRender.replace(/\n/g, '<br>');

      html += `<div class="chat-msg ${isClient ? 'client' : 'staff'}">
        <div class="chat-bubble">
          <div class="chat-sender">${escapeHtml(senderName)}</div>
          <div class="chat-text">${textRender}</div>
          <div class="chat-time">${time}</div>
        </div>
      </div>`;
    }
    html += '</div>';

    threadEl.innerHTML = html;
  } catch (e) {
    threadEl.innerHTML = `<div style="padding:12px;color:var(--rd);font-size:11px">✗ ${escapeHtml(e.message)}</div>`;
  }
}

// При загрузке страницы — обрабатываем deep link
window.addEventListener('hashchange', handleDeepLink);
function handleDeepLink() {
  const h = location.hash;
  if (h.startsWith('#deal/')) {
    const id = h.slice('#deal/'.length);
    if (id) {
      // Дождёмся загрузки данных
      const open = () => {
        if (dealsState.loaded && dealsState.deals.find(d => d.bitrixId === id)) {
          openDealCard(id);
        } else if (dealsState.loaded) {
          // Сделка не найдена — вычистим hash
          history.pushState({}, '', location.pathname + location.search);
        } else {
          setTimeout(open, 200);
        }
      };
      open();
    }
  }
}

function renderCustomFieldsBlock(cfData) {
  if (!cfData || Object.keys(cfData).length === 0) return '';
  const schema = dealsState.customSchema || {};

  // Сортируем поля: сначала те у которых есть значение и схема (с лейблом), потом UF_CRM_*
  const entries = Object.entries(cfData);
  entries.sort((a, b) => {
    const ma = schema[a[0]];
    const mb = schema[b[0]];
    const sa = ma?.sort || 9999;
    const sb = mb?.sort || 9999;
    return sa - sb;
  });

  let html = `<div class="section-h">Дополнительные поля</div><div class="cf-grid">`;
  let shownCount = 0;
  let emptyCount = 0;
  for (const [field, value] of entries) {
    const meta = schema[field] || {};
    const label = formatFieldLabel(meta.label, field);
    const display = formatCfValue(value, meta);
    // Скрываем пустые поля по умолчанию, показываем только заполненные
    const isEmpty = (display.includes('class="empty-cell"') || display === '<span class="empty-cell">—</span>' || display === '✗ Нет' || display === 'false');
    if (isEmpty) {
      emptyCount++;
      continue;
    }
    html += `<div class="fl">${escapeHtml(label)}</div><div class="fv">${display}</div>`;
    shownCount++;
  }
  if (shownCount === 0) return ''; // Все пустые — не показываем блок вообще
  html += `</div>`;
  if (emptyCount > 0) {
    html += `<div style="font-size:11px;color:var(--t3);margin-top:6px;text-align:center">Скрыто ${emptyCount} пустых полей</div>`;
  }
  return html;
}

// Битрикс может возвращать label либо строкой, либо объектом {ru: '...', en: '...'}
function formatFieldLabel(label, fallback) {
  if (!label) return fallback || '';
  if (typeof label === 'string') return label;
  if (typeof label === 'object') {
    return label.ru || label.RU || label.en || label.EN || Object.values(label)[0] || fallback || '';
  }
  return String(label) || fallback || '';
}

function formatCfValue(value, meta) {
  if (value === null || value === undefined || value === '') return '<span class="empty-cell">—</span>';
  if (Array.isArray(value)) {
    if (!value.length) return '<span class="empty-cell">—</span>';
    // Для enum нужно резолвить через meta.list
    if (meta.type === 'enumeration' && meta.list) {
      const labels = value.map(v => {
        const item = meta.list.find(l => String(l.ID) === String(v) || String(l.VALUE) === String(v));
        return item ? escapeHtml(item.VALUE) : escapeHtml(String(v));
      });
      return labels.join(', ');
    }
    return value.map(v => escapeHtml(String(v))).join(', ');
  }
  if (meta.type === 'enumeration' && meta.list) {
    const item = meta.list.find(l => String(l.ID) === String(value));
    return item ? escapeHtml(item.VALUE) : escapeHtml(String(value));
  }
  if (meta.type === 'boolean') return value === '1' || value === true ? '✓ Да' : '✗ Нет';
  if (meta.type === 'date' || meta.type === 'datetime') {
    try { return new Date(value).toLocaleString('ru'); } catch { return escapeHtml(String(value)); }
  }
  if (meta.type === 'money' || meta.type === 'double') {
    const num = parseFloat(value);
    return isNaN(num) ? escapeHtml(String(value)) : `<span class="money">${num.toLocaleString('ru')}</span>`;
  }
  return escapeHtml(String(value));
}

// ═════════════════════════════════════════════════════════════════════════
//   КЭШ В IndexedDB (для контактов 143k и задач 38k)
//   localStorage не подходит — лимит ~5-10 МБ, контакты весят больше
// ═════════════════════════════════════════════════════════════════════════
const CACHE_DB_NAME = 'pllato-cache';
const CACHE_TTL_MS = 60 * 60 * 1000; // 1 час
let _idb = null;

function idbOpen() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(CACHE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('cache')) {
        db.createObjectStore('cache');
      }
    };
    req.onsuccess = () => { _idb = req.result; resolve(_idb); };
    req.onerror = () => reject(req.error);
  });
}

async function cacheGet(key) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('cache', 'readonly');
      const req = tx.objectStore('cache').get(key);
      req.onsuccess = () => {
        const v = req.result;
        if (!v) return resolve(null);
        if (Date.now() - v.ts > CACHE_TTL_MS) return resolve(null); // expired
        resolve(v.data);
      };
      req.onerror = () => reject(req.error);
    });
  } catch (e) {
    return null;
  }
}

async function cacheSet(key, data) {
  try {
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('cache', 'readwrite');
      tx.objectStore('cache').put({ ts: Date.now(), data }, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) {
    // ignore
  }
}

async function cacheClear() {
  try {
    const db = await idbOpen();
    return new Promise((resolve) => {
      const tx = db.transaction('cache', 'readwrite');
      tx.objectStore('cache').clear();
      tx.oncomplete = () => resolve();
    });
  } catch (e) {}
}

const usersState = {
  loaded: false,
  loading: false,
  users: {},
};

async function ensureUsersLoaded() {
  if (usersState.loaded) return;
  if (usersState.loading) {
    // Ждём завершения текущей загрузки (опрос с интервалом 50мс)
    await new Promise(resolve => {
      const check = () => usersState.loaded ? resolve() : setTimeout(check, 50);
      check();
    });
    return;
  }
  usersState.loading = true;
  try {
    // Сначала кеш
    const cached = await cacheGet('users:map:v1');
    if (cached && typeof cached === 'object' && Object.keys(cached).length > 0) {
      usersState.users = cached;
      usersState.loaded = true;
      // Также прокидываем в dealsState для совместимости
      if (!dealsState.users || Object.keys(dealsState.users).length === 0) {
        dealsState.users = cached;
      }
      // Фоновое обновление
      setTimeout(() => refreshUsersBackground(), 200);
      return;
    }
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/users.json?auth=${idToken}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    usersState.users = data || {};
    usersState.loaded = true;
    if (!dealsState.users || Object.keys(dealsState.users).length === 0) {
      dealsState.users = usersState.users;
    }
    cacheSet('users:map:v1', usersState.users);
  } catch (e) {
    console.error('ensureUsersLoaded:', e);
  } finally {
    usersState.loading = false;
  }
}

async function refreshUsersBackground() {
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/users.json?auth=${idToken}`);
    if (!r.ok) return;
    const data = await r.json();
    if (data && Object.keys(data).length > 0) {
      usersState.users = data;
      dealsState.users = data;
      cacheSet('users:map:v1', data);
    }
  } catch (e) {}
}

async function loadContactsPage(page) {
  if (contactsState.loading) return;
  contactsState.loading = true;
  contactsState.page = page;

  const content = document.getElementById('contacts-content');
  if (content) content.style.opacity = '0.5';

  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const params = new URLSearchParams({
      page: String(page),
      pageSize: String(contactsState.pageSize),
      auth: idToken,
    });
    if (contactsState.searchTerm) params.set('q', contactsState.searchTerm);

    const r = await fetch(`${WORKER_LIST_URL}/contacts?${params}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    contactsState.items = data.items || [];
    contactsState.total = data.total || 0;
    contactsState.totalPages = data.totalPages || 1;

    renderContactsPagedTable();
    renderContactsPager();
  } catch (e) {
    console.error('loadContactsPage:', e);
    if (content) {
      content.innerHTML = `<div class="empty-state"><div class="empty-icon">✗</div><div class="empty-text">Ошибка загрузки: ${escapeHtml(e.message)}</div></div>`;
    }
  } finally {
    contactsState.loading = false;
    if (content) content.style.opacity = '';
  }
}

function updateContactsCount() {
  const countEl = document.getElementById('contacts-count');

  const t = contactsState.total.toLocaleString('ru');

function renderContactsPager() {
  const el = document.getElementById('contacts-pager');
  if (!el) return;
  el.innerHTML = buildPagerHtml(contactsState.page, contactsState.totalPages, contactsState.total);
  el.querySelectorAll('button[data-page]').forEach(btn => {

      const p = parseInt(btn.dataset.page, 10);
      if (p && p !== contactsState.page) loadContactsPage(p);
    });
  });
}

// Универсальный пагинатор: «← N M ... →» + счётчик «стр X из Y (всего N)».
// Показываем: первая, последняя, ±2 от текущей, плюс edges.
function buildPagerHtml(page, totalPages, total) {
  if (!totalPages || totalPages <= 1) {
    return total ? `<div class="pager-info">Всего ${total.toLocaleString('ru')}</div>` : '';
  }
  const pages = [];
  const add = (p) => { if (!pages.includes(p) && p >= 1 && p <= totalPages) pages.push(p); };
  add(1);
  for (let d = -2; d <= 2; d++) add(page + d);
  add(totalPages);
  pages.sort((a, b) => a - b);

  let html = '';
  html += `<button class="pager-btn" data-page="${Math.max(1, page - 1)}" ${page <= 1 ? 'disabled' : ''}>←</button>`;
  let prev = 0;
  for (const p of pages) {
    if (prev && p - prev > 1) html += `<span class="pager-gap">…</span>`;
    html += `<button class="pager-btn ${p === page ? 'active' : ''}" data-page="${p}">${p}</button>`;
    prev = p;
  }
  html += `<button class="pager-btn" data-page="${Math.min(totalPages, page + 1)}" ${page >= totalPages ? 'disabled' : ''}>→</button>`;
  html += `<div class="pager-info">стр ${page} из ${totalPages} · всего ${total.toLocaleString('ru')}</div>`;
  return html;
}

window.openContactCard = async function(key) {
  // Загружаем полную карточку контакта + связанные сделки
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const contact = await fetch(`${dbUrl}/contacts/${encodeURIComponent(key)}.json?auth=${idToken}`).then(r => r.ok ? r.json() : null);
    if (!contact) {
      alert('Контакт не найден');
      return;
    }
    const fullName = [contact.lastName, contact.name, contact.secondName].filter(Boolean).join(' ').trim() || '(без имени)';
    const phones = Array.isArray(contact.phones) ? contact.phones : [];
    const emails = Array.isArray(contact.emails) ? contact.emails : [];
    const respUser = getUserById(contact.responsibleUid);
    const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
    const bitrixUrl = `https://elcalmaty.bitrix24.kz/crm/contact/details/${contact.bitrixId}/`;

    // Связанные сделки — ищем по contactId в dealsState (если загружено)
    const relatedDeals = (dealsState?.deals || []).filter(d => d.contactId === key);

    let html = `<div class="modal-overlay" onclick="if(event.target===this)closeDealCard()">
      <div class="modal">
        <button class="close-x" onclick="closeDealCard()">×</button>
        <h2>${escapeHtml(fullName)}</h2>
        <div class="modal-sub">
          ID: <code>${escapeHtml(contact.bitrixId || '?')}</code> ·
          <a href="${bitrixUrl}" target="_blank" style="color:var(--ac2)">Открыть в Битриксе ↗</a>
        </div>
        <div class="section-h">Контактная информация</div>
        <div class="field-grid">`;

    if (phones.length > 0) {
      html += `<div class="fl">Телефон${phones.length > 1 ? 'ы' : ''}</div><div class="fv">`;
      html += phones.map(p => `<div><a href="tel:${escapeHtml(p.value)}" style="color:var(--ac2)">${escapeHtml(p.value)}</a> ${p.type ? `<span class="muted" style="font-size:11px">· ${escapeHtml(p.type)}</span>` : ''}</div>`).join('');
      html += `</div>`;
    }

    if (emails.length > 0) {
      html += `<div class="fl">Email</div><div class="fv">`;
      html += emails.map(em => `<div><a href="mailto:${escapeHtml(em.value)}" style="color:var(--ac2)">${escapeHtml(em.value)}</a></div>`).join('');
      html += `</div>`;
    }

    html += `<div class="fl">Ответственный</div><div class="fv">${escapeHtml(respName)}</div>`;
    if (contact.bitrixCreated) html += `<div class="fl">Создан</div><div class="fv">${new Date(contact.bitrixCreated).toLocaleString('ru')}</div>`;
    if (contact.bitrixDateModify) html += `<div class="fl">Изменён</div><div class="fv">${new Date(contact.bitrixDateModify).toLocaleString('ru')}</div>`;
    if (contact.companyId) html += `<div class="fl">Компания</div><div class="fv"><span class="muted">${escapeHtml(contact.companyId)}</span></div>`;
    html += `</div>`;

    if (contact.comments) {
      html += `<div class="section-h">Комментарий</div>
        <div style="font-size:13px;color:var(--t2);white-space:pre-wrap;background:var(--bg3);padding:12px 14px;border-radius:8px">${escapeHtml(contact.comments)}</div>`;
    }

    if (relatedDeals.length > 0) {
      html += `<div class="section-h">Связанные сделки (${relatedDeals.length})</div>
        <div style="display:flex;flex-direction:column;gap:6px">`;
      for (const d of relatedDeals.slice(0, 20)) {
        const stage = dealsState.pipeline?.stages?.[d.stageId];
        const stageName = stage?.name || d.stageId || '—';
        const stageColor = stage?.semantics === 'S' ? 'var(--gn)' : (stage?.semantics === 'F' ? 'var(--rd)' : 'var(--ac2)');
        html += `<div onclick="closeDealCard();setTimeout(()=>openDealCard('${escapeHtml(d.bitrixId)}'),100)" style="background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(d.title || '(без названия)')}</div>
            <div style="font-size:11px;color:var(--t3);margin-top:2px">${d.opportunity ? d.opportunity.toLocaleString('ru') + ' ' + (d.currency || '') : '—'}</div>
          </div>
          <span class="badge" style="color:${stageColor};border-color:${stageColor}55;background:${stageColor}22">${escapeHtml(stageName)}</span>
        </div>`;
      }
      if (relatedDeals.length > 20) {
        html += `<div style="font-size:11px;color:var(--t3);text-align:center;padding:6px">и ещё ${relatedDeals.length - 20}...</div>`;
      }
      html += `</div>`;
    } else if (dealsState?.deals?.length > 0) {
      html += `<div class="section-h">Связанные сделки</div><div style="font-size:13px;color:var(--t3)">Нет привязанных сделок</div>`;
    }

    html += `${renderCustomFieldsBlock(contact.customFields)}
      </div>
    </div>`;

    const div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div.firstElementChild);
    document.body.style.overflow = 'hidden';
  } catch (e) {
    alert('Ошибка загрузки контакта: ' + e.message);
  }
};

    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    await fetch(`${dbUrl}/taskReadState/${uid}/${encodeURIComponent(taskKey)}.json?auth=${idToken}`, {

      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(now),

    console.warn('markTaskRead:', e);
  }
}

  for (const t of tasksState.list) {
    taskReadState.data[t.key] = now;
    updates[t.key] = now;
  }
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    await fetch(`${dbUrl}/taskReadState/${uid}.json?auth=${idToken}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates),
    });
    showToast('Все задачи отмечены прочитанными');
    filterAndRenderTasks();
  } catch (e) {
    showToast('Ошибка: ' + e.message, true);
  }
}

// Возвращает true если у задачи есть непрочитанные изменения для текущего пользователя
function isTaskUnread(task) {
  if (!task) return false;
  const lastRead = taskReadState.data[task.key];
  // Что считаем "обновлением": bitrixDateModify (если есть), иначе bitrixCreated
  // Также: если в задаче появились новые комментарии — это тоже обновление
  // Эмулируем "modify" через max(bitrixDateModify, bitrixCreated)
  // Backend: каждый коммент должен апдейтить bitrixDateModify задачи
  const taskTs = task.bitrixDateModify || task.bitrixCreated;
  if (!taskTs) return false;
  if (!lastRead) return true; // никогда не открывали
  return taskTs > lastRead;
}

async function loadTasks() {
  if (tasksState.loading) return;
  tasksState.loading = true;
  const t0 = Date.now();

  // Кеш
  const cached = await cacheGet('tasks:list:v1');
  if (cached && Array.isArray(cached) && cached.length > 0) {
    tasksState.list = cached;
    tasksState.loaded = true;
    tasksState.loading = false;
    setTimeout(() => refreshTasksBackground(), 100);
    return;
  }

  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/tasks.json?auth=${idToken}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (!data) {
      tasksState.list = [];
      tasksState.loaded = true;
      tasksState.loading = false;
      return;
    }
    // Прогрессивный парсинг чанками — не блокируем UI
    const list = await parseTasksProgressive(data);
    tasksState.list = list;
    tasksState.loaded = true;
    console.log(`Loaded ${list.length} tasks in ${Date.now() - t0}ms`);
    cacheSet('tasks:list:v1', list);
    // Если страница задач сейчас открыта — финальный рендер с правильным subtasksCount
    if (document.getElementById('tasks-content')) {
      populateTaskAssigneeFilter();
      filterAndRenderTasks();
    }
  } catch (e) {
    console.error('loadTasks error:', e);
    if (document.getElementById('tasks-content')) {
      document.getElementById('tasks-content').innerHTML =
        `<div class="empty-state"><div class="empty-icon">✗</div><div class="empty-text">Ошибка загрузки: ${escapeHtml(e.message)}</div></div>`;
    }
  } finally {
    tasksState.loading = false;
  }
}

// Прогрессивный парсинг — рендерим первые 1000 сразу, остальные чанками
async function parseTasksProgressive(data) {
  const entries = Object.entries(data);
  const total = entries.length;
  const list = [];
  const FIRST_CHUNK = 1000;
  const CHUNK = 5000;

  function processOne(key, t) {
    if (!t) return;
    list.push({
      key,
      bitrixId: t.bitrixId || key.replace('task_', ''),
      title: t.title || '(без названия)',
      status: String(t.status || '1'),
      priority: String(t.priority || '1'),
      responsibleUid: t.responsibleUid || null,
      createdByUid: t.createdByUid || null,
      deadline: t.deadline || null,
      bitrixCreated: t.bitrixCreated || t.bitrixCreatedDate || null,
      bitrixDateModify: t.bitrixChangedDate || t.bitrixDateModify || t.bitrixCreated || t.bitrixCreatedDate || null,
      commentsCount: t.commentsCount || 0,
      groupId: t.groupId || null,
      parentId: t.parentId || null,
      bitrixParentId: t.bitrixParentId || null,
      searchable: (t.title || '').toLowerCase(),
      subtasksCount: 0,
    });
  }

  // Первый чанк — синхронно, чтобы пользователь увидел начало быстро
  for (let i = 0; i < Math.min(FIRST_CHUNK, total); i++) {
    processOne(entries[i][0], entries[i][1]);
  }

  // Промежуточный рендер если страница задач уже открыта
  if (document.getElementById('tasks-content') && total > FIRST_CHUNK) {
    list.sort((a, b) => (b.bitrixCreated || '').localeCompare(a.bitrixCreated || ''));
    tasksState.list = list;
    populateTaskAssigneeFilter();
    filterAndRenderTasks();
  }

  // Остальные — чанками через rAF
  for (let i = FIRST_CHUNK; i < total; i += CHUNK) {
    const end = Math.min(i + CHUNK, total);
    for (let j = i; j < end; j++) {
      processOne(entries[j][0], entries[j][1]);
    }
    // Промежуточный апдейт каждые 10000
    if (document.getElementById('tasks-content') && (i % 10000 === 0)) {
      list.sort((a, b) => (b.bitrixCreated || '').localeCompare(a.bitrixCreated || ''));
      tasksState.list = list;
      filterAndRenderTasks();
    }
    // Уступаем поток UI
    await new Promise(resolve => requestAnimationFrame(resolve));
  }

  // Финальная сортировка + subtasksCount
  list.sort((a, b) => (b.bitrixCreated || '').localeCompare(a.bitrixCreated || ''));
  const subtaskCounts = {};
  for (const t of list) {
    if (t.parentId) subtaskCounts[t.parentId] = (subtaskCounts[t.parentId] || 0) + 1;
  }
  for (const t of list) {
    t.subtasksCount = subtaskCounts[t.key] || 0;
  }
  return list;
}

function parseTasksToList(data) {
  const list = [];
  for (const [key, t] of Object.entries(data)) {
    if (!t) continue;
    list.push({
      key,
      bitrixId: t.bitrixId || key.replace('task_', ''),
      title: t.title || '(без названия)',
      status: String(t.status || '1'),
      priority: String(t.priority || '1'),
      responsibleUid: t.responsibleUid || null,
      createdByUid: t.createdByUid || null,
      deadline: t.deadline || null,
      bitrixCreated: t.bitrixCreated || t.bitrixCreatedDate || null,
      bitrixDateModify: t.bitrixChangedDate || t.bitrixDateModify || t.bitrixCreated || t.bitrixCreatedDate || null,
      commentsCount: t.commentsCount || 0,
      groupId: t.groupId || null,
      parentId: t.parentId || null,
      bitrixParentId: t.bitrixParentId || null,
      searchable: (t.title || '').toLowerCase(),
    });
  }
  list.sort((a, b) => (b.bitrixCreated || '').localeCompare(a.bitrixCreated || ''));

  // Считаем количество подзадач для каждой задачи
  const subtaskCounts = {};
  for (const t of list) {
    if (t.parentId) {
      subtaskCounts[t.parentId] = (subtaskCounts[t.parentId] || 0) + 1;
    }
  }
  for (const t of list) {
    t.subtasksCount = subtaskCounts[t.key] || 0;
  }

  return list;
}

async function refreshTasksBackground() {
  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/tasks.json?auth=${idToken}`);
    if (!r.ok) return;
    const data = await r.json();
    if (!data) return;
    const list = parseTasksToList(data);
    if (list.length !== tasksState.list.length) {
      tasksState.list = list;
      cacheSet('tasks:list:v1', list);
      if (document.getElementById('tasks-content')) {
        populateTaskAssigneeFilter();
        filterAndRenderTasks();
      }
    }
  } catch (e) {}
}

// ─── Realtime listener для задач ────────────────────────────────
let _tasksListenerAttached = false;
function attachTasksLiveListener() {
  if (_tasksListenerAttached) return;
  if (!tasksState.loaded) return;
  _tasksListenerAttached = true;

  const tasksRef = window.dbRef(window.fbDb, 'tasks');
  // Последний modify-момент среди наших задач (chenge tasks have bitrixModified, lite-list has bitrixCreated)
  const lastTs = tasksState.list.reduce((max, t) => {
    const ts = t.bitrixCreated || '';
    return ts > max ? ts : max;
  }, '');

  // child_added — initial flush + новые задачи. Фильтруем по дате
  window.dbOnChildAdded(tasksRef, (snap) => {
    const key = snap.key;
    const t = snap.val();
    if (!t) return;
    const ts = t.bitrixCreated || '';
    if (lastTs && ts <= lastTs) return; // уже знаем
    // Проверим что её нет в списке
    if (tasksState.list.find(x => x.key === key)) return;
    // Превращаем в lite-формат
    const lite = {
      key,
      bitrixId: t.bitrixId || key.replace('task_', ''),
      title: t.title || '(без названия)',
      status: String(t.status || '1'),
      priority: String(t.priority || '1'),
      responsibleUid: t.responsibleUid || null,
      createdByUid: t.createdByUid || null,
      deadline: t.deadline || null,
      bitrixCreated: t.bitrixCreated || t.bitrixCreatedDate || null,
      bitrixDateModify: t.bitrixChangedDate || t.bitrixDateModify || t.bitrixCreated || t.bitrixCreatedDate || null,
      commentsCount: t.commentsCount || 0,
      groupId: t.groupId || null,
      parentId: t.parentId || null,
      bitrixParentId: t.bitrixParentId || null,
      searchable: (t.title || '').toLowerCase(),
      subtasksCount: 0,
    };
    tasksState.list.unshift(lite);
    // Пересчитываем subtasksCount у родителя
    if (lite.parentId) {
      const parent = tasksState.list.find(x => x.key === lite.parentId);
      if (parent) parent.subtasksCount = (parent.subtasksCount || 0) + 1;
    }
    console.log('[Live] new task:', key, lite.title);
    if (document.querySelector('[data-page="tasks"].active')) {
      populateTaskAssigneeFilter();
      filterAndRenderTasks();
    }
    saveCacheTasksThrottled();
  });

  window.dbOnChildChanged(tasksRef, (snap) => {
    const key = snap.key;
    const t = snap.val();
    if (!t) return;
    const idx = tasksState.list.findIndex(x => x.key === key);
    if (idx < 0) return;
    const old = tasksState.list[idx];
    tasksState.list[idx] = {
      ...old,
      title: t.title || old.title,
      status: String(t.status || old.status),
      priority: String(t.priority || old.priority),
      responsibleUid: t.responsibleUid || old.responsibleUid,
      deadline: t.deadline || old.deadline,
      commentsCount: t.commentsCount ?? old.commentsCount,
      parentId: t.parentId || old.parentId,
      searchable: (t.title || '').toLowerCase(),
    };
    console.log('[Live] task changed:', key);
    if (document.querySelector('[data-page="tasks"].active')) {
      filterAndRenderTasks();
    }
    saveCacheTasksThrottled();
  });

  window.dbOnChildRemoved(tasksRef, (snap) => {
    const key = snap.key;
    const idx = tasksState.list.findIndex(x => x.key === key);
    if (idx < 0) return;
    const removed = tasksState.list[idx];
    tasksState.list.splice(idx, 1);
    // Уменьшаем subtasksCount у родителя
    if (removed.parentId) {
      const parent = tasksState.list.find(x => x.key === removed.parentId);
      if (parent && parent.subtasksCount > 0) parent.subtasksCount -= 1;
    }
    console.log('[Live] task removed:', key);
    if (document.querySelector('[data-page="tasks"].active')) {
      filterAndRenderTasks();
    }
    saveCacheTasksThrottled();
  });
}

function filterAndRenderTasks() {
  const term = tasksState.searchTerm;
  let arr = tasksState.list;
  if (tasksState.filterStatus === 'active') {
    arr = arr.filter(t => ['1', '2', '3'].includes(t.status));
  } else if (tasksState.filterStatus !== 'all') {
    arr = arr.filter(t => t.status === tasksState.filterStatus);
  }
  if (tasksState.filterAssignee !== 'all') {
    arr = arr.filter(t => t.responsibleUid === tasksState.filterAssignee);
  }
  if (term) {
    arr = arr.filter(t => t.searchable.includes(term));
  }

  // Если view = kanban — рендерим по-другому, hierarchyMode игнорируется
  if (tasksState.view === 'kanban') {
    tasksState.filtered = arr;
    const countEl = document.getElementById('tasks-count');
    if (countEl) {
      countEl.textContent = (arr.length === tasksState.list.length)
        ? tasksState.list.length.toLocaleString('ru')
        : `${arr.length.toLocaleString('ru')} из ${tasksState.list.length.toLocaleString('ru')}`;
    }
    renderTasksKanban();
    return;
  }

  // List view: hierarchy filtering
  if (tasksState.hierarchyMode === 'root') {
    arr = arr.filter(t => !t.parentId);
    arr = sortTasksByActivity(arr);
  } else if (tasksState.hierarchyMode === 'tree') {
    arr = buildTaskTree(arr);
  } else if (tasksState.hierarchyMode === 'smart') {
    arr = buildSmartList(arr);
  } else {
    // flat
    arr = sortTasksByActivity(arr);
  }
  tasksState.filtered = arr;

  const countEl = document.getElementById('tasks-count');
  if (countEl) {
    countEl.textContent = (arr.length === tasksState.list.length)
      ? tasksState.list.length.toLocaleString('ru')
      : `${arr.length.toLocaleString('ru')} из ${tasksState.list.length.toLocaleString('ru')}`;
  }

  renderTasksTable();
}

// Сортировка задач: непрочитанные с активностью наверху, потом по дате модификации
function sortTasksByActivity(arr) {
  return arr.slice().sort((a, b) => {
    const aUnread = isTaskUnread(a) ? 1 : 0;
    const bUnread = isTaskUnread(b) ? 1 : 0;
    if (aUnread !== bUnread) return bUnread - aUnread; // непрочитанные наверх
    // Внутри группы — по дате модификации (свежие наверх)
    const aTs = a.bitrixDateModify || a.bitrixCreated || '';
    const bTs = b.bitrixDateModify || b.bitrixCreated || '';
    return bTs.localeCompare(aTs);
  });
}

// SMART режим: корневые задачи + все непрочитанные раскрытые подзадачи под родителями
// Гибрид: ≤3 непрочитанных подзадач — показываем все, >3 — показываем 3 + кнопку "ещё N"
function buildSmartList(filtered) {
  // Индекс детей по родителю (из ПОЛНОГО списка, чтобы видеть подзадачи родителей которые сами могут не пройти фильтр)
  const childrenOf = {};
  for (const t of tasksState.list) {
    if (t.parentId) {
      if (!childrenOf[t.parentId]) childrenOf[t.parentId] = [];
      childrenOf[t.parentId].push(t);
    }
  }

  // Корневые задачи + сироты (родитель не в общем списке) +
  // подзадачи у которых родитель не прошёл текущий фильтр
  // (иначе при поиске по тексту, который матчит только подзадачу,
  // она бы пропала — потому что мы показываем только корни).
  const filteredKeys = new Set(filtered.map(t => t.key));
  const allKeysSet = new Set(tasksState.list.map(t => t.key));
  const roots = filtered.filter(t =>
    !t.parentId ||
    !allKeysSet.has(t.parentId) ||
    !filteredKeys.has(t.parentId)
  );

  // Для каждой корневой считаем "имеет ли непрочитанные подзадачи (рекурсивно)"
  // и собираем сами непрочитанные подзадачи (сразу с глубиной)
  function walkUnreadKids(parentKey, depth, accumulator) {
    const kids = childrenOf[parentKey] || [];
    for (const k of kids) {
      const kUnread = isTaskUnread(k);
      // Рекурсивно собираем все непрочитанные на любой глубине
      if (kUnread) {
        accumulator.push({ ...k, _depth: depth });
      }
      walkUnreadKids(k.key, depth + 1, accumulator);
    }
  }

  // Для бейджа "+N новых" считаем общее число непрочитанных подзадач задачи
  function countUnreadKids(parentKey) {
    let count = 0;
    const stack = [parentKey];
    while (stack.length) {
      const cur = stack.pop();
      const kids = childrenOf[cur] || [];
      for (const k of kids) {
        if (isTaskUnread(k)) count++;
        stack.push(k.key);
      }
    }
    return count;
  }

  // Добавляем root flag к корневым с подсчётом непрочитанных подзадач
  const enrichedRoots = roots.map(r => {
    const unreadKidsCount = countUnreadKids(r.key);
    return { ...r, _unreadKidsCount: unreadKidsCount };
  });

  // Сортируем корни: сначала те у кого есть свои непрочитанные ИЛИ непрочитанные подзадачи
  enrichedRoots.sort((a, b) => {
    const aActive = (isTaskUnread(a) ? 1 : 0) + (a._unreadKidsCount > 0 ? 1 : 0);
    const bActive = (isTaskUnread(b) ? 1 : 0) + (b._unreadKidsCount > 0 ? 1 : 0);
    if (aActive !== bActive) return bActive - aActive;
    // Внутри группы — по дате
    const aTs = a.bitrixDateModify || a.bitrixCreated || '';
    const bTs = b.bitrixDateModify || b.bitrixCreated || '';
    return bTs.localeCompare(aTs);
  });

  // Считаем общее число потомков (для бейджа "📂 N")
  function countAllDescendants(parentKey) {
    let count = 0;
    const stack = [parentKey];
    while (stack.length) {
      const cur = stack.pop();
      const kids = childrenOf[cur] || [];
      for (const k of kids) { count++; stack.push(k.key); }
    }
    return count;
  }

  // Все потомки (рекурсивно) — сортированы: непрочитанные первыми, потом по дате
  function walkAllDescendants(parentKey, depth, accumulator) {
    const kids = (childrenOf[parentKey] || []).slice();
    kids.sort((a, b) => {
      const aUn = isTaskUnread(a) ? 1 : 0;
      const bUn = isTaskUnread(b) ? 1 : 0;
      if (aUn !== bUn) return bUn - aUn; // непрочитанные сверху
      const aTs = a.bitrixDateModify || a.bitrixCreated || '';
      const bTs = b.bitrixDateModify || b.bitrixCreated || '';
      return bTs.localeCompare(aTs);
    });
    for (const k of kids) {
      accumulator.push({ ...k, _depth: depth });
      walkAllDescendants(k.key, depth + 1, accumulator);
    }
  }

  // Строим плоский массив для рендера: root → ВСЕ его потомки если раскрыт
  const result = [];
  for (const root of enrichedRoots) {
    const subtasksCount = countAllDescendants(root.key);
    const rootEntry = {
      ...root, _depth: 0,
      _unreadKidsCount: root._unreadKidsCount,
      _subtasksCount: subtasksCount,
    };
    result.push(rootEntry);

    if (subtasksCount === 0) continue;

    const isExpanded = tasksState.expandedRows.has(root.key);
    if (isExpanded) {
      walkAllDescendants(root.key, 1, result);
    }
    // Если не раскрыт — детей не показываем; пользователь видит "📂 N" и может кликнуть
  }
  return result;
}

// Строим плоский массив с deep-полем — родитель сверху, потом подзадачи (рекурсивно)
function buildTaskTree(filtered) {
  // Индекс всех задач из tasksState.list (не filtered) — нужен для подгрузки детей
  const allByKey = {};
  for (const t of tasksState.list) allByKey[t.key] = t;

  // Включаем в выборку только корни ИЛИ задачи родителя которых нет в filtered
  const filteredKeys = new Set(filtered.map(t => t.key));
  const rootCandidates = filtered.filter(t => !t.parentId || !filteredKeys.has(t.parentId));

  // Индекс детей в полном списке
  const childrenOf = {};
  for (const t of tasksState.list) {
    if (t.parentId) {
      if (!childrenOf[t.parentId]) childrenOf[t.parentId] = [];
      childrenOf[t.parentId].push(t);
    }
  }

  const result = [];
  const visited = new Set();
  function walk(t, depth) {
    if (visited.has(t.key)) return; // защита от циклов
    visited.add(t.key);
    result.push({ ...t, _depth: depth });
    const kids = childrenOf[t.key] || [];
    // Сортируем детей по дате создания (старые сверху)
    kids.sort((a, b) => (a.bitrixCreated || '').localeCompare(b.bitrixCreated || ''));
    for (const k of kids) walk(k, depth + 1);
  }
  // Сортируем корни по дате (новые сверху)
  rootCandidates.sort((a, b) => (b.bitrixCreated || '').localeCompare(a.bitrixCreated || ''));
  for (const r of rootCandidates) walk(r, 0);

  return result;
}

function renderTasksTable() {
  const c = document.getElementById('tasks-content');
  if (!c) return;
  if (tasksState.filtered.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">Задачи не найдены</div></div>`;
    return;
  }

  const ROW_HEIGHT = 48;
  const totalHeight = tasksState.filtered.length * ROW_HEIGHT;

  c.innerHTML = `
    <div class="dtable-wrap">
      <table class="dtable" style="table-layout:fixed">
        <thead>
          <tr>
            <th style="width:4%;text-align:center"><input type="checkbox" id="tasks-select-all-visible" title="Выделить все видимые" style="cursor:pointer;width:14px;height:14px"></th>
            <th style="width:44%">Название</th>
            <th style="width:14%">Статус</th>
            <th style="width:11%">Приоритет</th>
            <th style="width:15%">Исполнитель</th>
            <th style="width:7%">💬</th>
            <th style="width:5%">Дата</th>
          </tr>
        </thead>
      </table>
      <div class="vscroll-wrap" id="tasks-vscroll" style="height:calc(100vh - 240px);min-height:400px;overflow-y:auto;background:var(--bg2)">
        <div class="vscroll-spacer" style="height:${totalHeight}px;position:relative">
          <table class="dtable" style="table-layout:fixed;position:absolute;top:0;left:0;width:100%" id="tasks-vtable">
            <tbody id="tasks-vbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  const wrap = document.getElementById('tasks-vscroll');
  const vbody = document.getElementById('tasks-vbody');
  const vtable = document.getElementById('tasks-vtable');

  function renderVisible() {
    const VH = wrap.clientHeight;
    const visibleRows = Math.ceil(VH / ROW_HEIGHT) + 8;
    const scrollTop = wrap.scrollTop;
    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 4);
    const end = Math.min(tasksState.filtered.length, start + visibleRows);
    vtable.style.transform = `translateY(${start * ROW_HEIGHT}px)`;
    let html = '';
    for (let i = start; i < end; i++) {
      const t = tasksState.filtered[i];

      // "Ещё N" строка в smart режиме
      if (t._isMoreRow) {
        const indent = t._depth * 18;
        html += `<tr class="row task-more-row" data-parent-key="${escapeHtml(t._parentKey)}" style="height:${ROW_HEIGHT}px">
          <td colspan="7" style="padding-left:${indent + 24}px;color:var(--ac2);cursor:pointer;font-size:12px">
            <span>↓ Показать ещё ${t._hiddenCount} непрочитанных подзадач</span>
          </td>
        </tr>`;
        continue;
      }

      const stMeta = TASK_STATUS_META[t.status] || TASK_STATUS_META['1'];
      const prMeta = TASK_PRIORITY_META[t.priority] || TASK_PRIORITY_META['1'];
      const respUser = getUserById(t.responsibleUid);
      const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '—';
      const created = t.bitrixCreated ? new Date(t.bitrixCreated).toLocaleDateString('ru', { day: '2-digit', month: '2-digit', year: '2-digit' }) : '—';
      const unread = isTaskUnread(t);

      // Иерархия: для tree/smart — отступ + ↳, для flat — значок если есть подзадачи или родитель
      const depth = t._depth || 0;
      const indentPx = depth * 18;
      let prefix = '';
      // Считаем корневой подзадачи count из _subtasksCount (новый умный режим) или t.subtasksCount (legacy)
      const rootSubtasksCount = depth === 0 ? (t._subtasksCount ?? t.subtasksCount ?? 0) : 0;
      const isExpanded = depth === 0 && rootSubtasksCount > 0 && tasksState.expandedRows.has(t.key);
      if (depth > 0) {
        prefix = `<span style="display:inline-block;width:${indentPx}px"></span><span style="color:var(--t3);margin-right:4px">↳</span>`;
      } else if (rootSubtasksCount > 0) {
        // Кликабельный chevron — раскрывает/сворачивает все подзадачи
        const chev = isExpanded ? '▼' : '▶';
        prefix = `<span class="task-expand-toggle" data-toggle-key="${escapeHtml(t.key)}" title="${isExpanded ? 'Свернуть' : 'Раскрыть'} ${rootSubtasksCount} подзадач(и)" style="display:inline-block;cursor:pointer;color:var(--ac2);margin-right:6px;font-size:10px;user-select:none;padding:0 4px">${chev} ${rootSubtasksCount}</span>`;
      } else if (t.parentId) {
        prefix = `<span style="color:var(--t3);margin-right:4px;font-size:10px" title="Подзадача">↳</span>`;
      }

      // У корневой с непрочитанными где-то в дереве — бейдж "+N новых"
      let unreadKidsBadge = '';
      if (depth === 0 && t._unreadKidsCount > 0) {
        unreadKidsBadge = `<span class="task-unread-kids-badge">+${t._unreadKidsCount} новых</span>`;
      }
      // Сама задача непрочитана — точка
      const unreadDot = unread ? `<span class="task-unread-dot" title="Непрочитано"></span>` : '';
      const titleStyle = unread ? 'font-weight:700;color:var(--t1)' : '';

      const isSelected = tasksState.selected.has(t.key);
      html += `<tr class="row${unread ? ' unread' : ''}${isSelected ? ' selected' : ''}" data-key="${escapeHtml(t.key)}" style="height:${ROW_HEIGHT}px">
        <td class="select-cell" style="width:4%;text-align:center"><input type="checkbox" class="task-select-cb" data-key="${escapeHtml(t.key)}" ${isSelected ? 'checked' : ''} style="cursor:pointer;width:14px;height:14px"></td>
        <td class="name-cell" style="width:44%;max-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${titleStyle}">${unreadDot}${prefix}${escapeHtml(t.title)}${unreadKidsBadge}</td>
        <td style="width:14%"><span class="badge ${stMeta.class}">${escapeHtml(stMeta.label)}</span></td>
        <td style="width:11%"><span class="badge ${prMeta.class}">${escapeHtml(prMeta.label)}</span></td>
        <td style="width:15%;color:var(--ac2);font-size:11px">${escapeHtml(respName)}</td>
        <td style="width:7%;color:var(--t3)">${t.commentsCount > 0 ? t.commentsCount : ''}</td>
        <td style="width:5%;color:var(--t3);font-size:10px">${created}</td>
      </tr>`;
    }
    vbody.innerHTML = html;
    vbody.querySelectorAll('tr.row').forEach(tr => {
      if (tr.classList.contains('task-more-row')) {
        tr.addEventListener('click', () => {
          const parentKey = tr.dataset.parentKey;
          if (parentKey) {
            tasksState.expandedRows.add(parentKey);
            filterAndRenderTasks();
          }
        });
      } else if (tr.dataset.key) {
        // Чекбокс — отдельный handler, не пробрасывает к строке
        const cb = tr.querySelector('.task-select-cb');
        if (cb) {
          cb.addEventListener('click', (e) => e.stopPropagation());
          cb.addEventListener('change', () => {
            const k = cb.dataset.key;
            if (cb.checked) tasksState.selected.add(k);
            else tasksState.selected.delete(k);
            tr.classList.toggle('selected', cb.checked);
            updateBulkActionBar();
          });
        }
        tr.addEventListener('click', (e) => {
          // Клик по чекбоксу — пропускаем (handler выше)
          if (e.target.closest('.select-cell')) return;
          // Клик по chevron'у — раскрыть/свернуть, не открывать карточку
          const toggle = e.target.closest('.task-expand-toggle');
          if (toggle && toggle.dataset.toggleKey) {
            e.stopPropagation();
            const k = toggle.dataset.toggleKey;
            if (tasksState.expandedRows.has(k)) tasksState.expandedRows.delete(k);
            else tasksState.expandedRows.add(k);
            filterAndRenderTasks();
            return;
          }
          openTaskCard(tr.dataset.key);
        });
      }
    });
  }

  wrap.addEventListener('scroll', renderVisible, { passive: true });
  renderVisible();
  updateBulkActionBar();

  // Header checkbox: выделить/снять всё видимое (filtered)
  const selAllCb = document.getElementById('tasks-select-all-visible');
  if (selAllCb) {
    selAllCb.addEventListener('change', () => {
      if (selAllCb.checked) {
        for (const t of tasksState.filtered) {
          if (t._isMoreRow) continue;
          if (t.key) tasksState.selected.add(t.key);
        }
      } else {
        for (const t of tasksState.filtered) {
          if (t.key) tasksState.selected.delete(t.key);
        }
      }
      renderVisible();
      updateBulkActionBar();
    });
  }
}

          </label>
          <select id="be-status-val" style="margin-top:8px;width:100%;padding:8px 10px;background:var(--bg2);color:var(--t1);border:1px solid var(--b1);border-radius:6px;font-size:13px" disabled>
            <option value="2">Выполняется</option>
            <option value="3">Ждёт контроля</option>
            <option value="5">Завершена</option>
            <option value="6">Отложена</option>
            <option value="7">Отклонена</option>

          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t1);cursor:pointer">

            <span>Изменить <b>исполнителя</b> на:</span>
          </label>
          <select id="be-resp-val" style="margin-top:8px;width:100%;padding:8px 10px;background:var(--bg2);color:var(--t1);border:1px solid var(--b1);border-radius:6px;font-size:13px" disabled>

function closeBulkEditModal() {
  const o = document.getElementById('bulk-edit-overlay');
  if (o) o.remove();
  document.body.style.overflow = '';
}

async function applyBulkEdit() {
  const updates = {};
  if (document.getElementById('be-status-on').checked) {
    updates.status = parseInt(document.getElementById('be-status-val').value);
  }
  if (document.getElementById('be-priority-on').checked) {
    updates.priority = parseInt(document.getElementById('be-priority-val').value);
  }
  if (document.getElementById('be-resp-on').checked) {
    updates.responsibleBitrixId = document.getElementById('be-resp-val').value;
  }
  if (Object.keys(updates).length === 0) {
    document.getElementById('bulk-edit-result').innerHTML = '<span style="color:var(--rd)">Ничего не выбрано для изменения.</span>';
    return;
  }
  const taskKeys = Array.from(tasksState.selected);
  // Извлекаем bitrixId из ключей формата task_NNNNN
  const bitrixTaskIds = taskKeys.map(k => k.replace(/^task_/, '')).filter(Boolean);
  if (bitrixTaskIds.length === 0) {
    document.getElementById('bulk-edit-result').innerHTML = '<span style="color:var(--rd)">Не удалось определить ID задач.</span>';
    return;
  }
  const btn = document.getElementById('be-apply-btn');
  const resultEl = document.getElementById('bulk-edit-result');
  btn.disabled = true;
  btn.textContent = '⏳ Применяю...';
  resultEl.innerHTML = '<span style="color:var(--ac2)">Отправляю изменения в Битрикс...</span>';

  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const r = await fetch(WORKER_URL + '/api/tasks/bulk-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken, taskIds: bitrixTaskIds, updates }),
    });
    const data = await r.json();
    if (!r.ok || !data.ok) {
      resultEl.innerHTML = `<span style="color:var(--rd)">Ошибка: ${escapeHtml(data.error || `HTTP ${r.status}`)}</span>`;
      btn.disabled = false;
      btn.textContent = `Повторить`;
      return;
    }
    resultEl.innerHTML = `<span style="color:var(--gn)">✓ Успешно: ${data.success || 0}, ошибок: ${data.errors || 0}. Закрываю...</span>`;
    if (data.errorDetails && data.errorDetails.length > 0) {
      resultEl.innerHTML += `<div style="margin-top:6px;font-size:11px;color:var(--rd)">Примеры ошибок: ${data.errorDetails.slice(0, 3).map(e => escapeHtml(e.taskId + ': ' + e.error)).join('; ')}</div>`;
    }
    setTimeout(() => {
      tasksState.selected.clear();
      closeBulkEditModal();
      // Перерисовываем список — задачи изменены в Firebase, live listener подтянет
      filterAndRenderTasks();
    }, 1500);
  } catch (e) {
    resultEl.innerHTML = `<span style="color:var(--rd)">Сеть: ${escapeHtml(e.message)}</span>`;
    btn.disabled = false;
    btn.textContent = `Повторить`;
  }
}

// Floating action bar — появляется снизу когда что-то выделено
function updateBulkActionBar() {
  let bar = document.getElementById('bulk-action-bar');
  const count = tasksState.selected.size;
  if (count === 0) {
    if (bar) bar.remove();
    return;
  }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'bulk-action-bar';
    bar.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--ac);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);z-index:9999;font-size:13px';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <span style="color:var(--t1);font-weight:600">Выбрано: <span style="color:var(--ac)">${count}</span></span>
    <button id="bulk-select-filtered" style="padding:6px 12px;background:var(--bg3);color:var(--t1);border:1px solid var(--b1);border-radius:8px;cursor:pointer;font-size:12px">Выделить все по фильтру (${tasksState.filtered.filter(t => !t._isMoreRow).length})</button>
    <button id="bulk-edit-btn" style="padding:6px 12px;background:var(--ac);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">✏️ Изменить</button>
    <button id="bulk-clear-btn" style="padding:6px 10px;background:var(--bg3);color:var(--t2);border:1px solid var(--b1);border-radius:8px;cursor:pointer;font-size:12px">× Снять</button>
  `;
  document.getElementById('bulk-select-filtered').addEventListener('click', () => {
    for (const t of tasksState.filtered) {
      if (!t._isMoreRow && t.key) tasksState.selected.add(t.key);
    }
    filterAndRenderTasks();
  });
  document.getElementById('bulk-edit-btn').addEventListener('click', openBulkEditModal);
  document.getElementById('bulk-clear-btn').addEventListener('click', () => {
    tasksState.selected.clear();
    filterAndRenderTasks();
  });
}

// ─── KANBAN задач ─────────────────────────────────────────────
let _taskDragId = null;
let _taskKanbanScrollTimer = null;

const TASK_KANBAN_COLUMNS = [
  { id: '1', label: 'Новые', color: '#3fc8d8' },
  { id: '2', label: 'Ждут', color: '#a87fff' },
  { id: '3', label: 'Выполняются', color: '#7c5cfc' },
  { id: '4', label: 'Завершённые', color: '#3fd88e' },
  { id: '5', label: 'Отложенные', color: '#f5c842' },
  { id: '6', label: 'Отклонённые', color: '#f05975' },
];

function renderTasksKanban() {
  const c = document.getElementById('tasks-content');
  if (!c) return;
  const arr = tasksState.filtered;
  if (arr.length === 0) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">Задач не найдено</div></div>`;
    return;
  }

  // Группируем по статусу
  const byStatus = {};
  for (const col of TASK_KANBAN_COLUMNS) byStatus[col.id] = [];
  for (const t of arr) {
    if (byStatus[t.status]) byStatus[t.status].push(t);
    else (byStatus['1'] = byStatus['1'] || []).push(t);
  }

  let html = `<div class="kanban-wrap" id="tasks-kanban-wrap">`;
  const MAX_PER_COL = 100;
  for (const col of TASK_KANBAN_COLUMNS) {
    const cards = sortTasksByActivity(byStatus[col.id] || []);
    const unreadCount = cards.filter(t => isTaskUnread(t)).length;

    html += `<div class="kanban-col" data-status="${col.id}">
      <div class="kanban-col-header" style="border-top:3px solid ${col.color}">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <span class="stage-dot" style="background:${col.color}"></span>
          <span style="color:${col.color};font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em">${escapeHtml(col.label)}</span>
        </div>
        <span class="col-count" style="color:${col.color};background:${col.color}22;border:1px solid ${col.color}55">${cards.length.toLocaleString('ru')}${unreadCount > 0 ? ` <span style="color:var(--rd);font-weight:700">·${unreadCount}</span>` : ''}</span>
      </div>
      <div class="kanban-col-cards" data-status="${col.id}">`;

    for (const t of cards.slice(0, MAX_PER_COL)) {
      html += buildTaskKanbanCard(t, col.color);
    }
    if (cards.length > MAX_PER_COL) {
      html += `<div class="kanban-more">… ещё ${(cards.length - MAX_PER_COL).toLocaleString('ru')}</div>`;
    }
    if (cards.length === 0) {
      html += `<div class="kanban-empty" data-status="${col.id}">Перетащи сюда</div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;

  c.innerHTML = html;
  initTaskKanbanDragDrop();
  c.addEventListener('click', handleTaskKanbanCardAction);
}

function buildTaskKanbanCard(t, colColor) {
  const respUser = getUserById(t.responsibleUid);
  const respName = respUser ? `${respUser.lastName || ''} ${respUser.name || ''}`.trim() : '';
  const respShort = respName ? respName.split(' ').filter(Boolean).map(p => p[0]).slice(0, 2).join('').toUpperCase() : '?';
  const prMeta = TASK_PRIORITY_META[t.priority] || TASK_PRIORITY_META['1'];

  const created = t.bitrixCreated ? new Date(t.bitrixCreated).toLocaleDateString('ru', { day: '2-digit', month: '2-digit' }) : '';
  const deadline = t.deadline ? new Date(t.deadline) : null;
  const isOverdue = deadline && deadline < new Date() && !['4', '5', '6', '7'].includes(t.status);
  const deadlineStr = deadline ? deadline.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' }) : '';

  const unread = isTaskUnread(t);
  const titleStyle = unread ? 'font-weight:700' : '';
  const cardStyle = unread ? 'box-shadow:inset 4px 0 0 var(--ac);' : '';

  return `<div class="kanban-card${unread ? ' unread' : ''}" draggable="true" data-task-key="${escapeHtml(t.key)}" data-status="${escapeHtml(t.status)}" style="border-left:3px solid ${colColor};${cardStyle}">
    <div class="kanban-card-title" style="${titleStyle}">${unread ? '<span class="task-unread-dot"></span>' : ''}${escapeHtml(t.title || '(без названия)')}</div>
    ${t.subtasksCount > 0 ? `<div class="task-card-subs">📂 ${t.subtasksCount} подзадач(и)</div>` : ''}
    ${deadline ? `<div class="task-card-deadline" style="${isOverdue ? 'color:var(--rd);font-weight:600' : 'color:var(--t3)'}">📅 ${deadlineStr}${isOverdue ? ' · просрочено' : ''}</div>` : ''}
    <div class="kanban-card-foot">
      <div class="kanban-card-resp" title="${escapeHtml(respName || 'Без исполнителя')}">
        <span class="kanban-av">${escapeHtml(respShort)}</span>
        <span class="kanban-card-resp-name">${escapeHtml(respName.split(' ')[0] || '—')}</span>
      </div>
      ${t.priority && t.priority !== '1' ? `<span class="badge ${prMeta.class}" style="font-size:9px;padding:1px 6px">${escapeHtml(prMeta.label)}</span>` : ''}
      ${t.commentsCount > 0 ? `<span class="task-card-comments">💬 ${t.commentsCount}</span>` : ''}
    </div>
  </div>`;
}

function handleTaskKanbanCardAction(e) {
  const card = e.target.closest('.kanban-card');
  if (card && !e.defaultPrevented) {
    openTaskCard(card.dataset.taskKey);
  }
}

function initTaskKanbanDragDrop() {
  const wrap = document.getElementById('tasks-kanban-wrap');
  if (!wrap) return;

  wrap.querySelectorAll('.kanban-col-cards, .kanban-empty').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      col.classList.add('drag-over');
      const rect = wrap.getBoundingClientRect();
      const edge = 80;
      if (e.clientX > rect.right - edge) {
        if (!_taskKanbanScrollTimer) _taskKanbanScrollTimer = setInterval(() => { wrap.scrollLeft += 18; }, 16);
      } else if (e.clientX < rect.left + edge) {
        if (!_taskKanbanScrollTimer) _taskKanbanScrollTimer = setInterval(() => { wrap.scrollLeft -= 18; }, 16);
      } else {
        clearInterval(_taskKanbanScrollTimer);
        _taskKanbanScrollTimer = null;
      }
    });
    col.addEventListener('dragleave', () => {
      col.classList.remove('drag-over');
    });
    col.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      col.classList.remove('drag-over');
      clearInterval(_taskKanbanScrollTimer);
      _taskKanbanScrollTimer = null;
      const newStatus = col.dataset.status;
      if (newStatus && _taskDragId) {
        moveTaskToStatus(_taskDragId, newStatus);
      }
    });
  });

  wrap.querySelectorAll('.kanban-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      _taskDragId = card.dataset.taskKey;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      clearInterval(_taskKanbanScrollTimer);
      _taskKanbanScrollTimer = null;
      wrap.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      _taskDragId = null;
    });
  });
}

async function moveTaskToStatus(taskKey, newStatus) {
  const task = tasksState.list.find(t => t.key === taskKey);
  if (!task) return;
  if (task.status === newStatus) return;

  const oldStatus = task.status;
  task.status = newStatus;
  task.bitrixDateModify = new Date().toISOString();
  filterAndRenderTasks();

  try {
    const idToken = await fbAuth.currentUser.getIdToken();
    const dbUrl = WORKER_RTDB_URL;
    const r = await fetch(`${dbUrl}/tasks/${encodeURIComponent(taskKey)}.json?auth=${idToken}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status: parseInt(newStatus),
        bitrixChangedDate: new Date().toISOString(),
      }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    saveCacheTasksThrottled();
    showToast('Статус обновлён');
  } catch (e) {
    task.status = oldStatus;
    filterAndRenderTasks();
    showToast('Ошибка: ' + e.message, true);
  }
}
