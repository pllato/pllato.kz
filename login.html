<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход для команды — Pllato</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="pllato_favicon_64.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0a1628;
  --bronze: #b8895a;
  --bronze-deep: #8b6740;
  --bronze-tint: rgba(184, 137, 90, 0.08);
  --bg: #fafaf6;
  --surface: #ffffff;
  --text: #0f1620;
  --text-2: #4a5163;
  --text-3: #8a8d96;
  --line: #e8e2d4;
  --line-2: #ede9de;
  --red: #dc2626;
  --green: #16a34a;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.login-container { width: 100%; max-width: 440px; }
.brand-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 36px;
}
.brand-row img { height: 32px; }
.brand-row .tag {
  font-size: 12px; font-weight: 600;
  color: var(--text-3); padding-left: 14px; border-left: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: 16px;
  padding: 40px 32px 32px;
  box-shadow: 0 10px 40px -12px rgba(20, 30, 50, 0.08);
  text-align: center;
}
@media (max-width: 480px) { .login-card { padding: 28px 22px; } }
.login-card h1 {
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.025em;
  margin-bottom: 8px;
}
.login-card .subtitle {
  font-size: 14px; color: var(--text-2);
  margin-bottom: 32px; line-height: 1.5;
}
#google-signin-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 22px;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
}
#google-signin-btn:hover {
  border-color: var(--bronze);
  background: var(--bronze-tint);
}
#google-signin-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.google-icon { width: 20px; height: 20px; flex-shrink: 0; }
.note {
  margin-top: 20px;
  font-size: 12.5px; color: var(--text-3);
  line-height: 1.6;
}
.error {
  display: none;
  background: #fef2f2; color: #991b1b;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13.5px;
  margin-bottom: 20px;
  line-height: 1.5;
  text-align: left;
}
.error.show { display: block; }
.error strong { display: block; margin-bottom: 4px; font-size: 13px; }
.error code {
  background: rgba(0,0,0,.05);
  padding: 1px 5px; border-radius: 4px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
}
.loading {
  display: none;
  margin-bottom: 16px;
  font-size: 13.5px; color: var(--text-2);
}
.loading.show { display: block; }
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--line);
  border-top-color: var(--bronze);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-3);
  text-decoration: none;
}
.back-link:hover { color: var(--bronze-deep); }
</style>
</head>
<body>

<div class="login-container">

  <div class="brand-row">
    <img src="pllato_logo_transparent_navy.svg" alt="Pllato">
    <span class="tag">Вход для команды</span>
  </div>

  <div class="login-card">
    <h1>Войти в панель</h1>
    <p class="subtitle">Используйте корпоративный Google-аккаунт ELC, тот же что и для CRM.</p>

    <div class="error" id="error-msg"></div>
    <div class="loading" id="loading-msg"><span class="spinner"></span><span id="loading-text">Проверяем доступ...</span></div>

    <button id="google-signin-btn">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34.4 5.8 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.2-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34.4 5.8 29.4 4 24 4c-7.7 0-14.4 4.4-17.7 10.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.4-4.6 2.5-7.3 2.5-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.3 5.3C41.4 35.5 44 30.2 44 24c0-1.3-.2-2.6-.4-3.9z"/>
      </svg>
      <span>Войти через Google</span>
    </button>

    <div class="note">
      Доступ только для сотрудников команды.<br>
      Используйте тот же Google-аккаунт, что и для CRM.
    </div>

    <a href="index.html" class="back-link">← На главную</a>
  </div>

</div>

<!-- Firebase SDK — тот же что в team.html -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  onAuthStateChanged, signOut as fbSignOut
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
import {
  getDatabase, ref, get
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js';

// Тот же Firebase project что и team.html — единая система пользователей
const firebaseConfig = {
  apiKey: "AIzaSyC3Cw3nX6b1zpE1-lqW1whwUsPPUQ7TIhc",
  authDomain: "pllato-crm.firebaseapp.com",
  databaseURL: "https://pllato-crm-default-rtdb.firebaseio.com",
  projectId: "pllato-crm",
  storageBucket: "pllato-crm.firebasestorage.app",
  messagingSenderId: "690738857241",
  appId: "1:690738857241:web:2356e97c435656890ab188"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const errorEl = document.getElementById('error-msg');
const loadingEl = document.getElementById('loading-msg');
const loadingText = document.getElementById('loading-text');
const btn = document.getElementById('google-signin-btn');

function showError(title, detail) {
  errorEl.innerHTML = `<strong>${title}</strong>${detail || ''}`;
  errorEl.classList.add('show');
  loadingEl.classList.remove('show');
  btn.disabled = false;
}
function hideError() {
  errorEl.classList.remove('show');
}
function showLoading(text) {
  hideError();
  loadingText.textContent = text || 'Проверяем доступ...';
  loadingEl.classList.add('show');
  btn.disabled = true;
}

// Проверяем существует ли пользователь в /users по email
async function checkUserAccess(user) {
  try {
    showLoading('Проверяем ваш доступ в команде...');
    // UID Firebase Auth ≠ ключ /users (там другой UID), поэтому ищем по email
    const snap = await get(ref(db, 'users'));
    if (!snap.exists()) {
      return { ok: false, reason: 'no_users', message: 'База пользователей пуста. Обратитесь к администратору.' };
    }
    const users = snap.val();
    const userEmail = (user.email || '').toLowerCase().trim();

    let foundUser = null;
    let foundCrmUid = null;
    for (const [uid, u] of Object.entries(users)) {
      if (u && u.email && u.email.toLowerCase().trim() === userEmail) {
        foundUser = u;
        foundCrmUid = uid;
        break;
      }
    }

    if (!foundUser) {
      return {
        ok: false, reason: 'not_in_team',
        message: `Email <code>${userEmail}</code> не найден в базе сотрудников. Обратитесь к администратору, чтобы вас добавили.`
      };
    }
    return { ok: true, user: foundUser, crmUid: foundCrmUid };
  } catch (e) {
    console.error('checkUserAccess error:', e);
    const isPermission = (e.code || '').includes('PERMISSION_DENIED') || (e.message || '').includes('permission_denied');
    return {
      ok: false,
      reason: isPermission ? 'permissions' : 'firebase_error',
      message: isPermission
        ? 'Нет прав на чтение базы. Нужно обновить Firebase rules — обратитесь к администратору.'
        : 'Ошибка чтения базы: ' + e.message
    };
  }
}

// Слушаем состояние авторизации Firebase
onAuthStateChanged(auth, async (user) => {
  if (!user) return; // не авторизован — ждём клика на кнопку

  // Уже залогинен в Firebase — проверим есть ли в команде
  const result = await checkUserAccess(user);
  if (result.ok) {
    // Сохраняем профиль для быстрой загрузки app.html
    localStorage.setItem('pllato_user_cache', JSON.stringify({
      email: user.email,
      name: user.displayName || result.user.name || user.email.split('@')[0],
      photoURL: user.photoURL || '',
      authUid: user.uid,
      crmUid: result.crmUid,
      crmUserData: {
        name: result.user.name || '',
        lastName: result.user.lastName || '',
        position: result.user.position || '',
      },
      cachedAt: Date.now(),
    }));
    window.location.href = 'app.html';
  } else {
    // Залогинен в Google, но не в команде → выходим из Firebase, показываем ошибку
    await fbSignOut(auth);
    showError(
      result.reason === 'not_in_team' ? 'Доступ запрещён' : 'Ошибка',
      result.message
    );
  }
});

// Кнопка входа
btn.addEventListener('click', async () => {
  hideError();
  showLoading('Открываем окно Google...');
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    // onAuthStateChanged выше обработает результат
  } catch (e) {
    const code = e.code || '';
    if (code.includes('popup-closed-by-user')) {
      showError('Вход отменён', 'Окно Google было закрыто.');
    } else if (code.includes('popup-blocked')) {
      showError('Окно заблокировано', 'Браузер заблокировал всплывающее окно. Разрешите popups для pllato.kz.');
    } else if (code.includes('network-request-failed')) {
      showError('Нет интернета', 'Проверьте подключение и попробуйте ещё раз.');
    } else {
      showError('Ошибка входа', e.message || 'Попробуйте ещё раз');
    }
  }
});
</script>

</body>
</html>
