<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход для команды — Pllato</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="pllato_favicon_64.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #0a1628;
  --bronze: #b8895a;
  --bronze-deep: #8b6740;
  --bronze-tint: rgba(184, 137, 90, 0.08);
  --bg: #fafaf6;
  --surface: #ffffff;
  --text: #0f1620;
  --text-2: #4a5163;
  --text-3: #8a8d96;
  --line: #e8e2d4;
  --line-2: #ede9de;
  --red: #dc2626;
  --green: #16a34a;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  -webkit-font-smoothing: antialiased;
}
.login-container { width: 100%; max-width: 440px; }
.brand-row {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 36px;
}
.brand-row img { height: 32px; }
.brand-row .tag {
  font-size: 12px; font-weight: 600;
  color: var(--text-3); padding-left: 14px; border-left: 1px solid var(--line);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--line-2);
  border-radius: 16px;
  padding: 40px 32px 32px;
  box-shadow: 0 10px 40px -12px rgba(20, 30, 50, 0.08);
  text-align: center;
}
@media (max-width: 480px) { .login-card { padding: 28px 22px; } }
.login-card h1 {
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.025em;
  margin-bottom: 8px;
}
.login-card .subtitle {
  font-size: 14px; color: var(--text-2);
  margin-bottom: 32px; line-height: 1.5;
}
#google-signin-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 14px 22px;
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
}
#google-signin-btn:hover {
  border-color: var(--bronze);
  background: var(--bronze-tint);
}
#google-signin-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}
.google-icon { width: 20px; height: 20px; flex-shrink: 0; }
.note {
  margin-top: 20px;
  font-size: 12.5px; color: var(--text-3);
  line-height: 1.6;
}
.error {
  display: none;
  background: #fef2f2; color: #991b1b;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13.5px;
  margin-bottom: 20px;
  line-height: 1.5;
  text-align: left;
}
.error.show { display: block; }
.error strong { display: block; margin-bottom: 4px; font-size: 13px; }
.error code {
  background: rgba(0,0,0,.05);
  padding: 1px 5px; border-radius: 4px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
}
.loading {
  display: none;
  margin-bottom: 16px;
  font-size: 13.5px; color: var(--text-2);
}
.loading.show { display: block; }
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--line);
  border-top-color: var(--bronze);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--text-3);
  text-decoration: none;
}
.back-link:hover { color: var(--bronze-deep); }
</style>
</head>
<body>

<div class="login-container">

  <div class="brand-row">
    <img src="pllato_logo_transparent_navy.svg" alt="Pllato">
    <span class="tag">Вход для команды</span>
  </div>

  <div class="login-card">
    <h1>Войти в панель</h1>
    <p class="subtitle">Используйте корпоративный Google-аккаунт ELC, тот же что и для CRM.</p>

    <div class="error" id="error-msg"></div>
    <div class="loading" id="loading-msg"><span class="spinner"></span><span id="loading-text">Проверяем доступ...</span></div>

    <div id="google-signin-mount" style="display:flex;justify-content:center"></div>

    <div class="note">
      Доступ только для сотрудников команды.<br>
      Используйте тот же Google-аккаунт, что и для CRM.
    </div>

    <a href="index.html" class="back-link">← На главную</a>
  </div>

</div>

<script src="app.config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module">
import { getSession, mountGoogleButton } from './pllato-kz-shared/pllato-api.js';

const errorEl = document.getElementById('error-msg');
const loadingEl = document.getElementById('loading-msg');
const loadingText = document.getElementById('loading-text');
const mountEl = document.getElementById('google-signin-mount');

function showError(title, detail = '') {
  errorEl.innerHTML = `<strong>${title}</strong>${detail || ''}`;
  errorEl.classList.add('show');
  loadingEl.classList.remove('show');
}

function hideError() {
  errorEl.classList.remove('show');
}

function showLoading(text) {
  hideError();
  loadingText.textContent = text || 'Проверяем доступ...';
  loadingEl.classList.add('show');
}

function hideLoading() {
  loadingEl.classList.remove('show');
}

function cacheUserForApp(session) {
  const user = session?.user || {};
  localStorage.setItem('pllato_user_cache', JSON.stringify({
    email: user.email || '',
    name: user.name || (user.email || '').split('@')[0] || 'Сотрудник',
    photoURL: '',
    authUid: user.id || '',
    crmUid: user.id || '',
    flags: { isAdmin: !!user.isAdmin, isSuperAdmin: !!user.isSuperAdmin },
    apps: user.apps || {},
    crmUserData: {
      name: user.name || '',
      lastName: user.lastName || '',
      position: user.position || '',
    },
    cachedAt: Date.now(),
  }));
}

const existing = getSession();
if (existing?.token) {
  cacheUserForApp(existing);
  window.location.href = 'app.html';
}

showLoading('Подготавливаем вход Google...');
mountGoogleButton(mountEl, {
  onStatus: (text) => {
    if (text) showLoading(text);
    else hideLoading();
  },
  onDone: (session) => {
    cacheUserForApp(session);
    window.location.href = 'app.html';
  },
  onError: (error) => {
    const msg = String(error?.message || error || 'Не удалось войти');
    hideLoading();
    if (msg.includes('не в команде') || msg.includes('Пользователь не в команде')) {
      showError('Доступ запрещён', 'Этот Google-аккаунт не добавлен в команду.');
      return;
    }
    if (msg.includes('Нет доступа к Pllato CRM')) {
      showError('Нет доступа', 'Для этого аккаунта выключено приложение Pllato CRM.');
      return;
    }
    showError('Ошибка входа', msg);
  },
}).catch((error) => {
  hideLoading();
  showError('Не удалось запустить Google вход', String(error?.message || error || ''));
});
</script>

</body>
</html>
