name = "pllato-elc-worker"
main = "worker.js"
compatibility_date = "2025-01-01"
account_id = "d0655e161d8fca8487f88d55c0eeb215"

# ── Static assets ──
# Всё что в ./public/ Cloudflare отдаёт автоматически с правильными MIME.
# Worker имеет приоритет — если path совпадает с роутом в worker.js,
# обрабатывает worker, иначе assets. Используется для shared sip-client.js.
[assets]
directory = "./public"
binding = "ASSETS"

[vars]
FIREBASE_PROJECT_ID = "pllato-crm"
# JWT_SECRET для будущих собственных токенов (Phase 3+) — пока не используется
# Установить через: wrangler secret put JWT_SECRET

# ── D1 binding ──
# Заполни после создания базы:  wrangler d1 create pllato-elc-d1
[[d1_databases]]
binding = "DB"
database_name = "pllato-elc-d1"
database_id = "3e6c3138-5c6d-4239-ae09-2d60ca2ed0ab"

# ── R2 binding (мигрированные файлы из Bitrix24 disk) ──
[[r2_buckets]]
binding = "FILES"
bucket_name = "pllato-elc-files"

# ── Observability ──
[observability]
enabled = true
